<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0B1220">
  <title>RetIQ — Offline</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#0B1220;color:#E6EDF3}
    .wrap{max-width:720px;margin:0 auto;padding:40px 20px}
    .card{background:#121A2B;border:1px solid rgba(230,237,243,.12);border-radius:16px;padding:24px}
    h1{font-size:22px;margin:0 0 10px}
    p{line-height:1.5;margin:0 0 14px;color:rgba(230,237,243,.85)}
    a{color:#7DD3FC}
    .btn{display:inline-block;margin-top:6px;padding:10px 14px;border-radius:12px;background:rgba(125,211,252,.14);border:1px solid rgba(125,211,252,.25);text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>RetIQ is offline</h1>
      <p>You can still open RetIQ if it was cached previously. Otherwise, reconnect to the internet and reload.</p>
      <a class="btn" href="./">Try loading RetIQ</a>
    </div>
  </div>
</body>
</html>
