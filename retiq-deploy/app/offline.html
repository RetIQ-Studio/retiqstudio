<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#020617">
  <title>RetIQ — Offline</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #020617; color: #e2e8f0;
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .wrap { max-width: 480px; width: 100%; text-align: center; }
    .logo {
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; color: #fff;
      margin: 0 auto 24px; opacity: .6;
    }
    .card {
      background: #0f172a; border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px; padding: 36px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .offline-icon { font-size: 40px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    p  { font-size: 14px; color: #94a3b8; line-height: 1.65; margin-bottom: 24px; }
    .btn {
      display: inline-block; padding: 12px 28px; border-radius: 10px;
      background: rgba(59,130,246,.12); border: 1px solid rgba(59,130,246,.25);
      color: #60a5fa; font-size: 14px; font-weight: 600;
      text-decoration: none; font-family: inherit; cursor: pointer;
      transition: background .2s;
    }
    .btn:hover { background: rgba(59,130,246,.2); }
    .note { font-size: 11px; color: #334155; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">R</div>
    <div class="card">
      <div class="offline-icon">📴</div>
      <h1>You're offline</h1>
      <p>RetIQ works without internet once it's been loaded and cached. Try reopening the app — your data is safe on your device.</p>
      <a class="btn" href="./">Try loading RetIQ</a>
      <p class="note">All your retirement data is stored locally and never leaves your device.</p>
      <p class="note" style="margin-top:8px;"><a href="../" style="color:#1e293b;text-decoration:none;">← retiqstudio.com</a></p>
    </div>
  </div>
</body>
</html>
