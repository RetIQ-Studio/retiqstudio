    <input type="${inputType}" class="field-input${prefix?' has-prefix':''}${suffix?' has-suffix':''}" value="${displayVal}" ${ro ? 'readonly style="opacity:0.6;cursor:not-allowed"' : `onchange="${changeExpr}" ${extraAttr}`}>
    ${suffix ? `<span class="field-suffix">${suffix}</span>` : ''}
  </div>${help ? `<div class="field-help">${help}</div>` : ''}</div>`;
}

function computePlanHealth(proj) {
  const p = state.params;
  const totalAcct = p.accounts.reduce((s, a) => s + a.balance, 0);
  const preTaxBal = p.accounts.filter(a => a.type === 'pretax').reduce((s, a) => s + a.balance, 0);
  const final = proj[proj.length - 1].netWorth;
  const bust = proj.find(y => y.netWorth <= 0)?.age;
  const totalTax = proj.reduce((s, y) => s + y.tax, 0);
  const totalIRMAA = proj.reduce((s, y) => s + y.irmaa, 0);
  const totalRMD = proj.reduce((s, y) => s + y.rmd, 0);
  const peakRMD = Math.max(...proj.map(y => y.rmd));
  const totalConv = proj.reduce((s, y) => s + y.rothConv, 0);

  // -- Verdict --
  let grade, verdictText, verdictColor, verdictIcon;
  if (bust) {
    grade = 'critical';
    verdictColor = 'var(--red)';
    verdictIcon = '&#9888;';
    verdictText = `Your portfolio is projected to run out at age <strong>${bust}</strong>. This means ${p.endAge - bust} years without funds. This needs immediate attention.`;
  } else if (final < totalAcct * 0.2) {
    grade = 'caution';
    verdictColor = 'var(--amber)';
    verdictIcon = '&#9888;';
    verdictText = `Your money lasts through age ${p.endAge}, but with only <strong>${fmtK(final)}</strong> remaining — a thin margin. A bad sequence of returns or unexpected expenses could change the outcome.`;
  } else {
    grade = 'strong';
    verdictColor = 'var(--green)';
    verdictIcon = '&#10003;';
    verdictText = `Your money is projected to last through age ${p.endAge} with <strong>${fmtK(final)}</strong> remaining. Your plan has a solid foundation.`;
  }

  // -- Big Levers --
  const levers = [];

  // 1. Roth conversion opportunity / impact
  if (preTaxBal > 50000) {
    const noConvProj = runProjection({ ...p, rothConversion: { enabled: false } });
    const noConvTax = noConvProj.reduce((s, y) => s + y.tax, 0);
    const noConvIRMAA = noConvProj.reduce((s, y) => s + y.irmaa, 0);
    const noConvFinal = noConvProj[noConvProj.length - 1].netWorth;

    if (totalConv > 0) {
      // Currently converting — show the value
      const taxSaved = noConvTax - totalTax;
      const irmaaDelta = totalIRMAA - noConvIRMAA;
      const netBenefit = taxSaved - irmaaDelta;
      if (Math.abs(netBenefit) > 5000) {
        levers.push({
          magnitude: Math.abs(netBenefit),
          title: 'Roth Conversion Strategy',
          icon: '&#128260;',
          color: netBenefit > 0 ? 'var(--green)' : 'var(--amber)',
          amount: netBenefit > 0 ? fmt(netBenefit) : '-' + fmt(Math.abs(netBenefit)),
          amountLabel: netBenefit > 0 ? 'lifetime tax savings' : 'net cost vs. no conversions',
          desc: netBenefit > 0
            ? 'Your current conversion strategy is saving you money over doing nothing. Consider running the Optimizer to see if a different approach saves even more.'
            : 'Your current conversion strategy costs more in IRMAA surcharges than it saves in taxes. Consider Smart Fill or adjusting your target bracket.',
          action: "state.tab='inputs';state.inputTab='rothconv';render()",
          actionLabel: 'Go to Roth Conversions',
        });
      }
    } else {
      // Not converting — show the opportunity
      // Quick test: fill 22% bracket
      const testProj = runProjection({ ...p, rothConversion: {
        enabled: true, strategy: 'smartFill', startAge: p.retirementAge, endAge: Math.min(p.retirementAge + 7, 74), targetBracket: 0.22,
      }});
      const testTax = testProj.reduce((s, y) => s + y.tax, 0);
      const testIRMAA = testProj.reduce((s, y) => s + y.irmaa, 0);
      const potentialSaving = (noConvTax + noConvIRMAA) - (testTax + testIRMAA);
      if (potentialSaving > 10000) {
        levers.push({
          magnitude: potentialSaving,
          title: 'Roth Conversion Opportunity',
          icon: '&#128260;',
          color: 'var(--cyan)',
          amount: fmt(potentialSaving),
          amountLabel: 'potential lifetime tax savings',
          desc: `You have ${fmtK(preTaxBal)} in pre-tax accounts with no conversion plan. A Smart Fill strategy could save significantly in lifetime taxes and reduce future RMDs.`,
          action: "state.tab='inputs';state.inputTab='rothconv';render()",
          actionLabel: 'Explore Roth Conversions',
        });
      }
    }
  }

  // 2. Social Security claiming age (skip if SSDI overrides — auto-converts at FRA, can't delay)
  const ssdiPlanHealth = p.ssdiPrimary || {};
  if (p.ssClaimAge && p.ssClaimAge < 70 && !ssdiPlanHealth.enabled) {
    const delay70Proj = runProjection({ ...p, ssClaimAge: 70 });
    const delay70SS = delay70Proj.reduce((s, y) => s + y.ss, 0);
    const curSS = proj.reduce((s, y) => s + y.ss, 0);
    const ssDelta = delay70SS - curSS;
    if (ssDelta > 20000) {
      levers.push({
        magnitude: ssDelta,
        title: 'Social Security Timing',
        icon: '&#128176;',
        color: 'var(--blue)',
        amount: fmt(ssDelta),
        amountLabel: 'more lifetime SS income if you delay to 70',
        desc: `You're claiming at ${p.ssClaimAge}. Delaying to 70 increases your monthly benefit by ~${Math.round((70 - p.ssClaimAge) * 8)}% but requires bridging ${70 - p.ssClaimAge} more years from savings. The tradeoff depends on longevity.`,
        action: "state.tab='inputs';state.inputTab='ss';render()",
        actionLabel: 'Review SS Strategy',
      });
    }
  }

  // 3. IRMAA surcharges
  if (totalIRMAA > 5000) {
    levers.push({
      magnitude: totalIRMAA,
      title: 'Medicare IRMAA Surcharges',
      icon: '&#127973;',
      color: 'var(--pink)',
      amount: fmt(totalIRMAA),
      amountLabel: 'lifetime Medicare surcharges',
      desc: `Your income triggers Medicare income-related surcharges. ${totalConv > 0 ? 'Roth conversions are contributing — Smart Fill can avoid crossing IRMAA tiers.' : 'This is driven by your pre-tax withdrawals and other income.'} IRMAA uses a 2-year lookback, so decisions today affect premiums 2 years out.`,
      action: "state.tab='inputs';state.inputTab='medicare';render()",
      actionLabel: 'Review Medicare Costs',
    });
  }

  // 4. Pre-tax concentration risk
  const preTaxPct = totalAcct > 0 ? preTaxBal / totalAcct : 0;
  if (preTaxPct > 0.6 && preTaxBal > 200000) {
    const peakRmdPct = Math.round(peakRMD / Math.max(1, p.annualExpenses) * 100);
    levers.push({
      magnitude: Math.round(totalRMD * 0.22), // rough tax cost estimate
      title: 'Pre-Tax Concentration',
      icon: '&#9874;',
      color: 'var(--amber)',
      amount: Math.round(preTaxPct * 100) + '%',
      amountLabel: 'of your portfolio is pre-tax',
      desc: `${fmtK(preTaxBal)} in pre-tax accounts will generate forced RMDs starting at ${proj.find(y => y.rmdRequired)?.age || 73}. Peak RMD reaches ${fmtK(peakRMD)}/yr (${peakRmdPct}% of your expenses). This creates taxable income you can't control. Roth conversions before RMDs start can reduce this.`,
      action: "state.tab='inputs';state.inputTab='rothconv';render()",
      actionLabel: 'Explore Roth Conversions',
    });
  }

  // 5. Expense vulnerability
  const highExpProj = runProjection({ ...p, annualExpenses: Math.round(p.annualExpenses * 1.2) });
  const highExpBust = highExpProj.find(y => y.netWorth <= 0)?.age;
  if (highExpBust && !bust) {
    levers.push({
      magnitude: Math.round(p.annualExpenses * 0.2 * (p.endAge - p.retirementAge)),
      title: 'Expense Sensitivity',
      icon: '&#9888;',
      color: 'var(--red)',
      amount: 'Age ' + highExpBust,
      amountLabel: 'depletion if expenses rise 20%',
      desc: `A 20% increase in spending (to ${fmt(Math.round(p.annualExpenses * 1.2))}/yr) causes your plan to fail at age ${highExpBust}. Your margin is thin — consider building more buffer through higher savings, lower expenses, or delayed retirement.`,
      action: "state.tab='inputs';state.inputTab='expenses';render()",
      actionLabel: 'Review Expenses',
    });
  }

  // 6. Healthcare gap cost (early retirees)
  const hc = p.preMedicareHealthcare;
  const ssdiHC = p.ssdiPrimary || {};
  const planHealthMedAge = ssdiHC.enabled ? Math.min((ssdiHC.startAge || 0) + 2, 65) : 65;
  if (hc && hc.enabled && p.retirementAge < planHealthMedAge) {
    const gapYears = planHealthMedAge - p.retirementAge;
    const totalHC = proj.filter(y => y.age >= p.retirementAge && y.age < planHealthMedAge).reduce((s, y) => s + (y.healthcare || 0), 0);
    if (totalHC > 20000) {
      levers.push({
        magnitude: totalHC,
        title: 'Pre-Medicare Healthcare Gap',
        icon: '&#127974;',
        color: 'var(--amber)',
        amount: fmt(totalHC),
        amountLabel: `total cost over ${Math.round(gapYears)} gap years`,
        desc: `Retiring at ${p.retirementAge} means ${Math.round(gapYears)} years of self-funded healthcare before Medicare at ${planHealthMedAge}. At ${fmt(hc.annualCost || 0)}/yr growing at ${hc.inflation || 5}%, this is a significant expense to plan for.`,
        action: "state.tab='inputs';state.inputTab='healthcare';render()",
        actionLabel: 'Review Healthcare',
      });
    }
  }

  // Sort by dollar magnitude, take top 5
  levers.sort((a, b) => b.magnitude - a.magnitude);
  const topLevers = levers.slice(0, 5);

  // Count issues for verdict
  const issueCount = topLevers.filter(l => l.color !== 'var(--green)' && l.color !== 'var(--blue)').length;
  if (issueCount > 0 && grade === 'strong') {
    verdictText += ` You have <strong>${issueCount}</strong> area${issueCount > 1 ? 's' : ''} worth understanding.`;
  }

  return { grade, verdictText, verdictColor, verdictIcon, levers: topLevers, bust, final, totalTax, totalIRMAA, totalRMD, peakRMD };
}

function buildStrategyReport(proj) {
  const p = state.params;
  const goal = state.reportGoal || 'netWorth';
  const ssdi1r = p.ssdiPrimary || {};
  const ssdiOverridesPrimary = ssdi1r.enabled;
  const rc = p.rothConversion || {};
  const preTaxBal = p.accounts.filter(a => a.type === 'pretax').reduce((s, a) => s + a.balance, 0);

  // Extract metrics from a projection
  function metrics(pr) {
    const endNW = pr[pr.length - 1].netWorth;
    const bust = pr.find(y => y.netWorth <= 0)?.age || null;
    const lifeTax = pr.reduce((s, y) => s + y.tax, 0);
    const lifeIRMAA = pr.reduce((s, y) => s + y.irmaa, 0);
    const lifeSS = pr.reduce((s, y) => s + y.ss + y.ssdi, 0);
    const lifeRMD = pr.reduce((s, y) => s + y.rmd, 0);
    const endRoth = pr[pr.length - 1].roth;
    const endPreTax = pr[pr.length - 1].preTax;
    return { endNW, bust, lifeTax, lifeIRMAA, lifeSS, lifeRMD, endRoth, endPreTax };
  }

  const base = metrics(proj);

  // Build alternative strategies
  const alts = [];

  // --- SS TIMING ---
  if (!ssdiOverridesPrimary) {
    const fraAge = Math.round(fraMonths(p.birthYear || (new Date().getFullYear() - p.currentAge)) / 12);
    const ssAges = [62, fraAge, 70].filter(a => a !== p.ssClaimAge);
    for (const ssAge of ssAges) {
      const override = { ssClaimAge: ssAge };
      const label = ssAge === 62 ? 'SS at 62 (early)' : ssAge === fraAge ? `SS at FRA (${fraAge})` : 'SS at 70 (delayed)';
      const desc = ssAge < p.ssClaimAge ? 'Start SS earlier — less per month but more years of income'
        : 'Delay SS — larger monthly benefit, requires bridging from savings';
      try {
        const pr = runProjection({ ...p, ...override });
        const m = metrics(pr);
        alts.push({ label, desc, params: override, metrics: m, category: 'SS Timing' });
      } catch(e) {}
    }
  }

  // --- ROTH CONVERSIONS ---
  if (preTaxBal > 30000) {
    const rothStart = Math.max(p.retirementAge, p.currentAge);
    const rothEnd = Math.min(rothStart + 8, 74);
    if (rothStart <= rothEnd) {
    // Test Smart Fill 22% if not current strategy
    if (!rc.enabled || rc.strategy !== 'smartFill' || rc.targetBracket !== 0.22) {
      try {
        const pr = runProjection({ ...p, rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.22 }});
        alts.push({ label: 'Smart Fill Roth 22%', desc: 'IRMAA-aware conversions filling the 22% bracket', params: { rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.22 }}, metrics: metrics(pr), category: 'Roth Strategy' });
      } catch(e) {}
    }
    // Test Smart Fill 24%
    if (!rc.enabled || rc.strategy !== 'smartFill' || rc.targetBracket !== 0.24) {
      try {
        const pr = runProjection({ ...p, rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.24 }});
        alts.push({ label: 'Smart Fill Roth 24%', desc: 'Aggressive IRMAA-aware conversions filling the 24% bracket', params: { rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.24 }}, metrics: metrics(pr), category: 'Roth Strategy' });
      } catch(e) {}
    }
    // Test no conversions if currently converting
    if (rc.enabled) {
      try {
        const pr = runProjection({ ...p, rothConversion: { enabled: false }});
        alts.push({ label: 'No Roth Conversions', desc: 'Skip conversions entirely — compare the tax cost', params: { rothConversion: { enabled: false }}, metrics: metrics(pr), category: 'Roth Strategy' });
      } catch(e) {}
    }
    } // end rothStart <= rothEnd
  }

  // --- COMBINED: SS 70 + Roth ---
  if (!ssdiOverridesPrimary && p.ssClaimAge !== 70 && preTaxBal > 30000) {
    const rothStart = Math.max(p.retirementAge, p.currentAge);
    const rothEnd = Math.min(rothStart + 8, 74);
    if (rothStart <= rothEnd) {
      try {
        const pr = runProjection({ ...p, ssClaimAge: 70, rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.22 }});
        alts.push({ label: 'SS 70 + Smart Fill 22%', desc: 'Delay SS to max + Roth conversions to fill the gap years', params: { ssClaimAge: 70, rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.22 }}, metrics: metrics(pr), category: 'Combined' });
      } catch(e) {}
    }
  }

  // --- RETIREMENT AGE ---
  if (p.currentAge < p.retirementAge) {
    for (const delta of [1, 2]) {
      const newRetAge = p.retirementAge + delta;
      if (newRetAge <= 70 && newRetAge < p.endAge) {
        try {
          const pr = runProjection({ ...p, retirementAge: newRetAge });
          alts.push({ label: `Retire at ${newRetAge} (+${delta}yr)`, desc: `${delta} more year${delta>1?'s':''} of income, savings, and delayed withdrawals`, params: { retirementAge: newRetAge }, metrics: metrics(pr), category: 'Retirement Age' });
        } catch(e) {}
      }
    }
  }

  // --- SCORING ---
  const goalConfig = {
    netWorth: { key: 'endNW', label: 'Max End Net Worth', unit: '$', higher: true, fmt: v => fmtK(v) },
    minTax:   { key: 'lifeTax', label: 'Min Lifetime Taxes', unit: '$', higher: false, fmt: v => fmtK(v) },
    minTaxIRMAA: { key: m => m.lifeTax + m.lifeIRMAA, label: 'Min Tax + IRMAA', unit: '$', higher: false, fmt: v => fmtK(v) },
    maxIncome: { key: 'lifeSS', label: 'Max SS Income', unit: '$', higher: true, fmt: v => fmtK(v) },
  };
  const gc = goalConfig[goal] || goalConfig.netWorth;
  const getScore = (m) => typeof gc.key === 'function' ? gc.key(m) : m[gc.key];
  const baseScore = getScore(base);

  // Rank alternatives
  alts.forEach(a => { a.score = getScore(a.metrics); a.delta = a.score - baseScore; });
  alts.sort((a, b) => gc.higher ? (b.score - a.score) : (a.score - b.score));

  // Find the best alternative
  const best = alts[0];
  const bestIsBetter = best && (gc.higher ? best.score > baseScore : best.score < baseScore);

  // Render goal selector
  const goals = [
    { id: 'netWorth', label: 'Max Net Worth' },
    { id: 'minTax', label: 'Min Taxes' },
    { id: 'minTaxIRMAA', label: 'Min Tax + IRMAA' },
    { id: 'maxIncome', label: 'Max SS Income' },
  ];
  const goalBtns = goals.map(g =>
    `<button class="scenario-btn${goal === g.id ? ' active' : ''}" style="font-size:11px;padding:5px 12px" onclick="state.reportGoal='${g.id}';render()">${g.label}</button>`
  ).join('');

  // Build table
  let rows = '';
  // Current plan row
  rows += `<tr style="background:rgba(59,130,246,0.06)">
    <td style="font-weight:600;color:var(--text)">&#10003; Current Plan</td>
    <td style="color:var(--text-faint);font-size:11px">Your current settings</td>
    <td style="font-weight:600">${fmtK(base.endNW)}</td>
    <td>${fmtK(base.lifeTax)}</td>
    <td>${fmtK(base.lifeIRMAA)}</td>
    <td>${fmtK(base.lifeSS)}</td>
    <td>${base.bust ? '<span style="color:var(--red)">Age '+base.bust+'</span>' : '<span style="color:var(--green)">'+p.endAge+'+</span>'}</td>
    <td style="color:var(--text-faint)">—</td>
    <td></td>
  </tr>`;

  alts.forEach((a, i) => {
    const delta = a.delta;
    const isBest = i === 0 && bestIsBetter;
    const deltaStr = delta === 0 ? '—'
      : ((gc.higher ? delta > 0 : delta < 0) ? '<span style="color:var(--green)">' : '<span style="color:var(--red)">') + (delta > 0 ? '+' : '') + fmtK(delta) + '</span>';
    // Only show NW delta annotation when the selected goal isn't already net worth
    const nwDelta = goal !== 'netWorth' ? a.metrics.endNW - base.endNW : 0;
    const nwDeltaStr = nwDelta === 0 ? '' : ' <span style="font-size:10px;color:' + (nwDelta > 0 ? 'var(--green)' : 'var(--red)') + '">(' + (nwDelta > 0 ? '+' : '') + fmtK(nwDelta) + ')</span>';
    // Build apply onclick — replace (not merge) params to avoid stale keys
    const applyFn = `(function(){var o=${JSON.stringify(a.params)};for(var k in o){state.params[k]=o[k]}state.mcResults=null;saveState();render()})()`;

    rows += `<tr${isBest ? ' style="background:rgba(16,185,129,0.06)"' : ''}>
      <td style="white-space:nowrap">${isBest ? '<span style="color:var(--green);font-weight:600">★</span> ' : ''}${a.label}${isBest ? ' <span style="font-size:10px;color:var(--green);font-weight:600">BEST</span>' : ''}</td>
      <td style="color:var(--text-faint);font-size:11px">${a.desc}</td>
      <td>${fmtK(a.metrics.endNW)}${nwDeltaStr}</td>
      <td>${fmtK(a.metrics.lifeTax)}</td>
      <td>${fmtK(a.metrics.lifeIRMAA)}</td>
      <td>${fmtK(a.metrics.lifeSS)}</td>
      <td>${a.metrics.bust ? '<span style="color:var(--red)">Age '+a.metrics.bust+'</span>' : '<span style="color:var(--green)">'+p.endAge+'+</span>'}</td>
      <td style="font-weight:600">${deltaStr}</td>
      <td><button class="scenario-btn" style="font-size:10px;padding:3px 8px" onclick="${applyFn.replace(/"/g,'&quot;')}">Apply</button></td>
    </tr>`;
  });

  // Insight summary
  let insight = '';
  if (bestIsBetter && best) {
    const absDelta = Math.abs(best.delta);
    insight = `<div style="margin-top:12px;padding:12px 14px;background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);border-radius:8px;font-size:13px;color:var(--text-dim);line-height:1.7">
      <strong style="color:var(--green)">★ Top opportunity:</strong> <strong style="color:var(--text)">${best.label}</strong> ${gc.higher ? 'adds' : 'saves'} <strong style="color:var(--green)">${gc.fmt(absDelta)}</strong> in ${gc.label.toLowerCase()} compared to your current plan.
      ${best.metrics.bust && !base.bust ? '<br><span style="color:var(--red)">⚠ Warning: this strategy depletes your portfolio at age ' + best.metrics.bust + '.</span>' : ''}
      ${!best.metrics.bust && base.bust ? '<br><span style="color:var(--green)">✓ This strategy keeps your portfolio funded through age ' + p.endAge + '.</span>' : ''}
    </div>`;
  } else if (alts.length > 0) {
    insight = `<div style="margin-top:12px;padding:12px 14px;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.2);border-radius:8px;font-size:13px;color:var(--text-dim);line-height:1.7">
      <strong style="color:var(--blue)">Your current plan is already well-optimized</strong> for ${gc.label.toLowerCase()}. None of the alternatives tested improve on it. Fine-tune with the Roth Optimizer or Scenario Comparison for deeper analysis.
    </div>`;
  }

  if (alts.length === 0) {
    return `<div class="card" data-accent="green">
      <div class="card-title">Strategy Report Card <span class="badge" style="background:rgba(16,185,129,0.15);color:var(--green)">What-If</span></div>
      <div style="font-size:13px;color:var(--text-dim);line-height:1.7">No alternative strategies to test for your current configuration. Add retirement accounts or adjust your retirement age to enable comparisons.</div>
    </div>`;
  }

  return `<div class="card" data-accent="green">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px">
      <div class="card-title" style="margin:0">Strategy Report Card <span class="badge" style="background:rgba(16,185,129,0.15);color:var(--green)">What-If</span></div>
      <div style="font-size:11px;color:var(--text-dim)">Tests ${alts.length} alternatives against your current plan</div>
    </div>
    <div style="font-size:13px;color:var(--text-dim);margin-bottom:12px;line-height:1.6">
      What matters most to you? Select a goal and see which strategy changes would have the biggest impact. Each alternative runs a full projection with all your inputs.
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">${goalBtns}</div>
    <div style="overflow-x:auto">
      <table class="proj-table" style="font-size:12px;white-space:nowrap">
        <thead><tr>
          <th style="text-align:left">Strategy</th>
          <th style="text-align:left">Description</th>
          <th>End NW</th>
          <th>Lifetime Tax</th>
          <th>IRMAA</th>
          <th>Lifetime SS</th>
          <th>Lasts To</th>
          <th style="color:var(--green)">Δ ${gc.label}</th>
          <th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${insight}
  </div>`;
}

function renderDashboard(proj) {
  const p = state.params;
  const totalAcct = p.accounts.reduce((s, a) => s + a.balance, 0);
  const peak = Math.max(...proj.map(y => y.netWorth));
  const final = proj[proj.length - 1].netWorth;
  const bust = proj.find(y => y.netWorth <= 0)?.age;
  const totalTax = proj.reduce((s, y) => s + y.tax, 0);
  const totalRMD = proj.reduce((s, y) => s + y.rmd, 0);
  const totalIRMAA = proj.reduce((s, y) => s + y.irmaa, 0);
  const rmdStartYr = proj.find(y => y.rmdRequired);
  const peakRMD = Math.max(...proj.map(y => y.rmd));

  // Compute Plan Health
  const health = computePlanHealth(proj);

  // Build net worth chart keys dynamically based on which accounts have data
  const nwKeys = [], nwColors = [], nwLabels = [];
  if (proj.some(y => y.preTax !== 0)) { nwKeys.push('preTax'); nwColors.push('#3b82f6'); nwLabels.push('Pre-Tax'); }
  if (proj.some(y => y.roth !== 0)) { nwKeys.push('roth'); nwColors.push('#10b981'); nwLabels.push('Roth'); }
  if (proj.some(y => y.taxable !== 0)) { nwKeys.push('taxable'); nwColors.push('#f59e0b'); nwLabels.push('Taxable'); }
  if (nwKeys.length === 0) { nwKeys.push('netWorth'); nwColors.push('#3b82f6'); nwLabels.push('Net Worth'); }

  // Plan Health Verdict
  const verdictBg = health.grade === 'critical' ? 'rgba(239,68,68,0.08)' : health.grade === 'caution' ? 'rgba(245,158,11,0.08)' : 'rgba(16,185,129,0.08)';
  const verdictBorder = health.grade === 'critical' ? 'rgba(239,68,68,0.25)' : health.grade === 'caution' ? 'rgba(245,158,11,0.25)' : 'rgba(16,185,129,0.25)';

  const verdictHtml = `<div style="background:${verdictBg};border:1px solid ${verdictBorder};border-radius:10px;padding:16px 20px;margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <span style="font-size:20px;color:${health.verdictColor}">${health.verdictIcon}</span>
      <span style="font-size:16px;font-weight:700;color:${health.verdictColor}">${
        health.grade === 'critical' ? 'Your Plan Needs Attention' : health.grade === 'caution' ? 'Your Plan Has Thin Margins' : 'Your Plan Looks Strong'
      }</span>
    </div>
    <div style="font-size:13.5px;color:var(--text-dim);line-height:1.7">${health.verdictText}</div>
  </div>`;

  // Big Levers cards
  let leversHtml = '';
  if (health.levers.length > 0) {
    const cards = health.levers.map(lev => `
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;flex:1;min-width:220px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
          <span style="font-size:14px">${lev.icon}</span>
          <span style="font-size:12px;font-weight:600;color:var(--text)">${lev.title}</span>
        </div>
        <div style="font-size:22px;font-weight:800;color:${lev.color};margin-bottom:2px">${lev.amount}</div>
        <div style="font-size:11px;color:var(--text-faint);margin-bottom:8px">${lev.amountLabel}</div>
        <div style="font-size:12px;color:var(--text-dim);line-height:1.6;margin-bottom:10px">${lev.desc}</div>
        <button class="scenario-btn" style="font-size:11px;padding:4px 12px;color:${lev.color};border-color:${lev.color}" onclick="${lev.action}">${lev.actionLabel} &rarr;</button>
      </div>
    `).join('');
    leversHtml = `<div style="margin-bottom:16px">
      <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px">Highest-Impact Areas for Your Situation</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">${cards}</div>
    </div>`;
  }

  return `
    ${!isPro() ? `<div style="background:linear-gradient(135deg,rgba(59,130,246,0.12),rgba(6,182,212,0.12));border:1px solid rgba(59,130,246,0.3);border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="font-size:13px;color:var(--text)"><strong>&#128101; Demo Mode</strong> &mdash; Viewing the Johnson family sample plan. <span style="color:var(--text-dim)">Upgrade to enter your own data.</span></div>
      <button class="pro-gate-btn" onclick="document.getElementById('buyBtn').click()" style="font-size:11px;padding:6px 14px">Upgrade &mdash; $29 launch price</button>
    </div>` : ''}

    ${verdictHtml}
    ${leversHtml}

    <div class="stats-row">
      <div class="stat"><div class="stat-label">Current Net Worth</div><div class="stat-value" style="color:var(--blue)">${fmtK(totalAcct)}</div></div>
      <div class="stat"><div class="stat-label">Peak Net Worth</div><div class="stat-value" style="color:var(--cyan)">${fmtK(peak)}</div></div>
      <div class="stat"><div class="stat-label">End Net Worth</div><div class="stat-value" style="color:${final>0?'var(--green)':'var(--red)'}">${fmtK(final)}</div></div>
      <div class="stat"><div class="stat-label">Retire Age</div><div class="stat-value" style="color:var(--amber)">${p.retirementAge}</div></div>
      <div class="stat"><div class="stat-label">Money Lasts</div><div class="stat-value" style="color:${bust?'var(--red)':'var(--green)'}">${bust?'Age '+bust:p.endAge+'+'}</div><div class="stat-sub">${bust? 'Runs out': 'Funded'}</div></div>
      <div class="stat"><div class="stat-label">RMDs Start</div><div class="stat-value" style="color:var(--purple)">${rmdStartYr?'Age '+rmdStartYr.age:'N/A'}</div><div class="stat-sub">Peak: ${fmtK(peakRMD)}/yr</div></div>
      <div class="stat"><div class="stat-label">IRMAA Surcharges</div><div class="stat-value" style="color:var(--pink)">${fmtK(totalIRMAA)}</div><div class="stat-sub">Lifetime total</div></div>
      ${(() => {
        const lg = p.legacy || {};
        if (!lg.enabled || !lg.targetAmount) return '';
        const pct = Math.min(100, Math.round(Math.max(0, final) / lg.targetAmount * 100));
        const color = pct >= 100 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';
        return '<div class="stat"><div class="stat-label">Legacy Goal</div><div class="stat-value" style="color:'+color+'">'+pct+'%</div><div class="stat-sub">' + fmtK(final) + ' / ' + fmtK(lg.targetAmount) + '</div></div>';
      })()}
    </div>

    <div class="grid-2">
      <div class="card" data-accent="blue">${buildChart(proj, nwKeys, nwColors, nwLabels, { title:'Net Worth Over Time', stacked: nwKeys.length > 1, height:180 })}</div>
      <div class="card" data-accent="cyan">${buildChart(proj, ['totalInc','expenses'], ['#06b6d4','#ef4444'], ['Total Income','Expenses'], { title:'Income vs Expenses', height:180 })}</div>
      <div class="card" data-accent="purple">${buildChart(proj, ['tax','rmd'], ['#8b5cf6','#ec4899'], ['Total Tax','RMD Amount'], { title:'Taxes & RMDs', height:160 })}</div>
      <div class="card" data-accent="green">${buildChart(
        proj.filter(y => y.retired).map(y => ({...y, ssTotal: (y.ss||0) + (y.ssdi||0)})),
        ['ssTotal','withdrawal','medicareCost'],
        ['#10b981','#f59e0b','#ec4899'],
        ['SS & SSDI','Withdrawal','Medicare'],
        { title:'Retirement Cash Flows', height:160 }
      )}</div>
    </div>

    ${buildStrategyReport(proj)}

    <div class="card"><div class="card-title">Plan Summary</div>
      <div style="font-size:13px;line-height:1.8;color:var(--text-dim)">
        You are <strong style="color:var(--text)">${p.currentAge}</strong>, retiring at
        <strong style="color:var(--amber)">${p.retirementAge}</strong>.
        Household income: <strong style="color:var(--text)">${fmt(p.annualIncome + (p.spouseIncome||0))}/yr</strong> (growing ${p.incomeGrowth || 0}%/yr),
        saving <strong style="color:var(--green)">${fmt(p.annualSavings + (p.spouseSavings||0))}/yr</strong> (growing ${p.savingsGrowth || 0}%/yr).
        ${p.preRetirementExpenses > 0 ? `Pre-retirement expenses: <strong style="color:var(--red)">${fmt(p.preRetirementExpenses)}/yr</strong> (${p.preRetirementExpenseInflation !== undefined ? p.preRetirementExpenseInflation : p.inflation}% inflation). ` : ''}
        Portfolio: <strong style="color:var(--blue)">${fmtK(totalAcct)}</strong>.
        ${rmdStartYr ? `<span class="badge badge-rmd">RMD</span> Required Minimum Distributions begin at age <strong>${rmdStartYr.age}</strong>. ` : ''}
        ${totalIRMAA > 0 ? `<span class="badge badge-irmaa">IRMAA</span> Medicare surcharges total <strong style="color:var(--pink)">${fmtK(totalIRMAA)}</strong> over your lifetime. ` : ''}
        ${(() => { const tc = proj.reduce((s,y)=>s+y.rothConv,0); return tc > 0 ? `<span class="badge badge-roth">ROTH CONV</span> Converting <strong style="color:var(--cyan)">${fmtK(tc)}</strong> from pre-tax to Roth (ages ${p.rothConversion?.startAge}-${p.rothConversion?.endAge}). ` : ''; })()}
        ${final > 0
          ? `Portfolio reaches <strong style="color:var(--green)">${fmtK(final)}</strong> at age ${p.endAge}.`
          : `<span style="color:var(--red)">Portfolio depleted at age <strong>${bust}</strong>.</span>`}
        ${(() => {
          const lg = p.legacy || {};
          if (!lg.enabled || !lg.targetAmount) return '';
          return final >= lg.targetAmount
            ? ` <span style="color:var(--green)">&#10003; Legacy goal of ${fmtK(lg.targetAmount)} met -- surplus of ${fmtK(final - lg.targetAmount)}.</span>`
            : ` <span style="color:var(--amber)">! Legacy goal of ${fmtK(lg.targetAmount)} not met -- shortfall of ${fmtK(lg.targetAmount - Math.max(0,final))}.</span>`;
        })()}
        ${(() => {
          const dTotal = proj.reduce((s,y) => s + (y.debtPayments||0), 0);
          return dTotal > 0 ? ` Lifetime debt payments: <strong style="color:var(--red)">${fmtK(dTotal)}</strong>.` : '';
        })()}
        ${(() => {
          const ltTotal = proj.reduce((s,y) => s + (y.ltcCost||0), 0);
          return ltTotal > 0 ? ` Long-term care costs: <strong style="color:var(--pink)">${fmtK(ltTotal)}</strong>.` : '';
        })()}
      </div>
    </div>`;
}

function renderInputs() {
  const p = state.params;
  const tabs = ['personal','income','expenses','pension','accounts','ss','ssdi','debts','healthcare','medicare','rothconv','charity','legacy','assumptions'];
  const names = ['Personal','Income','Expenses','Pension','Accounts','Social Security','SSDI','Liabilities','Healthcare','Medicare','Roth Conv.','Charity/QCD','Legacy','Assumptions'];

          const adjWith = projWith[i].netWorth - cumTaxWith;
          const adjWithout = projWithout[i].netWorth - cumTaxWithout;
          if (i >= convStartIdx && i > 0) {
            const prevCTW = cumTaxWith - (projWith[i].tax || 0);
            const prevCTWO = cumTaxWithout - (projWithout[i].tax || 0);
            const prevAdj = projWith[i-1].netWorth - prevCTW;
            const prevAdjBase = projWithout[i-1].netWorth - prevCTWO;
            if (prevAdj < prevAdjBase && adjWith >= adjWithout) breakevenAge = projWith[i].age;
          }
        }
        // Check if ever behind
        cumTaxWith = 0; cumTaxWithout = 0;
        let everBehind = false;
        for (let i = 0; i < projWith.length; i++) {

          cumTaxWithout += projWithout[i].tax || 0;
          if (i >= convStartIdx && (projWith[i].netWorth - cumTaxWith) < (projWithout[i].netWorth - cumTaxWithout)) {

      const neverCatchesUp = breakevenAge === null && convStartIdx >= 0;

      // Positive = conversions winning, negative = still paying back upfront tax cost
      let ctW = 0, ctWO = 0;

        ctW += w.tax || 0;
        ctWO += projWithout[i].tax || 0;

        const adjWithout = projWithout[i].netWorth - ctWO;

        </div>

        Set a target amount you want to leave behind for heirs, charity, or other purposes.
        The dashboard will track progress toward this goal, and you can use other tabs to adjust strategies
        (Roth conversions, expense phases, charitable giving) to maximize or protect the legacy.
      </div>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text);margin-bottom:14px">
        <input type="checkbox" ${lg.enabled?'checked':''} onchange="setLegacy('enabled',this.checked)" style="width:16px;height:16px;accent-color:var(--green)">
        Enable Legacy Goal
      </label>
      ${lg.enabled ? `
        <div class="field"><label class="field-label">Target Legacy Amount</label><div class="field-wrap"><span class="field-prefix">$</span>
          <input type="text" inputmode="decimal" class="field-input has-prefix" value="${fmtC(lg.targetAmount||500000)}" onfocus="this.value=this.value.replace(/,/g,'')" onblur="this.value=fmtC(parseC(this.value))" onchange="setLegacy('targetAmount',parseC(this.value))">
        </div><div class="field-help">Net worth you want to leave at end of plan (age ${p.endAge})</div></div>

        <div style="margin:16px 0">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-bottom:6px">
            <span>Progress: ${pct}%</span>
            <span>${fmtK(Math.max(0, final))} / ${fmtK(lg.targetAmount||0)}</span>
          </div>
          <div style="height:20px;background:var(--bg-base);border-radius:10px;overflow:hidden;border:1px solid var(--border)">
            <div style="height:100%;width:${Math.min(100, pct)}%;background:${barColor};border-radius:10px;transition:width 0.5s"></div>
          </div>
        </div>

        <div class="grid-2">
          <div class="info-box"><div class="info-box-label">Projected End Net Worth</div>
            <div class="info-box-value" style="color:${final>0?'var(--green)':'var(--red)'}">${fmtK(final)}</div></div>
          <div class="info-box"><div class="info-box-label">${surplus >= 0 ? 'Surplus' : 'Shortfall'}</div>
            <div class="info-box-value" style="color:${surplus>=0?'var(--green)':'var(--red)'}">${fmtK(Math.abs(surplus))}</div></div>
        </div>

        <div style="margin-top:16px;padding:14px;background:var(--bg-base);border-radius:8px;border:1px solid var(--border)">
          <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">Strategies to Grow Legacy</div>
          <div style="font-size:12px;color:var(--text-dim);line-height:1.8">
            ${surplus < 0 ? `
              <div>* <strong>Reduce expenses</strong> -- even $${Math.round(Math.abs(surplus)/(p.endAge-p.retirementAge)/12).toLocaleString()}/mo could close the gap</div>
              <div>* <strong>Delay retirement</strong> -- each year adds income + savings + delayed SS</div>
              <div>* <strong>Roth conversions</strong> -- tax-free growth can compound significantly</div>
              <div>* <strong>Expense phases</strong> -- reduce spending in later retirement years</div>
            ` : `
              <div style="color:var(--green)">&#10003; Your current plan meets your legacy goal with a surplus of <strong>${fmtK(surplus)}</strong>.</div>
              <div>* Consider increasing charitable giving (QCDs reduce taxes)</div>
              <div>* Roth accounts pass to heirs tax-free -- maximize Roth conversions</div>
            `}
          </div>
        </div>

        <div class="field" style="margin-top:14px"><label class="field-label">Notes</label>
          <textarea class="field-input" rows="2" style="resize:vertical;font-size:13px;padding:8px" placeholder="e.g., Trust for children, charity endowment..." onchange="setLegacy('notes',this.value)">${lg.notes||''}</textarea>
        </div>
      ` : ''}
    </div>`;
  }

  if (state.inputTab === 'medicare') {
    const proj = runProjection(p);
    const ssdi1d = p.ssdiPrimary || {};
    const ssdi2d = p.ssdiSpouse || {};
    const primaryMedAgeCalc = ssdi1d.enabled ? Math.min((ssdi1d.startAge || 0) + 2, 65) : 65;
    const spouseMedAgeCalc = ssdi2d.enabled ? Math.min((ssdi2d.startAge || 0) + 2, 65) : 65;
    const hasSpouseMed = p.spouseEnabled || (p.spouseAge && p.spouseAge > 0);
    // Convert spouse Medicare age to primary's age scale
    const spMedInPrimAge = hasSpouseMed ? spouseMedAgeCalc + (p.currentAge - (p.spouseAge || 0)) : 999;
    const primaryMedAge = hasSpouseMed ? Math.min(primaryMedAgeCalc, spMedInPrimAge) : primaryMedAgeCalc;
    const medicareYears = proj.filter(y => y.age >= primaryMedAge);
    const totalMedicare = medicareYears.reduce((s,y) => s + y.medicareCost, 0);
    const totalSurcharge = medicareYears.reduce((s,y) => s + y.irmaa, 0);
    const hasSpouse = p.spouseEnabled || (p.spouseAge && p.spouseAge > 0);
    const irmaaBrackets = hasSpouse ? IRMAA_BRACKETS_MFJ : IRMAA_BRACKETS_SINGLE;
    const irmaaLabel = hasSpouse ? 'MFJ' : 'Single';
    const irmaaBaseThresh = hasSpouse ? '$212K' : '$106K';

    content += `<div class="card" data-accent="pink"><div class="card-title">Medicare IRMAA Impact <span class="badge badge-irmaa">Income-Based</span></div>
      ${primaryMedAge < 65 ? `<div style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--text-dim);line-height:1.6">
        <strong style="color:var(--blue)">&#9432; SSDI Early Medicare</strong> &mdash; Due to SSDI, household Medicare eligibility begins at age <strong>${primaryMedAge}</strong> (24-month qualifying period), ${65 - primaryMedAge} years earlier than standard age 65.
        ${ssdi1d.enabled && ssdi2d.enabled ? ' Both you and spouse qualify early via SSDI.' : ssdi2d.enabled && primaryMedAgeCalc === 65 ? ' (via spouse SSDI)' : ''}
      </div>` : ''}
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:12px;line-height:1.6">
        Medicare Part B and Part D premiums include Income-Related Monthly Adjustment Amounts (IRMAA) based on your MAGI from 2 years prior.
        Higher income in retirement (from RMDs, capital gains, or SS) can push you into higher IRMAA brackets.
      </div>

      <div class="grid-2">
        <div>
          <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">2025 IRMAA Brackets (${irmaaLabel})</div>
          ${irmaaBrackets.map((b, i) => {
            const next = irmaaBrackets[i+1];
            const rangeStr = next ? `$${(b.magi/1000).toFixed(0)}K - $${(next.magi/1000).toFixed(0)}K` : `$${(b.magi/1000).toFixed(0)}K+`;
            const isFirst = i === 0;
            return `<div class="irmaa-bracket">
              <span>${isFirst ? 'Base (&le;' + irmaaBaseThresh + ')' : rangeStr}</span>
              <span>Part B: $${(b.partB/12).toFixed(0)}/mo${i > 0 ? ' &#183; Part D: +$'+(b.partD/12).toFixed(0)+'/mo' : ''}</span>
            </div>`;
          }).join('')}
        </div>
        <div>
          <div class="info-box" style="margin-top:0"><div class="info-box-label">Lifetime Medicare Cost (from ${primaryMedAge})</div>
            <div class="info-box-value" style="color:var(--pink)">${fmtK(totalMedicare)}</div></div>
          <div class="info-box"><div class="info-box-label">Lifetime IRMAA Surcharges</div>
            <div class="info-box-value" style="color:var(--pink)">${fmtK(totalSurcharge)}</div></div>
          <div class="info-box"><div class="info-box-label">Years with IRMAA Surcharge</div>
            <div class="info-box-value" style="color:var(--amber)">${medicareYears.filter(y => y.irmaa > 0).length} of ${medicareYears.length}</div></div>
        </div>
      </div>

      ${medicareYears.length > 0 ? `<div style="margin-top:16px">${buildChart(
        medicareYears, ['medicareCost','irmaa'], ['#ec4899','#f59e0b'], ['Total Medicare','IRMAA Surcharge'], { title: 'Medicare Costs by Age', height: 160 }
      )}</div>` : ''}
    </div>`;
  }

  if (state.inputTab === 'assumptions') {
    const realRet = ((1 + p.nominalReturn/100) / (1 + p.inflation/100) - 1) * 100;
    content += `<div class="card"><div class="card-title">Economic Assumptions</div>
      <div class="grid-2">
        ${field('Nominal Investment Return','nominalReturn',{suffix:'%',help:'Default for accounts without individual rates. Historical S&P 500 ~10%. Balanced ~7%'})}
        ${field('Inflation Rate','inflation',{suffix:'%',help:'Historical avg ~3%'})}
      </div>
      <div class="grid-2">
        <div class="info-box"><div class="info-box-label">Real Return</div><div class="info-box-value" style="color:var(--cyan)">${realRet.toFixed(2)}%</div></div>
        <div class="field"><label class="field-label">State for Tax Purposes</label>
          <select class="field-input" onchange="setParam('stateCode',this.value)" style="cursor:pointer">
            ${Object.entries(STATE_TAXES).map(([code,st]) => `<option value="${code}"${p.stateCode===code?' selected':''}>${st.name}${st.rate?' ('+st.rate+'%)':''}</option>`).join('')}
          </select>
          <div class="field-help">${p.stateCode && p.stateCode !== 'none' ? STATE_TAXES[p.stateCode]?.name + ' -- flat rate ' + STATE_TAXES[p.stateCode]?.rate + '%' : 'Federal taxes only'}</div>
        </div>
      </div>
      <div style="margin-top:16px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text);margin-bottom:8px">
          <input type="checkbox" ${p.enforceContribLimits!==false?'checked':''} onchange="setParam('enforceContribLimits',this.checked)" style="width:16px;height:16px;accent-color:var(--blue)">
          Enforce Contribution Limits (401k: $23,500 + catch-up; IRA: $7,000 + catch-up)
        </label>
        <div class="field-help" style="margin-left:24px">When enabled, savings respect annual 401(k) and IRA limits with age 50+ catch-up and SECURE 2.0 age 60-63 super catch-up. Overflow goes to taxable accounts.</div>
      </div>
      <div style="margin-top:16px;font-size:12px;color:var(--text-faint);line-height:1.7">
        <strong style="color:var(--text-muted)">Model notes:</strong> 2025 tax brackets (OBBB Act). Std deduction $${STD_DEDUCTION.toLocaleString()} MFJ / $${STD_DEDUCTION_SINGLE.toLocaleString()} single + senior additions. SS taxation per IRS §86. SSA 2025 bend points &amp; wage base.
        Withdrawal order: RMD (minus QCDs) -> taxable -> pre-tax -> Roth.
        Taxable withdrawals taxed on estimated gains (50% cost basis) at applicable capital gains rate.
        Pension income is fully taxable. Pre-Medicare healthcare added to expenses during gap years.
        Pre-retirement expenses use a separate inflation rate and reduce available cash flow; shortfalls draw from taxable accounts.
        Expense phases reduce base spending in later retirement.
        RMD age per SECURE Act 2.0. IRMAA uses 2025 brackets. SS includes FRA by birth year, COLA, and independent survivor benefit claiming. Survivor SS integrates with SSDI (pays higher of the two).
      </div>
    </div>`;
  }

  return subNav + content;
}

function renderProjectionTable(proj) {
  const p = state.params;
  const categories = [
    { key: 'netWorth', label: 'Net Worth', color: '#3b82f6' },
    { key: 'earned', label: 'Earned Income', color: '#06b6d4' },
    { key: 'ss', label: 'Social Security', color: '#10b981' },
    { key: 'ssdi', label: 'SSDI', color: '#3b82f6' },
    { key: 'expenses', label: 'Expenses', color: '#ef4444' },
    { key: 'fedTax', label: 'Federal Tax', color: '#8b5cf6' },
    { key: 'stateTax', label: 'State Tax', color: '#a855f7' },
    { key: 'withdrawal', label: 'Withdrawals', color: '#f59e0b' },
    { key: 'rmd', label: 'RMDs', color: '#7c3aed' },
    { key: 'rothConv', label: 'Roth Conversions', color: '#06b6d4' },
    { key: 'irmaa', label: 'IRMAA', color: '#ec4899' },
    { key: 'pension', label: 'Pension', color: '#059669' },
    { key: 'healthcare', label: 'Healthcare', color: '#f43f5e' },
    { key: 'debtPayments', label: 'Liabilities', color: '#dc2626' },
    { key: 'ltcCost', label: 'Long-Term Care', color: '#be185d' },
    { key: 'charityTotal', label: 'Charity', color: '#d97706' },
    { key: 'magi', label: 'MAGI', color: '#6366f1' },
    { key: 'preTax', label: 'Pre-Tax Balance', color: '#3b82f6' },
    { key: 'roth', label: 'Roth Balance', color: '#10b981' },
    { key: 'taxable', label: 'Taxable Balance', color: '#f59e0b' },
  ];
  const available = categories.filter(cat => proj.some(y => (y[cat.key] || 0) !== 0));
  const selKeys = state.projChartKeys || ['netWorth'];
  const selCats = selKeys.map(k => available.find(c => c.key === k)).filter(Boolean);
  if (selCats.length === 0) selCats.push(available[0]);
  const curYear = new Date().getFullYear();

  const toggleKey = (key) => {
    let keys = state.projChartKeys || ['netWorth'];
    if (keys.includes(key)) { keys = keys.filter(k => k !== key); }
    else if (keys.length < 3) { keys.push(key); }
    if (keys.length === 0) keys = ['netWorth'];
    return keys;
  };

  const checkboxes = available.map(cat => {
    const checked = selKeys.includes(cat.key);
    const disabled = !checked && selKeys.length >= 3;
    return `<label style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:${checked?'var(--text)':'var(--text-dim)'};cursor:${disabled?'default':'pointer'};opacity:${disabled?'0.4':'1'}">
      <input type="checkbox" ${checked?'checked':''} ${disabled?'disabled':''} onchange="state.projChartKeys=[${
        checked ? selKeys.filter(k=>k!==cat.key).map(k=>"'"+k+"'").join(',')
        : [...selKeys, cat.key].map(k=>"'"+k+"'").join(',')
      }];render()" style="accent-color:${cat.color};width:13px;height:13px">
      ${cat.label}</label>`;
  }).join(' ');

  const chartData = proj.map(y => {
    const d = {age:y.age, year:y.year, retired:y.retired};
    selCats.forEach((c,i) => { d['v'+i] = deflate(y[c.key]||0, y.year-curYear); });
    return d;
  });
  const chartKeys = selCats.map((_,i) => 'v'+i);
  const chartColors = selCats.map(c => c.color);
  const chartLabels = selCats.map(c => c.label);
  const showTable = state.projShowTable || false;
  let html = `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="font-size:12px;font-weight:600;color:var(--text)">Select up to 3 categories:</div>
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" ${showTable?'checked':''} onchange="state.projShowTable=this.checked;render()" style="accent-color:var(--blue)"> Show data table
        </label>
        <button onclick="exportProjectionCSV()" style="font-size:11px;padding:4px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-dim);cursor:pointer" title="Export projection to CSV">&#x1F4BE; CSV</button>
      </div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px 12px;margin-bottom:10px">${checkboxes}</div>
    <div style="max-width:750px;margin:0 auto">
    ${buildChart(chartData, chartKeys, chartColors, chartLabels, {title: chartLabels.join(' + ') + (showRealDollars ? " (Today's $)" : " (Future $)"), height: 200})}
    </div>
  </div>`;
  if (showTable) {
    const allCols = [
      { head:'Age', key:'age', color:'', isCurrency:false, special:'age' },
      { head:'Year', key:'year', color:'', isCurrency:false },
      { head:'Earned', key:'earned', color:'var(--cyan)', isCurrency:true },
      { head:'SS', key:'ss', color:'var(--green)', isCurrency:true },
      { head:'SSDI', key:'ssdi', color:'var(--blue)', isCurrency:true },
      { head:'Pension', key:'pension', color:'var(--green)', isCurrency:true },
      { head:'Exp.', key:'expenses', color:'var(--red)', isCurrency:true },
      { head:'Fed Tax', key:'fedTax', color:'var(--purple)', isCurrency:true },
      { head:'State Tax', key:'stateTax', color:'var(--purple)', isCurrency:true },
      { head:'W/D', key:'withdrawal', color:'var(--amber)', isCurrency:true },
      { head:'RMD', key:'rmd', color:'var(--purple)', isCurrency:true },
      { head:'QCD', key:'qcd', color:'var(--amber)', isCurrency:true },
      { head:'Charity', key:'charityTotal', color:'var(--amber)', isCurrency:true },
      { head:'Roth Conv', key:'rothConv', color:'var(--cyan)', isCurrency:true },
      { head:'IRMAA', key:'irmaa', color:'var(--pink)', isCurrency:true },
      { head:'Medicare', key:'medicareCost', color:'var(--pink)', isCurrency:true },
      { head:'Pre-Tax', key:'preTax', color:'var(--blue)', isCurrency:true },
      { head:'Roth', key:'roth', color:'var(--green)', isCurrency:true },
      { head:'Taxable', key:'taxable', color:'var(--amber)', isCurrency:true },
      { head:'Net Worth', key:'netWorth', color:'', isCurrency:true, special:'nw' },
    ];
    const alwaysShow = new Set(['age','year','netWorth','expenses']);
    const cols = allCols.filter(col => alwaysShow.has(col.key) || proj.some(y => (y[col.key]||0)!==0));
    const hdr = cols.map(cc => `<th>${cc.head}</th>`).join('');
    const rows = proj.map(y => {
      const cls = y.age===p.retirementAge?' class="retire-year"':y.netWorth<=0?' class="bust-year"':'';
      return `<tr${cls}>${cols.map(cc => {
        const v = y[cc.key]||0;
        const dv = cc.isCurrency ? deflate(v, y.year-curYear) : v;
        let st = cc.color ? 'color:'+cc.color : '';
        if (cc.special==='nw') st='font-weight:600;color:'+(y.netWorth>0?'var(--text)':'var(--red)');
        return '<td'+(st?' style="'+st+'"':'')+'>'+(cc.isCurrency?fmtK(dv):dv)+'</td>';
      }).join('')}</tr>`;
    }).join('');
    // Total row
    const totals = cols.map(cc => {
      if (!cc.isCurrency) return '<td style="font-weight:700">Total</td>';
      if (cc.special==='nw' || cc.key==='preTax' || cc.key==='roth' || cc.key==='taxable') return '<td>--</td>';
      const sum = proj.reduce((s,y) => s + (y[cc.key]||0), 0);
      return '<td style="font-weight:600;color:'+cc.color+'">'+ fmtK(deflate(sum, Math.floor(proj.length/2))) +'</td>';
    }).join('');
    html += `<div class="card"><div style="overflow-x:auto;overflow-y:auto;max-height:70vh"><table class="proj-table"><thead><tr>${hdr}</tr></thead><tbody>${rows}<tr style="border-top:2px solid var(--border);background:rgba(59,130,246,.05)">${totals}</tr></tbody></table></div></div>`;
  }
  return html;
}

function renderMonteCarlo(proj) {
  const mc = state.mcResults;
  const p = state.params;
  const cfg = state.mcConfig;
  const realRet = ((1 + p.nominalReturn/100) / (1 + p.inflation/100) - 1) * 100;

  let results = '';
  if (mc) {
    const mF = mc.median[mc.median.length-1].netWorth;
    const p10F = mc.p10[mc.p10.length-1].netWorth;
    const p90F = mc.p90[mc.p90.length-1].netWorth;
    const color = mc.successRate >= 80 ? 'var(--green)' : mc.successRate >= 50 ? 'var(--amber)' : 'var(--red)';
    const chartData = mc.median.map((m,i) => ({ age:m.age, year:m.year, retired:m.retired, p90:mc.p90[i]?.netWorth||0, median:m.netWorth, p10:mc.p10[i]?.netWorth||0 }));
    results = `<div class="stats-row" style="justify-content:center">
      <div class="stat"><div class="stat-label">Success Rate</div><div class="stat-value" style="color:${color}">${mc.successRate}%</div><div class="stat-sub">${mc.successRate>=90?'Strong':mc.successRate>=75?'Good':mc.successRate>=50?'Caution':'High risk'}</div></div>
      <div class="stat"><div class="stat-label">Median Final</div><div class="stat-value" style="color:var(--cyan)">${fmtK(mF)}</div></div>
      <div class="stat"><div class="stat-label">10th Pctl</div><div class="stat-value" style="color:var(--amber)">${fmtK(p10F)}</div><div class="stat-sub">Bad luck</div></div>
      <div class="stat"><div class="stat-label">90th Pctl</div><div class="stat-value" style="color:var(--green)">${fmtK(p90F)}</div><div class="stat-sub">Good luck</div></div>
      ${mc.avgBustAge ? `<div class="stat"><div class="stat-label">Avg Bust Age</div><div class="stat-value" style="color:var(--red)">${mc.avgBustAge}</div><div class="stat-sub">Among failed simulations only</div></div>` : ''}
    </div>
    <div class="card">${buildChart(chartData,['p90','median','p10'],['#10b981','#06b6d4','#ef4444'],['90th Pctl','Median','10th Pctl'],{title:'Monte Carlo -- Net Worth Paths',height:220})}</div>`;
  }

  // MC Field helper (uses mcConfig, not params)
  function mcField(label, key, opts = {}) {
    const { suffix, help } = opts;
    const v = cfg[key];
    return `<div class="field"><label class="field-label">${label}</label><div class="field-wrap">
      <input type="number" class="field-input${suffix?' has-suffix':''}" value="${v}" onchange="setMCConfig('${key}',Number(this.value))">
      ${suffix ? `<span class="field-suffix">${suffix}</span>` : ''}
    </div>${help ? `<div class="field-help">${help}</div>` : ''}</div>`;
  }

  return `<div class="card" data-accent="purple"><div class="card-title">Monte Carlo Simulation</div>
    <div style="font-size:13px;color:var(--text-dim);margin-bottom:16px;line-height:1.6">
      Randomizes investment returns and inflation across multiple simulations to estimate the probability your money lasts through age ${p.endAge}.
    </div>

    <div class="grid-2" style="margin-bottom:16px">
      <div style="padding:14px;background:var(--bg-base);border-radius:8px;border:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:10px">Base Assumptions (from Inputs)</div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text-dim)">
          <div>Nominal Return: <strong style="color:var(--text)">${p.nominalReturn}%</strong></div>
          <div>Inflation: <strong style="color:var(--text)">${p.inflation}%</strong></div>
          <div>Real Return: <strong style="color:var(--cyan)">${realRet.toFixed(2)}%</strong></div>
        </div>
      </div>
      <div style="padding:14px;background:var(--bg-base);border-radius:8px;border:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:10px">Simulation Settings</div>
        <div class="grid-3" style="gap:8px">
          ${mcField('Simulations', 'numSims', { help: '100-2000' })}
          ${mcField('Return Std Dev', 'returnStdDev', { suffix: '%', help: 'Historical ~6%' })}
          ${mcField('Inflation Std Dev', 'inflationStdDev', { suffix: '%', help: 'Historical ~1.5%' })}
        </div>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:12px">
      <button class="mc-btn" onclick="runMC()">Run ${cfg.numSims} Simulations</button>
      <span style="font-size:11px;color:var(--text-faint)">
        Return range: ${(p.nominalReturn - cfg.returnStdDev).toFixed(1)}% - ${(p.nominalReturn + cfg.returnStdDev).toFixed(1)}% &#183;
        Inflation range: ${(p.inflation - cfg.inflationStdDev).toFixed(1)}% - ${(p.inflation + cfg.inflationStdDev).toFixed(1)}%
      </span>
    </div>
  </div>` + results;
}

function renderScenarios(proj) {
  const p = state.params, final = proj[proj.length-1].netWorth;
  const scenarios = [

    { key: 'rmd', label: 'RMDs', color: '#7c3aed' },
    { key: 'preTax', label: 'Pre-Tax Bal.', color: '#3b82f6' },
    { key: 'roth', label: 'Roth Bal.', color: '#10b981' },
    { key: 'taxable', label: 'Taxable Bal.', color: '#f59e0b' },

  // Category selector
  const catCheckboxes = scAvail.map(cat => {
    const checked = scSelKeys.includes(cat.key);

    return `<label style="display:inline-flex;align-items:center;gap:3px;font-size:11px;color:${checked?'var(--text)':'var(--text-dim)'};cursor:${disabled?'default':'pointer'};opacity:${disabled?'0.4':'1'}">

  let cmp = '';

    <div class="card"><div class="card-title">Survivor Impact Summary</div>
      <div style="font-size:13px;line-height:1.8;color:var(--text-dim)">

        ${svWho === 'spouse' ? 'your' : "your spouse's"} age <strong style="color:var(--pink)">${svAge}</strong>:
        The surviving spouse receives the <strong>higher</strong> of the two SS benefits (not both), losing
        <strong style="color:var(--red)">${fmtK(Math.abs(svSS - baseSS))}</strong> in lifetime SS income.
        Expenses drop by <strong>${svExpRed}%</strong>, but tax brackets shift to single-filer rates
        ${svTax > baseTax
          ? `, adding <strong style="color:var(--red)">${fmtK(svTax - baseTax)}</strong> in lifetime taxes due to narrower brackets and lower IRMAA thresholds.`
          : `, saving <strong style="color:var(--green)">${fmtK(baseTax - svTax)}</strong> in taxes due to lower overall income.`}
        ${sf > 0
          ? ` Portfolio ends at <strong style="color:var(--green)">${fmtK(sf)}</strong>.`
          : ` <strong style="color:var(--red)">Portfolio depleted at age ${sBust}.</strong>`}
      </div>
    </div>`;
  }

  return `<div class="card" data-accent="amber"><div class="card-title">Scenario Comparison</div>
    <div style="font-size:13px;color:var(--text-dim);margin-bottom:16px">Compare your base plan against different assumptions.</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">${btns}</div>
  </div>` + cmp + survivorSection;

// ---------------- RetIQ Install + Pro Licensing ----------------
const RETIQ_API = "https://retiq-worker.bortvin.workers.dev";

function setPlanBadge(isPro){
  const badge = document.getElementById("planBadge");
  if(!badge) return;
  if(isPro){
    badge.textContent = "PRO ✓";
    badge.style.background = "#065f46";
    badge.style.color = "#ecfdf5";
  }else{
    badge.textContent = "FREE";
    badge.style.background = "#111827";
    badge.style.color = "#e5e7eb";
  }
}

function hideUpgradeIfPro(){
  const buy = document.getElementById("buyBtn");
  if(!buy) return;
  if(localStorage.getItem("retiq_pro")==="true") { buy.style.display = "none"; return; }
  buy.style.display = "inline-flex";
  // Show correct price based on launch pricing
  const trialStart = parseInt(localStorage.getItem("retiq_trial_start") || "0", 10);
  const inLaunch = trialStart > 0 && (Date.now() - trialStart) / (1000*60*60*24) < 7;
  buy.textContent = inLaunch ? "Upgrade $29" : "Upgrade $49";
  buy.title = inLaunch ? "Pro: full customization, exports — $29 launch price" : "Pro: full customization, exports — $49 one-time";
}

function setActivateLabel(){
  const btn = document.getElementById("activateBtn");
  if(!btn) return;
  const pro = localStorage.getItem("retiq_pro")==="true" && localStorage.getItem("retiq_license");
  btn.textContent = pro ? "Manage" : "Activate";
}

async function validateLicense(key){
  try{
    const r = await fetch(`${RETIQ_API}/validate-license?license=${encodeURIComponent(key)}`);
    if(!r.ok) return false;
    const d = await r.json();
    return d.valid === true;
  }catch{ return null; } // null = network error (offline), false = explicitly invalid
}

// ---- Pro gating helpers ----
function requirePro(reason){
  const want = confirm(`${reason}\n\nUpgrade to RetIQ Pro now?`);
  if(want){
    document.getElementById("buyBtn")?.click();
  }
  return false;
}

// Gate exportHTML behind Pro
(function gateExport(){
  // exportHTML is a function already defined in this file
  if(typeof window.exportHTML === "function"){
    const original = window.exportHTML;
    window.exportHTML = function(){
      if(localStorage.getItem("retiq_pro") !== "true"){
        return requirePro("Saving an HTML snapshot is a Pro feature.");
      }
      return original.apply(this, arguments);
    };
  }
})();

// ---- Upgrade ----
document.getElementById("buyBtn")?.addEventListener("click", async ()=>{
  let trialToken = localStorage.getItem("retiq_trial_token") || null;

  // If we think we're in the launch window but have no token, try to get one
  const trialStart = parseInt(localStorage.getItem("retiq_trial_start") || "0", 10);
  const inLaunchWindow = trialStart > 0 && (Date.now() - trialStart) / (1000*60*60*24) < 7;

  if (inLaunchWindow && !trialToken) {
    try {
      const tr = await fetch(`${RETIQ_API}/start-trial`, { method: "POST" });
      if (tr.ok) {
        const td = await tr.json();
        if (td.token) {
          trialToken = td.token;
          localStorage.setItem("retiq_trial_token", td.token);
          localStorage.setItem("retiq_trial_start", String(td.issuedAt));
        }
      }
    } catch { /* proceed without token */ }
  }

  const r = await fetch(`${RETIQ_API}/create-checkout-session`, {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ token: trialToken })
  });
  const d = await r.json();
  if(d.url) location.href = d.url;
  else alert("Could not start checkout. Please try again.");
});

// ---- Activate / Manage ----
document.getElementById("activateBtn")?.addEventListener("click", async ()=>{
  const current = localStorage.getItem("retiq_license");
  const isPro = localStorage.getItem("retiq_pro")==="true" && current;

  if(isPro){
    const action = prompt(
      `RetIQ Pro is active.\n\nLicense on this device:\n${current}\n\nType:\nCOPY  (copy key)\nFORGET (remove from this device)\nCANCEL`
    );
    if(!action) return;
    const a = action.trim().toUpperCase();
    if(a==="COPY"){
      try{ await navigator.clipboard.writeText(current); alert("Copied ✔"); }
      catch{ alert("Copy failed — select and copy manually:\n"+current); }
      return;
    }
    if(a==="FORGET"){
      localStorage.removeItem("retiq_license");
      localStorage.removeItem("retiq_pro");
      localStorage.removeItem("retiq_v1");
      setPlanBadge(false);
      hideUpgradeIfPro();
      setActivateLabel();
      alert("This device is now Free. Your saved data has been cleared.");
      location.reload();
      return;
    }
    return;
  }

  const key = prompt("Enter your RetIQ license key:");
  if(!key) return;
  const normalized = key.trim().toUpperCase();
  const ok = await validateLicense(normalized);
  if(ok === true){
    localStorage.setItem("retiq_license", normalized);
    localStorage.setItem("retiq_pro", "true");
    setPlanBadge(true);
    hideUpgradeIfPro();
    setActivateLabel();
    // Restore saved data now that pro is active
    try { const s = localStorage.getItem('retiq_v1'); if (s) { state.params = JSON.parse(s); render(); } } catch(e) {}
    alert("License activated ✔");
  }else if(ok === null){
    alert("Could not reach the server. Check your internet connection and try again.");
  }else{
    alert("Invalid license key");
  }
});

// Auto-restore license on load
(async ()=>{
  const saved = localStorage.getItem("retiq_license");
  const result = saved ? await validateLicense(saved) : false;
  if(result === true){
    localStorage.setItem("retiq_pro","true");
    setPlanBadge(true);
    hideUpgradeIfPro();
    setActivateLabel();
    // Restore saved user data now that pro is confirmed
    try { const s = localStorage.getItem('retiq_v1'); if (s) { state.params = JSON.parse(s); render(); } } catch(e) {}
  } else if(result === null){
    // Network error (offline) — keep existing pro status if previously validated
    const wasPro = localStorage.getItem("retiq_pro")==="true";
    setPlanBadge(wasPro);
    hideUpgradeIfPro();
    setActivateLabel();
    if(wasPro){ try { const s = localStorage.getItem('retiq_v1'); if (s) { state.params = JSON.parse(s); render(); } } catch(e) {} }
  } else {
    // License explicitly invalid — demote
    localStorage.removeItem("retiq_pro");
    setPlanBadge(false);
    hideUpgradeIfPro();
    setActivateLabel();
  }
})();



// ---------- INSTALL UX (intentional) ----------
(function(){
  const installBtn = document.getElementById("installBtn");
  if(!installBtn) return;

  // Hide install button if already installed/standalone
  const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
  if(isStandalone) {
    installBtn.style.display = "none";
    return;
  }

  // Minimal modal (created on demand)
  function openInstallModal(canPrompt){
    const existing = document.getElementById("retiqInstallModal");
    if(existing) existing.remove();

    const overlay = document.createElement("div");
    overlay.id = "retiqInstallModal";
    overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px;";

    const card = document.createElement("div");
    card.style.cssText = "max-width:520px;width:100%;background:#0b1220;color:#e5e7eb;border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:16px 16px 14px;box-shadow:0 10px 30px rgba(0,0,0,.35);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;";

    const title = document.createElement("div");
    title.style.cssText = "font-weight:800;font-size:16px;margin-bottom:8px;";
    title.textContent = "Install RetIQ";

    const body = document.createElement("div");
    body.style.cssText = "font-size:13px;line-height:1.5;color:#cbd5e1;margin-bottom:12px;";

    const ua = navigator.userAgent;
    const isIOS = /iPhone|iPad|iPod/i.test(ua);
    const isMacSafari = /^((?!chrome|android).)*safari/i.test(ua) && /Mac/i.test(ua);
    const isChromium = /Chrome|Edg/i.test(ua);

    if(canPrompt){
      body.innerHTML = "Your browser supports one-click install. Click <b>Install now</b>.";
    } else if(isIOS){
      body.innerHTML = "On iPhone/iPad: tap <b>Share</b> → <b>Add to Home Screen</b>.";
    } else if(isMacSafari){
      body.innerHTML = "On Safari (macOS): use <b>File</b> → <b>Add to Dock</b> (or Share → Add to Dock, depending on version).";
    } else if(isChromium){
      body.innerHTML = "In Chrome/Edge: open the browser menu → <b>Install app</b> (or the install icon in the address bar).";
    } else {
      body.innerHTML = "Use your browser’s install option (often in the menu) to install this app.";
    }

    const actions = document.createElement("div");
    actions.style.cssText = "display:flex;gap:10px;justify-content:flex-end;";

    const closeBtn = document.createElement("button");
    closeBtn.textContent = "Close";
    closeBtn.style.cssText = "padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#e5e7eb;cursor:pointer;";
    closeBtn.onclick = ()=>overlay.remove();

    actions.appendChild(closeBtn);

    if(canPrompt){
      const doBtn = document.createElement("button");
      doBtn.textContent = "Install now";
      doBtn.style.cssText = "padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:#2563eb;color:white;cursor:pointer;";
      doBtn.onclick = async ()=>{
        try{
          await window.__retiqDeferredPrompt.prompt();
          window.__retiqDeferredPrompt = null;
          overlay.remove();
        }catch(e){
          overlay.remove();
          alert("Install prompt could not be shown. Use the browser menu to install.");
        }
      };
      actions.insertBefore(doBtn, closeBtn);
    }

    card.appendChild(title);
    card.appendChild(body);
    card.appendChild(actions);
    overlay.appendChild(card);
    overlay.addEventListener("click",(e)=>{ if(e.target===overlay) overlay.remove();});
    document.body.appendChild(overlay);
  }

  // Capture the install prompt if available (Chrome/Edge)
  window.__retiqDeferredPrompt = null;
  window.addEventListener("beforeinstallprompt",(e)=>{
    e.preventDefault();
    window.__retiqDeferredPrompt = e;
  });

  // Always open the modal on click; if we have deferred prompt, include Install now button
  installBtn.addEventListener("click", ()=>{
    openInstallModal(!!window.__retiqDeferredPrompt);
  });

  window.addEventListener("appinstalled", ()=>{
    installBtn.style.display = "none";
  });
})();

</script>

      navigator.serviceWorker.register('./service-worker.js').catch((err) => {
        console.warn('Service worker registration failed:', err);
      });
    });
  }
</script>
