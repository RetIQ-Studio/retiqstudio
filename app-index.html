          const adjWithout = projWithout[i].netWorth - cumTaxWithout;
          if (i >= convStartIdx && i > 0) {
            const prevCTW = cumTaxWith - (projWith[i].tax || 0);
            const prevCTWO = cumTaxWithout - (projWithout[i].tax || 0);
            const prevAdj = projWith[i-1].netWorth - prevCTW;
            const prevAdjBase = projWithout[i-1].netWorth - prevCTWO;
            if (prevAdj < prevAdjBase && adjWith >= adjWithout) breakevenAge = projWith[i].age;
          }
        }
        // Check if ever behind
        cumTaxWith = 0; cumTaxWithout = 0;
        let everBehind = false;
        for (let i = 0; i < projWith.length; i++) {
          cumTaxWith += projWith[i].tax || 0;
          cumTaxWithout += projWithout[i].tax || 0;
          if (i >= convStartIdx && (projWith[i].netWorth - cumTaxWith) < (projWithout[i].netWorth - cumTaxWithout)) {
            everBehind = true; break;
          }
        }
        if (!everBehind) breakevenAge = -1;
      }
      const neverCatchesUp = breakevenAge === null && convStartIdx >= 0;

      // Build conversion advantage chart: delta of tax-adjusted NW (with conv minus without)
      // Positive = conversions winning, negative = still paying back upfront tax cost
      let ctW = 0, ctWO = 0;
      const advantageData = projWith.map((w, i) => {
        ctW += w.tax || 0;
        ctWO += projWithout[i].tax || 0;
        const adjWith = w.netWorth - ctW;
        const adjWithout = projWithout[i].netWorth - ctWO;
        return { age: w.age, year: w.year, retired: w.retired, advantage: adjWith - adjWithout };
      });
      const advColor = (advantageData[advantageData.length - 1]?.advantage || 0) >= 0 ? '#10b981' : '#ef4444';

      impactHtml = `<div class="card" data-accent="cyan"><div class="card-title">Conversion Impact Analysis</div>
        <div class="stats-row" style="margin-bottom:12px">
          <div class="stat"><div class="stat-label">Total Converted</div><div class="stat-value" style="color:var(--cyan)">${fmtK(totalConv)}</div></div>
          <div class="stat"><div class="stat-label">Tax on Conversions</div><div class="stat-value" style="color:var(--red)">${fmtK(totalConvTax)}</div></div>
          <div class="stat"><div class="stat-label">Lifetime Tax &#916;</div><div class="stat-value" style="color:${taxDiff>0?'var(--red)':'var(--green)'}">${fmtK(taxDiff)}</div><div class="stat-sub">${taxDiff>0?'More taxes (upfront)':'Tax savings'}</div></div>
          <div class="stat"><div class="stat-label">RMD Reduction</div><div class="stat-value" style="color:var(--green)">${fmtK(Math.abs(rmdDiff))}</div><div class="stat-sub">Lifetime</div></div>
          <div class="stat"><div class="stat-label">IRMAA Impact</div><div class="stat-value" style="color:${irmaaDiff>0?'var(--pink)':'var(--green)'}">${fmtK(irmaaDiff)}</div></div>
          ${hasACAYears ? `<div class="stat"><div class="stat-label">ACA Subsidy &#916;</div><div class="stat-value" style="color:${acaSubsidyDiff<0?'var(--pink)':'var(--green)'}">${fmtK(acaSubsidyDiff)}</div><div class="stat-sub">${acaSubsidyDiff<0?'Conversions reduced subsidies':'No subsidy loss'}</div></div>` : ''}
          <div class="stat"><div class="stat-label">Final NW &#916;</div><div class="stat-value" style="color:${finalWith.netWorth>=finalWithout.netWorth?'var(--green)':'var(--red)'}">${fmtK(finalWith.netWorth - finalWithout.netWorth)}</div></div>
          <div class="stat"><div class="stat-label">Breakeven Age</div><div class="stat-value" style="color:${breakevenAge===-1?'var(--green)':breakevenAge?'var(--amber)':'var(--red)'}">${breakevenAge===-1?'Immediate':breakevenAge?breakevenAge:'Never'}</div><div class="stat-sub">${breakevenAge===-1?'NW never falls behind':breakevenAge?'NW catches up at this age':'Within projection'}</div></div>
        </div>

        <div>${buildChart(
          advantageData,
          ['advantage'],[advColor],['Conversion Advantage'],
          {title:'Conversion Advantage (Tax-Adjusted)' + (breakevenAge > 0 ? ' — Breakeven Age ' + breakevenAge : breakevenAge === -1 ? ' — Always Ahead' : ''),height:170}
        )}</div>
        <div style="font-size:11px;color:var(--text-faint);margin-top:2px;margin-bottom:4px">Above zero = conversions winning &#183; Below zero = still recouping upfront tax cost</div>

        <div class="grid-2" style="margin-top:4px">
          <div>${buildChart(
            projWith.map((w,i) => ({age:w.age,year:w.year,retired:w.retired,with:w.preTax,without:projWithout[i].preTax})),
            ['without','with'],['#8b5cf6','#06b6d4'],['Pre-Tax (No Conv)','Pre-Tax (With Conv)'],
            {title:'Pre-Tax Balance (lower = less RMDs)',height:160}
          )}</div>
          <div>${buildChart(
            projWith.map((w,i) => ({age:w.age,year:w.year,retired:w.retired,with:w.roth,without:projWithout[i].roth})),
            ['without','with'],['#8b5cf6','#10b981'],['Roth (No Conv)','Roth (With Conv)'],
            {title:'Roth Balance (tax-free growth)',height:160}
          )}</div>
        </div>

        <div>${buildChart(
          projWith.filter(y => y.rothConv > 0).map(y => ({age:y.age,year:y.year,retired:y.retired,conv:y.rothConv,convTax:y.conversionTax})),
          ['conv','convTax'],['#06b6d4','#ef4444'],['Conversion Amount','Tax Cost'],
          {title:'Annual Conversions & Tax',height:140}

        <div style="font-size:13px;line-height:1.8;color:var(--text-dim);margin-top:12px">
          <strong style="color:var(--text)">Strategy insight:</strong>
          Converting <strong>${fmtK(totalConv)}</strong> over ages ${rc.startAge}-${rc.endAge}
          costs <strong style="color:var(--red)">${fmtK(totalConvTax)}</strong> in conversion taxes now,
          but reduces lifetime RMDs by <strong style="color:var(--green)">${fmtK(Math.abs(rmdDiff))}</strong>
          and moves assets into tax-free Roth growth.
          ${finalWith.netWorth >= finalWithout.netWorth
            ? 'Net effect: <strong style="color:var(--green)">positive</strong> — the Roth conversion strategy improves your outcome.'
            : 'Net effect: the upfront tax cost outweighs the benefits in this scenario. Consider adjusting conversion amounts or timing.'}
        </div>
        ${breakevenAge !== -1 ? `<div style="font-size:12px;line-height:1.7;color:var(--text-dim);margin-top:8px;padding:10px 14px;background:var(--bg-base);border-radius:8px;border-left:3px solid var(--amber)">
          <strong style="color:var(--amber)">&#9202; Breakeven age: ${breakevenAge ? breakevenAge : 'beyond ' + p.endAge}</strong> —
          Roth conversions pay taxes upfront, so your net worth temporarily drops below the no-conversion path.
          ${breakevenAge ? 'It takes until age <strong>' + breakevenAge + '</strong> for tax-free growth and lower RMDs to recover that cost.'
            : 'Within this projection the conversion taxes are never fully recovered.'}
          ${breakevenAge ? ' If you do not survive to ' + breakevenAge + ', the conversion taxes represent a net loss to your estate — money that could have stayed invested.'
            : ' The tax cost may still benefit heirs (inherited Roth is tax-free vs. 10-year taxable distribution for inherited pre-tax), but on a pure net worth basis the strategy underperforms.'}
          ${breakevenAge && breakevenAge <= p.endAge ? ' After age ' + breakevenAge + ', the advantage compounds — every additional year widens the gap in your favor.' : ''}
        </div>` : `<div style="font-size:12px;line-height:1.7;color:var(--text-dim);margin-top:8px;padding:10px 14px;background:var(--bg-base);border-radius:8px;border-left:3px solid var(--green)">
          <strong style="color:var(--green)">&#10003; No breakeven delay</strong> —
          Your net worth with conversions never falls below the no-conversion path. This can happen when conversions are small relative to portfolio size, or when the tax bracket is low enough that the immediate RMD/IRMAA savings offset the conversion tax.
        </div>`}

    // Bracket visualization for current year — adapt to filing status
    const hasSpouseForTax = p.spouseEnabled || (p.spouseAge && p.spouseAge > 0);
    const brackets = hasSpouseForTax ? TAX_BRACKETS_MFJ : TAX_BRACKETS_SINGLE;
    const bracketLabel = hasSpouseForTax ? 'MFJ' : 'Single';
    const bracketViz = brackets.filter(b => b.max < 1e8).map((b, i) => {

              <option value="custom"${rc.strategy==='custom'?' selected':''}>Custom Schedule</option>
            </select>
          </div>

          ${rc.strategy === 'fixed' ? `
            <div class="field"><label class="field-label">Annual Conversion Amount</label>
              <div class="field-wrap"><span class="field-prefix">$</span>
                <input type="text" inputmode="decimal" class="field-input has-prefix" value="${fmtC(rc.fixedAmount||50000)}" onfocus="this.value=this.value.replace(/,/g,'')" onblur="this.value=fmtC(parseC(this.value))" onchange="setRothConv('fixedAmount',parseC(this.value))">
              </div></div>
          ` : ''}
          ${rc.strategy === 'fillBracket' || rc.strategy === 'smartFill' ? `
            <div class="field"><label class="field-label">Fill Up To Bracket ${tip('The tax bracket to fill up to &mdash; 22% is a common sweet spot. Higher brackets start to make conversions expensive')}</label>
              <select class="field-input" onchange="setRothConv('targetBracket',Number(this.value))" style="cursor:pointer">
                ${brackets.filter(b => b.rate <= 0.32).map(b => `<option value="${b.rate}"${rc.targetBracket===b.rate?' selected':''}>${(b.rate*100).toFixed(0)}% (${fmtK(b.min)} - ${fmtK(b.max)})</option>`).join('')}
              </select>
              <div class="field-help">${rc.strategy === 'smartFill'
                ? 'Fills bracket but stops before crossing the next IRMAA tier — no surprise surcharges'
                : 'Conversions fill available space in ' + bracketLabel + ' brackets up to this rate'}</div>
            </div>
          ` : ''}

          ${rc.strategy === 'targetMAGI' ? `
            <div class="field"><label class="field-label">Target Modified Adjusted Gross Income (MAGI) Ceiling</label>
              <div class="field-wrap"><span class="field-prefix">$</span>
                <input type="text" inputmode="decimal" class="field-input has-prefix" value="${fmtC(rc.targetMAGI||200000)}" onfocus="this.value=this.value.replace(/,/g,'')" onblur="this.value=fmtC(parseC(this.value))" onchange="setRothConv('targetMAGI',parseC(this.value))">
              </div>
              <div class="field-help">Convert up to this total income (MAGI) — controls Medicare surcharge (IRMAA) brackets</div></div>
          ` : ''}
          ${rc.strategy === 'percentBalance' ? `
            <div class="field"><label class="field-label">% of Pre-Tax Balance per Year</label>
              <div class="field-wrap">
                <input type="number" class="field-input has-suffix" value="${rc.percentOfBalance||10}" onchange="setRothConv('percentOfBalance',Number(this.value))">
                <span class="field-suffix">%</span>
              </div>
              <div class="field-help">Convert this % of remaining pre-tax balance each year</div></div>
          ` : ''}

          ${rc.strategy === 'custom' ? (() => {
            const sched = rc.customSchedule || [];
            const sa = rc.startAge || 65, ea = rc.endAge || 72;
            let rows = '';
            for (let a = sa; a <= ea; a++) {
              const entry = sched.find(e => e.age === a);
              const amt = entry ? entry.amount : 0;
              rows += '<tr><td style="text-align:center;color:var(--text)">' + a + '</td>' +
                '<td><div class="field-wrap" style="margin:0"><span class="field-prefix">$</span>' +
                '<input type="text" inputmode="decimal" class="field-input has-prefix" style="padding:4px 6px 4px 28px;font-size:12px" ' +
                'value="' + fmtC(amt) + '" onfocus="this.value=this.value.replace(/,/g,\'\')" ' +
                'onblur="this.value=fmtC(parseC(this.value))" ' +
                'onchange="setCustomScheduleAmount(' + a + ',parseC(this.value))">' +
                '</div></td></tr>';
            }
            const total = sched.reduce((s, e) => s + (e.amount || 0), 0);
            return '<div style="margin-bottom:12px">' +
              '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">' +
              '<div class="field-label" style="margin:0">Year-by-Year Schedule</div>' +
              '<button class="scenario-btn" style="padding:4px 12px;font-size:11px;color:var(--green);border-color:var(--green)" ' +
              'onclick="generateOptimalSchedule()">&#9881; Generate Optimal</button></div>' +
              '<div style="overflow-x:auto"><table class="proj-table" style="font-size:12px"><thead><tr>' +
              '<th style="width:60px">Age</th><th>Conversion Amount</th></tr></thead><tbody>' +
              rows + '</tbody>' +
              '<tfoot><tr style="font-weight:600"><td style="text-align:center">Total</td>' +
              '<td style="color:var(--cyan)">' + fmt(total) + '</td></tr></tfoot></table></div>' +
              '<div class="field-help">Edit amounts per year, or click Generate Optimal to auto-fill based on your tax landscape</div>' +
              '</div>';
          })() : ''}

          <div class="grid-2">
            <div class="field"><label class="field-label">Start Age</label>
              <input type="number" class="field-input" value="${rc.startAge||65}" onchange="setRothConv('startAge',Number(this.value))">
              <div class="field-help">Often: retirement age</div></div>
            <div class="field"><label class="field-label">End Age</label>
              <input type="number" class="field-input" value="${rc.endAge||72}" onchange="setRothConv('endAge',Number(this.value))">
              <div class="field-help">Before RMDs start</div></div>
          </div>
          <div style="font-size:11px;color:var(--text-faint);line-height:1.6;margin-top:6px;padding:8px 10px;background:var(--bg-base);border-radius:6px;border-left:3px solid var(--cyan)">
            <strong style="color:var(--cyan)">&#128712; Ladder timing:</strong> If you plan to access converted funds before 59&frac12;, start your ladder at least 5 years early &mdash;
            each conversion year begins a separate 5-year waiting period for penalty-free withdrawal. Conversions after 59&frac12; are accessible immediately.
          </div>
          ${(() => {
            const retAge = p.retirementAge || 65;
            const startAge = rc.startAge || 65;
            if (startAge < 59.5 || retAge < 59.5) {
              return '<div style="font-size:11px;color:var(--amber);line-height:1.6;margin-top:6px;padding:8px 10px;background:var(--bg-base);border-radius:6px;border-left:3px solid var(--amber)">' +
                '<strong>&#9888; Early retirement note:</strong> ' +
                (retAge < 59.5 ? 'You retire before 59&frac12;. ' : '') +
                'Roth conversions before 59&frac12; are subject to a 5-year waiting period before the converted amount can be withdrawn penalty-free. ' +
                'Plan your ladder start accordingly &mdash; convert early enough that the 5-year clock expires when you need the funds.' +

        </div>

        <div>
          <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">${bracketLabel} Tax Brackets</div>
          <div style="font-size:10px;color:var(--text-faint);margin-bottom:6px">${rc.strategy==='fillBracket'||rc.strategy==='smartFill'?'Highlighted brackets will be filled by conversions':'Target brackets for reference'}</div>
          ${bracketViz}
        </div>
      </div>
      ` : ''}
    </div>

    ${impactHtml}

    ${(() => {
      // 5-Year Rule Tracker
      if (!rc.enabled || !projWith) return '';
      const convYears = projWith.filter(y => y.rothConv > 0);
      if (convYears.length === 0) return '';
      const currentAge = p.currentAge || 65;
      const birthYear = new Date().getFullYear() - currentAge;
      const rows = convYears.map(y => {
        const convYear = birthYear + y.age;
        const accessYear = convYear + 5;
        const accessAge = y.age + 5;
        const under59 = y.age < 59.5;
        const penaltyFreeAge = under59 ? Math.max(accessAge, 59.5) : y.age;
        const penaltyFreeYear = under59 ? Math.max(accessYear, birthYear + Math.ceil(59.5)) : convYear;
        const isMature = currentAge >= penaltyFreeAge;
        return `<tr>
          <td style="text-align:center;color:var(--text)">${y.age}</td>

          <td style="text-align:right;color:var(--cyan)">${fmt(y.rothConv)}</td>
          <td style="text-align:center;color:${isMature ? 'var(--green)' : under59 ? 'var(--amber)' : 'var(--text-dim)'}">
            ${isMature ? '&#10003; Now' : under59 ? 'Age ' + Math.ceil(penaltyFreeAge) + ' (' + penaltyFreeYear + ')' : 'Age ' + accessAge + ' (' + accessYear + ')'}

      return `<div class="card" data-accent="cyan"><div class="card-title">5-Year Rule Tracker</div>

    })()}

    ${(() => {
      // Optimizer section
      const opt = state.rothOptResults;
      let optHtml = `<div class="card" data-accent="green"><div class="card-title">Roth Conversion Optimizer</div>
        <div style="font-size:13px;color:var(--text-dim);margin-bottom:14px;line-height:1.6">

          <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text);cursor:pointer">

          <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text);cursor:pointer">

        </div>
        <button class="mc-btn opt-btn" onclick="this.textContent='Optimizing...';this.disabled=true;setTimeout(optimizeRothConversion,50)" style="background:linear-gradient(135deg,var(--green),var(--cyan))">
          Find Optimal Strategy
        </button>
      </div>`;

      if (opt && opt.error) {
        optHtml += `<div class="card"><div style="color:var(--amber);font-size:13px">${opt.error}</div></div>`;
      } else if (opt && opt.strategies) {
        const bl = opt.baseline;
        optHtml += `<div class="card"><div class="card-title">Top ${opt.strategies.length} Strategies (of ${opt.totalTested} tested)</div>
          <div style="overflow-x:auto"><table class="proj-table" style="font-size:11px">
            <thead><tr>
              <th style="text-align:left">Strategy</th>
              <th>Converted</th><th>Conv Tax</th>
              <th>Tax vs Base</th><th>RMD vs Base</th><th>IRMAA vs Base</th>
              <th>Final NW vs Base</th><th title="Age when net worth with conversions catches up to no-conversion path">Breakeven</th><th title="Weighted composite score (0-100): tax savings, IRMAA savings, net worth gain. Higher is better.">Score</th><th></th>
            </tr></thead>
            <tbody>
              <tr style="background:var(--bg-base)">
                <td style="text-align:left;color:var(--text-muted)">No Conversion (baseline)</td>
                <td style="color:var(--text-faint)">--</td><td style="color:var(--text-faint)">--</td>
                <td>${fmtK(bl.tax)}</td><td>${fmtK(bl.rmd)}</td><td>${fmtK(bl.irmaa)}</td>
                <td>${fmtK(bl.final)}</td><td style="color:var(--text-faint)">--</td><td style="color:var(--text-faint)">--</td><td></td>
              </tr>
              ${opt.strategies.map((s, idx) => {
                const isBest = idx === 0;
                const isApplied = state.rothOptAppliedIdx === idx;
                return `<tr${isApplied ? ' style="background:rgba(16,185,129,0.15)"' : isBest ? ' style="background:rgba(16,185,129,0.08)"' : ''}>
                  <td style="text-align:left;color:${isBest?'var(--green)':'var(--text)'};font-weight:${isBest?'600':'400'}">${isBest?'&#9733; ':''}${s.label}${isApplied?' <span style="color:var(--green)">&#10003; Applied</span>':''}</td>

                  <td style="color:${s.nwDiff>0?'var(--green)':s.nwDiff<0?'var(--red)':'var(--text-faint)'}">${s.nwDiff>0?'&#8593; '+fmtK(s.nwDiff):s.nwDiff<0?'&#8595; '+fmtK(Math.abs(s.nwDiff)):'--'}</td>

          ${opt.strategies.length > 0 ? (() => {
            try {
            const best = opt.strategies[0];
            const noConvProj = runProjection({...p, rothConversion:{enabled:false}});
            const len = Math.min(best.proj.length, noConvProj.length);

            // Breakeven age for best strategy (tax-adjusted NW)
            let optBreakevenAge = null;
            const optConvStart = best.proj.findIndex(y => y.rothConv > 0);
            if (optConvStart >= 0) {
              let ctB = 0, ctN = 0;
              let prevAdjB = 0, prevAdjN = 0;
              for (let i = 0; i < len; i++) {
                ctB += best.proj[i].tax || 0;
                ctN += noConvProj[i].tax || 0;
                const adjB = best.proj[i].netWorth - ctB;
                const adjN = noConvProj[i].netWorth - ctN;
                if (i >= optConvStart && i > 0 && prevAdjB < prevAdjN && adjB >= adjN) {
                  optBreakevenAge = best.proj[i].age;
                }
                prevAdjB = adjB; prevAdjN = adjN;
              }
              ctB = 0; ctN = 0;
              let everBehind = false;
              for (let i = 0; i < len; i++) {
                ctB += best.proj[i].tax || 0;
                ctN += noConvProj[i].tax || 0;
                if (i >= optConvStart && (best.proj[i].netWorth - ctB) < (noConvProj[i].netWorth - ctN)) {
                  everBehind = true; break;
                }
              }
              if (!everBehind) optBreakevenAge = -1;
            }

            // Cumulative lifetime tax comparison
            let cumTaxBase = 0, cumTaxBest = 0;
            const taxChartData = [];
            for (let i = 0; i < len; i++) {
              cumTaxBase += noConvProj[i].tax || 0;
              cumTaxBest += best.proj[i].tax || 0;
              taxChartData.push({ age: best.proj[i].age, year: best.proj[i].year, retired: best.proj[i].retired, noConv: cumTaxBase, withConv: cumTaxBest });
            }
            // Conversion advantage delta: (best adjusted) - (baseline adjusted)
            const optAdvantageData = [];
            let ctBest = 0, ctBase = 0;
            for (let i = 0; i < len; i++) {
              ctBest += best.proj[i].tax || 0;
              ctBase += noConvProj[i].tax || 0;
              const adjBest = best.proj[i].netWorth - ctBest;
              const adjBase = noConvProj[i].netWorth - ctBase;
              optAdvantageData.push({ age: best.proj[i].age, year: best.proj[i].year, retired: best.proj[i].retired, advantage: adjBest - adjBase });
            }
            const optAdvColor = (optAdvantageData[optAdvantageData.length - 1]?.advantage || 0) >= 0 ? '#10b981' : '#ef4444';
            // Pre-tax vs Roth balance comparison
            const balChartData = [];
            for (let i = 0; i < len; i++) {
              balChartData.push({
                age: best.proj[i].age, year: best.proj[i].year, retired: best.proj[i].retired,
                ptBase: noConvProj[i].preTax || 0, ptConv: best.proj[i].preTax || 0,
                rothBase: noConvProj[i].roth || 0, rothConv: best.proj[i].roth || 0,
              });
            }
            return '<div style="margin-top:16px">' + buildChart(
                optAdvantageData, ['advantage'], [optAdvColor], ['Conversion Advantage'],
                {title:'Conversion Advantage (Tax-Adjusted)' + (optBreakevenAge > 0 ? ' — Breakeven Age ' + optBreakevenAge : optBreakevenAge === -1 ? ' — Always Ahead' : ''), height:170}
              ) + '<div style="font-size:11px;color:var(--text-faint);margin-top:2px;margin-bottom:4px">Above zero = strategy winning &#183; Below zero = still recouping upfront tax cost</div></div>' +
              '<div class="grid-2" style="margin-top:4px">' +
              '<div>' + buildChart(
                taxChartData, ['noConv','withConv'], ['#8b5cf6','#10b981'], ['Cumulative Tax (No Conv)','Cumulative Tax (With Conv)'],
                {title:'Lifetime Tax Burden', height:170}
              ) + '</div>' +
              '<div>' + buildChart(
                balChartData, ['ptBase','ptConv','rothBase','rothConv'],
                ['#8b5cf6','#3b82f6','#6b7280','#10b981'],
                ['Pre-Tax (No Conv)','Pre-Tax (With Conv)','Roth (No Conv)','Roth (With Conv)'],
                {title:'Account Composition Shift', height:170}
              ) + '</div></div>' +
            '<div style="margin-top:12px;font-size:13px;line-height:1.8;color:var(--text-dim)">' +
              '<strong style="color:var(--green)">&#9733; Recommended:</strong> ' + best.label + '. ' +
              'Convert <strong style="color:var(--cyan)">' + fmtK(best.conv) + '</strong> total, ' +
              'paying <strong style="color:var(--red)">' + fmtK(best.convTax) + '</strong> in conversion taxes. ' +
              'Reduces lifetime RMDs by <strong style="color:var(--green)">' + fmtK(Math.abs(best.rmdDiff)) + '</strong>' +
              (best.taxDiff < 0 ? ' and saves <strong style="color:var(--green)">' + fmtK(Math.abs(best.taxDiff)) + '</strong> in lifetime taxes.' : '.') +
              ' Final net worth ' + (best.nwDiff >= 0 ? 'increases' : 'decreases') +
              ' by <strong style="color:' + (best.nwDiff >= 0 ? 'var(--green)' : 'var(--red)') + '">' + fmtK(Math.abs(best.nwDiff)) + '</strong>.' + (best.nwDiff < 0 ? ' <em style="color:var(--text-dim)">(NW may decrease because conversion taxes are paid upfront; the benefit is in reduced lifetime taxes, RMDs, and IRMAA.)</em>' : '') +
            '</div>' +
            (optBreakevenAge !== -1 ? '<div style="font-size:12px;line-height:1.7;color:var(--text-dim);margin-top:8px;padding:10px 14px;background:var(--bg-base);border-radius:8px;border-left:3px solid var(--amber)">' +
              '<strong style="color:var(--amber)">&#9202; Breakeven age: ' + (optBreakevenAge ? optBreakevenAge : 'beyond ' + p.endAge) + '</strong> — ' +
              'Conversion taxes reduce net worth in early years. ' +
              (optBreakevenAge ? 'Tax-free Roth growth catches up at age <strong>' + optBreakevenAge + '</strong>. Before that age, the conversion taxes represent a net cost to the estate.' : 'Within this projection the cost is never fully recovered on a net worth basis.') +

              '<strong style="color:var(--green)">&#10003; No breakeven delay</strong> — Net worth with conversions never falls below the no-conversion path.' +
            '</div>');
            } catch(e) { console.error('Optimizer chart error:', e); return ''; }
          })() : ''}
        </div>`;
      }
      return optHtml;
    })()}`;
  }

  // Feature #1: SSDI tab
  if (state.inputTab === 'ssdi') {

            <div class="info-box"><div class="info-box-label">Spouse Annual SSDI Income</div><div class="info-box-value" style="color:var(--blue)">${fmt((ssdi2.monthlyAmount||0)*12)}</div></div>

      ${ssdi1.enabled || ssdi2.enabled ? `

            </tbody></table>
            <div style="margin-top:10px;font-size:12px;color:var(--text-dim);line-height:1.6">

            <tr style="background:rgba(16,185,129,0.06)"><td style="color:var(--green);font-weight:600">SS (auto-convert)</td><td>${spSSConvertAge}+</td><td>${fmt(spFraResult.annual)}</td><td>Converts at FRA (${spFraAge}) &mdash; no claiming choice</td></tr>

              ${(p.spouseSSClaimAge||67) > spSSConvertAge ? `<br><span style="color:var(--amber)">&#9888; Spouse SS claim age (${p.spouseSSClaimAge||67}) is ignored &mdash; SSDI auto-converts to SS at age ${spSSConvertAge}.</span>` : ''}
            </div>

        }
        return ssdiSummary;
      })()}
    </div>`;
  }

  if (state.inputTab === 'ss') {
    const birthYear = p.birthYear || (new Date().getFullYear() - p.currentAge);
    const useManual = p.ssUseManual && p.ssManualMonthly > 0;
    // SSDI auto-converts to SS at FRA — override user's claim age when active
    const ssdi1ss = p.ssdiPrimary || {};
    const effectiveClaimAge = ssdi1ss.enabled ? (ssdi1ss.endAge || 66) + 1 : p.ssClaimAge;

        })()
      : estimateSS({ avgIncome: p.ssAnnualIncome || p.annualIncome, claimAge: effectiveClaimAge, birthYear });
    // claim comparison table built inline below

    content += `<div class="grid-2">
      <div class="card"><div class="card-title">Your Social Security</div>
        ${ssdi1ss.enabled ? `<div style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--text-dim);line-height:1.6">

        ${field('SS Claim Age ' + tip('When you start collecting Social Security. You can start as early as 62 (smaller monthly check) or wait until 70 (largest check &mdash; about 77% more than at 62).'),'ssClaimAge',{help:'62 (early) to 70 (max delayed credits)' + (ssdi1ss.enabled ? ' — overridden by SSDI auto-conversion at FRA' : '')})}
        ${!isEssentials && (p.spouseEnabled || p.spouseAge > 0) ? field('Survivor SS Claim Age','survivorSSClaimAge',{help:'Age to start collecting survivor SS if spouse passes away. Min 60.'}) : ''}
        <div style="margin:14px 0;padding:12px;background:var(--bg-base);border-radius:8px;border:1px solid var(--border)">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text);margin-bottom:10px">
            <input type="checkbox" ${p.ssUseManual?'checked':''} onchange="setParam('ssUseManual',this.checked)" style="width:16px;height:16px;accent-color:var(--green)">
            Use my SSA statement amount (manual entry)
          </label>
          ${p.ssUseManual ? `
            ${field('Monthly Benefit at FRA from SSA ' + tip('Your Primary Insurance Amount (PIA) &mdash; the monthly benefit shown on your Social Security statement at Full Retirement Age. Log in to ssa.gov to find yours.'),'ssManualMonthly',{prefix:'$',help:'Enter the amount from your my Social Security statement at FRA. Early/late claiming adjustments are applied automatically.'})}
            ${p.ssManualMonthly > 0 ? `<div style="font-size:12px;color:var(--text-dim);margin-top:4px;padding:8px;background:var(--bg-base);border-radius:6px">
              <strong>FRA amount:</strong> ${fmt(p.ssManualMonthly)}/mo &#183; <strong>At age ${effectiveClaimAge}${ssdi1ss.enabled ? ' (SSDI→SS)' : ''}:</strong> ${fmt(ssResult.monthly)}/mo
              ${!ssdi1ss.enabled ? (effectiveClaimAge < ssResult.fra ? ' <span style="color:var(--red)">(reduced ' + Math.round((1 - ssResult.monthly/p.ssManualMonthly)*100) + '%)</span>' :
                effectiveClaimAge > ssResult.fra ? ' <span style="color:var(--green)">(+' + Math.round((ssResult.monthly/p.ssManualMonthly - 1)*100) + '% delayed credits)</span>' : ' <span style="color:var(--text-faint)">(at FRA)</span>') : ' <span style="color:var(--blue)">(auto-conversion at FRA)</span>'}

        ${!isEssentials && !ssdi1ss.enabled && effectiveClaimAge < ssResult.fra && p.currentAge <= p.retirementAge ? `<div style="background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);border-radius:8px;padding:10px 14px;margin-top:10px;font-size:12px;color:var(--text-dim);line-height:1.6">
          <strong style="color:var(--amber)">&#9432; Earnings Test</strong> &mdash;

          In 2025, $1 is withheld for every $2 you earn above $${SS_RET_UNDER_FRA_LIMIT.toLocaleString()}/year.
          In the year you reach FRA, the limit rises to $${SS_RET_FRA_YEAR_LIMIT.toLocaleString()} with $1 per $3.
          Withheld benefits are not lost &mdash; SSA recalculates your monthly benefit at FRA to credit them back.
          <br><span style="font-size:11px;color:var(--text-faint)">Your projection models this withholding. The FRA recalculation (benefit increase) is not yet modeled.</span>
        </div>` : ''}
      </div>
      <div class="card"><div class="card-title">Spouse Social Security</div>
        ${(p.spouseEnabled || p.spouseAge > 0) ? (() => {
          const spBY = p.spouseBirthYear || (new Date().getFullYear() - (p.spouseAge||0));
          const spUseManual = p.spouseSSUseManual && p.spouseSSManualMonthly > 0;
          const ssdi2ss = p.ssdiSpouse || {};
          const effectiveSpClaimAge = ssdi2ss.enabled ? (ssdi2ss.endAge || 66) + 1 : (p.spouseSSClaimAge || 67);
          const spResult = spUseManual
            ? (() => {
                const fraM = fraMonths(spBY);
                const adj = ssaAdjustPIA(p.spouseSSManualMonthly, effectiveSpClaimAge * 12, fraM);
                return { annual: adj*12, monthly: adj, fra: fraM/12 };
              })()
            : estimateSS({avgIncome:p.spouseSSIncome||0,claimAge:effectiveSpClaimAge,birthYear:spBY});
          return `
          ${ssdi2ss.enabled ? `<div style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--text-dim);line-height:1.6">

          </div>` : ''}

            </label>
            ${p.spouseSSUseManual ? `

        })()
          : '<div style="color:var(--text-faint);font-size:13px">Enable spouse in Personal tab.</div>'}
      </div>
    </div>

    ${!isEssentials ? `<div class="card"><div class="card-title">Cost-of-Living Adjustment (Both Spouses)</div>
      ${field('Social Security COLA ' + tip('Cost-of-living adjustment &mdash; how much Social Security increases each year to keep up with inflation. The historical average is about 2-3%.'),'ssCOLA',{suffix:'%',help:'Historical avg ~2%. Applied after claiming to both you and spouse.'})}
    </div>` : ''}

    ${!isEssentials ? (() => {
      const sstf = p.ssTrustFundReduction || {};
      return `<div class="card"><div class="card-title">SS Trust Fund Reduction</div>

            </div>
          </div>
        ` : ''}
      </div>`;
    })() : ''}

    ${!isEssentials ? (() => {
      // Build YOUR claim comparison table
      const manualPIA = p.ssUseManual && p.ssManualMonthly > 0 ? p.ssManualMonthly : null;
      const tableData = [62,63,64,65,66,67,68,69,70].map(age => {
        let r;
        if (manualPIA) {
          const fraM = fraMonths(birthYear);
          const adj = ssaAdjustPIA(manualPIA, age * 12, fraM);
          r = { age, annual: adj * 12, monthly: adj, fra: fraM / 12 };
        } else {
          r = { age, ...estimateSS({ avgIncome: p.ssAnnualIncome || p.annualIncome, claimAge: age, birthYear }) };
        }
        const at62 = manualPIA
          ? (() => { const adj = ssaAdjustPIA(manualPIA, 62 * 12, fraMonths(birthYear)); return adj * 12; })()
          : estimateSS({ avgIncome: p.ssAnnualIncome || p.annualIncome, claimAge: 62, birthYear }).annual;
        const diff = r.annual - at62;
        const yrsLost = (age - 62) * at62;
        r.breakeven = diff > 0 ? Math.round(age + yrsLost / diff) : null;
        return r;

      const fraAmt = tableData.find(x => x.age === Math.round(ssResult.fra))?.annual || ssResult.annual;
      let html = `<div class="card"><div class="card-title">Your SS Claiming Age Comparison</div>

          const diff = r.annual - at62;
          const yrsLost = (age - 62) * at62;
          r.breakeven = diff > 0 ? Math.round(age + yrsLost / diff) : null;
          return r;

            <tbody>${spTableData.map(r => {

              const isSelected = r.age === effectiveSpTblAge;
              return '<tr' + (isSelected ? ' style="background:rgba(16,185,129,0.08)"' : '') + '>' +
                '<td' + (isSelected ? ' class="highlight"' : '') + '>' + r.age + (r.age === Math.round(spFRA) ? ' (FRA)' : '') + (isSelected ? (ssdi2tbl.enabled ? ' &#9432;' : ' &#10003;') : '') + '</td>' +
                '<td>' + fmt(r.monthly) + '</td>' +
                '<td' + (isSelected ? ' class="highlight"' : '') + '>' + fmt(r.annual) + '</td>' +

                '<td>' + (r.breakeven ? 'Age ' + r.breakeven : '--') + '</td></tr>';

          </table>
        </div>`;
      }

  // Feature #2: Charitable Giving tab
  if (state.inputTab === 'charity') {
    const charity = p.charitableGiving || {};
    const sched = charity.schedule || [];
    content += `<div class="card" data-accent="amber"><div class="card-title">Charitable Giving & QCD <span class="badge badge-qcd">Tax-Free RMD</span></div>

              </td>
              <td><div style="display:flex;align-items:center;gap:2px"><span style="color:var(--text-faint);font-size:11px">$</span><input type="text" inputmode="decimal" value="${fmtC(s.amount||0)}" onfocus="this.value=this.value.replace(/,/g,'')" onblur="this.value=fmtC(parseC(this.value))" onchange="updateCharitySched(${idx},'amount',parseC(this.value))" style="background:transparent;border:1px solid var(--border);color:var(--text);font-size:12px;width:65px;text-align:right;border-radius:4px;padding:2px 4px"></div></td>

  if (state.inputTab === 'legacy') {

    const surplus = final - (lg.targetAmount || 0);
    const barColor = pct >= 100 ? '#10b981' : pct >= 50 ? '#f59e0b' : '#ef4444';

    const estateThreshold = ESTATE_TAX_STATES[p.stateCode] ?? null;
    const endNetWorth = proj[proj.length - 1].netWorth;
    const showEstateTaxWarning = estateThreshold !== null && endNetWorth > estateThreshold;
    if (showEstateTaxWarning) {
      const stName = STATE_TAXES[p.stateCode]?.name || p.stateCode;
      content += `<div style="margin-bottom:14px;padding:10px 14px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);border-radius:8px;font-size:12px;color:var(--amber);line-height:1.6">&#9888; <strong>Estate Tax Notice:</strong> Your projected estate (~${fmtK(endNetWorth)}) may exceed <strong>${stName}'s estate tax threshold</strong> (~${fmtK(estateThreshold)}). This tool models income taxes on inherited accounts but does <em>not</em> model estate taxes. Consider consulting an estate attorney. As a rough placeholder, you can add a one-time expense at your longevity date.</div>`;
    }

    content += `<div class="card" data-accent="green"><div class="card-title">Legacy Planning</div>
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:14px;line-height:1.6">
        Set a target amount you want to leave behind for heirs, charity, or other purposes.

        (Roth conversions, expense phases, charitable giving) to maximize or protect the legacy.
      </div>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text);margin-bottom:14px">
        <input type="checkbox" ${lg.enabled?'checked':''} onchange="setLegacy('enabled',this.checked)" style="width:16px;height:16px;accent-color:var(--green)">
        Enable Legacy Goal
      </label>
      ${lg.enabled ? `
        <div class="field"><label class="field-label">Target Legacy Amount</label><div class="field-wrap"><span class="field-prefix">$</span>
          <input type="text" inputmode="decimal" class="field-input has-prefix" value="${fmtC(lg.targetAmount||500000)}" onfocus="this.value=this.value.replace(/,/g,'')" onblur="this.value=fmtC(parseC(this.value))" onchange="setLegacy('targetAmount',parseC(this.value))">
        </div><div class="field-help">Net worth you want to leave at end of plan (age ${p.endAge})</div></div>

        <div style="margin:16px 0">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-bottom:6px">
            <span>Progress: ${pct}%</span>
            <span>${fmtK(Math.max(0, final))} / ${fmtK(lg.targetAmount||0)}</span>
          </div>
          <div style="height:20px;background:var(--bg-base);border-radius:10px;overflow:hidden;border:1px solid var(--border)">
            <div style="height:100%;width:${Math.min(100, pct)}%;background:${barColor};border-radius:10px;transition:width 0.5s"></div>
          </div>
        </div>

        <div class="grid-2">
          <div class="info-box"><div class="info-box-label">Projected End Net Worth</div>
            <div class="info-box-value" style="color:${final>0?'var(--green)':'var(--red)'}">${fmtK(final)}</div></div>
          <div class="info-box"><div class="info-box-label">${surplus >= 0 ? 'Surplus' : 'Shortfall'}</div>
            <div class="info-box-value" style="color:${surplus>=0?'var(--green)':'var(--red)'}">${fmtK(Math.abs(surplus))}</div></div>
        </div>

        <div style="margin-top:16px;padding:14px;background:var(--bg-base);border-radius:8px;border:1px solid var(--border)">
          <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">Strategies to Grow Legacy</div>
          <div style="font-size:12px;color:var(--text-dim);line-height:1.8">
            ${surplus < 0 ? `
              <div>* <strong>Reduce expenses</strong> -- even $${Math.round(Math.abs(surplus)/(p.endAge-p.retirementAge)/12).toLocaleString()}/mo could close the gap</div>
              <div>* <strong>Delay retirement</strong> -- each year adds income + savings + delayed SS</div>
              <div>* <strong>Roth conversions</strong> -- tax-free growth can compound significantly</div>
              <div>* <strong>Expense phases</strong> -- reduce spending in later retirement years</div>
            ` : `
              <div style="color:var(--green)">&#10003; Your current plan meets your legacy goal with a surplus of <strong>${fmtK(surplus)}</strong>.</div>

              <div>* Roth accounts pass to heirs tax-free -- maximize Roth conversions</div>
            `}
          </div>
        </div>

        ${(() => {
          const lastYear = proj[proj.length - 1];
          const endPreTax = lastYear.preTax;
          const endRoth = lastYear.roth;
          const endTaxable = lastYear.taxable;
          const endHsa = lastYear.hsa || 0;
          const endTotal = lastYear.netWorth;
          const totalLifeInsBenefits = proj.reduce((s, y) => s + (y.lifeInsBenefit || 0), 0);
          if (endTotal <= 0) return '<div style="margin-top:16px;padding:14px;background:var(--bg-base);border-radius:8px;border:1px solid var(--border);font-size:12px;color:var(--text-dim)">Your plan does not meet the legacy goal \u2014 portfolio depleted.</div>';
          const estimatedHeirBracket = 22;
          const afterTaxPreTax = Math.round(endPreTax * (1 - estimatedHeirBracket / 100));
          const afterTaxHsa = Math.round(endHsa * (1 - estimatedHeirBracket / 100));
          const afterTaxLegacy = afterTaxPreTax + afterTaxHsa + endRoth + endTaxable;
          const ptPct = endTotal > 0 ? Math.round(endPreTax / endTotal * 100) : 0;
          const roPct = endTotal > 0 ? Math.round(endRoth / endTotal * 100) : 0;
          const hsaPct = endTotal > 0 ? Math.round(endHsa / endTotal * 100) : 0;
          const txPct = Math.max(0, 100 - ptPct - roPct - hsaPct);
          // Roth conversion comparison
          let rothInsight = '';
          const rc = p.rothConversion || {};
          if (rc.enabled) {
            const noConvParams = { ...p, rothConversion: { ...rc, enabled: false } };
            const noConvProj = runProjection(noConvParams);
            const noConvLast = noConvProj[noConvProj.length - 1];
            const noConvAfterTax = Math.round(noConvLast.preTax * (1 - estimatedHeirBracket / 100)) + Math.round((noConvLast.hsa || 0) * (1 - estimatedHeirBracket / 100)) + noConvLast.roth + noConvLast.taxable;
            const legacyDelta = afterTaxLegacy - noConvAfterTax;
            rothInsight = '<div style="margin-top:14px;padding:14px;background:var(--bg-base);border-radius:8px;border:1px solid var(--border)">'
              + '<div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">Roth Conversion Impact on Legacy</div>'
              + '<div style="font-size:12px;color:var(--text-dim);line-height:1.8">'
              + '<div>Without conversions: ' + fmtK(noConvLast.preTax) + ' pre-tax / ' + fmtK(noConvLast.roth) + ' Roth / ' + fmtK(noConvLast.taxable) + ' taxable</div>'
              + '<div>With conversions: ' + fmtK(endPreTax) + ' pre-tax / ' + fmtK(endRoth) + ' Roth / ' + fmtK(endTaxable) + ' taxable</div>'
              + '<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">'
              + (legacyDelta > 0
                ? '<span style="color:var(--green)">&#10003;</span> Your Roth conversions increase the estimated after-tax legacy by approximately <strong style="color:var(--green)">' + fmtK(legacyDelta) + '</strong>, shifting wealth from taxable-to-heirs to tax-free-to-heirs.'
                : legacyDelta < -1000
                ? '<span style="color:var(--amber)">&#9888;</span> Your Roth conversions reduce the after-tax legacy by approximately <strong>' + fmtK(Math.abs(legacyDelta)) + '</strong>. This can happen if conversion taxes reduce the total portfolio more than the tax-free shift benefits heirs.'
                : 'Roth conversions have minimal impact on your after-tax legacy value at the assumed ' + estimatedHeirBracket + '% heir bracket.')
              + '</div>'
              + '<div style="font-size:11px;color:var(--text-faint);margin-top:6px">Roth conversions shift pre-tax (taxable to heirs) into Roth (tax-free to heirs). The trade-off is paying conversion taxes now. Assumes heirs in the ' + estimatedHeirBracket + '% bracket.</div>'
              + '</div></div>';
          }
          return '<div style="margin-top:20px;padding:16px;background:var(--bg-base);border-radius:8px;border:1px solid var(--border)">'
            + '<div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:12px">Legacy Composition</div>'
            + '<div style="height:16px;display:flex;border-radius:8px;overflow:hidden;margin:0 0 4px">'
            + (ptPct > 0 ? '<div style="width:' + ptPct + '%;background:var(--blue)" title="Pre-Tax ' + ptPct + '%"></div>' : '')
            + (roPct > 0 ? '<div style="width:' + roPct + '%;background:var(--cyan)" title="Roth ' + roPct + '%"></div>' : '')
            + (hsaPct > 0 ? '<div style="width:' + hsaPct + '%;background:#8b5cf6" title="HSA ' + hsaPct + '%"></div>' : '')
            + (txPct > 0 ? '<div style="width:' + txPct + '%;background:var(--amber)" title="Taxable ' + txPct + '%"></div>' : '')
            + '</div>'
            + '<div style="display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--text-dim);margin-bottom:12px">'
            + (ptPct > 0 ? '<span><span style="color:var(--blue)">&#9632;</span> Pre-Tax ' + ptPct + '%</span>' : '')
            + (roPct > 0 ? '<span><span style="color:var(--cyan)">&#9632;</span> Roth ' + roPct + '%</span>' : '')
            + (hsaPct > 0 ? '<span><span style="color:#8b5cf6">&#9632;</span> HSA ' + hsaPct + '%</span>' : '')
            + (txPct > 0 ? '<span><span style="color:var(--amber)">&#9632;</span> Taxable ' + txPct + '%</span>' : '')
            + '</div>'
            + '<div style="display:flex;flex-direction:column;gap:10px;font-size:13px">'
            + (endPreTax > 0 ? '<div style="display:flex;justify-content:space-between;align-items:baseline"><div><span style="color:var(--blue)">&#9632;</span> Pre-Tax (401k/IRA)</div><div style="font-weight:600">' + fmtK(endPreTax) + '</div></div><div style="font-size:11px;color:var(--text-dim);margin-top:-6px;padding-left:16px">Taxable to heirs as ordinary income. Non-spouse beneficiaries must distribute within 10 years (SECURE Act).</div>' : '')
            + (endRoth > 0 ? '<div style="display:flex;justify-content:space-between;align-items:baseline"><div><span style="color:var(--cyan)">&#9632;</span> Roth (401k/IRA)</div><div style="font-weight:600">' + fmtK(endRoth) + '</div></div><div style="font-size:11px;color:var(--text-dim);margin-top:-6px;padding-left:16px">Tax-free to heirs. Non-spouse beneficiaries must distribute within 10 years, but withdrawals are not taxed.</div>' : '')
            + (endHsa > 0 ? '<div style="display:flex;justify-content:space-between;align-items:baseline"><div><span style="color:#8b5cf6">&#9632;</span> HSA</div><div style="font-weight:600">' + fmtK(endHsa) + '</div></div><div style="font-size:11px;color:var(--text-dim);margin-top:-6px;padding-left:16px">Passes to spouse tax-free (becomes their HSA). Non-spouse beneficiaries pay income tax on the full balance in the year of death.</div>' : '')
            + (endTaxable > 0 ? '<div style="display:flex;justify-content:space-between;align-items:baseline"><div><span style="color:var(--amber)">&#9632;</span> Taxable (Brokerage)</div><div style="font-weight:600">' + fmtK(endTaxable) + '</div></div><div style="font-size:11px;color:var(--text-dim);margin-top:-6px;padding-left:16px">Heirs receive a stepped-up cost basis at date of death, eliminating unrealized capital gains.</div>' : '')
            + (totalLifeInsBenefits > 0 ? '<div style="font-size:11px;color:var(--green);margin-top:-4px;padding-left:16px">Includes ' + fmtK(totalLifeInsBenefits) + ' life insurance death benefit (tax-free to beneficiaries).</div>' : '')
            + '</div>'
            + (endPreTax > 0 || endHsa > 0 ? '<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)"><div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px">Estimated After-Tax Legacy</div><div style="font-size:12px;color:var(--text-dim);line-height:1.6">If heirs are in the ' + estimatedHeirBracket + '% tax bracket, the pre-tax portion (' + fmtK(endPreTax) + ')' + (endHsa > 0 ? ' and HSA (' + fmtK(endHsa) + ')' : '') + ' would yield approximately ' + fmtK(afterTaxPreTax + afterTaxHsa) + ' after taxes. Combined with tax-free Roth (' + fmtK(endRoth) + ') and stepped-up taxable (' + fmtK(endTaxable) + '), your estimated after-tax legacy is approximately <strong style="color:var(--green)">' + fmtK(afterTaxLegacy) + '</strong>.</div><div style="font-size:11px;color:var(--text-faint);margin-top:4px">Assumes non-spouse heirs in the 22% federal bracket. HSA passes to spouse tax-free. Actual tax depends on heir\u2019s income, state, and distribution timing.</div></div>' : '')
            + '</div>'
            + (ptPct === 100 ? '<div style="margin-top:10px;font-size:12px;color:var(--amber);line-height:1.5">&#9888; Your entire legacy is in pre-tax accounts \u2014 heirs will owe income tax on every dollar. Consider Roth conversions to shift some wealth to tax-free.</div>' : '')
            + (roPct === 100 ? '<div style="margin-top:10px;font-size:12px;color:var(--green);line-height:1.5">&#10003; Your entire legacy is in Roth accounts \u2014 tax-free to heirs.</div>' : '')

        <div class="field" style="margin-top:14px"><label class="field-label">Notes</label>

        </div>

    if (!isEssentials) {
      content += renderLifeInsurance(p);

  }

  if (state.inputTab === 'medicare') {
    const proj = runProjection(p);
    const ssdi1d = p.ssdiPrimary || {};

    const primaryMedAgeCalc = ssdi1d.enabled ? Math.min((ssdi1d.startAge || 0) + 2, 65) : 65;

    const hasSpouseMed = p.spouseEnabled || (p.spouseAge && p.spouseAge > 0);

    const medicareYears = proj.filter(y => y.age >= primaryMedAge);
    const totalMedicare = medicareYears.reduce((s,y) => s + y.medicareCost, 0);

    const irmaaLabel = hasSpouse ? 'MFJ' : 'Single';

        ${ssdi1d.enabled && ssdi2d.enabled ? ' Both you and spouse qualify early via SSDI.' : ssdi2d.enabled && primaryMedAgeCalc === 65 ? ' (via spouse SSDI)' : ''}
      </div>` : ''}
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:12px;line-height:1.6">
        Medicare Part B and Part D premiums include Income-Related Monthly Adjustment Amounts (IRMAA) based on your Modified Adjusted Gross Income (MAGI) from 2 years prior.

      </div>

      <div class="grid-2">
        <div>
          <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">2025 IRMAA Brackets (${irmaaLabel})</div>
          ${irmaaBrackets.map((b, i) => {
            const next = irmaaBrackets[i+1];
            const rangeStr = next ? `$${(b.magi/1000).toFixed(0)}K - $${(next.magi/1000).toFixed(0)}K` : `$${(b.magi/1000).toFixed(0)}K+`;
            const isFirst = i === 0;
            return `<div class="irmaa-bracket">
              <span>${isFirst ? 'Base (&le;' + irmaaBaseThresh + ')' : rangeStr}</span>
              <span>Part B: $${(b.partB/12).toFixed(0)}/mo${i > 0 ? ' &#183; Part D: +$'+(b.partD/12).toFixed(0)+'/mo' : ''}</span>

        </div>
        <div>
          <div class="info-box" style="margin-top:0"><div class="info-box-label">Lifetime Medicare Cost (from ${primaryMedAge})</div>

          <div class="info-box"><div class="info-box-label">Lifetime Medicare Surcharges (IRMAA)</div>
            <div class="info-box-value" style="color:var(--pink)">${fmtK(totalSurcharge)}</div></div>
          <div class="info-box"><div class="info-box-label">Years with IRMAA Surcharge</div>
            <div class="info-box-value" style="color:var(--amber)">${medicareYears.filter(y => y.irmaa > 0).length} of ${medicareYears.length}</div></div>
        </div>
      </div>

      ${medicareYears.length > 0 ? `<div style="margin-top:16px">${buildChart(
        medicareYears, ['medicareCost','irmaa'], ['#ec4899','#f59e0b'], ['Total Medicare','IRMAA Surcharge'], { title: 'Medicare Costs by Age', height: 160 }
      )}</div>` : ''}
    </div>`;
  }

  if (state.inputTab === 'assumptions') {
    const realRet = ((1 + p.nominalReturn/100) / (1 + p.inflation/100) - 1) * 100;
    content += `<div class="card"><div class="card-title">Economic Assumptions</div>
      <div class="grid-2">
        ${field('Nominal Investment Return','nominalReturn',{suffix:'%',help:'Default for accounts without individual rates. Historical S&P 500 ~10%. Balanced ~7%'})}
        ${field('Inflation Rate','inflation',{suffix:'%',help:'Historical avg ~3%'})}
      </div>
      <div class="grid-2">
        <div class="info-box"><div class="info-box-label">Real Return</div><div class="info-box-value" style="color:var(--cyan)">${realRet.toFixed(2)}%</div></div>
        <div class="field"><label class="field-label">State for Tax Purposes</label>
          <select class="field-input" onchange="setParam('stateCode',this.value)" style="cursor:pointer">
            ${Object.entries(STATE_TAXES).map(([code,st]) => {
              const label = st.type === 'bracketed' ? st.name + ' (progressive)'
                : st.rate > 0 ? st.name + ' (flat ' + st.rate + '%)'
                : st.name;
              return `<option value="${code}"${p.stateCode===code?' selected':''}>${label}</option>`;
            }).join('')}
          </select>
          <div class="field-help">${(() => {
            const stEntry = STATE_TAXES[p.stateCode];
            const stDesc = !stEntry || stEntry.type === 'none' ? 'Federal taxes only'
              : stEntry.type === 'flat' ? stEntry.name + ' &mdash; flat ' + stEntry.rate + '%'
              : stEntry.name + ' &mdash; progressive brackets';
            const exclNote = stEntry && (stEntry.ssExempt || stEntry.retirementExclusion > 0)
              ? ' &middot; Retirement exemptions apply' : '';
            return stDesc + exclNote;
          })()}</div>
        </div>
      </div>
      ${!isEssentials ? `<div style="margin-top:20px;padding:14px;background:var(--bg-base);border-radius:10px;border:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">Default Withdrawal Order ${tip('When you need money in retirement, which account should RetIQ draw from first? The order matters because each account type is taxed differently.')}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:10px;line-height:1.5">This order applies whenever no phase schedule covers a given year. If you don't add phases below, this order applies for all of retirement. The default (Cash &rarr; HSA &rarr; Brokerage &rarr; Pre-Tax &rarr; Roth) is a widely-used approach.</div>
        ${(p.withdrawalOrder || ['cash','hsa','taxable','pretax','roth']).map((src, i, arr) => {
          const labels = { cash: 'Cash / HYS', taxable: 'Brokerage', pretax: 'Pre-Tax (401k/IRA)', roth: 'Roth', hsa: 'HSA' };
          const colors = { cash: 'var(--cyan)', taxable: 'var(--amber)', pretax: 'var(--blue)', roth: 'var(--green)', hsa: '#8b5cf6' };
          const _tInvBal = p.accounts.filter(a => a.type === 'taxable' && a.subtype !== 'cash').reduce((s,a)=>s+a.balance,0);
          const _gainPct = p.brokerageCostBasis !== undefined && _tInvBal > 0
            ? Math.round(Math.max(0, _tInvBal - Math.min(p.brokerageCostBasis, _tInvBal)) / _tInvBal * 100)
            : Math.round((p.brokerageGainsFraction ?? 0.5) * 100);
          const notes = { cash: 'Zero capital gains — pure principal return', taxable: 'Gains taxed at capital gains rate (' + _gainPct + '% estimated gain' + (p.brokerageCostBasis !== undefined ? ' — tracked dynamically' : '') + ')', pretax: 'Taxable as ordinary income', roth: 'Tax-free withdrawals', hsa: 'Tax-free (qualified medical); ordinary income after 65 (non-medical)' };
          return '<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;margin-bottom:4px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px">'

            + '<div style="flex:1">'

            + '</div>'
            + '<div style="display:flex;flex-direction:column;gap:2px">'
            + '<button onclick="moveWithdrawalOrder(' + i + ',-1)" style="background:var(--bg-input);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:12px;color:' + (i === 0 ? 'var(--text-faint)' : 'var(--text)') + ';cursor:' + (i === 0 ? 'default' : 'pointer') + ';opacity:' + (i === 0 ? '0.3' : '1') + '"' + (i === 0 ? ' disabled' : '') + '>&#9650;</button>'
            + '<button onclick="moveWithdrawalOrder(' + i + ',1)" style="background:var(--bg-input);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:12px;color:' + (i === arr.length - 1 ? 'var(--text-faint)' : 'var(--text)') + ';cursor:' + (i === arr.length - 1 ? 'default' : 'pointer') + ';opacity:' + (i === arr.length - 1 ? '0.3' : '1') + '"' + (i === arr.length - 1 ? ' disabled' : '') + '>&#9660;</button>'
            + '</div></div>';
        }).join('')}
        ${(() => { const hasHsa = p.accounts.some(a => a.type === 'hsa'); const defaultOrder = hasHsa ? ['cash','hsa','taxable','pretax','roth'] : ['cash','taxable','pretax','roth']; const defaultLabel = hasHsa ? 'Cash → HSA → Brokerage → Pre-Tax → Roth' : 'Cash → Brokerage → Pre-Tax → Roth'; return JSON.stringify(p.withdrawalOrder || defaultOrder) !== JSON.stringify(defaultOrder) ? '<button onclick="state.params.withdrawalOrder=' + JSON.stringify(defaultOrder) + ';state.mcResults=null;state.rothOptResults=null;saveState();render()" style="margin-top:8px;background:transparent;border:1px dashed var(--border-active);border-radius:6px;color:var(--blue);padding:6px 14px;font-size:11px;width:100%;cursor:pointer">Reset to recommended order (' + defaultLabel + ')</button>' : ''; })()}
        <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">

          <div style="font-size:11px;color:var(--text-dim);margin-bottom:12px;line-height:1.5">Add age-based phases to change the withdrawal order at different stages of retirement. Useful for Roth conversion windows, ACA MAGI control, or RMD planning. Years not covered by any phase use the Default order above.</div>
          ${(() => {

            const labels = { cash: 'Cash/HYS', taxable: 'Brokerage', pretax: 'Pre-Tax', roth: 'Roth', hsa: 'HSA' };
            const colors = { cash: 'var(--cyan)', taxable: 'var(--amber)', pretax: 'var(--blue)', roth: 'var(--green)', hsa: '#8b5cf6' };
            let html = '';

                + '</div>';
              html += '<div style="display:flex;flex-direction:column;gap:3px">';

                  + '<button onclick="moveWithdrawalPhaseOrder(' + pi + ',' + si + ',-1)" style="background:var(--bg-input);border:1px solid var(--border);border-radius:3px;padding:1px 6px;font-size:10px;color:' + (si === 0 ? 'var(--text-faint)' : 'var(--text)') + ';cursor:' + (si === 0 ? 'default' : 'pointer') + ';opacity:' + (si === 0 ? '0.3' : '1') + '"' + (si === 0 ? ' disabled' : '') + '>&#9650;</button>'
                  + '<button onclick="moveWithdrawalPhaseOrder(' + pi + ',' + si + ',1)" style="background:var(--bg-input);border:1px solid var(--border);border-radius:3px;padding:1px 6px;font-size:10px;color:' + (si === phase.order.length - 1 ? 'var(--text-faint)' : 'var(--text)') + ';cursor:' + (si === phase.order.length - 1 ? 'default' : 'pointer') + ';opacity:' + (si === phase.order.length - 1 ? '0.3' : '1') + '"' + (si === phase.order.length - 1 ? ' disabled' : '') + '>&#9660;</button>'
                  + '</div>';
              });
              html += '</div></div>';
            });
            html += '<button onclick="addWithdrawalPhase()" style="margin-top:4px;background:transparent;border:1px dashed var(--border-active);border-radius:6px;color:var(--blue);padding:6px 14px;font-size:11px;width:100%;cursor:pointer">+ Add Phase</button>';
            if (sched.length > 0) {

            }
            return html;
          })()}
        </div>
      </div>
      <div style="margin-top:16px;font-size:12px;color:var(--text-faint);line-height:1.7">
        <strong style="color:var(--text-muted)">Model notes:</strong> 2025 tax brackets (OBBB Act). Std deduction $${STD_DEDUCTION.toLocaleString()} MFJ / $${STD_DEDUCTION_SINGLE.toLocaleString()} single + senior additions. SS taxation per IRS §86. SSA 2025 bend points &amp; wage base.
        Withdrawal order: ${(p.withdrawalOrder || ['cash','hsa','taxable','pretax','roth']).map(s => s === 'pretax' ? 'pre-tax' : s === 'cash' ? 'cash/HYS' : s === 'taxable' ? 'brokerage' : s === 'hsa' ? 'HSA' : 'Roth').join(' &rarr; ')} (configurable above).
        Cash/HYS withdrawals are tax-free (principal return); interest taxed as ordinary income annually. Brokerage withdrawals taxed on estimated gains (50% cost basis) at applicable capital gains rate.
        Pension income is fully taxable. Pre-Medicare healthcare source-aware: COBRA two-phase (COBRA period then follow-up), spouse plan (until spouse retires then follow-up), ACA/retiree plan/other (flat inflated cost), VA ($0).
        Pre-retirement expenses use a separate inflation rate and reduce available cash flow; shortfalls draw from taxable accounts.
        Expense phases reduce base spending in later retirement.
        RMD age per SECURE Act 2.0. IRMAA uses 2025 brackets. SS includes FRA by birth year, COLA, and independent survivor benefit claiming. Survivor SS integrates with SSDI (pays higher of the two).
      </div>` : ''}
    </div>`;
  }

  return subNav + content;
}

function buildBearMarketParams(p, bm) {
  const shocked = JSON.parse(JSON.stringify(p));
  const investmentTypes = ['pretax', 'roth', 'taxable'];
  const retirementYear = p.retirementAge - p.currentAge; // yr index when retirement starts
  const crashStart = retirementYear + bm.onsetYr;
  const crashEnd = crashStart + bm.durationYrs;
  const equityFrac = bm.equityPct / 100;
  const bondFrac = 1 - equityFrac;
  const BOND_RETURN = 3; // conservative bond return during crash
  const overrides = {};
  for (let yr = crashStart; yr < crashEnd; yr++) {
    overrides[yr] = {};
    shocked.accounts
      .filter(a => investmentTypes.includes(a.type))
      .forEach(a => {
        // Equities lose crashPct% spread over durationYrs; bonds earn BOND_RETURN
        const annualEquityLoss = bm.crashPct / bm.durationYrs;
        const crashReturn = equityFrac * (-annualEquityLoss) + bondFrac * BOND_RETURN;
        overrides[yr][a.id] = Math.max(-50, crashReturn);
      });
  }
  shocked._bearOverrides = overrides;
  return shocked;
}

  // Category selection for scenario charts (up to 3)
  const scCategories = [

  let cmp = '';
  if (state.scenario !== null && state.scenario !== 'survivor' && state.scenario !== 'bear' && state.scenario !== 'hcInflation') {

      <div class="stat"><div class="stat-label">IRMAA &#916;</div><div class="stat-value" style="color:var(--pink)">${fmtK(sTotalIRMAA - bTotalIRMAA)}</div></div>

    <div class="card">

      <div style="max-width:560px;margin:0 auto">
      ${(() => {
        const selCats = scSelKeys.map(k => scCategories.find(c=>c.key===k)).filter(Boolean);

        // Build combined chart: for each selected category, show base vs scenario as separate lines
        const chartData = proj.map((b,i) => {
          const d = {age:b.age,year:b.year,retired:b.retired};
          selCats.forEach((c,ci) => {

            d['sc'+ci] = sp[i]?.[c.key]||0;

        });
        const keys = [], colors = [], labels = [];
        const scColor = '#f59e0b';
        selCats.forEach((c,ci) => {

      })()}
      </div>
    </div>`;
  }

  // -- Bear Market Stress Test --
  const bm = state.bearMarket || { equityPct: 70, crashPct: 30, onsetYr: 1, durationYrs: 3, active: false };
  const presets = [{label:'Mild \u2212 20%',val:20},{label:'Moderate \u2212 30%',val:30},{label:'Severe \u2212 50%',val:50}];
  let bearSection = `
  <div class="card" data-accent="red"><div class="card-title">Bear Market Stress Test</div>
    <div style="font-size:13px;color:var(--text-dim);margin-bottom:14px;line-height:1.6">

          <div class="field-wrap" style="width:70px"><input type="number" class="field-input has-suffix" value="${bm.crashPct}" min="0" max="100" style="font-size:12px;padding:5px 24px 5px 8px"

  if (bm.active) {
    const bearParams = buildBearMarketParams(p, bm);

    const bearFinal = bearProj[bearProj.length-1].netWorth;
    const bearDiff = bearFinal - final;
    const bearBust = bearProj.find(y => y.netWorth <= 0)?.age;

    bearSection += `<div style="font-size:12px;color:var(--text-dim);margin-bottom:10px;line-height:1.6;padding:8px 12px;background:var(--bg-base);border-radius:6px;border:1px solid var(--border)">

          const d = {age:b.age,year:b.year,retired:b.retired};

  // -- Healthcare Inflation Stress Test --

  if (!hc.enabled) {

  } else {

    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px">

      ${isHcActive ? '\u2713 Showing Healthcare Inflation Scenario' : 'Run Healthcare Inflation Stress Test'}
    </button>`;
  }

  if (isHcActive && hc.enabled) {
    const hcInflProj = runProjection({
      ...p,
      preMedicareHealthcare: { ...hc, inflation: state.hcInflation || 8 }
    });
    const hcInflFinal = hcInflProj[hcInflProj.length-1].netWorth;
    const hcInflDiff = hcInflFinal - final;

    </div>`;
  }

  hcInflSection += `</div>`;

  // -- Survivor Scenario --
  const svWho = state.survivorWho || 'spouse';

  let survivorSection = `

      <div class="field"><label class="field-label">Expense reduction after</label>

    </button>
  </div>`;

  if (isSvActive) {
    const sp = runProjection({...p, survivorWho: svWho, survivorAge: svAge, survivorExpenseReduction: svExpRed});
    const sf = sp[sp.length-1].netWorth, diff = sf - final;
    const sBust = sp.find(y => y.netWorth <= 0)?.age;
    const baseTax = proj.reduce((s,y) => s+y.tax, 0);
    const svTax = sp.reduce((s,y) => s+y.tax, 0);
    const baseSS = proj.reduce((s,y) => s+y.ss+y.ssdi, 0);
    const svSS = sp.reduce((s,y) => s+y.ss+y.ssdi, 0);
    const label = svWho === 'spouse' ? 'Spouse passes at your age ' + svAge : 'You pass at age ' + svAge;
    const deathYear = sp.find(y => y.isSingle);

    const chartData = proj.map((b,i) => ({age:b.age,year:b.year,retired:b.retired,base:b.netWorth,scenario:sp[i]?.netWorth||0}));
    const ssChart = proj.map((b,i) => ({age:b.age,year:b.year,retired:b.retired,base:b.ss+b.ssdi,scenario:(sp[i]?.ss||0)+(sp[i]?.ssdi||0)}));
    const taxChart = proj.map((b,i) => ({age:b.age,year:b.year,retired:b.retired,base:b.tax,scenario:sp[i]?.tax||0}));

    survivorSection += `
    <div class="stats-row">
      <div class="stat"><div class="stat-label">Base Final NW</div><div class="stat-value" style="color:var(--blue)">${fmtK(final)}</div></div>
      <div class="stat"><div class="stat-label">Survivor Final NW</div><div class="stat-value" style="color:var(--pink)">${fmtK(sf)}</div></div>
      <div class="stat"><div class="stat-label">NW Difference</div><div class="stat-value" style="color:${diff>=0?'var(--green)':'var(--red)'}">${fmtK(diff)}</div></div>
      <div class="stat"><div class="stat-label">Lasts To</div><div class="stat-value" style="color:${sBust?'var(--red)':'var(--green)'}">${sBust?'Age '+sBust:p.endAge+'+'}</div></div>
      <div class="stat"><div class="stat-label">SS Impact</div><div class="stat-value" style="color:var(--red)">${fmtK(svSS - baseSS)}</div><div class="stat-sub">Lifetime</div></div>

    </div>
    <div class="grid-2">
      <div class="card"><div style="max-width:480px;margin:0 auto">${buildChart(chartData,['base','scenario'],['#3b82f6','#ec4899'],['Base Plan',label],{title:'Net Worth Comparison',height:150})}</div></div>
      <div class="card"><div style="max-width:480px;margin:0 auto">${buildChart(ssChart,['base','scenario'],['#10b981','#ec4899'],['Base SS+SSDI','Survivor SS+SSDI'],{title:'Social Security & SSDI Impact',height:150})}</div></div>
    </div>
    <div class="card"><div style="max-width:560px;margin:0 auto">${buildChart(taxChart,['base','scenario'],['#8b5cf6','#ec4899'],['Base Taxes','Survivor Taxes'],{title:'Tax Burden -- MFJ vs Single Filer',height:140})}</div></div>

    <div class="card"><div class="card-title">Survivor Impact Summary</div>
      <div style="font-size:13px;line-height:1.8;color:var(--text-dim)">
        If <strong style="color:var(--text)">${svWho === 'spouse' ? 'your spouse' : 'you'}</strong> passes away at
        ${svWho === 'spouse' ? 'your' : "your spouse's"} age <strong style="color:var(--pink)">${svAge}</strong>:
        The surviving spouse receives the <strong>higher</strong> of the two SS benefits (not both), losing
        <strong style="color:var(--red)">${fmtK(Math.abs(svSS - baseSS))}</strong> in lifetime SS income.
        Expenses drop by <strong>${svExpRed}%</strong>, but tax brackets shift to single-filer rates
        ${svTax > baseTax
          ? `, adding <strong style="color:var(--red)">${fmtK(svTax - baseTax)}</strong> in lifetime taxes due to narrower brackets and lower IRMAA thresholds.`
          : `, saving <strong style="color:var(--green)">${fmtK(baseTax - svTax)}</strong> in taxes due to lower overall income.`}
        ${sf > 0
          ? ` Portfolio ends at <strong style="color:var(--green)">${fmtK(sf)}</strong>.`
          : ` <strong style="color:var(--red)">Portfolio depleted at age ${sBust}.</strong>`}
      </div>
    </div>`;
  }

  return `<div class="card" data-accent="amber"><div class="card-title">Scenario Comparison</div>
    <div style="font-size:13px;color:var(--text-dim);margin-bottom:16px">Compare your base plan against different assumptions.</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">${btns}</div>
  </div>` + cmp + bearSection + hcInflSection + survivorSection;
}

function renderValidation() {
  // Group by category
  const cats = {};
  let total = 0, passed = 0;
  for (const [cat, name, source, expected, actual, tol, pass] of VALIDATION_DATA) {
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push({ name, source, expected, actual, tol, pass });
    total++;
    if (pass) passed++;
  }
  const rate = (passed / total * 100).toFixed(1);
  const allPass = passed === total;
  const statusColor = allPass ? 'var(--green)' : 'var(--red)';
  const statusIcon = allPass ? '\u2705' : '\u274c';

  let html = `<div class="card" style="max-width:1100px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <span style="font-size:22px">${statusIcon}</span>
      <div>
        <div style="font-size:18px;font-weight:700;color:${statusColor}">${passed}/${total} Tests Passing (${rate}%)</div>
        <div style="font-size:12px;color:var(--text-dim)">Verified against IRS publications, SSA tables, CMS Medicare data, SECURE Act 2.0, and OBBB Act 2025</div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--text-faint);margin-bottom:18px;line-height:1.6">
      Every calculation in RetIQ's engine is tested against authoritative government sources. This report runs automatically before each release.
      For methodology details, see the <a href="#" onclick="showInfoPage('manual.html','Manual');return false" style="color:var(--blue);text-decoration:none">User Manual</a>.
    </div>`;

  // Category summary bar
  html += `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px">`;
  for (const [cat, tests] of Object.entries(cats)) {
    const cp = tests.filter(t => t.pass).length;
    const ct = tests.length;
    const ok = cp === ct;
    html += `<button onclick="document.getElementById('vc_${cat.replace(/[^a-zA-Z]/g,'')}').scrollIntoView({behavior:'smooth',block:'start'})"
      style="background:${ok ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)'};border:1px solid ${ok ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)'};
      border-radius:6px;padding:4px 10px;font-size:11px;color:${ok ? 'var(--green)' : 'var(--red)'};cursor:pointer;font-family:inherit">
      ${cat} <span style="font-weight:700">${cp}/${ct}</span></button>`;
  }
  html += `</div>`;

  // Each category table
  for (const [cat, tests] of Object.entries(cats)) {
    const cp = tests.filter(t => t.pass).length;
    const ct = tests.length;
    html += `<div id="vc_${cat.replace(/[^a-zA-Z]/g,'')}" style="margin-bottom:20px">
      <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:8px">
        <span style="color:${cp===ct?'var(--green)':'var(--red)'}">${cp===ct?'\u2713':'\u2717'}</span> ${cat}
        <span style="font-size:11px;font-weight:400;color:var(--text-faint)">${cp}/${ct}</span>
      </div>
      <div style="overflow-x:auto"><table class="proj-table" style="font-size:11.5px">
        <thead><tr><th style="width:30px"></th><th>Test</th><th>Expected</th><th>Actual</th><th>\u00b1</th><th>Source</th></tr></thead><tbody>`;
    for (const t of tests) {
      const fmtV = v => typeof v === 'number' && Math.abs(v) >= 100 ? v.toLocaleString() : v;
      html += `<tr style="${!t.pass?'background:rgba(239,68,68,0.08)':''}">
        <td style="text-align:center;color:${t.pass?'var(--green)':'var(--red)'}">${t.pass?'\u2713':'\u2717'}</td>
        <td>${t.name}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:11px">${fmtV(t.expected)}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${t.pass?'var(--text)':'var(--red)'}">${fmtV(t.actual)}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-faint)">${t.tol}</td>
        <td style="font-size:10.5px;color:var(--text-faint)">${t.source}</td>
      </tr>`;
    }
    html += `</tbody></table></div></div>`;
  }

  html += `</div>`;
  return html;
}

const RETIQ_API = "https://retiq-worker.bortvin.workers.dev";

// Fetch updated regulatory constants from KV. Falls back to embedded defaults on failure.
(async function loadRegs() {
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 3000);
    const resp = await fetch(RETIQ_API + '/regs-current', { signal: ctrl.signal });
    clearTimeout(timer);
    if (!resp.ok) return;
    const data = await resp.json();
    if (!data || !data.version || data.version === REGS.version) return;
    // Deep-mutate REGS arrays in place (keeps const aliases valid)
    const arrayFields = {
      federal: ['brackets_mfj', 'brackets_single'],
      irmaa: ['brackets_mfj', 'brackets_single'],
      aca: ['pct_enhanced', 'pct_original'],
    };
    for (const [section, keys] of Object.entries(arrayFields)) {
      if (!data[section]) continue;
      for (const key of keys) {
        if (!data[section][key]) continue;
        REGS[section][key].length = 0;
        data[section][key].forEach(item => {
          // Convert null → Infinity for bracket max fields (JSON can't encode Infinity)
          if (item.max === null) item.max = Infinity;
          REGS[section][key].push(item);
        });
      }
    }
    // Merge scalar properties
    for (const section of ['federal', 'ss', 'aca', 'retirement_accounts']) {
      if (!data[section]) continue;
      for (const [k, v] of Object.entries(data[section])) {
        if (Array.isArray(v) || typeof v === 'object') continue; // arrays handled above
        REGS[section][k] = v;
      }
    }
    // ACA fpl_base is an object, not an array
    if (data.aca?.fpl_base) REGS.aca.fpl_base = data.aca.fpl_base;
    // Metadata
    REGS.version = data.version;
    REGS.effectiveDate = data.effectiveDate || REGS.effectiveDate;
    REGS.publishedDate = data.publishedDate || REGS.publishedDate;
    if (data.sources) REGS.sources = data.sources;
    // Update version badge
    const badge = document.getElementById('regsBadge');
    if (badge) { badge.textContent = data.version; badge.title = 'Tax data: IRS ' + data.version + ' · Updated ' + (data.publishedDate || ''); }
    render();
  } catch (e) { /* silent — use embedded defaults */ }
})();

async function validateLicense(key){

    const d = await r.json();
    return d.valid === true;

// ---- Upgrade ----
document.getElementById("buyBtn")?.addEventListener("click", async ()=>{
  let trialToken = localStorage.getItem("retiq_trial_token") || null;

  // If we think we're in the launch window but have no token, try to get one
  const trialStart = parseInt(localStorage.getItem("retiq_trial_start") || "0", 10);
  const inLaunchWindow = trialStart > 0 && (Date.now() - trialStart) / (1000*60*60*24) < 7;

  if (inLaunchWindow && !trialToken) {
    try {
      const tr = await fetch(`${RETIQ_API}/start-trial`, { method: "POST" });
      if (tr.ok) {
        const td = await tr.json();
        if (td.token) {
          trialToken = td.token;
          localStorage.setItem("retiq_trial_token", td.token);
          localStorage.setItem("retiq_trial_start", String(td.issuedAt));
        }
      }
    } catch { /* proceed without token */ }
  }

  const r = await fetch(`${RETIQ_API}/create-checkout-session`, {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ token: trialToken })
  });
  const d = await r.json();
  if(d.url) location.href = d.url;
  else alert("Could not start checkout. Please try again.");
});
