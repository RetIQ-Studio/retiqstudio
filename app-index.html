  overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });

  const card = document.createElement("div");
  card.style.cssText = "max-width:420px;width:100%;background:#0b1220;color:#e5e7eb;border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.35);font-family:system-ui,-apple-system,sans-serif;";

  if (isPro) {
    // ── Pro management view ──
    card.innerHTML = `
      <div style="font-weight:800;font-size:16px;margin-bottom:12px;">Manage License</div>
      <p style="font-size:13px;color:#94a3b8;margin:0 0 8px;">RetIQ Pro is active.</p>
      <div style="background:#0f172a;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px;font-family:monospace;font-size:15px;letter-spacing:1px;color:#38bdf8;margin:0 0 16px;word-break:break-all;">${current}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button id="amCopy" style="flex:1;padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:#1e3a5f;color:#e5e7eb;cursor:pointer;">Copy Key</button>
        <button id="amForget" style="flex:1;padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:#7f1d1d;color:#fecaca;cursor:pointer;">Remove from Device</button>
        <button id="amClose" style="flex:1;padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#e5e7eb;cursor:pointer;">Close</button>
      </div>
    `;
    overlay.appendChild(card);
    document.body.appendChild(overlay);

    document.getElementById("amCopy").onclick = async () => {
      try { await navigator.clipboard.writeText(current); document.getElementById("amCopy").textContent = "Copied ✔"; }
      catch { alert("Copy failed — select and copy manually:\n" + current); }
    };
    document.getElementById("amForget").onclick = () => {
      if (!confirm("Remove license from this device? Your saved data will be cleared.")) return;
      localStorage.removeItem("retiq_license");
      localStorage.removeItem("retiq_pro");
      localStorage.removeItem("retiq_v1");
      setPlanBadge(false);
      hideUpgradeIfPro();
      setActivateLabel();
      overlay.remove();
      alert("This device is now Free.");
      location.reload();
    };
    document.getElementById("amClose").onclick = () => overlay.remove();

  } else {
    // ── Activation view (license entry + recovery) ──
    card.innerHTML = `
      <div style="font-weight:800;font-size:16px;margin-bottom:12px;">Activate License</div>
      <div id="amActivateView">
        <label style="font-size:13px;color:#94a3b8;display:block;margin-bottom:6px;">Enter your license key:</label>
        <input id="amKeyInput" type="text" placeholder="RTIQ-XXXX-XXXX-XXXX" style="width:100%;box-sizing:border-box;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:#0f172a;color:#e5e7eb;font-family:monospace;font-size:15px;letter-spacing:1px;margin-bottom:12px;" />
        <div id="amKeyMsg" style="font-size:12px;margin-bottom:10px;min-height:16px;"></div>
        <div style="display:flex;gap:8px;margin-bottom:14px;">
          <button id="amActivate" style="flex:1;padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:#2563eb;color:white;cursor:pointer;font-weight:600;">Activate</button>
          <button id="amCancel" style="flex:1;padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#e5e7eb;cursor:pointer;">Cancel</button>
        </div>
        <div style="border-top:1px solid rgba(255,255,255,.1);padding-top:12px;">
          <a href="#" id="amShowRecover" style="font-size:12px;color:#60a5fa;text-decoration:none;">Lost your license key? Recover via email →</a>
        </div>
      </div>
      <div id="amRecoverView" style="display:none;">
        <label style="font-size:13px;color:#94a3b8;display:block;margin-bottom:6px;">Enter the email you used at checkout:</label>
        <input id="amEmailInput" type="email" placeholder="you@example.com" style="width:100%;box-sizing:border-box;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:#0f172a;color:#e5e7eb;font-size:14px;margin-bottom:12px;" />
        <div id="amRecoverMsg" style="font-size:12px;margin-bottom:10px;min-height:16px;"></div>
        <div style="display:flex;gap:8px;margin-bottom:14px;">
          <button id="amRecover" style="flex:1;padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:#2563eb;color:white;cursor:pointer;font-weight:600;">Send Recovery Email</button>
          <button id="amBackToKey" style="flex:1;padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#e5e7eb;cursor:pointer;">Back</button>
        </div>
      </div>
    `;
    overlay.appendChild(card);
    document.body.appendChild(overlay);

    const keyInput = document.getElementById("amKeyInput");
    const keyMsg = document.getElementById("amKeyMsg");
    keyInput.focus();

    // Activate license
    document.getElementById("amActivate").onclick = async () => {
      const key = keyInput.value.trim().toUpperCase();
      if (!key) { keyMsg.style.color = "#f87171"; keyMsg.textContent = "Please enter a license key."; return; }
      keyMsg.style.color = "#60a5fa"; keyMsg.textContent = "Verifying…";
      const ok = await validateLicense(key);
      if (ok === true) {
        localStorage.setItem("retiq_license", key);
        localStorage.setItem("retiq_pro", "true");
        setPlanBadge(true);
        hideUpgradeIfPro();
        setActivateLabel();
        try { const s = localStorage.getItem('retiq_v1'); if (s) { state.params = JSON.parse(s); migrateParams(); render(); } } catch(e) {}
        overlay.remove();
        alert("License activated ✔");
      } else if (ok === null) {
        keyMsg.style.color = "#f87171"; keyMsg.textContent = "Could not reach server. Check your connection.";
      } else {
        keyMsg.style.color = "#f87171"; keyMsg.textContent = "Invalid license key.";
      }
    };

    // Enter key submits
    keyInput.addEventListener("keydown", (e) => { if (e.key === "Enter") document.getElementById("amActivate").click(); });

    // Cancel
    document.getElementById("amCancel").onclick = () => overlay.remove();

    // Show recovery view
    document.getElementById("amShowRecover").onclick = (e) => {
      e.preventDefault();
      document.getElementById("amActivateView").style.display = "none";
      document.getElementById("amRecoverView").style.display = "block";
      document.getElementById("amEmailInput").focus();
    };

    // Back to key entry
    document.getElementById("amBackToKey").onclick = () => {
      document.getElementById("amRecoverView").style.display = "none";
      document.getElementById("amActivateView").style.display = "block";
      keyInput.focus();
    };

    // Send recovery email
    document.getElementById("amRecover").onclick = async () => {
      const email = document.getElementById("amEmailInput").value.trim();
      const recoverMsg = document.getElementById("amRecoverMsg");
      if (!email || !email.includes("@")) {
        recoverMsg.style.color = "#f87171"; recoverMsg.textContent = "Please enter a valid email.";
        return;
      }
      const btn = document.getElementById("amRecover");
      btn.disabled = true; btn.textContent = "Sending…";
      recoverMsg.style.color = "#60a5fa"; recoverMsg.textContent = "";
      try {
        const r = await fetch(`${RETIQ_API}/recover-license`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
        const d = await r.json();
        if (d.error === "rate_limited") {
          recoverMsg.style.color = "#f87171";
          recoverMsg.textContent = d.message || "Too many requests. Try again later.";
        } else if (d.ok) {
          recoverMsg.style.color = "#4ade80";
          recoverMsg.textContent = d.message;
        } else {
          recoverMsg.style.color = "#f87171";
          recoverMsg.textContent = "Something went wrong. Please try again.";
        }
      } catch {
        recoverMsg.style.color = "#f87171";
        recoverMsg.textContent = "Could not reach server. Check your connection.";
      }
      btn.disabled = false; btn.textContent = "Send Recovery Email";
    };

    // Enter key in email field
    document.getElementById("amEmailInput").addEventListener("keydown", (e) => { if (e.key === "Enter") document.getElementById("amRecover").click(); });
  }
}

document.getElementById("activateBtn")?.addEventListener("click", () => openActivateModal());
  

// Auto-restore license on load
(async ()=>{
  const saved = localStorage.getItem("retiq_license");
  const result = saved ? await validateLicense(saved) : false;
  if(result === true){
    localStorage.setItem("retiq_pro","true");
    setPlanBadge(true);
    hideUpgradeIfPro();
    setActivateLabel();
    // Restore saved user data now that pro is confirmed
    try { const s = localStorage.getItem('retiq_v1'); if (s) { state.params = JSON.parse(s); migrateParams(); render(); } } catch(e) {}
  } else if(result === null){
    // Network error (offline) — keep existing pro status if previously validated
    const wasPro = localStorage.getItem("retiq_pro")==="true";
    setPlanBadge(wasPro);
    hideUpgradeIfPro();
    setActivateLabel();
    if(wasPro){ try { const s = localStorage.getItem('retiq_v1'); if (s) { state.params = JSON.parse(s); migrateParams(); render(); } } catch(e) {} }
  } else {
    // License explicitly invalid — demote
    localStorage.removeItem("retiq_pro");
    setPlanBadge(false);
    hideUpgradeIfPro();
    setActivateLabel();
  }
})();



// ---------- INSTALL UX (intentional) ----------
(function(){
  const installBtn = document.getElementById("installBtn");
  if(!installBtn) return;

  // Hide install button if already installed/standalone, otherwise show it
  const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
  if(isStandalone) {
    installBtn.style.display = "none";
    return;
  }
  installBtn.style.display = "";

  // Minimal modal (created on demand)
  function openInstallModal(canPrompt){
    const existing = document.getElementById("retiqInstallModal");
    if(existing) existing.remove();

    const overlay = document.createElement("div");
    overlay.id = "retiqInstallModal";
    overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px;";

    const card = document.createElement("div");
    card.style.cssText = "max-width:520px;width:100%;background:#0b1220;color:#e5e7eb;border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:16px 16px 14px;box-shadow:0 10px 30px rgba(0,0,0,.35);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;";

    const title = document.createElement("div");
    title.style.cssText = "font-weight:800;font-size:16px;margin-bottom:8px;";
    title.textContent = "Install RetIQ";

    const body = document.createElement("div");
    body.style.cssText = "font-size:13px;line-height:1.5;color:#cbd5e1;margin-bottom:12px;";

    const ua = navigator.userAgent;
    const isIOS = /iPhone|iPad|iPod/i.test(ua);
    const isMacSafari = /^((?!chrome|android).)*safari/i.test(ua) && /Mac/i.test(ua);
    const isChromium = /Chrome|Edg/i.test(ua);

    if(canPrompt){
      body.innerHTML = "Your browser supports one-click install. Click <b>Install now</b>.";
    } else if(isIOS){
      body.innerHTML = "On iPhone/iPad: tap <b>Share</b> → <b>Add to Home Screen</b>.";
    } else if(isMacSafari){
      body.innerHTML = "On Safari (macOS): use <b>File</b> → <b>Add to Dock</b> (or Share → Add to Dock, depending on version).";
    } else if(isChromium){
      body.innerHTML = "In Chrome/Edge: open the browser menu → <b>Install app</b> (or the install icon in the address bar).";
    } else {
      body.innerHTML = "Use your browser’s install option (often in the menu) to install this app.";
    }

    const actions = document.createElement("div");
    actions.style.cssText = "display:flex;gap:10px;justify-content:flex-end;";

    const closeBtn = document.createElement("button");
    closeBtn.textContent = "Close";
    closeBtn.style.cssText = "padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#e5e7eb;cursor:pointer;";
    closeBtn.onclick = ()=>overlay.remove();

    actions.appendChild(closeBtn);

    if(canPrompt){
      const doBtn = document.createElement("button");
      doBtn.textContent = "Install now";
      doBtn.style.cssText = "padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:#2563eb;color:white;cursor:pointer;";
      doBtn.onclick = async ()=>{
        try{
          await window.__retiqDeferredPrompt.prompt();
          window.__retiqDeferredPrompt = null;
          overlay.remove();
        }catch(e){
          overlay.remove();
          alert("Install prompt could not be shown. Use the browser menu to install.");
        }
      };
      actions.insertBefore(doBtn, closeBtn);
    }

    card.appendChild(title);
    card.appendChild(body);
    card.appendChild(actions);
    overlay.appendChild(card);
    overlay.addEventListener("click",(e)=>{ if(e.target===overlay) overlay.remove();});
    document.body.appendChild(overlay);
  }

  // Capture the install prompt if available (Chrome/Edge)
  window.__retiqDeferredPrompt = null;
  window.addEventListener("beforeinstallprompt",(e)=>{
    e.preventDefault();
    window.__retiqDeferredPrompt = e;
  });

  // Always open the modal on click; if we have deferred prompt, include Install now button
  installBtn.addEventListener("click", ()=>{
    openInstallModal(!!window.__retiqDeferredPrompt);
  });

  window.addEventListener("appinstalled", ()=>{
    installBtn.style.display = "none";
  });
})();

// iOS keyboard handling — prevent scroll behind Dynamic Island
if (window.Capacitor && window.Capacitor.isNativePlatform()) {
  let _savedScrollY = 0;

  // On focus: save scroll position, prevent page from jumping
  document.addEventListener('focus', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
      _savedScrollY = window.scrollY;
      // Small delay to let iOS keyboard animation start
      setTimeout(function() {
        // Scroll the input into view within its container, not the whole page
        e.target.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }, 100);
    }
  }, true);

  // On blur: restore scroll position after keyboard dismisses
  document.addEventListener('blur', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
      setTimeout(function() {
        window.scrollTo({ top: _savedScrollY, behavior: 'instant' });
      }, 100);
    }
  }, true);

  // Use visualViewport if available (more reliable on modern iOS)
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', function() {
      // When keyboard opens, viewport shrinks — prevent body from scrolling up
      document.body.style.height = window.visualViewport.height + 'px';
    });
    window.visualViewport.addEventListener('scroll', function() {
      // Counteract any viewport scroll
      document.body.style.transform = 'translateY(' + window.visualViewport.offsetTop + 'px)';
    });
  }
}

<script>
  if ('serviceWorker' in navigator && !(window.Capacitor && window.Capacitor.isNativePlatform())) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').then((reg) => {
        // Check for waiting worker on page load (update installed while away)
        if (reg.waiting) showUpdateBanner(reg.waiting);

        // Detect new worker arriving
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', () => {
            // installed + existing controller = update ready
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              showUpdateBanner(newWorker);
            }
          });
        });
      }).catch((err) => {
        console.warn('Service worker registration failed:', err);
      });

      // When a new SW activates (replacing an old one), reload to pick up new code.
      // Skip on first-ever install (no previous controller) to avoid unnecessary reload.
      const hadController = !!navigator.serviceWorker.controller;
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (hadController && !refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });
    });
  }

  function showUpdateBanner(worker) {
    if (document.getElementById('sw-update-banner')) return; // already showing
    const banner = document.createElement('div');
    banner.id = 'sw-update-banner';
    banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9999;display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 16px;background:linear-gradient(135deg,rgba(16,185,129,0.95),rgba(6,182,212,0.95));color:#fff;font-size:13px;font-family:system-ui,sans-serif;box-shadow:0 -2px 12px rgba(0,0,0,0.3);backdrop-filter:blur(8px)';
    banner.innerHTML = '<span>&#9889; A new version of RetIQ is available.</span>'
      + '<button onclick="document.getElementById(\'sw-update-banner\')._worker.postMessage({type:\'SKIP_WAITING\'})" '
      + 'style="background:#fff;color:#047857;border:none;border-radius:6px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer">Update now</button>'
      + '<button onclick="this.parentElement.remove()" '
      + 'style="background:transparent;color:rgba(255,255,255,0.8);border:1px solid rgba(255,255,255,0.4);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer">Later</button>';
    banner._worker = worker;
    document.body.appendChild(banner);
  }
</script>
