  }
}

// Tooltip helper — renders ⓘ icon with hover (desktop) / tap (mobile) popover
function tip(text) {
  return `<span class="tip-wrap" onmouseenter="tipShow(this)" onmouseleave="tipHide(this)"><i class="tip-icon" onclick="tipToggle(event,this.parentNode)" aria-label="Info">i</i><span class="tip-bubble">${text}</span></span>`;
}
function tipShow(el) { if (!('ontouchstart' in window)) el.classList.add('tip-open'); }
function tipHide(el) { if (!('ontouchstart' in window)) el.classList.remove('tip-open'); }
function tipToggle(e, el) { e.stopPropagation(); document.querySelectorAll('.tip-open').forEach(t => { if (t !== el) t.classList.remove('tip-open'); }); el.classList.toggle('tip-open'); }
document.addEventListener('click', () => document.querySelectorAll('.tip-open').forEach(t => t.classList.remove('tip-open')));

function field(label, key, opts = {}) {
  const { prefix, suffix, help, val } = opts;
  const v = val !== undefined ? val : state.params[key];
  const ro = !isPro();
  const isCurrency = prefix === '$';
  const displayVal = isCurrency ? fmtC(v) : v;
  const inputType = isCurrency ? 'text' : 'number';
  const extraAttr = isCurrency
    ? `inputmode="decimal" onfocus="this.value=this.value.replace(/,/g,'')" onblur="this.value=fmtC(parseC(this.value))"`
    : '';
  const changeExpr = isCurrency
    ? `setParam('${key}',parseC(this.value))`
    : `setParam('${key}',Number(this.value))`;
  return `<div class="field"><label class="field-label">${label}</label><div class="field-wrap">
    ${prefix ? `<span class="field-prefix">${prefix}</span>` : ''}
    <input type="${inputType}" class="field-input${prefix?' has-prefix':''}${suffix?' has-suffix':''}" value="${displayVal}" ${ro ? 'readonly style="opacity:0.6;cursor:not-allowed"' : `onchange="${changeExpr}" ${extraAttr}`}>
    ${suffix ? `<span class="field-suffix">${suffix}</span>` : ''}
  </div>${help ? `<div class="field-help">${help}</div>` : ''}</div>`;
}

function computePlanHealth(proj) {
  const p = state.params;
  const totalAcct = p.accounts.reduce((s, a) => s + a.balance, 0);
  const preTaxBal = p.accounts.filter(a => a.type === 'pretax').reduce((s, a) => s + a.balance, 0);
  const final = proj[proj.length - 1].netWorth;
  const bust = proj.find(y => y.netWorth <= 0)?.age;
  const totalTax = proj.reduce((s, y) => s + y.tax, 0);
  const totalIRMAA = proj.reduce((s, y) => s + y.irmaa, 0);
  const totalRMD = proj.reduce((s, y) => s + y.rmd, 0);
  const peakRMD = Math.max(...proj.map(y => y.rmd));
  const totalConv = proj.reduce((s, y) => s + y.rothConv, 0);

  // -- Verdict --
  let grade, verdictText, verdictColor, verdictIcon;
  if (bust) {
    grade = 'critical';
    verdictColor = 'var(--red)';
    verdictIcon = '&#9888;';
    verdictText = `Your portfolio is projected to run out at age <strong>${bust}</strong>. This means ${p.endAge - bust} years without funds. This needs immediate attention.`;
  } else if (final < totalAcct * 0.2) {
    grade = 'caution';
    verdictColor = 'var(--amber)';
    verdictIcon = '&#9888;';
    verdictText = `Your money lasts through age ${p.endAge}, but with only <strong>${fmtK(final)}</strong> remaining — a thin margin. A bad sequence of returns or unexpected expenses could change the outcome.`;
  } else {
    grade = 'strong';
    verdictColor = 'var(--green)';
    verdictIcon = '&#10003;';
    verdictText = `Your money is projected to last through age ${p.endAge} with <strong>${fmtK(final)}</strong> remaining. Your plan has a solid foundation.`;
  }

  // -- Big Levers --
  const levers = [];

  // 1. Roth conversion opportunity / impact
  if (preTaxBal > 50000) {
    const noConvProj = runProjection({ ...p, rothConversion: { enabled: false } });
    const noConvTax = noConvProj.reduce((s, y) => s + y.tax, 0);
    const noConvIRMAA = noConvProj.reduce((s, y) => s + y.irmaa, 0);
    const noConvFinal = noConvProj[noConvProj.length - 1].netWorth;

    if (totalConv > 0) {
      // Currently converting — show the value
      const taxSaved = noConvTax - totalTax;
      const irmaaDelta = totalIRMAA - noConvIRMAA;
      const netBenefit = taxSaved - irmaaDelta;
      if (Math.abs(netBenefit) > 5000) {
        levers.push({
          magnitude: Math.abs(netBenefit),
          title: 'Roth Conversion Strategy',
          icon: '&#128260;',
          color: netBenefit > 0 ? 'var(--green)' : 'var(--amber)',
          amount: netBenefit > 0 ? fmt(netBenefit) : '-' + fmt(Math.abs(netBenefit)),
          amountLabel: netBenefit > 0 ? 'lifetime tax savings' : 'net cost vs. no conversions',
          desc: netBenefit > 0
            ? 'Your current conversion strategy is saving you money over doing nothing. Consider running the Optimizer to see if a different approach saves even more.'
            : 'Your current conversion strategy costs more in IRMAA surcharges than it saves in taxes. Consider Smart Fill or adjusting your target bracket.',
          action: "state.tab='inputs';state.inputTab='rothconv';render()",
          actionLabel: 'Go to Roth Conversions',
        });
      }
    } else {
      // Not converting — show the opportunity
      // Quick test: fill 22% bracket
      const testProj = runProjection({ ...p, rothConversion: {
        enabled: true, strategy: 'smartFill', startAge: p.retirementAge, endAge: Math.min(p.retirementAge + 7, 74), targetBracket: 0.22,
      }});
      const testTax = testProj.reduce((s, y) => s + y.tax, 0);
      const testIRMAA = testProj.reduce((s, y) => s + y.irmaa, 0);
      const potentialSaving = (noConvTax + noConvIRMAA) - (testTax + testIRMAA);
      if (potentialSaving > 10000) {
        levers.push({
          magnitude: potentialSaving,
          title: 'Roth Conversion Opportunity',
          icon: '&#128260;',
          color: 'var(--cyan)',
          amount: fmt(potentialSaving),
          amountLabel: 'potential lifetime tax savings',
          desc: `You have ${fmtK(preTaxBal)} in pre-tax accounts with no conversion plan. A Smart Fill strategy could save significantly in lifetime taxes and reduce future RMDs.`,
          action: "state.tab='inputs';state.inputTab='rothconv';render()",
          actionLabel: 'Explore Roth Conversions',
        });
      }
    }
  }

  // 2. Social Security claiming age (skip if SSDI overrides — auto-converts at FRA, can't delay)
  const ssdiPlanHealth = p.ssdiPrimary || {};
  if (p.ssClaimAge && p.ssClaimAge < 70 && !ssdiPlanHealth.enabled) {
    const delay70Proj = runProjection({ ...p, ssClaimAge: 70 });
    const delay70SS = delay70Proj.reduce((s, y) => s + y.ss, 0);
    const curSS = proj.reduce((s, y) => s + y.ss, 0);
    const ssDelta = delay70SS - curSS;
    if (ssDelta > 20000) {
      levers.push({
        magnitude: ssDelta,
        title: 'Social Security Timing',
        icon: '&#128176;',
        color: 'var(--blue)',
        amount: fmt(ssDelta),
        amountLabel: 'more lifetime SS income if you delay to 70',
        desc: `You're claiming at ${p.ssClaimAge}. Delaying to 70 increases your monthly benefit by ~${Math.round((70 - p.ssClaimAge) * 8)}% but requires bridging ${70 - p.ssClaimAge} more years from savings. The tradeoff depends on longevity.`,
        action: "state.tab='inputs';state.inputTab='ss';render()",
        actionLabel: 'Review SS Strategy',
      });
    }
  }

  // 3. IRMAA surcharges
  if (totalIRMAA > 5000) {
    levers.push({
      magnitude: totalIRMAA,
      title: 'Medicare Surcharges (IRMAA)',
      icon: '&#127973;',
      color: 'var(--pink)',
      amount: fmt(totalIRMAA),
      amountLabel: 'lifetime Medicare surcharges',
      desc: `Your income triggers Medicare income-related surcharges. ${totalConv > 0 ? 'Roth conversions are contributing — Smart Fill can avoid crossing IRMAA tiers.' : 'This is driven by your pre-tax withdrawals and other income.'} IRMAA uses a 2-year lookback, so decisions today affect premiums 2 years out.`,
      action: "state.tab='inputs';state.inputTab='medicare';render()",
      actionLabel: 'Review Medicare Costs',
    });
  }

  // 4. Pre-tax concentration risk
  const preTaxPct = totalAcct > 0 ? preTaxBal / totalAcct : 0;
  if (preTaxPct > 0.6 && preTaxBal > 200000) {
    const peakRmdPct = Math.round(peakRMD / Math.max(1, p.annualExpenses) * 100);
    levers.push({
      magnitude: Math.round(totalRMD * 0.22), // rough tax cost estimate
      title: 'Pre-Tax Concentration',
      icon: '&#9874;',
      color: 'var(--amber)',
      amount: Math.round(preTaxPct * 100) + '%',
      amountLabel: 'of your portfolio is pre-tax',
      desc: `${fmtK(preTaxBal)} in pre-tax accounts will generate forced RMDs starting at ${proj.find(y => y.rmdRequired)?.age || 73}. Peak RMD reaches ${fmtK(peakRMD)}/yr (${peakRmdPct}% of your expenses). This creates taxable income you can't control. Roth conversions before RMDs start can reduce this.`,
      action: "state.tab='inputs';state.inputTab='rothconv';render()",
      actionLabel: 'Explore Roth Conversions',
    });
  }

  // 5. Expense vulnerability
  const highExpProj = runProjection({ ...p, annualExpenses: Math.round(p.annualExpenses * 1.2) });
  const highExpBust = highExpProj.find(y => y.netWorth <= 0)?.age;
  if (highExpBust && !bust) {
    levers.push({
      magnitude: Math.round(p.annualExpenses * 0.2 * (p.endAge - p.retirementAge)),
      title: 'Expense Sensitivity',
      icon: '&#9888;',
      color: 'var(--red)',
      amount: 'Age ' + highExpBust,
      amountLabel: 'depletion if expenses rise 20%',
      desc: `A 20% increase in spending (to ${fmt(Math.round(p.annualExpenses * 1.2))}/yr) causes your plan to fail at age ${highExpBust}. Your margin is thin — consider building more buffer through higher savings, lower expenses, or delayed retirement.`,
      action: "state.tab='inputs';state.inputTab='expenses';render()",
      actionLabel: 'Review Expenses',
    });
  }

  // 6. Healthcare gap cost (early retirees)
  const hc = p.preMedicareHealthcare;
  const ssdiHC = p.ssdiPrimary || {};
  const planHealthMedAge = ssdiHC.enabled ? Math.min((ssdiHC.startAge || 0) + 2, 65) : 65;
  if (hc && hc.enabled && p.retirementAge < planHealthMedAge) {
    const gapYears = planHealthMedAge - p.retirementAge;
    const totalHC = proj.filter(y => y.age >= p.retirementAge && y.age < planHealthMedAge).reduce((s, y) => s + (y.healthcare || 0), 0);
    if (totalHC > 20000) {
      levers.push({
        magnitude: totalHC,
        title: 'Pre-Medicare Healthcare Gap',
        icon: '&#127974;',
        color: 'var(--amber)',
        amount: fmt(totalHC),
        amountLabel: `total cost over ${Math.round(gapYears)} gap years`,
        desc: `Retiring at ${p.retirementAge} means ${Math.round(gapYears)} years of self-funded healthcare before Medicare at ${planHealthMedAge}. At ${fmt(hc.annualCost || 0)}/yr growing at ${hc.inflation || 5}%, this is a significant expense to plan for.`,
        action: "state.tab='inputs';state.inputTab='healthcare';render()",
        actionLabel: 'Review Healthcare',
      });
    }
  }

  // Sort by dollar magnitude, take top 5
  levers.sort((a, b) => b.magnitude - a.magnitude);
  const topLevers = levers.slice(0, 5);

  // Count issues for verdict
  const issueCount = topLevers.filter(l => l.color !== 'var(--green)' && l.color !== 'var(--blue)').length;
  if (issueCount > 0 && grade === 'strong') {
    verdictText += ` You have <strong>${issueCount}</strong> area${issueCount > 1 ? 's' : ''} worth understanding.`;
  }

  return { grade, verdictText, verdictColor, verdictIcon, levers: topLevers, bust, final, totalTax, totalIRMAA, totalRMD, peakRMD };
}

function buildStrategyReport(proj) {
  const p = state.params;
  const goal = state.reportGoal || 'netWorth';
  const ssdi1r = p.ssdiPrimary || {};
  const ssdiOverridesPrimary = ssdi1r.enabled;
  const rc = p.rothConversion || {};
  const preTaxBal = p.accounts.filter(a => a.type === 'pretax').reduce((s, a) => s + a.balance, 0);

  // Extract metrics from a projection
  function metrics(pr) {
    const endNW = pr[pr.length - 1].netWorth;
    const bust = pr.find(y => y.netWorth <= 0)?.age || null;
    const lifeTax = pr.reduce((s, y) => s + y.tax, 0);
    const lifeIRMAA = pr.reduce((s, y) => s + y.irmaa, 0);
    const lifeSS = pr.reduce((s, y) => s + y.ss + y.ssdi, 0);
    const lifeRMD = pr.reduce((s, y) => s + y.rmd, 0);
    const endRoth = pr[pr.length - 1].roth;
    const endPreTax = pr[pr.length - 1].preTax;
    return { endNW, bust, lifeTax, lifeIRMAA, lifeSS, lifeRMD, endRoth, endPreTax };
  }

  const base = metrics(proj);

  // Build alternative strategies
  const alts = [];

  // --- SS TIMING ---
  if (!ssdiOverridesPrimary) {
    const fraAge = Math.round(fraMonths(p.birthYear || (new Date().getFullYear() - p.currentAge)) / 12);
    const ssAges = [62, fraAge, 70].filter(a => a !== p.ssClaimAge);
    for (const ssAge of ssAges) {
      const override = { ssClaimAge: ssAge };
      const label = ssAge === 62 ? 'SS at 62 (early)' : ssAge === fraAge ? `SS at FRA (${fraAge})` : 'SS at 70 (delayed)';
      const desc = ssAge < p.ssClaimAge ? 'Start SS earlier — less per month but more years of income'
        : 'Delay SS — larger monthly benefit, requires bridging from savings';
      try {
        const pr = runProjection({ ...p, ...override });
        const m = metrics(pr);
        alts.push({ label, desc, params: override, metrics: m, category: 'SS Timing' });
      } catch(e) {}
    }
  }

  // --- ROTH CONVERSIONS ---
  if (preTaxBal > 30000) {
    const rothStart = Math.max(p.retirementAge, p.currentAge);
    const rothEnd = Math.min(rothStart + 8, 74);
    if (rothStart <= rothEnd) {
    // Test Smart Fill 22% if not current strategy
    if (!rc.enabled || rc.strategy !== 'smartFill' || rc.targetBracket !== 0.22) {
      try {
        const pr = runProjection({ ...p, rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.22 }});
        alts.push({ label: 'Smart Fill Roth 22%', desc: 'IRMAA-aware conversions filling the 22% bracket', params: { rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.22 }}, metrics: metrics(pr), category: 'Roth Strategy' });
      } catch(e) {}
    }
    // Test Smart Fill 24%
    if (!rc.enabled || rc.strategy !== 'smartFill' || rc.targetBracket !== 0.24) {
      try {
        const pr = runProjection({ ...p, rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.24 }});
        alts.push({ label: 'Smart Fill Roth 24%', desc: 'Aggressive IRMAA-aware conversions filling the 24% bracket', params: { rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.24 }}, metrics: metrics(pr), category: 'Roth Strategy' });
      } catch(e) {}
    }
    // Test no conversions if currently converting
    if (rc.enabled) {
      try {
        const pr = runProjection({ ...p, rothConversion: { enabled: false }});
        alts.push({ label: 'No Roth Conversions', desc: 'Skip conversions entirely — compare the tax cost', params: { rothConversion: { enabled: false }}, metrics: metrics(pr), category: 'Roth Strategy' });
      } catch(e) {}
    }
    } // end rothStart <= rothEnd
  }

  // --- COMBINED: SS 70 + Roth ---
  if (!ssdiOverridesPrimary && p.ssClaimAge !== 70 && preTaxBal > 30000) {
    const rothStart = Math.max(p.retirementAge, p.currentAge);
    const rothEnd = Math.min(rothStart + 8, 74);
    if (rothStart <= rothEnd) {
      try {
        const pr = runProjection({ ...p, ssClaimAge: 70, rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.22 }});
        alts.push({ label: 'SS 70 + Smart Fill 22%', desc: 'Delay SS to max + Roth conversions to fill the gap years', params: { ssClaimAge: 70, rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.22 }}, metrics: metrics(pr), category: 'Combined' });
      } catch(e) {}
    }
  }

  // --- RETIREMENT AGE ---
  if (p.currentAge < p.retirementAge) {
    for (const delta of [1, 2]) {
      const newRetAge = p.retirementAge + delta;
      if (newRetAge <= 70 && newRetAge < p.endAge) {
        try {
          const pr = runProjection({ ...p, retirementAge: newRetAge });
          alts.push({ label: `Retire at ${newRetAge} (+${delta}yr)`, desc: `${delta} more year${delta>1?'s':''} of income, savings, and delayed withdrawals`, params: { retirementAge: newRetAge }, metrics: metrics(pr), category: 'Retirement Age' });
        } catch(e) {}
      }
    }
  }

  // --- SCORING ---
  const goalConfig = {
    netWorth: { key: 'endNW', label: 'Max End Net Worth', unit: '$', higher: true, fmt: v => fmtK(v) },
    minTax:   { key: 'lifeTax', label: 'Min Lifetime Taxes', unit: '$', higher: false, fmt: v => fmtK(v) },
    minTaxIRMAA: { key: m => m.lifeTax + m.lifeIRMAA, label: 'Min Tax + IRMAA', unit: '$', higher: false, fmt: v => fmtK(v) },
    maxIncome: { key: 'lifeSS', label: 'Max SS Income', unit: '$', higher: true, fmt: v => fmtK(v) },
  };
  const gc = goalConfig[goal] || goalConfig.netWorth;
  const getScore = (m) => typeof gc.key === 'function' ? gc.key(m) : m[gc.key];
  const baseScore = getScore(base);

  // Rank alternatives
  alts.forEach(a => { a.score = getScore(a.metrics); a.delta = a.score - baseScore; });
  alts.sort((a, b) => gc.higher ? (b.score - a.score) : (a.score - b.score));

  // Find the best alternative
  const best = alts[0];
  const bestIsBetter = best && (gc.higher ? best.score > baseScore : best.score < baseScore);

  // Stash for PDF export
  state.lastReportCard = bestIsBetter && best ? {
    label: best.label, delta: best.delta, goalLabel: gc.label,
    higher: gc.higher, fmt: gc.fmt
  } : null;

  // Render goal selector
  const goals = [
    { id: 'netWorth', label: 'Max Net Worth' },
    { id: 'minTax', label: 'Min Taxes' },
    { id: 'minTaxIRMAA', label: 'Min Tax + IRMAA' },
    { id: 'maxIncome', label: 'Max SS Income' },
  ];
  const goalBtns = goals.map(g =>
    `<button class="scenario-btn${goal === g.id ? ' active' : ''}" style="font-size:11px;padding:5px 12px" onclick="state.reportGoal='${g.id}';render()">${g.label}</button>`
  ).join('');

  // Build strategy cards
  function metricPill(label, value, color) {
    return `<div style="display:inline-flex;align-items:baseline;gap:3px;font-size:11px"><span style="color:var(--text-faint)">${label}</span> <span style="font-weight:600;color:${color || 'var(--text)'}">${value}</span></div>`;
  }

  function strategyCard(label, desc, m, deltaStr, isBest, isCurrent, applyFn) {
    const bg = isCurrent ? 'rgba(59,130,246,0.06)' : isBest ? 'rgba(16,185,129,0.06)' : 'var(--bg-card)';
    const border = isCurrent ? 'rgba(59,130,246,0.25)' : isBest ? 'rgba(16,185,129,0.25)' : 'var(--border)';
    const lastsStr = m.bust ? '<span style="color:var(--red)">Age ' + m.bust + '</span>' : '<span style="color:var(--green)">' + p.endAge + '+</span>';
    const nwColor = m.endNW > 0 ? 'var(--text)' : 'var(--red)';

    return `<div style="background:${bg};border:1px solid ${border};border-radius:8px;padding:10px 12px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:6px;flex-wrap:wrap">
        <div style="font-size:13px;font-weight:600;color:var(--text)">
          ${isCurrent ? '&#10003; ' : ''}${isBest ? '<span style="color:var(--green)">★</span> ' : ''}${label}${isBest ? ' <span style="font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(16,185,129,0.15);color:var(--green);font-weight:700">BEST</span>' : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${deltaStr !== null ? '<span style="font-size:12px;font-weight:700">' + deltaStr + '</span>' : ''}
          ${applyFn ? '<button class="scenario-btn" style="font-size:10px;padding:3px 10px" onclick="' + applyFn + '">Apply</button>' : ''}
        </div>
      </div>
      ${desc ? '<div style="font-size:11px;color:var(--text-faint);margin-bottom:6px;line-height:1.4">' + desc + '</div>' : ''}
      <div style="display:flex;flex-wrap:wrap;gap:6px 14px">
        ${metricPill('NW', fmtK(m.endNW), nwColor)}
        ${metricPill('Tax', fmtK(m.lifeTax), 'var(--text-dim)')}
        ${metricPill('IRMAA', fmtK(m.lifeIRMAA), 'var(--text-dim)')}
        ${metricPill('SS', fmtK(m.lifeSS), 'var(--text-dim)')}
        ${metricPill('Lasts', lastsStr, null)}
      </div>
    </div>`;
  }

  // Current plan card
  let cards = strategyCard('Current Plan', '', base, null, false, true, '');

  // Alternative cards
  alts.forEach((a, i) => {
    const delta = a.delta;
    const isBest = i === 0 && bestIsBetter;
    const deltaStr = delta === 0 ? '<span style="color:var(--text-faint)">—</span>'
      : ((gc.higher ? delta > 0 : delta < 0)
        ? '<span style="color:var(--green)">' : '<span style="color:var(--red)">')
        + (delta > 0 ? '+' : '') + fmtK(delta) + '</span>';
    const applyFn = `(function(){var o=${JSON.stringify(a.params)};for(var k in o){state.params[k]=o[k]}state.mcResults=null;saveState();render()})()`.replace(/"/g,'&quot;');
    cards += strategyCard(a.label, a.desc, a.metrics, deltaStr, isBest, false, applyFn);
  });

  // Insight summary
  let insight = '';
  if (bestIsBetter && best) {
    const absDelta = Math.abs(best.delta);
    insight = `<div style="margin-top:10px;padding:10px 12px;background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);border-radius:8px;font-size:12px;color:var(--text-dim);line-height:1.6">
      <strong style="color:var(--green)">★ Top opportunity:</strong> <strong style="color:var(--text)">${best.label}</strong> ${gc.higher ? 'adds' : 'saves'} <strong style="color:var(--green)">${gc.fmt(absDelta)}</strong> in ${gc.label.toLowerCase()} compared to your current plan.
      ${best.metrics.bust && !base.bust ? '<br><span style="color:var(--red)">⚠ Warning: this strategy depletes your portfolio at age ' + best.metrics.bust + '.</span>' : ''}
      ${!best.metrics.bust && base.bust ? '<br><span style="color:var(--green)">✓ This strategy keeps your portfolio funded through age ' + p.endAge + '.</span>' : ''}
    </div>`;
  } else if (alts.length > 0) {
    insight = `<div style="margin-top:10px;padding:10px 12px;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.2);border-radius:8px;font-size:12px;color:var(--text-dim);line-height:1.6">
      <strong style="color:var(--blue)">Your current plan is already well-optimized</strong> for ${gc.label.toLowerCase()}. None of the alternatives tested improve on it. Fine-tune with the Roth Optimizer or Scenario Comparison for deeper analysis.
    </div>`;
  }

  if (alts.length === 0) {
    return `<div class="card" data-accent="green">
      <div class="card-title">Strategy Report Card <span class="badge" style="background:rgba(16,185,129,0.15);color:var(--green)">What-If</span></div>
      <div style="font-size:13px;color:var(--text-dim);line-height:1.7">No alternative strategies to test for your current configuration. Add retirement accounts or adjust your retirement age to enable comparisons.</div>
    </div>`;
  }

function solveMaxSpending() {
  const p = state.params;
  // Binary search: find highest annualExpenses (today's $) where endNW >= 0
  let lo = 1000, hi = Math.max(p.annualExpenses * 5, 500000);

  // Quick check: can they even survive at minimal spending?
  const minProj = runProjection({ ...p, annualExpenses: lo });
  if (minProj[minProj.length - 1].netWorth <= 0) return null; // can't even survive at $1K/yr

  // Quick check: does max spending still work? (cap the search)
  const maxProj = runProjection({ ...p, annualExpenses: hi });
  if (maxProj[maxProj.length - 1].netWorth > 0) hi *= 2;

  // Binary search — converge to within $500
  for (let i = 0; i < 30 && (hi - lo) > 500; i++) {
    const mid = Math.round((lo + hi) / 2);
    const proj = runProjection({ ...p, annualExpenses: mid });
    if (proj[proj.length - 1].netWorth > 0) lo = mid;
    else hi = mid;
  }

  // lo is the highest safe value — run final projection for details
  const finalProj = runProjection({ ...p, annualExpenses: lo });
  const endNW = finalProj[finalProj.length - 1].netWorth;
  const totalTax = finalProj.reduce((s, y) => s + y.tax, 0);
  return { maxExpense: lo, endNW, totalTax, proj: finalProj };
}

    <div class="stats-row">
      <div class="stat"><div class="stat-label">Current Net Worth</div><div class="stat-value" style="color:var(--blue)">${fmtK(totalAcct)}</div></div>
      <div class="stat"><div class="stat-label">Peak Net Worth</div><div class="stat-value" style="color:var(--cyan)">${fmtK(peak)}</div></div>
      <div class="stat"><div class="stat-label">End Net Worth</div><div class="stat-value" style="color:${final>0?'var(--green)':'var(--red)'}">${fmtK(final)}</div></div>
      <div class="stat"><div class="stat-label">Retire Age</div><div class="stat-value" style="color:var(--amber)">${p.retirementAge}</div></div>
      <div class="stat"><div class="stat-label">Money Lasts</div><div class="stat-value" style="color:${bust?'var(--red)':'var(--green)'}">${bust?'Age '+bust:p.endAge+'+'}</div><div class="stat-sub">${bust? 'Runs out': 'Funded'}</div></div>
      <div class="stat"><div class="stat-label">RMDs Start ${tip('Required Minimum Distributions &mdash; the IRS forces you to withdraw (and pay tax on) a minimum amount from pre-tax accounts starting at age 73-75.')}</div><div class="stat-value" style="color:var(--purple)">${rmdStartYr?'Age '+rmdStartYr.age:'N/A'}</div><div class="stat-sub">Peak: ${fmtK(peakRMD)}/yr</div></div>
      <div class="stat"><div class="stat-label">Medicare Surcharges (IRMAA) ${tip('Income-Related Monthly Adjustment Amount &mdash; extra Medicare premiums you pay if your income exceeds certain thresholds. Roth conversions and RMDs can trigger these.')}</div><div class="stat-value" style="color:var(--pink)">${fmtK(totalIRMAA)}</div><div class="stat-sub">Lifetime total</div></div>
      ${(() => {
        const lg = p.legacy || {};
        if (!lg.enabled || !lg.targetAmount) return '';
        const pct = Math.min(100, Math.round(Math.max(0, final) / lg.targetAmount * 100));
        const color = pct >= 100 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';
        return '<div class="stat"><div class="stat-label">Legacy Goal</div><div class="stat-value" style="color:'+color+'">'+pct+'%</div><div class="stat-sub">' + fmtK(final) + ' / ' + fmtK(lg.targetAmount) + '</div></div>';
      })()}
    </div>

    <div class="card max-spend-card" style="padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:14px">&#128200;</span>
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--text)">Maximum Spending</div>
          <div style="font-size:11px;color:var(--text-faint)">Highest retirement spending that keeps your money lasting through age ${p.endAge}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="maxSpendResult" style="font-size:11px;color:var(--text-dim)"></span>
        <button onclick="(function(){
          var el=document.getElementById('maxSpendResult');
          el.textContent='Calculating...';
          setTimeout(function(){
            var r=solveMaxSpending();
            if(!r){el.innerHTML='<span style=color:var(--red)>Not solvable — portfolio cannot sustain even minimal spending</span>';return;}
            var diff=r.maxExpense-state.params.annualExpenses;
            var diffStr=diff>0?'<span style=color:var(--green)>+'+fmtK(diff)+'/yr vs current</span>':'<span style=color:var(--amber)>'+fmtK(diff)+'/yr vs current</span>';
            el.innerHTML='<strong style=color:var(--green);font-size:14px>'+fmt(r.maxExpense)+'/yr</strong> <span style=font-size:11px;color:var(--text-faint)>(today\\'s $) &nbsp;'+diffStr+'</span>';
          },20);
        })()" style="background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:5px 14px;font-size:11px;font-weight:600;color:var(--cyan);cursor:pointer">Calculate</button>
      </div>
    </div>

    <div class="grid-2">
      <div class="card" data-accent="blue">${buildChart(proj, nwKeys, nwColors, nwLabels, { title:'Net Worth Over Time', stacked: nwKeys.length > 1, height:180 })}</div>
      <div class="card" data-accent="cyan">${buildChart(proj, ['totalInc','expenses'], ['#06b6d4','#ef4444'], ['Total Income','Expenses'], { title:'Income vs Expenses', height:180 })}</div>
      <div class="card" data-accent="purple">${buildChart(proj, ['tax','rmd'], ['#8b5cf6','#ec4899'], ['Total Tax','RMD Amount'], { title:'Taxes & RMDs', height:160 })}</div>
      <div class="card" data-accent="green">${buildChart(
        proj.filter(y => y.retired).map(y => ({...y, ssTotal: (y.ss||0) + (y.ssdi||0)})),
        ['ssTotal','withdrawal','medicareCost'],
        ['#10b981','#f59e0b','#ec4899'],
        ['SS & SSDI','Withdrawal','Medicare'],
        { title:'Retirement Cash Flows', height:160 }
      )}</div>
    </div>

    ${buildStrategyReport(proj)}

    <div class="card"><div class="card-title">Plan Summary</div>
      <div style="font-size:13px;line-height:1.8;color:var(--text-dim)">
        You are <strong style="color:var(--text)">${p.currentAge}</strong>, retiring at
        <strong style="color:var(--amber)">${p.retirementAge}</strong>.
        Household income: <strong style="color:var(--text)">${fmt(p.annualIncome + (p.spouseIncome||0))}/yr</strong> (growing ${p.incomeGrowth || 0}%/yr),
        saving <strong style="color:var(--green)">${fmt(p.annualSavings + (p.spouseSavings||0))}/yr</strong> (growing ${p.savingsGrowth || 0}%/yr).
        ${p.preRetirementExpenses > 0 ? `Pre-retirement expenses: <strong style="color:var(--red)">${fmt(p.preRetirementExpenses)}/yr</strong> (${p.preRetirementExpenseInflation !== undefined ? p.preRetirementExpenseInflation : p.inflation}% inflation). ` : ''}
        Portfolio: <strong style="color:var(--blue)">${fmtK(totalAcct)}</strong>.
        ${rmdStartYr ? `<span class="badge badge-rmd">RMD</span> Required Minimum Distributions begin at age <strong>${rmdStartYr.age}</strong>. ` : ''}
        ${totalIRMAA > 0 ? `<span class="badge badge-irmaa">IRMAA</span> Medicare surcharges total <strong style="color:var(--pink)">${fmtK(totalIRMAA)}</strong> over your lifetime. ` : ''}
        ${(() => { const tc = proj.reduce((s,y)=>s+y.rothConv,0); return tc > 0 ? `<span class="badge badge-roth">ROTH CONV</span> Converting <strong style="color:var(--cyan)">${fmtK(tc)}</strong> from pre-tax to Roth (ages ${p.rothConversion?.startAge}-${p.rothConversion?.endAge}). ` : ''; })()}
        ${final > 0
          ? `Portfolio reaches <strong style="color:var(--green)">${fmtK(final)}</strong> at age ${p.endAge}.`
          : `<span style="color:var(--red)">Portfolio depleted at age <strong>${bust}</strong>.</span>`}
        ${(() => {
          const lg = p.legacy || {};
          if (!lg.enabled || !lg.targetAmount) return '';
          return final >= lg.targetAmount
            ? ` <span style="color:var(--green)">&#10003; Legacy goal of ${fmtK(lg.targetAmount)} met -- surplus of ${fmtK(final - lg.targetAmount)}.</span>`
            : ` <span style="color:var(--amber)">! Legacy goal of ${fmtK(lg.targetAmount)} not met -- shortfall of ${fmtK(lg.targetAmount - Math.max(0,final))}.</span>`;
        })()}
        ${(() => {
          const dTotal = proj.reduce((s,y) => s + (y.debtPayments||0), 0);
          return dTotal > 0 ? ` Lifetime debt payments: <strong style="color:var(--red)">${fmtK(dTotal)}</strong>.` : '';
        })()}
        ${(() => {
          const ltTotal = proj.reduce((s,y) => s + (y.ltcCost||0), 0);
          return ltTotal > 0 ? ` Long-term care costs: <strong style="color:var(--pink)">${fmtK(ltTotal)}</strong>.` : '';
        })()}
      </div>
    </div>`;
}

    const preTaxBal = p.accounts.filter(a => a.type === 'pretax').reduce((s, a) => s + a.balance, 0);
    const hasPretax = preTaxBal > 0;

    // Run projection with and without conversion to show impact
    const projWith = rc.enabled ? runProjection(p) : null;
    const projWithout = rc.enabled ? runProjection({...p, rothConversion: {...rc, enabled: false}}) : null;
    let impactHtml = '';
    if (projWith && projWithout) {
      const totalConv = projWith.reduce((s,y) => s + y.rothConv, 0);
      const totalConvTax = projWith.reduce((s,y) => s + y.conversionTax, 0);
      const finalWith = projWith[projWith.length-1];
      const finalWithout = projWithout[projWithout.length-1];

      // Tax-adjusted NW = portfolio value minus cumulative lifetime taxes paid.
      // This captures the real cost: conversions pay taxes upfront, reducing spendable wealth
      // until tax-free Roth growth and lower future RMDs recover the difference.
      let breakevenAge = null;
      let cumTaxWith = 0, cumTaxWithout = 0;
      const convStartIdx = projWith.findIndex(y => y.rothConv > 0);

          cumTaxWithout += projWithout[i].tax || 0;
          const adjWith = projWith[i].netWorth - cumTaxWith;
          const adjWithout = projWithout[i].netWorth - cumTaxWithout;
          if (i >= convStartIdx && i > 0) {
            const prevCTW = cumTaxWith - (projWith[i].tax || 0);
            const prevCTWO = cumTaxWithout - (projWithout[i].tax || 0);
            const prevAdj = projWith[i-1].netWorth - prevCTW;
            const prevAdjBase = projWithout[i-1].netWorth - prevCTWO;
            if (prevAdj < prevAdjBase && adjWith >= adjWithout) breakevenAge = projWith[i].age;
          }
        }
        // Check if ever behind
        cumTaxWith = 0; cumTaxWithout = 0;
        let everBehind = false;
        for (let i = 0; i < projWith.length; i++) {
          cumTaxWith += projWith[i].tax || 0;
          cumTaxWithout += projWithout[i].tax || 0;
          if (i >= convStartIdx && (projWith[i].netWorth - cumTaxWith) < (projWithout[i].netWorth - cumTaxWithout)) {
            everBehind = true; break;
          }
        }
        if (!everBehind) breakevenAge = -1;
      }
      const neverCatchesUp = breakevenAge === null && convStartIdx >= 0;

      // Build conversion advantage chart: delta of tax-adjusted NW (with conv minus without)
      // Positive = conversions winning, negative = still paying back upfront tax cost
      let ctW = 0, ctWO = 0;
      const advantageData = projWith.map((w, i) => {
        ctW += w.tax || 0;
        ctWO += projWithout[i].tax || 0;
        const adjWith = w.netWorth - ctW;
        const adjWithout = projWithout[i].netWorth - ctWO;
        return { age: w.age, year: w.year, retired: w.retired, advantage: adjWith - adjWithout };
      });
      const advColor = (advantageData[advantageData.length - 1]?.advantage || 0) >= 0 ? '#10b981' : '#ef4444';

        </div>
        ${breakevenAge !== -1 ? `<div style="font-size:12px;line-height:1.7;color:var(--text-dim);margin-top:8px;padding:10px 14px;background:var(--bg-base);border-radius:8px;border-left:3px solid var(--amber)">
          <strong style="color:var(--amber)">&#9202; Breakeven age: ${breakevenAge ? breakevenAge : 'beyond ' + p.endAge}</strong> —

          ${breakevenAge ? 'It takes until age <strong>' + breakevenAge + '</strong> for tax-free growth and lower RMDs to recover that cost.'

          ${breakevenAge && breakevenAge <= p.endAge ? ' After age ' + breakevenAge + ', the advantage compounds — every additional year widens the gap in your favor.' : ''}
        </div>` : `<div style="font-size:12px;line-height:1.7;color:var(--text-dim);margin-top:8px;padding:10px 14px;background:var(--bg-base);border-radius:8px;border-left:3px solid var(--green)">

        </div>`}
      </div>`;
    }

    // Bracket visualization for current year — adapt to filing status
    const hasSpouseForTax = p.spouseEnabled || (p.spouseAge && p.spouseAge > 0);
    const brackets = hasSpouseForTax ? TAX_BRACKETS_MFJ : TAX_BRACKETS_SINGLE;

    content += `<div class="card" data-accent="cyan"><div class="card-title">Roth Conversion Strategy</div>

      ${rc.enabled ? `
      <div class="grid-2" style="margin-bottom:14px">

            <select class="field-input" onchange="setRothConv('strategy',this.value)" style="cursor:pointer">

              <option value="smartFill"${rc.strategy==='smartFill'?' selected':''}>Smart Fill (IRMAA-Aware)</option>
              <option value="targetMAGI"${rc.strategy==='targetMAGI'?' selected':''}>Target Income (MAGI) Ceiling</option>
              <option value="percentBalance"${rc.strategy==='percentBalance'?' selected':''}>% of Pre-Tax Balance</option>
              <option value="custom"${rc.strategy==='custom'?' selected':''}>Custom Schedule</option>
            </select>
          </div>

          ${rc.strategy === 'fixed' ? `
            <div class="field"><label class="field-label">Annual Conversion Amount</label>
              <div class="field-wrap"><span class="field-prefix">$</span>
                <input type="text" inputmode="decimal" class="field-input has-prefix" value="${fmtC(rc.fixedAmount||50000)}" onfocus="this.value=this.value.replace(/,/g,'')" onblur="this.value=fmtC(parseC(this.value))" onchange="setRothConv('fixedAmount',parseC(this.value))">
              </div></div>
          ` : ''}
          ${rc.strategy === 'fillBracket' || rc.strategy === 'smartFill' ? `
            <div class="field"><label class="field-label">Fill Up To Bracket ${tip('The tax bracket to fill up to &mdash; 22% is a common sweet spot. Higher brackets start to make conversions expensive')}</label>
              <select class="field-input" onchange="setRothConv('targetBracket',Number(this.value))" style="cursor:pointer">
                ${brackets.filter(b => b.rate <= 0.32).map(b => `<option value="${b.rate}"${rc.targetBracket===b.rate?' selected':''}>${(b.rate*100).toFixed(0)}% (${fmtK(b.min)} - ${fmtK(b.max)})</option>`).join('')}
              </select>
              <div class="field-help">${rc.strategy === 'smartFill'
                ? 'Fills bracket but stops before crossing the next IRMAA tier — no surprise surcharges'
                : 'Conversions fill available space in ' + bracketLabel + ' brackets up to this rate'}</div>
            </div>
          ` : ''}

          ${rc.strategy === 'targetMAGI' ? `
            <div class="field"><label class="field-label">Target Modified Adjusted Gross Income (MAGI) Ceiling</label>
              <div class="field-wrap"><span class="field-prefix">$</span>
                <input type="text" inputmode="decimal" class="field-input has-prefix" value="${fmtC(rc.targetMAGI||200000)}" onfocus="this.value=this.value.replace(/,/g,'')" onblur="this.value=fmtC(parseC(this.value))" onchange="setRothConv('targetMAGI',parseC(this.value))">
              </div>

          ${rc.strategy === 'percentBalance' ? `

                <span class="field-suffix">%</span>

              <div class="field-help">Convert this % of remaining pre-tax balance each year</div></div>
          ` : ''}

          ${rc.strategy === 'custom' ? (() => {

            const sa = rc.startAge || 65, ea = rc.endAge || 72;
            let rows = '';
            for (let a = sa; a <= ea; a++) {

              rows += '<tr><td style="text-align:center;color:var(--text)">' + a + '</td>' +

              'onclick="generateOptimalSchedule()">&#9881; Generate Optimal</button></div>' +
              '<div style="overflow-x:auto"><table class="proj-table" style="font-size:12px"><thead><tr>' +

          <div class="grid-2">

              <input type="number" class="field-input" value="${rc.startAge||65}" onchange="setRothConv('startAge',Number(this.value))">

          ${bracketViz}
        </div>
      </div>
      ` : ''}
    </div>

    ${impactHtml}

    ${(() => {
      // Optimizer section
      const opt = state.rothOptResults;
      let optHtml = `<div class="card" data-accent="green"><div class="card-title">Roth Conversion Optimizer</div>
        <div style="font-size:13px;color:var(--text-dim);margin-bottom:14px;line-height:1.6">

          the top results by a composite score of lifetime tax savings, IRMAA reduction, and net worth gain.
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
          <span style="font-size:12px;color:var(--text-dim);font-weight:500">Scoring priority:</span>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text);cursor:pointer">
            <input type="radio" name="optScore" ${state.optScoreMode==='balanced'?'checked':''} onchange="setOptScoreMode('balanced')" style="accent-color:var(--green)"> Balanced</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text);cursor:pointer">
            <input type="radio" name="optScore" ${state.optScoreMode==='taxMin'?'checked':''} onchange="setOptScoreMode('taxMin')" style="accent-color:var(--green)"> Minimize Taxes</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text);cursor:pointer">
            <input type="radio" name="optScore" ${state.optScoreMode==='nwMax'?'checked':''} onchange="setOptScoreMode('nwMax')" style="accent-color:var(--green)"> Maximize Net Worth</label>
        </div>
        <button class="mc-btn opt-btn" onclick="this.textContent='Optimizing...';this.disabled=true;setTimeout(optimizeRothConversion,50)" style="background:linear-gradient(135deg,var(--green),var(--cyan))">
          Find Optimal Strategy
        </button>
      </div>`;

      if (opt && opt.error) {
        optHtml += `<div class="card"><div style="color:var(--amber);font-size:13px">${opt.error}</div></div>`;
      } else if (opt && opt.strategies) {
        const bl = opt.baseline;
        optHtml += `<div class="card"><div class="card-title">Top ${opt.strategies.length} Strategies (of ${opt.totalTested} tested)</div>
          <div style="overflow-x:auto"><table class="proj-table" style="font-size:11px">
            <thead><tr>
              <th style="text-align:left">Strategy</th>
              <th>Converted</th><th>Conv Tax</th>
              <th>Tax vs Base</th><th>RMD vs Base</th><th>IRMAA vs Base</th>
              <th>Final NW vs Base</th><th title="Age when net worth with conversions catches up to no-conversion path">Breakeven</th><th title="Weighted composite score (0-100): tax savings, IRMAA savings, net worth gain. Higher is better.">Score</th><th></th>
            </tr></thead>
            <tbody>
              <tr style="background:var(--bg-base)">
                <td style="text-align:left;color:var(--text-muted)">No Conversion (baseline)</td>
                <td style="color:var(--text-faint)">--</td><td style="color:var(--text-faint)">--</td>
                <td>${fmtK(bl.tax)}</td><td>${fmtK(bl.rmd)}</td><td>${fmtK(bl.irmaa)}</td>
                <td>${fmtK(bl.final)}</td><td style="color:var(--text-faint)">--</td><td style="color:var(--text-faint)">--</td><td></td>
              </tr>
              ${opt.strategies.map((s, idx) => {
                const isBest = idx === 0;
                const isApplied = state.rothOptAppliedIdx === idx;
                return `<tr${isApplied ? ' style="background:rgba(16,185,129,0.15)"' : isBest ? ' style="background:rgba(16,185,129,0.08)"' : ''}>
                  <td style="text-align:left;color:${isBest?'var(--green)':'var(--text)'};font-weight:${isBest?'600':'400'}">${isBest?'&#9733; ':''}${s.label}${isApplied?' <span style="color:var(--green)">&#10003; Applied</span>':''}</td>
                  <td style="color:var(--cyan)">${fmtK(s.conv)}</td>
                  <td style="color:var(--red)">${fmtK(s.convTax)}</td>
                  <td style="color:${s.taxDiff<0?'var(--green)':s.taxDiff>0?'var(--red)':'var(--text-faint)'}">${s.taxDiff<0?'&#8595; '+fmtK(Math.abs(s.taxDiff)):s.taxDiff>0?'&#8593; '+fmtK(s.taxDiff):'--'}</td>
                  <td style="color:${s.rmdDiff<0?'var(--green)':s.rmdDiff>0?'var(--red)':'var(--text-faint)'}">${s.rmdDiff<0?'&#8595; '+fmtK(Math.abs(s.rmdDiff)):s.rmdDiff>0?'&#8593; '+fmtK(s.rmdDiff):'--'}</td>
                  <td style="color:${s.irmaaDiff<0?'var(--green)':s.irmaaDiff>0?'var(--pink)':'var(--text-faint)'}">${s.irmaaDiff<0?'&#8595; '+fmtK(Math.abs(s.irmaaDiff)):s.irmaaDiff>0?'&#8593; '+fmtK(s.irmaaDiff):'--'}</td>
                  <td style="color:${s.nwDiff>0?'var(--green)':s.nwDiff<0?'var(--red)':'var(--text-faint)'}">${s.nwDiff>0?'&#8593; '+fmtK(s.nwDiff):s.nwDiff<0?'&#8595; '+fmtK(Math.abs(s.nwDiff)):'--'}</td>
                  <td style="color:${s.breakevenAge===-1?'var(--green)':s.breakevenAge?'var(--text)':'var(--red)'}; font-size:${s.breakevenAge===-1?'9px':'11px'}">${s.breakevenAge===-1?'&#10003; Immed.':s.breakevenAge?s.breakevenAge:'Never'}</td>
                  <td style="font-weight:600;color:${isBest?'var(--green)':'var(--text-dim)'}">${(s.score*100).toFixed(1)}</td>
                  <td>${isApplied ? '<span style="color:var(--green);font-size:11px;font-weight:600">Active</span>' : `<button class="scenario-btn" style="padding:4px 10px;font-size:10px;color:var(--green);border-color:var(--green)" onclick="applyRothOpt(${idx})">Apply</button>`}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table></div>

          ${opt.strategies.length > 0 ? (() => {
            try {
            const best = opt.strategies[0];
            const noConvProj = runProjection({...p, rothConversion:{enabled:false}});
            const len = Math.min(best.proj.length, noConvProj.length);

            // Breakeven age for best strategy (tax-adjusted NW)
            let optBreakevenAge = null;
            const optConvStart = best.proj.findIndex(y => y.rothConv > 0);
            if (optConvStart >= 0) {
              let ctB = 0, ctN = 0;
              let prevAdjB = 0, prevAdjN = 0;
              for (let i = 0; i < len; i++) {
                ctB += best.proj[i].tax || 0;
                ctN += noConvProj[i].tax || 0;
                const adjB = best.proj[i].netWorth - ctB;
                const adjN = noConvProj[i].netWorth - ctN;
                if (i >= optConvStart && i > 0 && prevAdjB < prevAdjN && adjB >= adjN) {
                  optBreakevenAge = best.proj[i].age;
                }
                prevAdjB = adjB; prevAdjN = adjN;
              }
              ctB = 0; ctN = 0;
              let everBehind = false;
              for (let i = 0; i < len; i++) {
                ctB += best.proj[i].tax || 0;
                ctN += noConvProj[i].tax || 0;
                if (i >= optConvStart && (best.proj[i].netWorth - ctB) < (noConvProj[i].netWorth - ctN)) {
                  everBehind = true; break;
                }
              }
              if (!everBehind) optBreakevenAge = -1;
            }

            // Cumulative lifetime tax comparison
            let cumTaxBase = 0, cumTaxBest = 0;
            const taxChartData = [];
            for (let i = 0; i < len; i++) {
              cumTaxBase += noConvProj[i].tax || 0;
              cumTaxBest += best.proj[i].tax || 0;
              taxChartData.push({ age: best.proj[i].age, year: best.proj[i].year, retired: best.proj[i].retired, noConv: cumTaxBase, withConv: cumTaxBest });
            }
            // Conversion advantage delta: (best adjusted) - (baseline adjusted)
            const optAdvantageData = [];
            let ctBest = 0, ctBase = 0;
            for (let i = 0; i < len; i++) {
              ctBest += best.proj[i].tax || 0;
              ctBase += noConvProj[i].tax || 0;
              const adjBest = best.proj[i].netWorth - ctBest;
              const adjBase = noConvProj[i].netWorth - ctBase;
              optAdvantageData.push({ age: best.proj[i].age, year: best.proj[i].year, retired: best.proj[i].retired, advantage: adjBest - adjBase });
            }
            const optAdvColor = (optAdvantageData[optAdvantageData.length - 1]?.advantage || 0) >= 0 ? '#10b981' : '#ef4444';
            // Pre-tax vs Roth balance comparison
            const balChartData = [];
            for (let i = 0; i < len; i++) {
              balChartData.push({
                age: best.proj[i].age, year: best.proj[i].year, retired: best.proj[i].retired,
                ptBase: noConvProj[i].preTax || 0, ptConv: best.proj[i].preTax || 0,
                rothBase: noConvProj[i].roth || 0, rothConv: best.proj[i].roth || 0,
              });
            }

        <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">
          ${manualPIA ? 'Based on SSA FRA amount of ' + fmt(manualPIA) + '/mo' : 'Based on income of ' + fmt(p.ssAnnualIncome || p.annualIncome)} and birth year ${birthYear}

        <table class="ss-table">
          <thead><tr><th>Claim Age</th><th>Monthly</th><th>Annual</th><th>% of FRA</th><th>Break-even vs 62</th></tr></thead>
          <tbody>${tableData.map(r => {
            const pctFRA = fraAmt > 0 ? Math.round(r.annual / fraAmt * 100) : 0;
            const isSelected = r.age === effectiveClaimAge;
            return '<tr' + (isSelected ? ' style="background:rgba(16,185,129,0.08)"' : '') + '>' +
              '<td' + (isSelected ? ' class="highlight"' : '') + '>' + r.age + (r.age === Math.round(ssResult.fra) ? ' (FRA)' : '') + (isSelected ? (ssdi1ss.enabled ? ' &#9432;' : ' &#10003;') : '') + '</td>' +
              '<td>' + fmt(r.monthly) + '</td>' +
              '<td' + (isSelected ? ' class="highlight"' : '') + '>' + fmt(r.annual) + '</td>' +
              '<td>' + pctFRA + '%</td>' +
              '<td>' + (r.breakeven ? 'Age ' + r.breakeven : '--') + '</td></tr>';
          }).join('')}</tbody>
        </table>
      </div>`;

      // Build SPOUSE claim comparison table
      if (p.spouseEnabled || p.spouseAge > 0) {
        const spBY = p.spouseBirthYear || (new Date().getFullYear() - (p.spouseAge||0));
        const spManualPIA = p.spouseSSUseManual && p.spouseSSManualMonthly > 0 ? p.spouseSSManualMonthly : null;
        const spFRAM = fraMonths(spBY);
        const spFRA = spFRAM / 12;
        const ssdi2tbl = p.ssdiSpouse || {};
        const effectiveSpTblAge = ssdi2tbl.enabled ? (ssdi2tbl.endAge || 66) + 1 : (p.spouseSSClaimAge || 67);
        const spTableData = [62,63,64,65,66,67,68,69,70].map(age => {
          let r;
          if (spManualPIA) {
            const adj = ssaAdjustPIA(spManualPIA, age * 12, spFRAM);
            r = { age, annual: adj * 12, monthly: adj, fra: spFRA };
          } else {
            r = { age, ...estimateSS({avgIncome:p.spouseSSIncome||0, claimAge:age, birthYear:spBY}) };
          }
          const at62 = spManualPIA
            ? (() => { const adj = ssaAdjustPIA(spManualPIA, 62 * 12, spFRAM); return adj * 12; })()
            : estimateSS({avgIncome:p.spouseSSIncome||0, claimAge:62, birthYear:spBY}).annual;
          const diff = r.annual - at62;
          const yrsLost = (age - 62) * at62;
          r.breakeven = diff > 0 ? Math.round(age + yrsLost / diff) : null;
          return r;
        });
        const spFrAAmt = spTableData.find(x => x.age === Math.round(spFRA))?.annual || spTableData[4]?.annual || 0;
        html += `<div class="card"><div class="card-title">Spouse SS Claiming Age Comparison</div>

            ${spManualPIA ? 'Based on SSA FRA amount of ' + fmt(spManualPIA) + '/mo' : 'Based on income of ' + fmt(p.spouseSSIncome||0)} and birth year ${spBY}

            <thead><tr><th>Claim Age</th><th>Monthly</th><th>Annual</th><th>% of FRA</th><th>Break-even vs 62</th></tr></thead>
            <tbody>${spTableData.map(r => {
              const pctFRA = spFrAAmt > 0 ? Math.round(r.annual / spFrAAmt * 100) : 0;
              const isSelected = r.age === effectiveSpTblAge;
              return '<tr' + (isSelected ? ' style="background:rgba(16,185,129,0.08)"' : '') + '>' +
                '<td' + (isSelected ? ' class="highlight"' : '') + '>' + r.age + (r.age === Math.round(spFRA) ? ' (FRA)' : '') + (isSelected ? (ssdi2tbl.enabled ? ' &#9432;' : ' &#10003;') : '') + '</td>' +
                '<td>' + fmt(r.monthly) + '</td>' +
                '<td' + (isSelected ? ' class="highlight"' : '') + '>' + fmt(r.annual) + '</td>' +
                '<td>' + pctFRA + '%</td>' +
                '<td>' + (r.breakeven ? 'Age ' + r.breakeven : '--') + '</td></tr>';
            }).join('')}</tbody>
          </table>
        </div>`;
      }
      return html;
    })()}`;
  }

  // Feature #2: Charity/QCD tab
  if (state.inputTab === 'charity') {
    const charity = p.charitableGiving || {};
    const sched = charity.schedule || [];
    content += `<div class="card" data-accent="amber"><div class="card-title">Charitable Giving & QCD <span class="badge badge-qcd">Tax-Free RMD</span></div>
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:14px;line-height:1.6">

      ${charity.enabled ? `
        <div style="margin-bottom:14px">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text);margin-bottom:10px">
            <input type="checkbox" ${charity.useSchedule?'checked':''} onchange="setQCD('useSchedule',this.checked)" style="width:16px;height:16px;accent-color:var(--cyan)">

        </div>

        ${!charity.useSchedule ? `
          <div class="grid-2">

              <input type="text" inputmode="decimal" class="field-input has-prefix" value="${fmtC(charity.annualAmount||10000)}" onfocus="this.value=this.value.replace(/,/g,'')" onblur="this.value=fmtC(parseC(this.value))" onchange="setQCD('annualAmount',parseC(this.value))">
            </div><div class="field-help">Max QCD: $108K/yr (2025). Amounts beyond QCD eligibility are non-deductible expenses.</div></div>
            <div>
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text);margin-top:24px">
                <input type="checkbox" ${charity.growWithInflation?'checked':''} onchange="setQCD('growWithInflation',this.checked)" style="width:16px;height:16px;accent-color:var(--green)">

              <div class="field-help" style="margin-left:24px">Increase giving amount by ${p.inflation}%/year</div>
            </div>
          </div>

          <div style="font-size:12px;color:var(--text-dim);margin-bottom:10px">Define giving phases -- each can be a fixed amount or a percentage of annual income.</div>
          ${sched.length > 0 ? `<div style="overflow-x:auto;margin-bottom:12px"><table class="proj-table" style="font-size:12px">

            <tbody>${sched.map((s, idx) => `<tr>
              <td style="text-align:left"><input type="text" value="${s.name||''}" onchange="updateCharitySched(${idx},'name',this.value)" style="background:transparent;border:none;color:var(--text);font-size:12px;width:100px"></td>
              <td style="white-space:nowrap">
                <input type="number" value="${s.startAge||65}" onchange="updateCharitySched(${idx},'startAge',Number(this.value))" style="background:transparent;border:1px solid var(--border);color:var(--text);font-size:12px;width:40px;text-align:center;border-radius:4px;padding:2px">-<input type="number" value="${s.endAge||95}" onchange="updateCharitySched(${idx},'endAge',Number(this.value))" style="background:transparent;border:1px solid var(--border);color:var(--text);font-size:12px;width:40px;text-align:center;border-radius:4px;padding:2px">
              </td>
              <td><div style="display:flex;align-items:center;gap:2px"><span style="color:var(--text-faint);font-size:11px">$</span><input type="text" inputmode="decimal" value="${fmtC(s.amount||0)}" onfocus="this.value=this.value.replace(/,/g,'')" onblur="this.value=fmtC(parseC(this.value))" onchange="updateCharitySched(${idx},'amount',parseC(this.value))" style="background:transparent;border:1px solid var(--border);color:var(--text);font-size:12px;width:65px;text-align:right;border-radius:4px;padding:2px 4px"></div></td>
              <td><div style="display:flex;align-items:center;gap:2px"><input type="number" value="${s.pctIncome||0}" onchange="updateCharitySched(${idx},'pctIncome',Number(this.value))" style="background:transparent;border:1px solid var(--border);color:var(--text);font-size:12px;width:45px;text-align:right;border-radius:4px;padding:2px 4px"><span style="color:var(--text-faint);font-size:11px">%</span></div></td>

          </table></div>` : ''}
          <button onclick="addCharitySchedule()" style="background:var(--bg-base);border:1px dashed var(--border);border-radius:8px;color:var(--text-dim);padding:8px 16px;font-size:12px;width:100%">+ Add Giving Phase</button>
          <div class="field-help" style="margin-top:6px">Set amount for fixed $/year or % income for percentage-based. If both are set, % income is used. Multiple phases can overlap.</div>
        `}
      ` : ''}
    </div>`;
  }

  if (state.inputTab === 'legacy') {
    const lg = p.legacy || {};
    const proj = runProjection(p);
    const final = proj[proj.length - 1].netWorth;
    const pct = lg.targetAmount > 0 ? Math.min(100, Math.round(Math.max(0, final) / lg.targetAmount * 100)) : 0;
    const surplus = final - (lg.targetAmount || 0);
    const barColor = pct >= 100 ? '#10b981' : pct >= 50 ? '#f59e0b' : '#ef4444';

    content += `<div class="card" data-accent="green"><div class="card-title">Legacy Planning</div>
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:14px;line-height:1.6">
        Set a target amount you want to leave behind for heirs, charity, or other purposes.

      </div>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text);margin-bottom:14px">

        Enable Legacy Goal
      </label>
      ${lg.enabled ? `
        <div class="field"><label class="field-label">Target Legacy Amount</label><div class="field-wrap"><span class="field-prefix">$</span>
          <input type="text" inputmode="decimal" class="field-input has-prefix" value="${fmtC(lg.targetAmount||500000)}" onfocus="this.value=this.value.replace(/,/g,'')" onblur="this.value=fmtC(parseC(this.value))" onchange="setLegacy('targetAmount',parseC(this.value))">
        </div><div class="field-help">Net worth you want to leave at end of plan (age ${p.endAge})</div></div>

        <div style="margin:16px 0">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-bottom:6px">
            <span>Progress: ${pct}%</span>
            <span>${fmtK(Math.max(0, final))} / ${fmtK(lg.targetAmount||0)}</span>
          </div>
          <div style="height:20px;background:var(--bg-base);border-radius:10px;overflow:hidden;border:1px solid var(--border)">
            <div style="height:100%;width:${Math.min(100, pct)}%;background:${barColor};border-radius:10px;transition:width 0.5s"></div>
          </div>
        </div>

        <div class="grid-2">
          <div class="info-box"><div class="info-box-label">Projected End Net Worth</div>
            <div class="info-box-value" style="color:${final>0?'var(--green)':'var(--red)'}">${fmtK(final)}</div></div>
          <div class="info-box"><div class="info-box-label">${surplus >= 0 ? 'Surplus' : 'Shortfall'}</div>
            <div class="info-box-value" style="color:${surplus>=0?'var(--green)':'var(--red)'}">${fmtK(Math.abs(surplus))}</div></div>
        </div>

        <div style="margin-top:16px;padding:14px;background:var(--bg-base);border-radius:8px;border:1px solid var(--border)">
          <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">Strategies to Grow Legacy</div>
          <div style="font-size:12px;color:var(--text-dim);line-height:1.8">
            ${surplus < 0 ? `
              <div>* <strong>Reduce expenses</strong> -- even $${Math.round(Math.abs(surplus)/(p.endAge-p.retirementAge)/12).toLocaleString()}/mo could close the gap</div>
              <div>* <strong>Delay retirement</strong> -- each year adds income + savings + delayed SS</div>
              <div>* <strong>Roth conversions</strong> -- tax-free growth can compound significantly</div>
              <div>* <strong>Expense phases</strong> -- reduce spending in later retirement years</div>
            ` : `
              <div style="color:var(--green)">&#10003; Your current plan meets your legacy goal with a surplus of <strong>${fmtK(surplus)}</strong>.</div>
              <div>* Consider increasing charitable giving (QCDs reduce taxes)</div>
              <div>* Roth accounts pass to heirs tax-free -- maximize Roth conversions</div>
            `}
          </div>
        </div>

        <div class="field" style="margin-top:14px"><label class="field-label">Notes</label>
          <textarea class="field-input" rows="2" style="resize:vertical;font-size:13px;padding:8px" placeholder="e.g., Trust for children, charity endowment..." onchange="setLegacy('notes',this.value)">${lg.notes||''}</textarea>
        </div>
      ` : ''}
    </div>`;
  }

  if (state.inputTab === 'medicare') {
    const proj = runProjection(p);
    const ssdi1d = p.ssdiPrimary || {};
    const ssdi2d = p.ssdiSpouse || {};
    const primaryMedAgeCalc = ssdi1d.enabled ? Math.min((ssdi1d.startAge || 0) + 2, 65) : 65;
    const spouseMedAgeCalc = ssdi2d.enabled ? Math.min((ssdi2d.startAge || 0) + 2, 65) : 65;
    const hasSpouseMed = p.spouseEnabled || (p.spouseAge && p.spouseAge > 0);
    // Convert spouse Medicare age to primary's age scale
    const spMedInPrimAge = hasSpouseMed ? spouseMedAgeCalc + (p.currentAge - (p.spouseAge || 0)) : 999;
    const primaryMedAge = hasSpouseMed ? Math.min(primaryMedAgeCalc, spMedInPrimAge) : primaryMedAgeCalc;
    const medicareYears = proj.filter(y => y.age >= primaryMedAge);
    const totalMedicare = medicareYears.reduce((s,y) => s + y.medicareCost, 0);
    const totalSurcharge = medicareYears.reduce((s,y) => s + y.irmaa, 0);
    const hasSpouse = p.spouseEnabled || (p.spouseAge && p.spouseAge > 0);
    const irmaaBrackets = hasSpouse ? IRMAA_BRACKETS_MFJ : IRMAA_BRACKETS_SINGLE;
    const irmaaLabel = hasSpouse ? 'MFJ' : 'Single';
    const irmaaBaseThresh = hasSpouse ? '$212K' : '$106K';

    content += `<div class="card" data-accent="pink"><div class="card-title">Medicare IRMAA Impact <span class="badge badge-irmaa">Income-Based</span></div>
      ${primaryMedAge < 65 ? `<div style="background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--text-dim);line-height:1.6">
        <strong style="color:var(--blue)">&#9432; SSDI Early Medicare</strong> &mdash; Due to SSDI, household Medicare eligibility begins at age <strong>${primaryMedAge}</strong> (24-month qualifying period), ${65 - primaryMedAge} years earlier than standard age 65.
        ${ssdi1d.enabled && ssdi2d.enabled ? ' Both you and spouse qualify early via SSDI.' : ssdi2d.enabled && primaryMedAgeCalc === 65 ? ' (via spouse SSDI)' : ''}
      </div>` : ''}
      <div style="font-size:13px;color:var(--text-dim);margin-bottom:12px;line-height:1.6">
        Medicare Part B and Part D premiums include Income-Related Monthly Adjustment Amounts (IRMAA) based on your Modified Adjusted Gross Income (MAGI) from 2 years prior.

      <div class="grid-2">
        <div>
          <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">2025 IRMAA Brackets (${irmaaLabel})</div>
          ${irmaaBrackets.map((b, i) => {

              <span>${isFirst ? 'Base (&le;' + irmaaBaseThresh + ')' : rangeStr}</span>

        </div>
        <div>
          <div class="info-box" style="margin-top:0"><div class="info-box-label">Lifetime Medicare Cost (from ${primaryMedAge})</div>
            <div class="info-box-value" style="color:var(--pink)">${fmtK(totalMedicare)}</div></div>
          <div class="info-box"><div class="info-box-label">Lifetime Medicare Surcharges (IRMAA)</div>
            <div class="info-box-value" style="color:var(--pink)">${fmtK(totalSurcharge)}</div></div>
          <div class="info-box"><div class="info-box-label">Years with IRMAA Surcharge</div>
            <div class="info-box-value" style="color:var(--amber)">${medicareYears.filter(y => y.irmaa > 0).length} of ${medicareYears.length}</div></div>
        </div>
      </div>

      ${medicareYears.length > 0 ? `<div style="margin-top:16px">${buildChart(
        medicareYears, ['medicareCost','irmaa'], ['#ec4899','#f59e0b'], ['Total Medicare','IRMAA Surcharge'], { title: 'Medicare Costs by Age', height: 160 }
      )}</div>` : ''}
    </div>`;
  }

  if (state.inputTab === 'assumptions') {
    const realRet = ((1 + p.nominalReturn/100) / (1 + p.inflation/100) - 1) * 100;
    content += `<div class="card"><div class="card-title">Economic Assumptions</div>
      <div class="grid-2">
        ${field('Nominal Investment Return','nominalReturn',{suffix:'%',help:'Default for accounts without individual rates. Historical S&P 500 ~10%. Balanced ~7%'})}
        ${field('Inflation Rate','inflation',{suffix:'%',help:'Historical avg ~3%'})}
      </div>
      <div class="grid-2">
        <div class="info-box"><div class="info-box-label">Real Return</div><div class="info-box-value" style="color:var(--cyan)">${realRet.toFixed(2)}%</div></div>
        <div class="field"><label class="field-label">State for Tax Purposes</label>
          <select class="field-input" onchange="setParam('stateCode',this.value)" style="cursor:pointer">
            ${Object.entries(STATE_TAXES).map(([code,st]) => `<option value="${code}"${p.stateCode===code?' selected':''}>${st.name}${st.rate?' ('+st.rate+'%)':''}</option>`).join('')}
          </select>
          <div class="field-help">${p.stateCode && p.stateCode !== 'none' ? STATE_TAXES[p.stateCode]?.name + ' -- flat rate ' + STATE_TAXES[p.stateCode]?.rate + '%' : 'Federal taxes only'}</div>
        </div>
      </div>
      <div style="margin-top:20px;padding:14px;background:var(--bg-base);border-radius:10px;border:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px">Retirement Withdrawal Order ${tip('When you need money in retirement, which account should RetIQ draw from first? The order matters because each account type is taxed differently.')}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-bottom:10px;line-height:1.5">This is the order RetIQ draws from your accounts in retirement. The default order (Cash &rarr; Brokerage &rarr; Pre-Tax &rarr; Roth) is a widely-used approach: spend taxable money first and let tax-advantaged accounts keep growing. Roth goes last because it grows tax-free and passes to heirs tax-free.</div>
        ${(p.withdrawalOrder || ['cash','taxable','pretax','roth']).map((src, i, arr) => {
          const labels = { cash: 'Cash / HYS', taxable: 'Brokerage', pretax: 'Pre-Tax (401k/IRA)', roth: 'Roth' };
          const colors = { cash: 'var(--cyan)', taxable: 'var(--amber)', pretax: 'var(--blue)', roth: 'var(--green)' };
          const notes = { cash: 'Zero capital gains — pure principal return', taxable: 'Gains taxed at capital gains rate (50% cost basis)', pretax: 'Taxable as ordinary income', roth: 'Tax-free withdrawals' };
          return `<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;margin-bottom:4px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px">
            <span style="font-size:13px;font-weight:700;color:var(--text-muted);width:18px;text-align:center">${i + 1}</span>
            <div style="flex:1">
              <div style="font-size:12px;font-weight:600;color:${colors[src]}">${labels[src]}</div>

              <button onclick="moveWithdrawalOrder(${i},1)" style="background:var(--bg-input);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:12px;color:${i === arr.length - 1 ? 'var(--text-faint)' : 'var(--text)'};cursor:${i === arr.length - 1 ? 'default' : 'pointer'};opacity:${i === arr.length - 1 ? '0.3' : '1'}" ${i === arr.length - 1 ? 'disabled' : ''}>&#9660;</button>
            </div>
          </div>`;
        }).join('')}
        ${JSON.stringify(p.withdrawalOrder || ['cash','taxable','pretax','roth']) !== '["cash","taxable","pretax","roth"]' ? `<button onclick="state.params.withdrawalOrder=['cash','taxable','pretax','roth'];state.mcResults=null;state.rothOptResults=null;saveState();render()" style="margin-top:8px;background:transparent;border:1px dashed var(--border-active);border-radius:6px;color:var(--blue);padding:6px 14px;font-size:11px;width:100%;cursor:pointer">Reset to recommended order (Cash &rarr; Brokerage &rarr; Pre-Tax &rarr; Roth)</button>` : ''}
      </div>
      <div style="margin-top:16px;font-size:12px;color:var(--text-faint);line-height:1.7">
        <strong style="color:var(--text-muted)">Model notes:</strong> 2025 tax brackets (OBBB Act). Std deduction $${STD_DEDUCTION.toLocaleString()} MFJ / $${STD_DEDUCTION_SINGLE.toLocaleString()} single + senior additions. SS taxation per IRS §86. SSA 2025 bend points &amp; wage base.
        Withdrawal order: ${(p.withdrawalOrder || ['cash','taxable','pretax','roth']).map(s => s === 'pretax' ? 'pre-tax' : s === 'cash' ? 'cash/HYS' : s === 'taxable' ? 'brokerage' : 'Roth').join(' &rarr; ')} (configurable above).
        Cash/HYS withdrawals are tax-free (principal return); interest taxed as ordinary income annually. Brokerage withdrawals taxed on estimated gains (50% cost basis) at applicable capital gains rate.
        Pension income is fully taxable. Pre-Medicare healthcare added to expenses during gap years.
        Pre-retirement expenses use a separate inflation rate and reduce available cash flow; shortfalls draw from taxable accounts.
        Expense phases reduce base spending in later retirement.
        RMD age per SECURE Act 2.0. IRMAA uses 2025 brackets. SS includes FRA by birth year, COLA, and independent survivor benefit claiming. Survivor SS integrates with SSDI (pays higher of the two).
      </div>
    </div>`;
  }

  return subNav + content;
}

    { key: 'stateTax', label: 'State Tax', color: '#a855f7' },
    { key: 'withdrawal', label: 'Withdrawals', color: '#f59e0b' },
    { key: 'rmd', label: 'RMDs', color: '#7c3aed' },
