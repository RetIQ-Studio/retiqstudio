function buildChart(data, keys, colors, labels, opts = {}) {
  if (!data || !data.length) return '';
  const { height = 200, stacked = false, title = '' } = opts;
  const w = 500, h = height, pL = 14, pR = 14, pT = 12, pB = 22;
  const cW = w - pL - pR, cH = h - pT - pB;

  let allVals;
  if (stacked) { allVals = data.map(d => keys.reduce((s, k) => s + Math.max(0, d[k] || 0), 0)); allVals.push(0); }
  else { allVals = data.flatMap(d => keys.map(k => d[k] || 0)); allVals.push(0); }
  const maxV = Math.max(...allVals, 1), minV = Math.min(...allVals, 0), range = maxV - minV || 1;
  const xStep = data.length > 1 ? cW / (data.length - 1) : cW;
  const yS = v => pT + cH - ((v - minV) / range) * cH;
  const zeroY = yS(0);

  let gridLines = '';
  [0, 0.25, 0.5, 0.75, 1].forEach(pct => {
    const val = minV + pct * range, y = yS(val);
    gridLines += `<line x1="${pL}" x2="${w-pR}" y1="${y}" y2="${y}" stroke="var(--grid-line)" stroke-width="0.5"/>`;
    gridLines += `<text x="${w-pR+2}" y="${y+2}" font-size="6" fill="var(--text-faint)" text-anchor="start">${fmtK(val)}</text>`;
  });

  // Zero line when data spans positive and negative (e.g. advantage charts)
  let zeroLine = '';
  if (minV < 0 && maxV > 0) {
    zeroLine = `<line x1="${pL}" x2="${w-pR}" y1="${zeroY}" y2="${zeroY}" stroke="var(--text-muted)" stroke-width="0.7" stroke-dasharray="4,2"/>` +
      `<text x="${pL-1}" y="${zeroY+2}" font-size="6" fill="var(--text-muted)" text-anchor="end">0</text>`;
  }

  let retLine = '';
  const retIdx = data.findIndex(d => d.retired);
  if (retIdx > 0) { const rx = pL + retIdx * xStep; retLine = `<line x1="${rx}" x2="${rx}" y1="${pT}" y2="${pT+cH}" stroke="var(--amber)" stroke-width="0.8" stroke-dasharray="3,2"/>`; }

  let paths = '';
  keys.forEach((key, ki) => {
    if (stacked && ki > 0) {
      const topPts = data.map((d, i) => {
        const base = keys.slice(0, ki).reduce((s, k) => s + Math.max(0, d[k] || 0), 0);
        return { x: pL + i * xStep, yt: yS(base + Math.max(0, d[key] || 0)), yb: yS(base) };
      });
      const topL = topPts.map((p, i) => `${i===0?'M':'L'}${p.x},${p.yt}`).join(' ');
      const baseL = [...topPts].reverse().map((p, i) => `${i===0?'M':'L'}${p.x},${p.yb}`).join(' ');
      paths += `<path d="${topL} ${baseL.replace('M','L')} Z" fill="${colors[ki]}" opacity="0.18"/>`;
      paths += `<path d="${topL}" fill="none" stroke="${colors[ki]}" stroke-width="1"/>`;
    } else {
      const pts = data.map((d, i) => ({ x: pL + i * xStep, y: d[key] || 0 }));
      const line = pts.map((p, i) => `${i===0?'M':'L'}${p.x},${yS(p.y)}`).join(' ');
      const fill = line + ` L${pts[pts.length-1].x},${zeroY} L${pts[0].x},${zeroY} Z`;
      paths += `<path d="${fill}" fill="${colors[ki]}" opacity="0.15"/>`;
      paths += `<path d="${line}" fill="none" stroke="${colors[ki]}" stroke-width="1"/>`;
    }
  });

  let xLabels = '';
  const step = Math.max(1, Math.ceil(data.length / 8));
  data.forEach((d, i) => {
    if (i === 0 || i === data.length - 1 || i % step === 0) {
      const anchor = i === 0 ? 'start' : i === data.length - 1 ? 'end' : 'middle';
      xLabels += `<text x="${pL + i * xStep}" y="${h-3}" font-size="6" fill="var(--text-muted)" text-anchor="${anchor}">${d.age}</text>`;
    }
  });

  const cid = 'c_' + Math.random().toString(36).slice(2, 8);
  const chartDataJSON = JSON.stringify(data.map(d => ({ age: d.age, year: d.year, vals: keys.map(k => d[k] || 0) }))).replace(/"/g, '&quot;');
  const colorsJSON = JSON.stringify(colors).replace(/"/g, '&quot;');
  const labelsJSON = JSON.stringify(labels).replace(/"/g, '&quot;');

  return `<div class="chart-wrap" id="${cid}_w">${title ? `<div class="chart-title">${title}</div>` : ''}
    <div style="position:relative">
      <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;overflow:visible" id="${cid}">
        ${gridLines}${zeroLine}${paths}${retLine}${xLabels}
        <rect x="${pL}" y="${pT}" width="${cW}" height="${cH}" fill="transparent"
          onmousemove="cHover(event,'${cid}','${chartDataJSON}','${colorsJSON}','${labelsJSON}',${pL},${xStep})"
          onmouseleave="cLeave('${cid}')"
          ontouchmove="event.preventDefault();cHover(event,'${cid}','${chartDataJSON}','${colorsJSON}','${labelsJSON}',${pL},${xStep})"
          ontouchend="cLeave('${cid}')"/>
        <line id="${cid}_h" x1="0" x2="0" y1="${pT}" y2="${pT+cH}" stroke="var(--text-muted)" stroke-width="0.4" visibility="hidden"/>
      </svg>
      <div class="chart-tooltip" id="${cid}_t" style="display:none"></div>
    </div>
    <div class="chart-legend">${labels.map((l, i) => `<div class="chart-legend-item"><div class="chart-legend-dot" style="background:${colors[i]}"></div>${l}</div>`).join('')}</div>
  </div>`;
}

function cHover(evt, id, dataStr, colorsStr, labelsStr, pL, xStep) {
  const svg = document.getElementById(id); const rect = svg.getBoundingClientRect();
  const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
  const x = ((clientX - rect.left) / rect.width) * 500;
  const data = JSON.parse(dataStr), colors = JSON.parse(colorsStr), labels = JSON.parse(labelsStr);
  const idx = Math.round((x - pL) / xStep);
  if (idx < 0 || idx >= data.length) return;
  const d = data[idx];
  const hl = document.getElementById(id + '_h');
  hl.setAttribute('x1', pL + idx * xStep); hl.setAttribute('x2', pL + idx * xStep); hl.setAttribute('visibility', 'visible');
  const tip = document.getElementById(id + '_t');
  tip.style.display = 'block';
  tip.innerHTML = `<div class="chart-tooltip-title">Age ${d.age} (${d.year})</div>` +
    d.vals.map((v, i) => `<div class="chart-tooltip-row"><span style="color:${colors[i]}">${labels[i]}</span><span>${fmt(v)}</span></div>`).join('');
}
function cLeave(id) { document.getElementById(id+'_h').setAttribute('visibility','hidden'); document.getElementById(id+'_t').style.display='none'; }

// Tooltip helper — renders ⓘ icon with hover (desktop) / tap (mobile) popover
function tip(text) {
  return `<span class="tip-wrap" onmouseenter="tipShow(this)" onmouseleave="tipHide(this)"><i class="tip-icon" onclick="tipToggle(event,this.parentNode)" aria-label="Info">i</i><span class="tip-bubble">${text}</span></span>`;
}
const _tipOverlay = () => document.getElementById('tip-overlay');
const _tipBackdrop = () => document.getElementById('tip-backdrop');

function tipDismiss() {
  document.querySelectorAll('.tip-open').forEach(t => t.classList.remove('tip-open'));
  const ov = _tipOverlay(); if (ov) ov.style.display = 'none';
  const bd = _tipBackdrop(); if (bd) bd.style.display = 'none';
}

function tipToggle(e, el) {
  if (e && e.stopPropagation) e.stopPropagation();
  if (e && e.preventDefault) e.preventDefault();
  const ov = _tipOverlay();
  const bd = _tipBackdrop();
  const bubble = el.querySelector('.tip-bubble');
  if (!bubble) return;
  const wasOpen = el.classList.contains('tip-open');
  tipDismiss();
  if (wasOpen) return; // was open, now closed — done
  // Open this tip
  el.classList.add('tip-open');
  ov.innerHTML = bubble.innerHTML;
  ov.style.display = 'block';
  if (bd) bd.style.display = 'block';
  // Position above icon, clamped to viewport
  const iconRect = el.querySelector('.tip-icon').getBoundingClientRect();
  const PAD = 16;
  ov.style.left = '-9999px'; ov.style.top = '-9999px';
  requestAnimationFrame(() => {
    const ow = ov.offsetWidth, oh = ov.offsetHeight;
    let left = iconRect.left + iconRect.width / 2 - ow / 2;
    left = Math.max(PAD, Math.min(left, window.innerWidth - ow - PAD));
    let top = iconRect.top - oh - 10;
    if (top < PAD) top = iconRect.bottom + 10;
    ov.style.left = left + 'px'; ov.style.top = top + 'px';
  });
}

function tipShow(el) {
  if (window.matchMedia('(hover: none)').matches) return;
  if (!el.querySelector('.tip-bubble') || el.classList.contains('tip-open')) return;
  tipToggle(null, el);
}

function tipHide(el) {
  if (window.matchMedia('(hover: none)').matches) return;
  tipDismiss();
}

// Backdrop and overlay dismiss — wired via JS so stopPropagation works
window.addEventListener('DOMContentLoaded', function() {
  function bdHandler(e) {
    e.stopPropagation();
    e.preventDefault();
    tipDismiss();
  }
  const bd = document.getElementById('tip-backdrop');
  const ov = document.getElementById('tip-overlay');
  if (bd) { bd.addEventListener('touchstart', bdHandler, {passive:false}); bd.addEventListener('click', bdHandler); }
  if (ov) { ov.addEventListener('touchstart', bdHandler, {passive:false}); ov.addEventListener('click', bdHandler); }
});

// Dismiss when user focuses an input
document.addEventListener('focus', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') tipDismiss();
}, true);

function field(label, key, opts = {}) {
  const { prefix, suffix, help, val } = opts;
  const v = val !== undefined ? val : state.params[key];
  const ro = !isPro();
  const isCurrency = prefix === '$';
  const displayVal = isCurrency ? fmtC(v) : v;
  const inputType = isCurrency ? 'text' : 'number';
  const extraAttr = isCurrency
    ? `inputmode="decimal" onfocus="this.value=this.value.replace(/,/g,'')" onblur="this.value=fmtC(parseC(this.value))"`
    : '';
  const changeExpr = isCurrency
    ? `setParam('${key}',parseC(this.value))`
    : `setParam('${key}',Number(this.value))`;

}

function computePlanHealth(proj) {
  const p = state.params;
  const totalAcct = p.accounts.reduce((s, a) => s + a.balance, 0);
  const preTaxBal = p.accounts.filter(a => a.type === 'pretax').reduce((s, a) => s + a.balance, 0);
  const final = proj[proj.length - 1].netWorth;
  const bust = proj.find(y => y.netWorth <= 0)?.age;
  const totalTax = proj.reduce((s, y) => s + y.tax, 0);
  const totalIRMAA = proj.reduce((s, y) => s + y.irmaa, 0);
  const totalRMD = proj.reduce((s, y) => s + y.rmd, 0);
  const peakRMD = Math.max(...proj.map(y => y.rmd));
  const totalConv = proj.reduce((s, y) => s + y.rothConv, 0);

  // -- Verdict --
  let grade, verdictText, verdictColor, verdictIcon;
  if (bust) {
    grade = 'critical';
    verdictColor = 'var(--red)';
    verdictIcon = '&#9888;';
    verdictText = `Your portfolio is projected to run out at age <strong>${bust}</strong>. This means ${p.endAge - bust} years without funds. This needs immediate attention.`;
  } else if (final < totalAcct * 0.2) {
    grade = 'caution';
    verdictColor = 'var(--amber)';
    verdictIcon = '&#9888;';
    verdictText = `Your money lasts through age ${p.endAge}, but with only <strong>${fmtK(final)}</strong> remaining — a thin margin. A bad sequence of returns or unexpected expenses could change the outcome.`;
  } else {
    grade = 'strong';
    verdictColor = 'var(--green)';
    verdictIcon = '&#10003;';
    verdictText = `Your money is projected to last through age ${p.endAge} with <strong>${fmtK(final)}</strong> remaining. Your plan has a solid foundation.`;
  }

  // -- Big Levers --
  const levers = [];

  // 1. Roth conversion opportunity / impact
  if (preTaxBal > 50000) {
    const noConvProj = runProjection({ ...p, rothConversion: { enabled: false } });
    const noConvTax = noConvProj.reduce((s, y) => s + y.tax, 0);
    const noConvIRMAA = noConvProj.reduce((s, y) => s + y.irmaa, 0);
    const noConvFinal = noConvProj[noConvProj.length - 1].netWorth;

    if (totalConv > 0) {
      // Currently converting — show the value
      const taxSaved = noConvTax - totalTax;
      const irmaaDelta = totalIRMAA - noConvIRMAA;
      const netBenefit = taxSaved - irmaaDelta;
      if (Math.abs(netBenefit) > 5000) {
        levers.push({
          magnitude: Math.abs(netBenefit),
          title: 'Roth Conversion Strategy',
          icon: '&#128260;',
          color: netBenefit > 0 ? 'var(--green)' : 'var(--amber)',
          amount: netBenefit > 0 ? fmt(netBenefit) : '-' + fmt(Math.abs(netBenefit)),
          amountLabel: netBenefit > 0 ? 'lifetime tax savings' : 'net cost vs. no conversions',
          desc: netBenefit > 0
            ? 'Your current conversion strategy is saving you money over doing nothing. Consider running the Optimizer to see if a different approach saves even more.'
            : 'Your current conversion strategy costs more in IRMAA surcharges than it saves in taxes. Consider Smart Fill or adjusting your target bracket.',
          action: "state.tab='inputs';state.inputTab='rothconv';render()",
          actionLabel: 'Go to Roth Conversions',
        });
      }
    } else {
      // Not converting — show the opportunity
      // Quick test: fill 22% bracket
      const testProj = runProjection({ ...p, rothConversion: {
        enabled: true, strategy: 'smartFill', startAge: p.retirementAge, endAge: Math.min(p.retirementAge + 7, 74), targetBracket: 0.22,
      }});
      const testTax = testProj.reduce((s, y) => s + y.tax, 0);
      const testIRMAA = testProj.reduce((s, y) => s + y.irmaa, 0);
      const potentialSaving = (noConvTax + noConvIRMAA) - (testTax + testIRMAA);
      if (potentialSaving > 10000) {
        levers.push({
          magnitude: potentialSaving,
          title: 'Roth Conversion Opportunity',
          icon: '&#128260;',
          color: 'var(--cyan)',
          amount: fmt(potentialSaving),
          amountLabel: 'potential lifetime tax savings',
          desc: `You have ${fmtK(preTaxBal)} in pre-tax accounts with no conversion plan. A Smart Fill strategy could save significantly in lifetime taxes and reduce future RMDs.`,
          action: "state.tab='inputs';state.inputTab='rothconv';render()",
          actionLabel: 'Explore Roth Conversions',
        });
      }
    }
  }

  // 2. Social Security claiming age (skip if SSDI overrides — auto-converts at FRA, can't delay)
  const ssdiPlanHealth = p.ssdiPrimary || {};
  if (p.ssClaimAge && p.ssClaimAge < 70 && !ssdiPlanHealth.enabled) {
    const delay70Proj = runProjection({ ...p, ssClaimAge: 70 });
    const delay70SS = delay70Proj.reduce((s, y) => s + y.ss, 0);
    const curSS = proj.reduce((s, y) => s + y.ss, 0);
    const ssDelta = delay70SS - curSS;
    if (ssDelta > 20000) {
      levers.push({
        magnitude: ssDelta,
        title: 'Social Security Timing',
        icon: '&#128176;',
        color: 'var(--blue)',
        amount: fmt(ssDelta),
        amountLabel: 'more lifetime SS income if you delay to 70',
        desc: `You're claiming at ${p.ssClaimAge}. Delaying to 70 increases your monthly benefit by ~${Math.round((70 - p.ssClaimAge) * 8)}% but requires bridging ${70 - p.ssClaimAge} more years from savings. The tradeoff depends on longevity.`,
        action: "state.tab='inputs';state.inputTab='ss';render()",
        actionLabel: 'Review SS Strategy',
      });
    }
  }

  // 3. IRMAA surcharges
  if (totalIRMAA > 5000) {
    levers.push({
      magnitude: totalIRMAA,
      title: 'Medicare Surcharges (IRMAA)',
      icon: '&#127973;',
      color: 'var(--pink)',
      amount: fmt(totalIRMAA),
      amountLabel: 'lifetime Medicare surcharges',
      desc: `Your income triggers Medicare income-related surcharges. ${totalConv > 0 ? 'Roth conversions are contributing — Smart Fill can avoid crossing IRMAA tiers.' : 'This is driven by your pre-tax withdrawals and other income.'} IRMAA uses a 2-year lookback, so decisions today affect premiums 2 years out.`,
      action: "state.tab='inputs';state.inputTab='medicare';render()",
      actionLabel: 'Review Medicare Costs',
    });
  }

  // 4. Pre-tax concentration risk
  const preTaxPct = totalAcct > 0 ? preTaxBal / totalAcct : 0;
  if (preTaxPct > 0.6 && preTaxBal > 200000) {
    const peakRmdPct = Math.round(peakRMD / Math.max(1, p.annualExpenses) * 100);
    levers.push({
      magnitude: Math.round(totalRMD * 0.22), // rough tax cost estimate
      title: 'Pre-Tax Concentration',
      icon: '&#9874;',
      color: 'var(--amber)',
      amount: Math.round(preTaxPct * 100) + '%',
      amountLabel: 'of your portfolio is pre-tax',
      desc: `${fmtK(preTaxBal)} in pre-tax accounts will generate forced RMDs starting at ${proj.find(y => y.rmdRequired)?.age || 73}. Peak RMD reaches ${fmtK(peakRMD)}/yr (${peakRmdPct}% of your expenses). This creates taxable income you can't control. Roth conversions before RMDs start can reduce this.`,
      action: "state.tab='inputs';state.inputTab='rothconv';render()",
      actionLabel: 'Explore Roth Conversions',
    });
  }

  // 5. Expense vulnerability
  const highExpProj = runProjection({ ...p, annualExpenses: Math.round(p.annualExpenses * 1.2) });
  const highExpBust = highExpProj.find(y => y.netWorth <= 0)?.age;
  if (highExpBust && !bust) {
    levers.push({
      magnitude: Math.round(p.annualExpenses * 0.2 * (p.endAge - p.retirementAge)),
      title: 'Expense Sensitivity',
      icon: '&#9888;',
      color: 'var(--red)',
      amount: 'Age ' + highExpBust,
      amountLabel: 'depletion if expenses rise 20%',
      desc: `A 20% increase in spending (to ${fmt(Math.round(p.annualExpenses * 1.2))}/yr) causes your plan to fail at age ${highExpBust}. Your margin is thin — consider building more buffer through higher savings, lower expenses, or delayed retirement.`,
      action: "state.tab='inputs';state.inputTab='expenses';render()",
      actionLabel: 'Review Expenses',
    });
  }

  // 6. Healthcare gap cost (early retirees)
  const hc = p.preMedicareHealthcare;
  const ssdiHC = p.ssdiPrimary || {};
  const planHealthMedAge = ssdiHC.enabled ? Math.min((ssdiHC.startAge || 0) + 2, 65) : 65;
  if (hc && hc.enabled && p.retirementAge < planHealthMedAge) {
    const gapYears = planHealthMedAge - p.retirementAge;
    const totalHC = proj.filter(y => y.age >= p.retirementAge && y.age < planHealthMedAge).reduce((s, y) => s + (y.healthcare || 0), 0);
    if (totalHC > 20000) {
      const totalAcaSub = proj.filter(y => y.age >= p.retirementAge && y.age < planHealthMedAge).reduce((s, y) => s + (y.acaSubsidy || 0), 0);
      const acaSrc = (hc.source || 'aca') === 'aca';
      const acaDesc = acaSrc
        ? `Source: ACA Marketplace with MAGI-based subsidies.${totalAcaSub > 0 ? ` Total subsidies: ${fmt(totalAcaSub)} over the gap.` : ''} Net cost after subsidies: ${fmt(totalHC)}. Income during these years (SS, Roth conversions, withdrawals) directly affects your premium.`
        : `Source: ${(HC_SOURCES[hc.source||'aca']||HC_SOURCES.aca).label} at ${fmt(hc.annualCost || 0)}/yr${hc.source === 'cobra' ? ` (COBRA ${hc.cobraDuration||18}mo, then follow-up at ${fmt(hc.cobraFollowUpCost||0)}/yr)` : hc.source === 'spouse_plan' ? ` (until spouse retires, then ${fmt(hc.spousePlanFollowUpCost||0)}/yr)` : ''} growing at ${hc.inflation || 5}%.`;
      levers.push({
        magnitude: totalHC,
        title: 'Pre-Medicare Healthcare Gap',
        icon: '&#127974;',
        color: 'var(--amber)',
        amount: fmt(totalHC),
        amountLabel: `total ${acaSrc ? 'net ' : ''}cost over ${Math.round(gapYears)} gap years`,
        desc: `Retiring at ${p.retirementAge} means ${Math.round(gapYears)} years of self-funded healthcare before Medicare at ${planHealthMedAge}. ${acaDesc}`,
        action: "state.tab='inputs';state.inputTab='healthcare';render()",
        actionLabel: 'Review Healthcare',
      });
    }
  }

  // 7. Pension survivor risk (single-life pension with spouse)
  const hasSpouseForPension = p.spouseEnabled || (p.spouseAge && p.spouseAge > 0);
  const pen1PH = p.pension || {};
  const pen2PH = p.spousePension || {};
  if (hasSpouseForPension) {
    const atRisk = [];
    if (pen1PH.enabled && (pen1PH.survivorBenefit || 'none') === 'none') atRisk.push(pen1PH.name || 'Your Pension');
    if (pen2PH.enabled && (pen2PH.survivorBenefit || 'none') === 'none') atRisk.push(pen2PH.name || 'Spouse Pension');
    if (atRisk.length > 0) {
      const totalAtRisk = (pen1PH.enabled && (pen1PH.survivorBenefit || 'none') === 'none' ? (pen1PH.annualAmount || 0) : 0)
        + (pen2PH.enabled && (pen2PH.survivorBenefit || 'none') === 'none' ? (pen2PH.annualAmount || 0) : 0);
      const yearsAtRisk = Math.max(0, p.endAge - (p.retirementAge || 65));
      levers.push({
        magnitude: totalAtRisk * Math.round(yearsAtRisk * 0.3),
        title: 'Pension Survivor Risk',
        icon: '&#9888;',
        color: 'var(--amber)',
        amount: fmt(totalAtRisk) + '/yr',
        amountLabel: `at risk if pensioner dies (${atRisk.join(', ')})`,
        desc: `${atRisk.join(' and ')} ${atRisk.length > 1 ? 'are' : 'is'} set to Single Life — income stops entirely when the pensioner dies. A Joint & Survivor option would reduce the monthly benefit but protect the surviving spouse. Consider the trade-off carefully.`,
        action: "state.tab='inputs';state.inputTab='pension';render()",
        actionLabel: 'Review Pension Options',
      });
    }
  }

  // Sort by dollar magnitude, take top 5
  levers.sort((a, b) => b.magnitude - a.magnitude);
  const topLevers = levers.slice(0, 5);

  // Count issues for verdict
  const issueCount = topLevers.filter(l => l.color !== 'var(--green)' && l.color !== 'var(--blue)').length;
  if (issueCount > 0 && grade === 'strong') {
    verdictText += ` See the highest-impact areas below for details.`;
  }

  return { grade, verdictText, verdictColor, verdictIcon, levers: topLevers, bust, final, totalTax, totalIRMAA, totalRMD, peakRMD };
}

function buildStrategyReport(proj) {
  const p = state.params;
  const goal = state.reportGoal || 'netWorth';
  const ssdi1r = p.ssdiPrimary || {};
  const ssdiOverridesPrimary = ssdi1r.enabled;
  const rc = p.rothConversion || {};
  const preTaxBal = p.accounts.filter(a => a.type === 'pretax').reduce((s, a) => s + a.balance, 0);

  // Extract metrics from a projection
  function metrics(pr) {
    const endNW = pr[pr.length - 1].netWorth;
    const bust = pr.find(y => y.netWorth <= 0)?.age || null;
    const lifeTax = pr.reduce((s, y) => s + y.tax, 0);
    const lifeIRMAA = pr.reduce((s, y) => s + y.irmaa, 0);
    const lifeSS = pr.reduce((s, y) => s + y.ss + y.ssdi, 0);
    const lifeRMD = pr.reduce((s, y) => s + y.rmd, 0);
    const endRoth = pr[pr.length - 1].roth;
    const endPreTax = pr[pr.length - 1].preTax;
    return { endNW, bust, lifeTax, lifeIRMAA, lifeSS, lifeRMD, endRoth, endPreTax };
  }

  const base = metrics(proj);

  // Build alternative strategies
  const alts = [];

  // --- SS TIMING ---
  if (!ssdiOverridesPrimary) {
    const fraAge = Math.round(fraMonths(p.birthYear || (new Date().getFullYear() - p.currentAge)) / 12);
    const ssAges = [62, fraAge, 70].filter(a => a !== p.ssClaimAge);
    for (const ssAge of ssAges) {
      const override = { ssClaimAge: ssAge };
      const label = ssAge === 62 ? 'SS at 62 (early)' : ssAge === fraAge ? `SS at FRA (${fraAge})` : 'SS at 70 (delayed)';
      const desc = ssAge < p.ssClaimAge ? 'Start SS earlier — less per month but more years of income'
        : 'Delay SS — larger monthly benefit, requires bridging from savings';
      try {
        const pr = runProjection({ ...p, ...override });
        const m = metrics(pr);
        alts.push({ label, desc, params: override, metrics: m, category: 'SS Timing' });
      } catch(e) {}
    }
  }

  // --- ROTH CONVERSIONS ---
  if (preTaxBal > 30000) {
    const rothStart = Math.max(p.retirementAge, p.currentAge);
    const rothEnd = Math.min(rothStart + 8, 74);
    if (rothStart <= rothEnd) {
    // Test Smart Fill 22% if not current strategy
    if (!rc.enabled || rc.strategy !== 'smartFill' || rc.targetBracket !== 0.22) {
      try {
        const pr = runProjection({ ...p, rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.22 }});
        alts.push({ label: 'Smart Fill Roth 22%', desc: 'IRMAA-aware conversions filling the 22% bracket', params: { rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.22 }}, metrics: metrics(pr), category: 'Roth Strategy' });
      } catch(e) {}
    }
    // Test Smart Fill 24%
    if (!rc.enabled || rc.strategy !== 'smartFill' || rc.targetBracket !== 0.24) {
      try {
        const pr = runProjection({ ...p, rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.24 }});
        alts.push({ label: 'Smart Fill Roth 24%', desc: 'Aggressive IRMAA-aware conversions filling the 24% bracket', params: { rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.24 }}, metrics: metrics(pr), category: 'Roth Strategy' });
      } catch(e) {}
    }
    // Test no conversions if currently converting
    if (rc.enabled) {
      try {
        const pr = runProjection({ ...p, rothConversion: { enabled: false }});
        alts.push({ label: 'No Roth Conversions', desc: 'Skip conversions entirely — compare the tax cost', params: { rothConversion: { enabled: false }}, metrics: metrics(pr), category: 'Roth Strategy' });
      } catch(e) {}
    }
    } // end rothStart <= rothEnd
  }

  // --- COMBINED: SS 70 + Roth ---
  if (!ssdiOverridesPrimary && p.ssClaimAge !== 70 && preTaxBal > 30000) {
    const rothStart = Math.max(p.retirementAge, p.currentAge);
    const rothEnd = Math.min(rothStart + 8, 74);
    if (rothStart <= rothEnd) {
      try {
        const pr = runProjection({ ...p, ssClaimAge: 70, rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.22 }});
        alts.push({ label: 'SS 70 + Smart Fill 22%', desc: 'Delay SS to max + Roth conversions to fill the gap years', params: { ssClaimAge: 70, rothConversion: { enabled: true, strategy: 'smartFill', startAge: rothStart, endAge: rothEnd, targetBracket: 0.22 }}, metrics: metrics(pr), category: 'Combined' });
      } catch(e) {}
    }
  }

  // --- RETIREMENT AGE ---
  if (p.currentAge < p.retirementAge) {
    for (const delta of [1, 2]) {
      const newRetAge = p.retirementAge + delta;
      if (newRetAge <= 70 && newRetAge < p.endAge) {
        try {
          const pr = runProjection({ ...p, retirementAge: newRetAge });
          alts.push({ label: `Retire at ${newRetAge} (+${delta}yr)`, desc: `${delta} more year${delta>1?'s':''} of income, savings, and delayed withdrawals`, params: { retirementAge: newRetAge }, metrics: metrics(pr), category: 'Retirement Age' });
        } catch(e) {}
      }
    }
  }

  // --- SCORING ---
  const goalConfig = {
    netWorth: { key: 'endNW', label: 'Max End Net Worth', unit: '$', higher: true, fmt: v => fmtK(v) },
    minTax:   { key: 'lifeTax', label: 'Min Lifetime Taxes', unit: '$', higher: false, fmt: v => fmtK(v) },
    minTaxIRMAA: { key: m => m.lifeTax + m.lifeIRMAA, label: 'Min Tax + IRMAA', unit: '$', higher: false, fmt: v => fmtK(v) },
    maxIncome: { key: 'lifeSS', label: 'Max SS Income', unit: '$', higher: true, fmt: v => fmtK(v) },
  };
  const gc = goalConfig[goal] || goalConfig.netWorth;
  const getScore = (m) => typeof gc.key === 'function' ? gc.key(m) : m[gc.key];
  const baseScore = getScore(base);

  // Rank alternatives
  alts.forEach(a => { a.score = getScore(a.metrics); a.delta = a.score - baseScore; });
  alts.sort((a, b) => gc.higher ? (b.score - a.score) : (a.score - b.score));

  // Find the best alternative
  const best = alts[0];
  const bestIsBetter = best && (gc.higher ? best.score > baseScore : best.score < baseScore);

  // Stash for PDF export
  state.lastReportCard = bestIsBetter && best ? {
    label: best.label, delta: best.delta, goalLabel: gc.label,
    higher: gc.higher, fmt: gc.fmt
  } : null;

  // Render goal selector
  const goals = [
    { id: 'netWorth', label: 'Max Net Worth' },
    { id: 'minTax', label: 'Min Taxes' },
    { id: 'minTaxIRMAA', label: 'Min Tax + IRMAA' },
    { id: 'maxIncome', label: 'Max SS Income' },
  ];
  const goalBtns = goals.map(g =>
    `<button class="scenario-btn${goal === g.id ? ' active' : ''}" style="font-size:11px;padding:5px 12px" onclick="state.reportGoal='${g.id}';render()">${g.label}</button>`
  ).join('');

  // Build strategy cards
  function metricPill(label, value, color) {
    return `<div style="display:inline-flex;align-items:baseline;gap:3px;font-size:11px"><span style="color:var(--text-faint)">${label}</span> <span style="font-weight:600;color:${color || 'var(--text)'}">${value}</span></div>`;
  }

  function strategyCard(label, desc, m, deltaStr, isBest, isCurrent, applyFn) {
    const bg = isCurrent ? 'rgba(59,130,246,0.06)' : isBest ? 'rgba(16,185,129,0.06)' : 'var(--bg-card)';
    const border = isCurrent ? 'rgba(59,130,246,0.25)' : isBest ? 'rgba(16,185,129,0.25)' : 'var(--border)';
    const lastsStr = m.bust ? '<span style="color:var(--red)">Age ' + m.bust + '</span>' : '<span style="color:var(--green)">' + p.endAge + '+</span>';
    const nwColor = m.endNW > 0 ? 'var(--text)' : 'var(--red)';

    return `<div style="background:${bg};border:1px solid ${border};border-radius:8px;padding:10px 12px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:6px;flex-wrap:wrap">
        <div style="font-size:13px;font-weight:600;color:var(--text)">
          ${isCurrent ? '&#10003; ' : ''}${isBest ? '<span style="color:var(--green)">★</span> ' : ''}${label}${isBest ? ' <span style="font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(16,185,129,0.15);color:var(--green);font-weight:700">BEST</span>' : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${deltaStr !== null ? '<span style="font-size:12px;font-weight:700">' + deltaStr + '</span>' : ''}
          ${applyFn ? '<button class="scenario-btn" style="font-size:10px;padding:3px 10px" onclick="' + applyFn + '">Apply</button>' : ''}
        </div>
      </div>
      ${desc ? '<div style="font-size:11px;color:var(--text-faint);margin-bottom:6px;line-height:1.4">' + desc + '</div>' : ''}
      <div style="display:flex;flex-wrap:wrap;gap:6px 14px">
        ${metricPill('NW', fmtK(m.endNW), nwColor)}
        ${metricPill('Tax', fmtK(m.lifeTax), 'var(--text-dim)')}
        ${metricPill('IRMAA', fmtK(m.lifeIRMAA), 'var(--text-dim)')}
        ${metricPill('SS', fmtK(m.lifeSS), 'var(--text-dim)')}
        ${metricPill('Lasts', lastsStr, null)}
      </div>
    </div>`;
  }

  // Current plan card
  let cards = strategyCard('Current Plan', '', base, null, false, true, '');

  // Alternative cards
  alts.forEach((a, i) => {
    const delta = a.delta;
    const isBest = i === 0 && bestIsBetter;
    const deltaStr = delta === 0 ? '<span style="color:var(--text-faint)">—</span>'
      : ((gc.higher ? delta > 0 : delta < 0)
        ? '<span style="color:var(--green)">' : '<span style="color:var(--red)">')
        + (delta > 0 ? '+' : '') + fmtK(delta) + '</span>';
    const applyFn = `(function(){var o=${JSON.stringify(a.params)};for(var k in o){state.params[k]=o[k]}state.mcResults=null;saveState();renderKeepScroll()})()`.replace(/"/g,'&quot;');
    cards += strategyCard(a.label, a.desc, a.metrics, deltaStr, isBest, false, applyFn);
  });

  // Insight summary
  let insight = '';
  if (bestIsBetter && best) {
    const absDelta = Math.abs(best.delta);
    insight = `<div style="margin-top:10px;padding:10px 12px;background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);border-radius:8px;font-size:12px;color:var(--text-dim);line-height:1.6">
      <strong style="color:var(--green)">★ Top opportunity:</strong> <strong style="color:var(--text)">${best.label}</strong> ${gc.higher ? 'adds' : 'saves'} <strong style="color:var(--green)">${gc.fmt(absDelta)}</strong> in ${gc.label.toLowerCase()} compared to your current plan.
      ${best.metrics.bust && !base.bust ? '<br><span style="color:var(--red)">⚠ Warning: this strategy depletes your portfolio at age ' + best.metrics.bust + '.</span>' : ''}
      ${!best.metrics.bust && base.bust ? '<br><span style="color:var(--green)">✓ This strategy keeps your portfolio funded through age ' + p.endAge + '.</span>' : ''}
    </div>`;
  } else if (alts.length > 0) {
    insight = `<div style="margin-top:10px;padding:10px 12px;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.2);border-radius:8px;font-size:12px;color:var(--text-dim);line-height:1.6">
      <strong style="color:var(--blue)">Your current plan is already well-optimized</strong> for ${gc.label.toLowerCase()}. None of the alternatives tested improve on it. Fine-tune with the Roth Optimizer or Scenario Comparison for deeper analysis.
    </div>`;
  }

  // Life insurance: flag term policies that expire before death
  const survivorMode = p.survivorAge && p.survivorWho;
  const spouseDiesAge_ = survivorMode && p.survivorWho === 'spouse' ? p.survivorAge : null;
  const primaryDiesAge_ = survivorMode && p.survivorWho === 'primary' ? p.survivorAge : null;
  const termExpiredBeforeDeath = (p.lifeInsurance || []).some(li => {
    if (li.type !== 'term') return false;
    const deathAge = li.insured === 'spouse' ? spouseDiesAge_ : primaryDiesAge_;
    const insuredAge = li.insured === 'spouse' ? (p.spouseAge || 0) : p.currentAge;
    const expiresInsuredAge = li.expiresAge || 75;
    const expiresAtPrimaryAge = expiresInsuredAge + (p.currentAge - insuredAge);
    return deathAge && deathAge > expiresAtPrimaryAge;
  });
  if (termExpiredBeforeDeath) {
    insight += `<div style="margin-top:8px;padding:10px 12px;background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.2);border-radius:8px;font-size:12px;color:var(--amber);line-height:1.6">
      &#9888; Your term life policy expires before the modeled death age &mdash; consider whether extending coverage or converting to permanent makes sense for your legacy goals.
    </div>`;
  }

  const srCollapsed = state.strategyReportCollapsed;
  const srChevron = srCollapsed ? '\u25B6' : '\u25BC';

  if (alts.length === 0) {
    return `<div class="card" data-accent="green">
      <div class="card-title" onclick="toggleStrategyReport()" style="cursor:pointer">Strategy Report Card <span class="badge" style="background:rgba(16,185,129,0.15);color:var(--green)">What-If</span> <span class="ty-chevron">${srChevron}</span></div>
      <div class="ty-body${srCollapsed ? ' collapsed' : ''}">
        <div style="font-size:13px;color:var(--text-dim);line-height:1.7">No alternative strategies to test for your current configuration. Add retirement accounts or adjust your retirement age to enable comparisons.</div>
      </div>
    </div>`;
  }

  return `<div class="card" data-accent="green" style="max-width:600px;margin-left:auto;margin-right:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:${srCollapsed ? '0' : '10px'};cursor:pointer" onclick="toggleStrategyReport()">
      <div class="card-title" style="margin:0">Strategy Report Card <span class="badge" style="background:rgba(16,185,129,0.15);color:var(--green)">What-If</span> <span class="ty-chevron">${srChevron}</span></div>
      <div style="font-size:11px;color:var(--text-dim)">${alts.length} alternatives tested</div>
    </div>
    <div class="ty-body${srCollapsed ? ' collapsed' : ''}">
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:10px;line-height:1.5">
        Select a goal — each card shows a full projection. <strong style="color:var(--text-dim)">&Delta;</strong> = difference in ${gc.label.toLowerCase()} vs. your current plan.
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${goalBtns}</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${cards}
      </div>
      ${insight}
    </div>
  </div>`;
}

function solveMaxSpending() {
  const p = state.params;
  // Binary search: find highest annualExpenses (today's $) where endNW >= 0
  let lo = 1000, hi = Math.max(p.annualExpenses * 5, 500000);

  // Quick check: can they even survive at minimal spending?
  const minProj = runProjection({ ...p, annualExpenses: lo });
  if (minProj[minProj.length - 1].netWorth <= 0) return null; // can't even survive at $1K/yr

  // Quick check: does max spending still work? (cap the search)
  const maxProj = runProjection({ ...p, annualExpenses: hi });
  if (maxProj[maxProj.length - 1].netWorth > 0) hi *= 2;

  // Binary search — converge to within $500
  for (let i = 0; i < 30 && (hi - lo) > 500; i++) {
    const mid = Math.round((lo + hi) / 2);
    const proj = runProjection({ ...p, annualExpenses: mid });
    if (proj[proj.length - 1].netWorth > 0) lo = mid;
    else hi = mid;
  }

  // lo is the highest safe value — run final projection for details
  const finalProj = runProjection({ ...p, annualExpenses: lo });
  const endNW = finalProj[finalProj.length - 1].netWorth;
  const totalTax = finalProj.reduce((s, y) => s + y.tax, 0);
  return { maxExpense: lo, endNW, totalTax, proj: finalProj };
}

function exportDashboardSummary() {
  const p = state.params;
  const proj = runProjection(p);
  const health = computePlanHealth(proj);

  // Metrics (same as renderDashboard)
  const totalAcct = p.accounts.reduce((s, a) => s + a.balance, 0);
  const peak = Math.max(...proj.map(y => y.netWorth));
  const final = proj[proj.length - 1].netWorth;
  const bust = proj.find(y => y.netWorth <= 0)?.age;
  const totalTax = proj.reduce((s, y) => s + y.tax, 0);
  const totalIRMAA = proj.reduce((s, y) => s + y.irmaa, 0);
  const totalSS = proj.reduce((s, y) => s + (y.ss || 0) + (y.ssdi || 0), 0);
  const rmdStartYr = proj.find(y => y.rmdRequired);
  const peakRMD = Math.max(...proj.map(y => y.rmd));

  // Roth conversion summary
  const totalConv = proj.reduce((s, y) => s + y.rothConv, 0);
  const rc = p.rothConversion || {};
  let rothLine = 'None';
  if (rc.enabled && totalConv > 0) {
    const strat = rc.strategy === 'smartFill' ? 'Smart Fill ' + Math.round((rc.targetBracket || 0.22) * 100) + '%'
      : rc.strategy === 'fixed' ? 'Fixed ' + fmtK(rc.fixedAmount || 0) + '/yr' : rc.strategy || '';
    rothLine = fmtK(totalConv) + ' (ages ' + rc.startAge + '\u2013' + rc.endAge + ', ' + strat + ')';
  }

  // Monte Carlo
  const mc = state.mcResults;
  let mcHtml = '';
  if (mc) {
    const medianFinal = mc.median[mc.median.length - 1].netWorth;
    const p5Final = mc.p10[mc.p10.length - 1].netWorth; // p10 is ~worst realistic
    mcHtml = `
      <div class="sec-head">MONTE CARLO SIMULATION (${mc.model === 'historical' ? 'Historical' : mc.model === 'stress' ? 'Stress Test' : 'Normal'})</div>

        <div class="metric"><div class="metric-label">Success Rate</div><div class="metric-value" style="color:#10b981">${mc.successRate}%</div></div>

        <div class="metric"><div class="metric-label">Worst Case (10th %ile)</div><div class="metric-value" style="color:#f59e0b">${fmtK(p5Final)}</div></div>
      </div>`;
  }

  // Strategy Report Card best
  const rc2 = state.lastReportCard;
  let stratHtml = '';
  if (rc2) {
    const absDelta = Math.abs(rc2.delta);
    const verb = rc2.higher ? 'adds' : 'saves';
    stratHtml = `
      <div class="sec-head">STRATEGY REPORT CARD</div>
      <div class="insight">
        <div class="insight-title">&#9733; &nbsp;Top opportunity: ${rc2.label}</div>
        <div class="insight-body">${verb.charAt(0).toUpperCase() + verb.slice(1)} <strong>${fmtK(absDelta)}</strong> in ${rc2.goalLabel.toLowerCase()} vs. your current projection. Use the Dashboard to apply this strategy and explore alternatives.</div>
      </div>`;
  }

  // Big levers
  let leversHtml = '';
  if (health.levers.length > 0) {
    const rows = health.levers.map(lev => {
      // Strip HTML tags from desc, replace "plan" with "projection"
      const desc = lev.desc.replace(/<[^>]*>/g, '').replace(/\bplan\b/gi, 'projection');
      const amt = lev.amount;
      return `<div class="lever-row">
        <div class="lever-title">${lev.title}</div>
        <div class="lever-amt">${amt}</div>
        <div class="lever-detail">${lev.amountLabel}</div>
      </div>`;
    }).join('');
    leversHtml = `
      <div class="sec-head">HIGHEST-IMPACT AREAS</div>
      <div class="levers">${rows}</div>`;
  }

  // Max Spending
  let maxSpendHtml = '';
  const maxR = solveMaxSpending();
  if (maxR) {
    const diff = maxR.maxExpense - p.annualExpenses;
    const diffColor = diff >= 0 ? '#10b981' : '#f59e0b';
    const diffStr = (diff >= 0 ? '+' : '') + fmt(diff) + '/yr vs current';
    maxSpendHtml = `
      <div class="sec-head">MAXIMUM SPENDING</div>
      <div class="metrics">
        <div class="metric" style="flex:2"><div class="metric-label">Max Retirement Spending (today's $)</div><div class="metric-value" style="color:#10b981">${fmt(maxR.maxExpense)}/yr</div><div class="metric-sub" style="color:${diffColor}">${diffStr}</div></div>
        <div class="metric"><div class="metric-label">Current Setting</div><div class="metric-value" style="color:#06b6d4">${fmt(p.annualExpenses)}/yr</div></div>
        <div class="metric"><div class="metric-label">End NW at Max</div><div class="metric-value" style="color:#94a3b8">${fmtK(maxR.endNW)}</div><div class="metric-sub">Near zero by design</div></div>
      </div>`;
  }

  // Verdict — replace "plan" with "projection"
  const verdictText = health.verdictText.replace(/<[^>]*>/g, '').replace(/\bplan\b/gi, 'projection');
  const verdictLabel = health.grade === 'critical' ? 'Your Projection Needs Attention'
    : health.grade === 'caution' ? 'Your Projection Has Thin Margins'
    : 'Your Projection Looks Strong';
  const verdictIcon = health.grade === 'strong' ? '&#10003;' : '&#9888;';
  const verdictClass = health.grade;
  const verdictColor = health.grade === 'critical' ? '#ef4444' : health.grade === 'caution' ? '#f59e0b' : '#10b981';

  // Assumptions line
  const parts = [`Primary age ${p.currentAge}`];
  if (p.spouseAge) parts.push(`Spouse age ${p.spouseAge}`);
  parts.push(`Retire at ${p.retirementAge}`, `Through age ${p.endAge}`,
    `${p.nominalReturn || 7}% return`, `${p.inflation || 3}% inflation`);
  if (p.stateCode) parts.push(p.stateCode);
  const assumeLine = parts.join(' &nbsp;|&nbsp; ');

  // SS claim
  const ssLine = p.ssClaimAge ? 'Claiming at age ' + p.ssClaimAge : 'Not configured';

  // Timestamps — NY timezone
  const now = new Date();
  const displayTs = now.toLocaleString('en-US', {
    timeZone: 'America/New_York', year: 'numeric', month: 'long', day: 'numeric',
    hour: 'numeric', minute: '2-digit', hour12: true, timeZoneName: 'short'
  });
  // 24-hour for filename
  const nyParts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/New_York', year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', hour12: false
  }).formatToParts(now);
  const fp = {};
  nyParts.forEach(p2 => { fp[p2.type] = p2.value; });
  const fname = `RetIQ-Summary-${fp.year}-${fp.month}-${fp.day}-${fp.hour}${fp.minute}`;

  // Legacy goal
  const lg = p.legacy || {};
  let legacyHtml = '';
  if (lg.enabled && lg.targetAmount) {
    const pct = Math.min(100, Math.round(Math.max(0, final) / lg.targetAmount * 100));
    const color = pct >= 100 ? '#10b981' : pct >= 50 ? '#f59e0b' : '#ef4444';
    legacyHtml = `<div class="metric"><div class="metric-label">Legacy Goal</div><div class="metric-value" style="color:${color}">${pct}%</div><div class="metric-sub">${fmtK(final)} / ${fmtK(lg.targetAmount)}</div></div>`;
  }

  const html = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">

function renderThisYear(proj, p, bust) {
  if (!proj || proj.length < 2) return '';
  const y = proj[0];
  const collapsed = state.thisYearCollapsed;
  const titleLabel = y.retired
    ? `This Year's Retirement Plan (Age ${y.age})`
    : `This Year's Plan (Age ${y.age} &mdash; Still Working)`;

  // Step 1 — Detect upcoming retirement year
  const retYrIndex = p.retirementAge - p.currentAge;
  const showRetirementCard = p.currentAge < p.retirementAge
    && p.retirementAge - p.currentAge <= 5
    && retYrIndex < proj.length;
  const yRet = showRetirementCard ? proj[retYrIndex] : null;

  const moneyLastsAge = bust ? bust : p.endAge + '+';
  const moneyLastsColor = bust ? 'var(--red)' : 'var(--green)';

  // Step 2 — Reusable card-builder helpers
  function buildCardSections(y, yr) {
    const d = (v) => fmtD(v, yr);
    const sections = [];
    // Income
    const incomeRows = [];
    if (y.earned > 0) incomeRows.push({ label: 'Employment Income', value: y.earned, color: 'var(--text)' });
    if (y.qualifiedDividends > 0) incomeRows.push({ label: 'Qualified Dividends', value: y.qualifiedDividends, color: 'var(--amber)', note: 'taxed at LTCG rates' });
    if (y.ss > 0 || y.ssWithheld > 0) incomeRows.push({ label: 'Social Security' + (y.ssWithheld > 0 ? ' (\u2212' + d(y.ssWithheld) + ' withheld)' : ''), value: y.ss, color: 'var(--green)' });
    if (y.ssdi > 0) incomeRows.push({ label: 'SSDI Benefits', value: y.ssdi, color: 'var(--blue)' });
    if (y.pension > 0) {
      const penLabel = (() => {
        const pen1 = p.pension || {}, pen2 = p.spousePension || {};
        const labels = { joint50: 'J&50%', joint75: 'J&75%', joint100: 'J&100%' };
        const parts = [];
        if (pen1.enabled && pen1.survivorBenefit && pen1.survivorBenefit !== 'none') parts.push(labels[pen1.survivorBenefit]);
        if (pen2.enabled && pen2.survivorBenefit && pen2.survivorBenefit !== 'none') parts.push(labels[pen2.survivorBenefit]);
        return parts.length > 0 ? 'Pension Income (' + parts.join(', ') + ')' : 'Pension Income';
      })();
      incomeRows.push({ label: penLabel, value: y.pension, color: 'var(--text)' });
      if (y.pensionTaxable !== undefined && y.pensionTaxable !== y.pension) {
        incomeRows.push({ label: 'Pension Taxable Portion', value: y.pensionTaxable, color: 'var(--text-dim)', note: 'used for tax calculations' });
      }
    }
    if (y.other > 0) incomeRows.push({ label: 'Other Income', value: y.other, color: 'var(--text)' });
    if (y.cashEventNet > 0) incomeRows.push({ label: 'Cash Event Proceeds', value: y.cashEventNet, color: 'var(--amber)', note: y.cashEventGains > 0 ? fmt(y.cashEventGains) + ' capital gains' : 'no taxable gains' });
    if (y.lifeInsBenefit > 0) incomeRows.push({ label: 'Life Insurance Benefit', value: y.lifeInsBenefit, color: 'var(--green)', note: 'tax-free' });
    if (incomeRows.length > 0) sections.push({ label: 'Income', rows: incomeRows });
    // Savings
    const savRows = [];
    if (y.savings > 0) savRows.push({ label: 'Your Savings', value: y.savings, color: 'var(--green)' });
    if (y.employerMatch > 0) savRows.push({ label: 'Employer 401(k) Match', value: y.employerMatch, color: 'var(--green)', note: 'added to pre-tax accounts' });
    if (y.hsaContrib > 0) savRows.push({ label: 'HSA Contribution', value: y.hsaContrib, color: '#8b5cf6', note: 'tax-deductible' });
    if (savRows.length > 0) sections.push({ label: 'Savings', rows: savRows });
    // Withdrawals
    const wdRows = [];
    if (y.withdrawal > 0) {
      wdRows.push({ label: 'Portfolio Withdrawals', value: y.withdrawal, color: 'var(--amber)' });
      if (y.rmd > 0) wdRows.push({ label: 'Required Minimum Distribution (RMD)', value: y.rmd, color: 'var(--purple)', note: 'included in pre-tax withdrawal' });
    }
    if (wdRows.length > 0) sections.push({ label: 'Withdrawals', rows: wdRows });
    // Roth Conversions
    if (y.rothConv > 0) {
      const rcRows = [{ label: 'Roth Conversion', value: y.rothConv, color: 'var(--cyan)' }];
      if (y.conversionTax > 0) rcRows.push({ label: 'Tax on Conversion', value: y.conversionTax, color: 'var(--red)', negative: true });
      sections.push({ label: 'Roth Conversions', rows: rcRows });
    }
    // Taxes & Medicare
    const taxRows = [];
    if (y.fedTax > 0) taxRows.push({ label: 'Estimated Federal Tax', value: y.fedTax, color: 'var(--red)' });
    if (y.stateTax > 0) taxRows.push({ label: 'Estimated State Tax', value: y.stateTax, color: 'var(--red)' });
    if (y.medicareCost > 0 && y.age >= 65) taxRows.push({ label: 'Medicare Premium', value: y.medicareCost, color: 'var(--pink)' });
    if (y.irmaa > 0) taxRows.push({ label: 'Medicare Surcharge (IRMAA)', value: y.irmaa, color: 'var(--pink)' });
    if (taxRows.length > 0) sections.push({ label: 'Taxes & Medicare', rows: taxRows });
    // Expenses
    const expRows = [];
    if (y.expenses > 0) expRows.push({ label: 'Total Living Expenses', value: y.expenses, color: 'var(--text)' });
    if (y.healthcare > 0) {
      const srcLabel = y.healthcareSource && HC_SOURCES[y.healthcareSource] ? HC_SOURCES[y.healthcareSource].label : 'Pre-Medicare';
      if (y.healthcareSource === 'aca' && y.acaSubsidy > 0) {
        expRows.push({ label: `Healthcare (${srcLabel})`, value: y.healthcare, color: 'var(--pink)', note: `${d(y.acaBenchmark)} benchmark \u2212 ${d(y.acaSubsidy)} subsidy \u00B7 ${y.acaFPLPercent}% FPL` });
      } else {
        expRows.push({ label: `Healthcare (${srcLabel})`, value: y.healthcare, color: 'var(--pink)', note: 'included in living expenses' });
      }
    }
    if (y.charityTotal > 0) expRows.push({ label: 'Charitable Giving', value: y.charityTotal, color: 'var(--amber)' });
    if (y.qcd > 0) expRows.push({ label: 'Qualified Charitable Distribution (QCD)', value: y.qcd, color: 'var(--amber)', note: 'included in charitable giving' });
    if (y.debtPayments > 0) expRows.push({ label: 'Debt/Liability Payments', value: y.debtPayments, color: 'var(--red)' });
    if (y.lifeInsPremiums > 0) expRows.push({ label: 'Life Insurance Premiums', value: y.lifeInsPremiums, color: 'var(--text-dim)' });
    if (expRows.length > 0) sections.push({ label: 'Expenses', rows: expRows });
    return sections;
  }
  function renderSectionsHtml(sections, yr) {
    const d = (v) => fmtD(v, yr);
    return sections.map(s => `
      <div class="ty-section">
        <div class="ty-section-label">${s.label}</div>
        ${s.rows.map(r => `<div class="ty-row">
          <span class="ty-row-label">${r.label}${r.note ? ' <span style="font-size:10px;color:var(--text-faint)">(' + r.note + ')</span>' : ''}</span>
          <span class="ty-row-value" style="color:${r.color}">${d(r.value)}</span>
        </div>`).join('')}
      </div>`).join('<hr class="ty-divider">');
  }

  // --- Card 1: This Year (current age) ---
  const sections1 = buildCardSections(y, 0);
  const sectionsHtml1 = renderSectionsHtml(sections1, 0);
  const card1 = `<div class="ty-card">
    <div class="ty-header" onclick="toggleThisYear()">
      <span class="ty-title">${titleLabel}</span>
      <span class="ty-chevron${collapsed ? ' collapsed' : ''}">&#9660;</span>
    </div>
    <div class="ty-body${collapsed ? ' collapsed' : ''}">
      ${sectionsHtml1}
      <div class="ty-bottom">
        <div class="ty-bottom-row">
          <span class="ty-bottom-label">Net Worth</span>
          <span class="ty-bottom-value" style="color:${y.netWorth > 0 ? 'var(--blue)' : 'var(--red)'}">${fmtD(y.netWorth, 0)}</span>
        </div>
        <div style="font-size:12px;color:var(--text-faint);margin-top:6px">
          Your money lasts through <strong style="color:${moneyLastsColor}">age ${moneyLastsAge}</strong>
          ${showRealDollars ? ' <span style="font-size:10px">(today\'s dollars)</span>' : ''}
        </div>
      </div>
    </div>
  </div>`;

  // --- Card 2: Retirement Year (only when upcoming within 5 years) ---
  let card2 = '';
  if (showRetirementCard && yRet) {
    const retireMonthName = ['January','February','March','April','May','June','July','August','September','October','November','December'][p.retireMonth - 1] || '';
    const retMonthLabel = p.retireMonth > 0 ? ` &mdash; Retiring ${retireMonthName}` : '';
    const retTitleLabel = `Retirement Year Preview (Age ${yRet.age}${retMonthLabel})`;
    const sections2 = buildCardSections(yRet, retYrIndex);
    const sectionsHtml2 = renderSectionsHtml(sections2, retYrIndex);
    const retCollapsed = state.retYearCollapsed;
    card2 = `<div class="ty-card" style="margin-top:16px;border-color:var(--green);opacity:0.92">
      <div class="ty-header" onclick="toggleRetYear()">
        <span class="ty-title" style="color:var(--green)">${retTitleLabel}</span>
        <span class="ty-chevron${retCollapsed ? ' collapsed' : ''}">&#9660;</span>
      </div>
      <div class="ty-body${retCollapsed ? ' collapsed' : ''}">
        ${sectionsHtml2}
        <div class="ty-bottom">
          <div class="ty-bottom-row">
            <span class="ty-bottom-label">Net Worth</span>
            <span class="ty-bottom-value" style="color:${yRet.netWorth > 0 ? 'var(--blue)' : 'var(--red)'}">${fmtD(yRet.netWorth, retYrIndex)}</span>
          </div>
          <div style="font-size:12px;color:var(--text-faint);margin-top:6px">
            First full year of retirement cash flows
          </div>
        </div>
      </div>
    </div>`;
  }
  return card1 + card2;
}

function renderDashboard(proj) {
  const p = state.params;
  const totalAcct = p.accounts.reduce((s, a) => s + a.balance, 0);
  const peak = Math.max(...proj.map(y => y.netWorth));
  const final = proj[proj.length - 1].netWorth;
  const bust = proj.find(y => y.netWorth <= 0)?.age;
  const totalTax = proj.reduce((s, y) => s + y.tax, 0);
  const totalRMD = proj.reduce((s, y) => s + y.rmd, 0);
  const totalIRMAA = proj.reduce((s, y) => s + y.irmaa, 0);
  const rmdStartYr = proj.find(y => y.rmdRequired);
  const peakRMD = Math.max(...proj.map(y => y.rmd));

  // Compute Plan Health
  const health = computePlanHealth(proj);

  // Build net worth chart keys dynamically based on which accounts have data
  const nwKeys = [], nwColors = [], nwLabels = [];
  if (proj.some(y => y.preTax !== 0)) { nwKeys.push('preTax'); nwColors.push('#3b82f6'); nwLabels.push('Pre-Tax'); }
  if (proj.some(y => y.roth !== 0)) { nwKeys.push('roth'); nwColors.push('#10b981'); nwLabels.push('Roth'); }
  if (proj.some(y => (y.cash || 0) > 0)) { nwKeys.push('cash'); nwColors.push('#06b6d4'); nwLabels.push('Cash/HYS'); }
  if (proj.some(y => (y.taxableInv || 0) > 0)) { nwKeys.push('taxableInv'); nwColors.push('#f59e0b'); nwLabels.push('Brokerage'); }
  if (proj.some(y => (y.hsa || 0) > 0)) { nwKeys.push('hsa'); nwColors.push('#8b5cf6'); nwLabels.push('HSA'); }
  if (nwKeys.length === 0) { nwKeys.push('netWorth'); nwColors.push('#3b82f6'); nwLabels.push('Net Worth'); }

  // Plan Health Verdict
  const verdictBg = health.grade === 'critical' ? 'rgba(239,68,68,0.08)' : health.grade === 'caution' ? 'rgba(245,158,11,0.08)' : 'rgba(16,185,129,0.08)';
  const verdictBorder = health.grade === 'critical' ? 'rgba(239,68,68,0.25)' : health.grade === 'caution' ? 'rgba(245,158,11,0.25)' : 'rgba(16,185,129,0.25)';

  const verdictHtml = `<div style="background:${verdictBg};border:1px solid ${verdictBorder};border-radius:10px;padding:16px 20px;margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <span style="font-size:20px;color:${health.verdictColor}">${health.verdictIcon}</span>
      <span style="font-size:16px;font-weight:700;color:${health.verdictColor}">${
        health.grade === 'critical' ? 'Your Plan Needs Attention' : health.grade === 'caution' ? 'Your Plan Has Thin Margins' : 'Your Plan Looks Strong'
      }</span>
    </div>
    <div style="font-size:13.5px;color:var(--text-dim);line-height:1.7">${health.verdictText}</div>
  </div>`;

  // Big Levers cards
  let leversHtml = '';
  if (health.levers.length > 0) {
    const cards = health.levers.map(lev => `
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;flex:1;min-width:220px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
          <span style="font-size:14px">${lev.icon}</span>
          <span style="font-size:12px;font-weight:600;color:var(--text)">${lev.title}</span>
        </div>
        <div style="font-size:22px;font-weight:800;color:${lev.color};margin-bottom:2px">${lev.amount}</div>
        <div style="font-size:11px;color:var(--text-faint);margin-bottom:8px">${lev.amountLabel}</div>
        <div style="font-size:12px;color:var(--text-dim);line-height:1.6;margin-bottom:10px">${lev.desc}</div>
        <button class="scenario-btn" style="font-size:11px;padding:4px 12px;color:${lev.color};border-color:${lev.color}" onclick="${lev.action}">${lev.actionLabel} &rarr;</button>
      </div>
    `).join('');
    leversHtml = `<div style="margin-bottom:16px">
      <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px">Highest-Impact Areas for Your Situation</div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">${cards}</div>
    </div>`;
  }

  return `
    ${!isPro() ? `<div style="background:linear-gradient(135deg,rgba(59,130,246,0.12),rgba(6,182,212,0.12));border:1px solid rgba(59,130,246,0.3);border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="font-size:13px;color:var(--text)"><strong>&#128101; Demo Mode</strong> &mdash; Viewing the Johnson family sample plan. <span style="color:var(--text-dim)">Upgrade to enter your own data.</span></div>
      <button class="pro-gate-btn" onclick="document.getElementById('buyBtn').click()" style="font-size:11px;padding:6px 14px">Upgrade &mdash; $29 launch price</button>
    </div>` : ''}

    ${state.activeExample && exampleMeta[state.activeExample] ? `<div style="background:linear-gradient(135deg,rgba(168,85,247,0.12),rgba(236,72,153,0.12));border:1px solid rgba(168,85,247,0.3);border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="font-size:13px;color:var(--text)"><strong>&#128203; Example Plan</strong> &mdash; ${exampleMeta[state.activeExample].name}: ${exampleMeta[state.activeExample].tagline} <span style="color:var(--text-dim)">This is not your personal plan.</span></div>
      <button onclick="clearExample()" style="background:transparent;border:1px solid rgba(168,85,247,0.4);border-radius:6px;padding:4px 14px;font-size:11px;color:var(--text-dim);cursor:pointer">Clear Example</button>
    </div>` : ''}

    ${state.importedPlanInfo ? `<div style="background:linear-gradient(135deg,rgba(34,197,94,0.12),rgba(59,130,246,0.12));border:1px solid rgba(34,197,94,0.3);border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="font-size:13px;color:var(--text)"><strong>&#128194; Loaded Plan</strong> &mdash; ${state.importedPlanInfo.filename}${state.importedPlanInfo.date ? ' <span style="color:var(--text-dim)">(' + state.importedPlanInfo.date + ')</span>' : ''}</div>
      <button onclick="state.importedPlanInfo=null;render()" style="background:transparent;border:1px solid rgba(34,197,94,0.4);border-radius:6px;padding:4px 14px;font-size:11px;color:var(--text-dim);cursor:pointer">Dismiss</button>
    </div>` : ''}

    <div style="display:flex;justify-content:flex-end;margin-bottom:6px">
      <button onclick="exportDashboardSummary()" style="background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 12px;font-size:11px;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;gap:4px" title="Export one-page summary as PDF">&#128196; Export Summary</button>
    </div>

    ${verdictHtml}

    <div class="card"><div class="card-title">Plan Summary</div>
      <div style="font-size:13px;line-height:1.8;color:var(--text-dim)">
        You are <strong style="color:var(--text)">${p.currentAge}</strong>, retiring at
        <strong style="color:var(--amber)">${p.retirementAge}</strong>.
        Household income: <strong style="color:var(--text)">${fmt(p.annualIncome + (p.spouseIncome||0))}/yr</strong> (growing ${p.incomeGrowth || 0}%/yr),
        saving <strong style="color:var(--green)">${fmt(p.annualSavings + (p.spouseSavings||0))}/yr</strong> (growing ${p.savingsGrowth || 0}%/yr).
        ${(() => { const emTotal = proj.reduce((s,y)=>s+(y.employerMatch||0),0); return emTotal > 0 ? `Employer match adds <strong style="color:var(--green)">${fmtK(emTotal)}</strong> to pre-tax accounts over your career. ` : ''; })()}
        ${p.preRetirementExpenses > 0 ? `Pre-retirement expenses: <strong style="color:var(--red)">${fmt(p.preRetirementExpenses)}/yr</strong> (${p.preRetirementExpenseInflation !== undefined ? p.preRetirementExpenseInflation : p.inflation}% inflation). ` : ''}
        Portfolio: <strong style="color:var(--blue)">${fmtK(totalAcct)}</strong>.
        ${rmdStartYr ? `<span class="badge badge-rmd">RMD</span> Required Minimum Distributions begin at age <strong>${rmdStartYr.age}</strong>. ` : ''}
        ${totalIRMAA > 0 ? `<span class="badge badge-irmaa">IRMAA</span> Medicare surcharges total <strong style="color:var(--pink)">${fmtK(totalIRMAA)}</strong> over your lifetime. ` : ''}
        ${(() => { const tc = proj.reduce((s,y)=>s+y.rothConv,0); return tc > 0 ? `<span class="badge badge-roth">ROTH CONV</span> Converting <strong style="color:var(--cyan)">${fmtK(tc)}</strong> from pre-tax to Roth (ages ${p.rothConversion?.startAge}-${p.rothConversion?.endAge}). ` : ''; })()}
        ${final > 0
          ? `Portfolio reaches <strong style="color:var(--green)">${fmtK(final)}</strong> at age ${p.endAge}.`
          : `<span style="color:var(--red)">Portfolio depleted at age <strong>${bust}</strong>.</span>`}
        ${(() => {
          const lg = p.legacy || {};
          if (!lg.enabled || !lg.targetAmount) return '';
          return final >= lg.targetAmount
            ? ` <span style="color:var(--green)">&#10003; Legacy goal of ${fmtK(lg.targetAmount)} met -- surplus of ${fmtK(final - lg.targetAmount)}.</span>`
            : ` <span style="color:var(--amber)">! Legacy goal of ${fmtK(lg.targetAmount)} not met -- shortfall of ${fmtK(lg.targetAmount - Math.max(0,final))}.</span>`;
        })()}
        ${(() => {
          const dTotal = proj.reduce((s,y) => s + (y.debtPayments||0), 0);
          return dTotal > 0 ? ` Lifetime debt payments: <strong style="color:var(--red)">${fmtK(dTotal)}</strong>.` : '';
        })()}
        ${(() => {
          const ltTotal = proj.reduce((s,y) => s + (y.ltcCost||0), 0);
          return ltTotal > 0 ? ` Long-term care costs: <strong style="color:var(--pink)">${fmtK(ltTotal)}</strong>.` : '';
        })()}
      </div>
    </div>

    <div class="stats-row">
      <div class="stat"><div class="stat-label">Current Net Worth</div><div class="stat-value" style="color:var(--blue)">${fmtK(totalAcct)}</div></div>
      <div class="stat"><div class="stat-label">Peak Net Worth</div><div class="stat-value" style="color:var(--cyan)">${fmtK(peak)}</div></div>
      <div class="stat"><div class="stat-label">End Net Worth</div><div class="stat-value" style="color:${final>0?'var(--green)':'var(--red)'}">${fmtK(final)}</div></div>
      <div class="stat"><div class="stat-label">Retire Age</div><div class="stat-value" style="color:var(--amber)">${p.retirementAge}</div></div>
      <div class="stat"><div class="stat-label">Money Lasts</div><div class="stat-value" style="color:${bust?'var(--red)':'var(--green)'}">${bust?'Age '+bust:p.endAge+'+'}</div><div class="stat-sub">${bust? 'Runs out': 'Funded'}</div></div>
      <div class="stat"><div class="stat-label">RMDs Start ${tip('Required Minimum Distributions &mdash; the IRS forces you to withdraw (and pay tax on) a minimum amount from pre-tax accounts starting at age 73-75.')}</div><div class="stat-value" style="color:var(--purple)">${rmdStartYr?'Age '+rmdStartYr.age:'N/A'}</div><div class="stat-sub">Peak: ${fmtK(peakRMD)}/yr</div></div>
      <div class="stat"><div class="stat-label">Medicare Surcharges (IRMAA) ${tip('Income-Related Monthly Adjustment Amount &mdash; extra Medicare premiums you pay if your income exceeds certain thresholds. Roth conversions and RMDs can trigger these.')}</div><div class="stat-value" style="color:var(--pink)">${fmtK(totalIRMAA)}</div><div class="stat-sub">Lifetime total</div></div>
      ${(() => {
        const lg = p.legacy || {};
        if (!lg.enabled || !lg.targetAmount) return '';
        const pct = Math.min(100, Math.round(Math.max(0, final) / lg.targetAmount * 100));
        const color = pct >= 100 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';
        const lastYr = proj[proj.length - 1];
        const accts = [{n:'Pre-Tax',v:lastYr.preTax},{n:'Roth',v:lastYr.roth},{n:'Taxable',v:lastYr.taxable}].filter(a => a.v > 0);
        const dominant = accts.length > 0 ? accts.sort((a,b) => b.v - a.v)[0] : null;
        const domHint = dominant ? ' · Mostly ' + dominant.n : '';
        return '<div class="stat"><div class="stat-label">Legacy Goal</div><div class="stat-value" style="color:'+color+'">'+pct+'%</div><div class="stat-sub">' + fmtK(final) + ' / ' + fmtK(lg.targetAmount) + domHint + '</div></div>';
      })()}
    </div>

    ${leversHtml}

    <div class="card max-spend-card" style="padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:14px">&#128200;</span>
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--text)">Maximum Spending</div>
          <div style="font-size:11px;color:var(--text-faint)">Highest retirement spending that keeps your money lasting through age ${p.endAge}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="maxSpendResult" style="font-size:11px;color:var(--text-dim)"></span>
        <button onclick="(function(){
          var el=document.getElementById('maxSpendResult');
          el.textContent='Calculating...';
          setTimeout(function(){
            var r=solveMaxSpending();
            if(!r){el.innerHTML='<span style=color:var(--red)>Not solvable — portfolio cannot sustain even minimal spending</span>';return;}
            var diff=r.maxExpense-state.params.annualExpenses;
            var diffStr=diff>0?'<span style=color:var(--green)>+'+fmtK(diff)+'/yr vs current</span>':'<span style=color:var(--amber)>'+fmtK(diff)+'/yr vs current</span>';
            el.innerHTML='<strong style=color:var(--green);font-size:14px>'+fmt(r.maxExpense)+'/yr</strong> <span style=font-size:11px;color:var(--text-faint)>(today\\'s $) &nbsp;'+diffStr+'</span>';
          },20);
        })()" style="background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:5px 14px;font-size:11px;font-weight:600;color:var(--cyan);cursor:pointer">Calculate</button>
      </div>
    </div>

    ${renderThisYear(proj, p, bust)}

    <div class="grid-2">
      <div class="card" data-accent="blue">${buildChart(proj, nwKeys, nwColors, nwLabels, { title:'Net Worth Over Time', stacked: nwKeys.length > 1, height:180 })}</div>
      <div class="card" data-accent="cyan">${buildChart(proj, ['totalInc','expenses'], ['#06b6d4','#ef4444'], ['Total Income','Expenses'], { title:'Income vs Expenses', height:180 })}</div>
      <div class="card" data-accent="purple">${buildChart(proj, ['tax','rmd'], ['#8b5cf6','#ec4899'], ['Total Tax','RMD Amount'], { title:'Taxes & RMDs', height:160 })}</div>
      <div class="card" data-accent="green">${buildChart(
        proj.filter(y => y.retired).map(y => ({...y, ssTotal: (y.ss||0) + (y.ssdi||0)})),
        ['ssTotal','withdrawal','medicareCost'],
        ['#10b981','#f59e0b','#ec4899'],
        ['SS & SSDI','Withdrawal','Medicare'],
        { title:'Retirement Cash Flows', height:160 }
      )}</div>
    </div>

    ${buildStrategyReport(proj)}`;
}

function renderLifeInsurance(p) {
  const policies = p.lifeInsurance || [];
  let html = `<div class="card" data-accent="blue"><div class="card-title">Life Insurance</div>
    <div style="font-size:13px;color:var(--text-dim);margin-bottom:14px;line-height:1.6">
      Model term or permanent life insurance policies. Premiums are added to annual expenses.
      Death benefits deposit tax-free (IRC &sect;101) into the survivor's brokerage account when the insured dies.
    </div>`;
  if (policies.length === 0) {
    html += `<div style="font-size:13px;color:var(--text-faint);margin-bottom:12px">No policies configured.</div>`;
  }
  for (const li of policies) {
    const isTerm = li.type === 'term';
    const insuredAge = li.insured === 'spouse' ? (p.spouseAge || 0) : p.currentAge;
    const yearsOfPremiums = isTerm
      ? Math.max(0, (li.expiresAge || 75) - insuredAge)
      : Math.max(0, p.endAge - insuredAge);
    const totalPremiums = (li.annualPremium || 0) * yearsOfPremiums;
    html += `<div style="margin-bottom:16px;padding:14px;background:var(--bg-base);border-radius:8px;border:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:13px;font-weight:600;color:var(--text)">${li.name || (isTerm ? 'Term Life' : 'Whole Life')}</div>
        <button onclick="removeLifeIns(${li.id})" style="background:transparent;border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:11px;color:var(--red);cursor:pointer" title="Remove policy">&times; Remove</button>
      </div>
      <div class="grid-2">
        <div class="field"><label class="field-label">Policy Name</label>
          <input type="text" class="field-input" value="${li.name || ''}"
            onchange="setLifeIns(${li.id},'name',this.value)">
        </div>
        <div class="field"><label class="field-label">Insured Person</label>
          <select class="field-input" onchange="setLifeIns(${li.id},'insured',this.value)" style="cursor:pointer">
            <option value="primary"${li.insured==='primary'?' selected':''}>You</option>
            ${(p.spouseEnabled || p.spouseAge > 0) ? '<option value="spouse"' + (li.insured==='spouse'?' selected':'') + '>Spouse</option>' : ''}
          </select>
        </div>
      </div>
      <div class="grid-2">
        <div class="field"><label class="field-label">Policy Type</label>
          <select class="field-input" onchange="setLifeIns(${li.id},'type',this.value)" style="cursor:pointer">
            <option value="term"${li.type==='term'?' selected':''}>Term Life</option>
            <option value="permanent"${li.type==='permanent'?' selected':''}>Permanent (Whole/Universal)</option>
          </select>
        </div>
        <div class="field"><label class="field-label">Death Benefit</label>
          <div class="field-wrap"><span class="field-prefix">$</span>
            <input type="text" inputmode="decimal" class="field-input has-prefix"
              value="${fmtC(li.deathBenefit||0)}"
              onfocus="this.value=this.value.replace(/,/g,'')"
              onblur="this.value=fmtC(parseC(this.value))"
              onchange="setLifeIns(${li.id},'deathBenefit',parseC(this.value))">
          </div>
          <div class="field-help">Tax-free lump sum paid to beneficiary at death</div>
        </div>
      </div>
      <div class="grid-2">
        <div class="field"><label class="field-label">Annual Premium</label>
          <div class="field-wrap"><span class="field-prefix">$</span>
            <input type="text" inputmode="decimal" class="field-input has-prefix"
              value="${fmtC(li.annualPremium||0)}"
              onfocus="this.value=this.value.replace(/,/g,'')"
              onblur="this.value=fmtC(parseC(this.value))"
              onchange="setLifeIns(${li.id},'annualPremium',parseC(this.value))">
          </div>
          <div class="field-help">Level annual premium (not inflation-adjusted)</div>
        </div>
        ${isTerm ? `
        <div class="field"><label class="field-label">Policy Expires at Age</label>
          <input type="number" class="field-input" value="${li.expiresAge||75}"
            onchange="setLifeIns(${li.id},'expiresAge',Number(this.value))">
          <div class="field-help">Coverage and premiums end at this age. No payout if alive.</div>
        </div>` : `
        <div class="field"><label class="field-label">Beneficiary</label>
          <select class="field-input" onchange="setLifeIns(${li.id},'beneficiary',this.value)" style="cursor:pointer">
            <option value="spouse"${(li.beneficiary||'spouse')==='spouse'?' selected':''}>Surviving Spouse</option>
            <option value="estate"${li.beneficiary==='estate'?' selected':''}>Estate</option>
          </select>
        </div>`}
      </div>
      <div class="grid-2" style="margin-top:10px">
        <div class="info-box">
          <div class="info-box-label">Total Premiums</div>
          <div class="info-box-value" style="color:var(--red)">${fmtK(totalPremiums)}</div>
          <div style="font-size:11px;color:var(--text-faint);margin-top:4px">~${yearsOfPremiums} years at ${fmt(li.annualPremium||0)}/yr</div>
        </div>
        <div class="info-box">
          <div class="info-box-label">Net Benefit</div>
          <div class="info-box-value" style="color:var(--green)">${fmtK(Math.max(0, (li.deathBenefit||0) - totalPremiums))}</div>
          <div style="font-size:11px;color:var(--text-faint);margin-top:4px">Death benefit minus total premiums paid</div>
        </div>
      </div>
    </div>`;
  }
  html += `<button onclick="addLifeIns()" style="width:100%;padding:10px;background:transparent;border:1px dashed var(--border-active);border-radius:8px;color:var(--blue);font-size:13px;cursor:pointer;margin-top:8px">+ Add Life Insurance Policy</button>`;

  if (state.inputTab === 'debts') {

  if (state.inputTab === 'healthcare') {

    const acaPreview = calcACASubsidy(acaPreviewIncome, acaPreviewBenchmark, acaHHSize, 0, acaPreviewYear);
    // Estimate total HC cost for info box (source-aware)
    const totalHC = (() => {

            </button>`;

            ${hf('Healthcare Inflation','inflation',{suffix:'%',def:hcDef.inf,help:'Medical costs typically inflate at 5-7%/year'})}

                  ${[1,2,3,4,5,6].map(n => `<option value="${n}" ${(hc.acaHouseholdSize||0)===n||(!(hc.acaHouseholdSize>0)&&n===(isCouple?2:1))?'selected':''}>${n} person${n>1?'s':''}</option>`).join('')}
                </select>
              </div><div class="field-help">You + spouse + dependents on the plan</div></div>
              <div class="field"><label class="field-label">Benchmark Premium Override</label><div class="field-wrap">

  if (state.inputTab === 'rothconv') {

      const acaSubsidyDiff = acaSubsidyWith - acaSubsidyWithout; // negative = conversions reduced subsidies
      const hasACAYears = projWith.some(y => y.acaSubsidy > 0) || projWithout.some(y => y.acaSubsidy > 0);

      // Breakeven ("catch-up") age: when tax-adjusted NW with conversions overtakes without
      // Tax-adjusted NW = portfolio value minus cumulative lifetime taxes paid.
      // This captures the real cost: conversions pay taxes upfront, reducing spendable wealth

      let breakevenAge = null;
      let cumTaxWith = 0, cumTaxWithout = 0;
      const convStartIdx = projWith.findIndex(y => y.rothConv > 0);
