// Student's t-distribution random number generator (for Stress Test model)
// df = degrees of freedom. Lower df = fatter tails. df=5 used for stress testing.
function randT(df) {
  const u1 = Math.random(), u2 = Math.random();
  const z = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
  let chi2 = 0;
  for (let i = 0; i < df; i++) {
    const a = Math.random(), b = Math.random();
    const n = Math.sqrt(-2 * Math.log(a)) * Math.cos(2 * Math.PI * b);
    chi2 += n * n;
  }
  return z / Math.sqrt(chi2 / df);
}

// -- Employer 401(k) Match ------------------------------------------
// Computes the employer match contribution for a given year.
// matchCfg: { enabled, formula, customPct, customCap, vesting, vestingYears }
// salary: gross earned income for this person this year
// employeeContrib: the employee's own 401k contribution this year
// yearsOfService: years since the person started working (yr index)
// limInf: inflation multiplier for IRC §415 limit scaling
function calcEmployerMatch(matchCfg, salary, employeeContrib, yearsOfService, limInf) {
  if (!matchCfg || !matchCfg.enabled || salary <= 0 || employeeContrib <= 0) return 0;
  // Parse formula
  let matchPct, capPct;
  const f = matchCfg.formula || '50_6';
  if (f === 'custom') {
    matchPct = (matchCfg.customPct || 50) / 100;
    capPct = (matchCfg.customCap || 6) / 100;
  } else if (f === 'dollar_for_dollar') {
    matchPct = 1.0;
    capPct = (matchCfg.customCap || 6) / 100;
  } else {
    // Standard formulas: "50_6", "100_3", "100_4", "100_6"
    const parts = f.split('_');
    matchPct = parseInt(parts[0]) / 100;
    capPct = parseInt(parts[1]) / 100;
  }
  // Employer matches matchPct of employee contributions, up to capPct of salary
  const maxMatchable = salary * capPct;
  const matchableContrib = Math.min(employeeContrib, maxMatchable);
  let match = Math.round(matchableContrib * matchPct);
  // IRC §415(c) limit: total employee + employer cannot exceed the annual addition limit
  const limit415 = Math.round(TOTAL_ANNUAL_ADDITION * limInf);
  match = Math.min(match, Math.max(0, limit415 - employeeContrib));
  // Vesting
  const vest = matchCfg.vesting || 'immediate';
  if (vest === 'immediate') {
    // 100% vested immediately
  } else if (vest === 'cliff') {
    // 0% until vestingYears, then 100%
    const cliffYrs = matchCfg.vestingYears || 3;
    if (yearsOfService < cliffYrs) match = 0;
  } else if (vest === 'graded') {
    // Linear vesting over vestingYears (e.g., 20% per year over 5 years)
    const gradeYrs = matchCfg.vestingYears || 5;
    const vestedPct = Math.min(1, yearsOfService / gradeYrs);
    match = Math.round(match * vestedPct);
  }
  return match;
}

// -- Main Projection Engine ----------------------------------------

function runProjection(p) {
  const hasSequences = p._returnSeq && p._inflationSeq;
  const years = [];
  let preTax = p.accounts.filter(a => a.type === 'pretax').reduce((s, a) => s + a.balance, 0);
  let roth = p.accounts.filter(a => a.type === 'roth').reduce((s, a) => s + a.balance, 0);
  let cash = p.accounts.filter(a => a.type === 'taxable' && a.subtype === 'cash').reduce((s, a) => s + a.balance, 0);
  let taxableInv = p.accounts.filter(a => a.type === 'taxable' && a.subtype !== 'cash').reduce((s, a) => s + a.balance, 0);
  let taxableBasis = (p.brokerageCostBasis !== undefined)
    ? Math.min(p.brokerageCostBasis, taxableInv)  // clamp: basis can't exceed balance
    : null;  // null = not tracking, use fallback fraction
  let taxable = cash + taxableInv; // combined for backward compat
  let hsa = p.accounts.filter(a => a.type === 'hsa').reduce((s, a) => s + a.balance, 0);
  let gkCurrentSpend = null; // Guyton-Klinger: tracks nominal spending, initialized at retirement

  // Per-account return rates (Feature #7) -- compute weighted average per type
  const weightedReturn = (type, subtype) => {
    const accts = p.accounts.filter(a => a.type === type && (subtype === undefined || (subtype === 'cash' ? a.subtype === 'cash' : a.subtype !== 'cash')));
    const totalBal = accts.reduce((s,a) => s + a.balance, 0);
    if (totalBal <= 0) return type === 'taxable' && subtype === 'cash' ? 4 : p.nominalReturn;
    return accts.reduce((s,a) => s + (a.returnRate !== undefined ? a.returnRate : p.nominalReturn) * a.balance, 0) / totalBal;
  };
  const ptReturn = weightedReturn('pretax');
  const rReturn = weightedReturn('roth');
  const cashReturn = weightedReturn('taxable', 'cash');
  const tInvReturn = weightedReturn('taxable', 'investment');
  const hsaReturn = weightedReturn('hsa');

  // Bear market per-year return overrides — replaces type-level returns during crash window
  const weightedBearReturn = (type, ovr, subtype) => {
    const accts = p.accounts.filter(a => a.type === type && (subtype === undefined || (subtype === 'cash' ? a.subtype === 'cash' : a.subtype !== 'cash')));
    const totalBal = accts.reduce((s,a) => s + a.balance, 0);
    if (totalBal <= 0) return type === 'taxable' && subtype === 'cash' ? 4 : p.nominalReturn;
    return accts.reduce((s,a) => s + (ovr[a.id] !== undefined ? ovr[a.id] : (a.returnRate !== undefined ? a.returnRate : p.nominalReturn)) * a.balance, 0) / totalBal;
  };

  const birthYear = p.birthYear || (new Date().getFullYear() - p.currentAge);
  const rmdStart = rmdStartAge(birthYear);
  const ssBirthYear = birthYear;
  const spBirthYear = p.spouseBirthYear || (p.spouseAge ? new Date().getFullYear() - p.spouseAge : birthYear);

  const survivorMode = p.survivorWho && p.survivorAge;
  const spouseDiesAge = survivorMode && p.survivorWho === 'spouse' ? p.survivorAge : null;
  const primaryDiesAge = survivorMode && p.survivorWho === 'primary' ? p.survivorAge : null;
  const expenseReduction = p.survivorExpenseReduction || 30;

  // SSDI (Feature #1)
  const ssdi1 = p.ssdiPrimary || {};
  const ssdi2 = p.ssdiSpouse || {};

  // SSDI auto-converts to regular SS at FRA. Recipients cannot choose a different claim age.
  // Effective claim age = endAge+1 (the age when SSDI stops and SS begins)
  const effectivePrimarySSClaimAge = ssdi1.enabled ? (ssdi1.endAge || 66) + 1 : p.ssClaimAge;
  const effectiveSpouseSSClaimAge = ssdi2.enabled ? (ssdi2.endAge || 66) + 1 : (p.spouseSSClaimAge || 67);

  // Medicare eligibility: SSDI recipients qualify after 24-month qualifying period
  // Normal Medicare starts at 65; SSDI recipients get it at SSDI start age + 2 (if earlier)
  const primaryMedicareAge = ssdi1.enabled ? Math.min((ssdi1.startAge || 0) + 2, 65) : 65;
  const spouseMedicareAge = ssdi2.enabled ? Math.min((ssdi2.startAge || 0) + 2, 65) : 65;

  for (let age = p.currentAge; age <= p.endAge; age++) {
    const yr = age - p.currentAge;
    taxable = cash + taxableInv; // keep combined taxable in sync
    const spAge = (p.spouseEnabled || p.spouseAge > 0) ? (p.spouseAge || 0) + yr : null;

    // Feature #8: partial year retirement
    const retireMonth = p.retireMonth || 0;
    const retired = age > p.retirementAge || (age === p.retirementAge && retireMonth === 0);
    const partialRetire = age === p.retirementAge && retireMonth > 0;
    const effectivelyRetired = retired || partialRetire;
    const spouseRetireMonth = p.spouseRetireMonth || 0;
    const spRetired = spAge && (spAge > p.spouseRetirementAge || (spAge === p.spouseRetirementAge && spouseRetireMonth === 0));
    const spPartialRetire = spAge && spAge === p.spouseRetirementAge && spouseRetireMonth > 0;

    const spouseDead = spouseDiesAge && age >= spouseDiesAge;
    const primaryDead = primaryDiesAge && age >= primaryDiesAge;
    const hasSpouse = p.spouseEnabled || (p.spouseAge && p.spouseAge > 0);
    const isSingle = !hasSpouse || spouseDead || primaryDead;
    const lostSpouse = spouseDead || primaryDead; // spouse died during projection (for expense reduction)

    const incGrow = p.incomeGrowth || 0;
    const savGrow = p.savingsGrowth || 0;
    const spIncGrow = p.spouseIncomeGrowth !== undefined ? p.spouseIncomeGrowth : incGrow;
    const spSavGrow = p.spouseSavingsGrowth !== undefined ? p.spouseSavingsGrowth : savGrow;
    const incomeAtYear = p.annualIncome * Math.pow(1 + incGrow / 100, yr);
    const spouseIncomeAtYear = (p.spouseIncome || 0) * Math.pow(1 + spIncGrow / 100, yr);
    const savingsAtYear = p.annualSavings * Math.pow(1 + savGrow / 100, yr);
    const spSavingsAtYear = (p.spouseSavings || 0) * Math.pow(1 + spSavGrow / 100, yr);

    let primaryEarned = retired ? 0 : (partialRetire ? incomeAtYear * (retireMonth / 12) : incomeAtYear);
    if (primaryDead) primaryEarned = 0;
    let spouseEarned = 0;
    if (p.spouseAge && !spouseDead) {
      if (!spRetired && !spPartialRetire) spouseEarned = spouseIncomeAtYear;
      else if (spPartialRetire) spouseEarned = spouseIncomeAtYear * (spouseRetireMonth / 12);
    }
    let earned = primaryEarned + spouseEarned;

    // Feature #1: SSDI
    let ssdiIncome = 0;
    if (ssdi1.enabled && age >= (ssdi1.startAge||0) && age <= (ssdi1.endAge||66) && !primaryDead) ssdiIncome += (ssdi1.monthlyAmount||0) * 12;
    if (ssdi2.enabled && spAge && spAge >= (ssdi2.startAge||0) && spAge <= (ssdi2.endAge||66) && !spouseDead) ssdiIncome += (ssdi2.monthlyAmount||0) * 12;

    // SS with survivor benefits -- supports manual monthly entry from SSA statement
    let ss = 0;
    let ssWithheld = 0; // SS earnings test withholding (both spouses combined)
    // For SSDI recipients, SS auto-converts at FRA — use effective claim age, not user setting
    const primarySSResult = p.ssUseManual && p.ssManualMonthly > 0
      ? (() => {
          const by = p.birthYear || ssBirthYear;
          const fraM = fraMonths(by);
          const adj = ssaAdjustPIA(p.ssManualMonthly, effectivePrimarySSClaimAge * 12, fraM);
          return { annual: adj * 12, monthly: adj, fra: fraM / 12, aime: 0, piaMonthly: p.ssManualMonthly };
        })()
      : estimateSS({ avgIncome: p.ssAnnualIncome || p.annualIncome, claimAge: effectivePrimarySSClaimAge, birthYear: ssBirthYear, useDetailed: p.useDetailedSS, earningsHistory: p.earningsHistory });

    const spouseHasSS = p.spouseSSUseManual ? (p.spouseSSManualMonthly > 0) : (p.spouseSSIncome > 0 || ssdi2.enabled);
    const spouseSSResult = p.spouseSSUseManual && p.spouseSSManualMonthly > 0
      ? (() => {
          const by = p.spouseBirthYear || spBirthYear;
          const fraM = fraMonths(by);
          const adj = ssaAdjustPIA(p.spouseSSManualMonthly, effectiveSpouseSSClaimAge * 12, fraM);
          return { annual: adj * 12, monthly: adj, fra: fraM / 12, aime: 0, piaMonthly: p.spouseSSManualMonthly };
        })()
      : (p.spouseSSIncome ? estimateSS({ avgIncome: p.spouseSSIncome, claimAge: effectiveSpouseSSClaimAge, birthYear: spBirthYear }) : { annual: 0, fra: 67 });

    const primaryOnSSDI = ssdi1.enabled && age >= (ssdi1.startAge||0) && age <= (ssdi1.endAge||66);
    const spouseOnSSDI = ssdi2.enabled && spAge && spAge >= (ssdi2.startAge||0) && spAge <= (ssdi2.endAge||66);

    // Compute survivor benefit amounts (based on deceased's PIA, not claim-adjusted amount)
    // If deceased died BEFORE their claim age, survivor gets 100% of PIA
    // If deceased died AFTER claiming, survivor gets the actual benefit amount (with delayed credits)
    // PIA: use SS result if available, fall back to SSDI monthly amount (SSDI ≈ PIA for disabled workers)
    const primaryPIA = primarySSResult.piaMonthly ? primarySSResult.piaMonthly * 12
      : primarySSResult.annual > 0 ? primarySSResult.annual
      : ssdi1.enabled ? (ssdi1.monthlyAmount || 0) * 12 : 0;
    const spousePIA = spouseSSResult.piaMonthly ? spouseSSResult.piaMonthly * 12
      : spouseSSResult.annual > 0 ? spouseSSResult.annual
      : ssdi2.enabled ? (ssdi2.monthlyAmount || 0) * 12 : 0;

    function getSurvivorBenefit(deceasedPIA, deceasedClaimAge, deceasedFRA, deceasedSSResult, deathAge, survivorAge, survivorFRA, colaRate) {
      // What the deceased was actually receiving (or would have received)
      let deceasedBenefit;
      if (deathAge < deceasedClaimAge) {
        // Died before claiming -- survivor gets 100% of deceased PIA
        deceasedBenefit = deceasedPIA;
      } else {
        // Died after claiming -- survivor gets what deceased was receiving (including delayed credits)
        deceasedBenefit = deceasedSSResult.annual;
      }
      // Survivor reduction: full benefit at survivor's FRA, reduced if claimed early (min age 60)
      let survivorFactor = 1.0;
      if (survivorAge < survivorFRA) {
        // Reduced by ~0.396% per month before FRA (max 28.5% reduction at age 60 for FRA 67)
        const monthsEarly = Math.round((survivorFRA - Math.max(survivorAge, 60)) * 12);
        survivorFactor = 1 - monthsEarly * 0.00396;
        survivorFactor = Math.max(survivorFactor, 0.715); // floor at 71.5%
      }
      // Apply COLA from deceased's FRA (benefits grow even before being claimed)
      const colaYrs = Math.max(0, survivorAge - deceasedFRA);
      const withCOLA = Math.round(deceasedBenefit * survivorFactor * Math.pow(1 + colaRate / 100, colaYrs));
      return withCOLA;
    }

    const projYear = new Date().getFullYear() + yr;
    if (!primaryDead && !spouseDead) {
      // Both alive -- normal SS logic
      if (age >= effectivePrimarySSClaimAge && !primaryOnSSDI) {
        let pSS = primarySSResult.annual;
        const colaYrs = Math.max(0, age - Math.max(effectivePrimarySSClaimAge, primarySSResult.fra));
        pSS = Math.round(pSS * Math.pow(1 + (p.ssCOLA || 2) / 100, colaYrs));
        // Earnings test: withhold if claiming before FRA and still earning
        const pWithheld = calcSSEarningsTest(pSS, primaryEarned, age, primarySSResult.fra, projYear, false);
        ssWithheld += pWithheld;
        ss += pSS - pWithheld;
      }
      if (spAge && spAge >= effectiveSpouseSSClaimAge && spouseHasSS && !spouseOnSSDI) {
        let spSS = spouseSSResult.annual;
        const colaYrs = Math.max(0, spAge - Math.max(effectiveSpouseSSClaimAge, spouseSSResult.fra));
        spSS = Math.round(spSS * Math.pow(1 + (p.ssCOLA || 2) / 100, colaYrs));
        const spWithheld = calcSSEarningsTest(spSS, spouseEarned, spAge, spouseSSResult.fra, projYear, false);
        ssWithheld += spWithheld;
        ss += spSS - spWithheld;
      }
    } else if (spouseDead) {
      // Spouse died -- primary is survivor
      const svClaimAge = p.survivorSSClaimAge || 60;
      const deathAge = spouseDiesAge; // age of primary when spouse died

      // Phase 1: Survivor benefit (can start at svClaimAge, independent of own SS)
      let survivorBen = 0;
      if (age >= svClaimAge && spouseHasSS) {
        survivorBen = getSurvivorBenefit(
          spousePIA, effectiveSpouseSSClaimAge, spouseSSResult.fra, spouseSSResult,
          deathAge - (p.currentAge - (p.spouseAge||0)), // spouse's age at death
          age, primarySSResult.fra, p.ssCOLA || 2
        );
      }

      // Phase 2: Own SS (at own claim age)
      let ownSS = 0;
      if (age >= effectivePrimarySSClaimAge && !primaryOnSSDI) {
        ownSS = primarySSResult.annual;
        const colaYrs = Math.max(0, age - Math.max(effectivePrimarySSClaimAge, primarySSResult.fra));
        ownSS = Math.round(ownSS * Math.pow(1 + (p.ssCOLA || 2) / 100, colaYrs));
      }

      // SSDI interaction: if primary is on SSDI, they get max(SSDI, survivorBen)
      // The SSDI amount is already in ssdiIncome; SS should be the additional amount if survivor > SSDI
      if (primaryOnSSDI) {
        const ssdiAmt = (ssdi1.monthlyAmount||0) * 12;
        if (survivorBen > ssdiAmt) {
          // SSA pays the difference on top of SSDI
          ss = survivorBen - ssdiAmt;
        }
        // else: SSDI is higher, no additional SS
      } else {
        // Not on SSDI -- take the higher of own SS vs survivor benefit
        // Strategy: before own claim age, get survivor only; at/after own claim age, get max
        if (age < effectivePrimarySSClaimAge) {
          ss = survivorBen; // survivor benefit as bridge before own SS kicks in
        } else {
          ss = Math.max(ownSS, survivorBen);
        }
        // Earnings test on primary's SS/survivor benefit
        if (ss > 0 && age < primarySSResult.fra) {
          const w = calcSSEarningsTest(ss, primaryEarned, age, primarySSResult.fra, projYear, false);
          ssWithheld += w; ss -= w;
        }
      }

    } else if (primaryDead) {
      // Primary died -- spouse is survivor
      const svClaimAge = p.spouseSurvivorSSClaimAge || 60;
      const deathAge = primaryDiesAge; // primary's age at death

      // Phase 1: Survivor benefit from deceased primary's record
      let survivorBen = 0;
      if (spAge && spAge >= svClaimAge) {
        survivorBen = getSurvivorBenefit(
          primaryPIA, effectivePrimarySSClaimAge, primarySSResult.fra, primarySSResult,
          deathAge, // primary's age at death
          spAge, spouseSSResult.fra, p.ssCOLA || 2
        );
      }

      // Phase 2: Spouse's own SS (at spouse's claim age)
      let ownSS = 0;
      if (spAge && spAge >= effectiveSpouseSSClaimAge && spouseHasSS && !spouseOnSSDI) {
        ownSS = spouseSSResult.annual;
        const colaYrs = Math.max(0, spAge - Math.max(effectiveSpouseSSClaimAge, spouseSSResult.fra));
        ownSS = Math.round(ownSS * Math.pow(1 + (p.ssCOLA || 2) / 100, colaYrs));
      }

      // SSDI interaction: if spouse is on SSDI, they get max(SSDI, survivorBen)
      if (spouseOnSSDI) {
        const ssdiAmt = (ssdi2.monthlyAmount||0) * 12;
        if (survivorBen > ssdiAmt) {
          ss = survivorBen - ssdiAmt; // SSA pays the difference
        }
      } else {
        // Not on SSDI -- take higher of own SS vs survivor benefit
        if (spAge < effectiveSpouseSSClaimAge) {
          ss = survivorBen; // survivor benefit as bridge
        } else {
          ss = Math.max(ownSS, survivorBen);
        }
        // Earnings test on spouse's SS/survivor benefit
        if (ss > 0 && spAge < spouseSSResult.fra) {
          const w = calcSSEarningsTest(ss, spouseEarned, spAge, spouseSSResult.fra, projYear, false);
          ssWithheld += w; ss -= w;
        }
      }
    }

    // SS Trust Fund Reduction: apply after all SS computation, before other income
    const sstf = p.ssTrustFundReduction;
    if (sstf && sstf.enabled && projYear >= (sstf.startYear || 2034) && ss > 0) {
      const reductionFactor = 1 - (sstf.reductionPct || 20) / 100;
      ss = Math.round(ss * reductionFactor);
    }

    let ordinaryIncomeEvents = 0; // populated in cashEvents loop below

    // Pension / Annuity income — survivor-benefit-aware (v2.0)
    let pensionIncome = 0;
    let pensionTaxable = 0;
    const pen1 = p.pension || {};
    const pen2 = p.spousePension || {};
    const survivorPct = { none: 0, joint50: 0.5, joint75: 0.75, joint100: 1.0 };
    // Primary's pension
    if (pen1.enabled && age >= (pen1.startAge || 65)) {
      const penYrs = Math.max(0, age - (pen1.startAge || 65));
      const fullAmt = (pen1.annualAmount || 0) * Math.pow(1 + (pen1.cola || 0) / 100, penYrs);
      if (!primaryDead) {
        pensionIncome += fullAmt;
        pensionTaxable += fullAmt * (pen1.taxablePercent ?? 100) / 100;
      } else if (!spouseDead && (survivorPct[pen1.survivorBenefit] || 0) > 0) {
        // Primary died: surviving spouse gets survivor portion
        pensionIncome += fullAmt * survivorPct[pen1.survivorBenefit];
        pensionTaxable += fullAmt * survivorPct[pen1.survivorBenefit] * (pen1.taxablePercent ?? 100) / 100;
      }
    }
    // Spouse's pension
    if (pen2.enabled && spAge && spAge >= (pen2.startAge || 65)) {
      const penYrs = Math.max(0, spAge - (pen2.startAge || 65));
      const fullAmt = (pen2.annualAmount || 0) * Math.pow(1 + (pen2.cola || 0) / 100, penYrs);
      if (!spouseDead) {
        pensionIncome += fullAmt;
        pensionTaxable += fullAmt * (pen2.taxablePercent ?? 100) / 100;
      } else if (!primaryDead && (survivorPct[pen2.survivorBenefit] || 0) > 0) {
        // Spouse died: surviving primary gets survivor portion
        pensionIncome += fullAmt * survivorPct[pen2.survivorBenefit];
        pensionTaxable += fullAmt * survivorPct[pen2.survivorBenefit] * (pen2.taxablePercent ?? 100) / 100;
      }
    }
    pensionIncome = Math.round(pensionIncome);
    pensionTaxable = Math.round(pensionTaxable);

    // One-Time Income Events (asset sales + ordinary income)
    let cashEventGains = 0, cashEventNet = 0;
    const events = p.cashEvents || [];
    for (const ev of events) {
      if (age !== ev.age) continue;
      // Whose check: skip if person is dead or not applicable
      const isSpouseEvent = ev.whose === 'spouse';
      const isJoint = ev.whose === 'joint';
      if (isSpouseEvent && !p.spouseEnabled) continue;
      if (!isSpouseEvent && !isJoint && primaryDead) continue;
      if (isSpouseEvent && spouseDead) continue;
      if (isJoint && (primaryDead || spouseDead)) continue;
      if ((ev.eventCategory || 'asset_sale') === 'ordinary_income') {
        // Ordinary income: full amount taxed as ordinary income, deposited to destination
        const amt = Math.round(ev.amount || 0);
        ordinaryIncomeEvents += amt;
        if (ev.destination === 'cash') cash += amt;
        else { taxableInv += amt; if (taxableBasis !== null) taxableBasis += amt; }
      } else {
        // Asset sale: existing logic unchanged
        const net = Math.round((ev.grossAmount || 0) * (ev.netPercent || 100) / 100);
        if (ev.costBasis !== undefined) {
          let gain = Math.max(0, net - (ev.costBasis || 0));
          if (ev.type === 'primary_home') {
            const exclusion = isSingle ? 250000 : 500000;
            gain = Math.max(0, gain - exclusion);
          }
          cashEventGains += gain;
        }
        cashEventNet += net;
        if (ev.destination === 'cash') cash += net;
        else { taxableInv += net; if (taxableBasis !== null) taxableBasis += net; }
      }
    }
    // Recurring income streams (replaces additionalIncome)
    let other = ordinaryIncomeEvents; // ordinary_income cashEvents already computed above
    let qualifiedDividends = 0;       // taxed at LTCG rates
    let streams = p.incomeStreams || [];
    // Backward compat: if no streams but legacy additionalIncome exists, create virtual stream
    if (streams.length === 0 && (p.additionalIncome || 0) > 0) {
      streams = [{ name: 'Additional Income', amount: p.additionalIncome,
        startAge: p.additionalIncomeStartAge || p.retirementAge, endAge: p.additionalIncomeEndAge || p.endAge,
        whose: 'primary', taxTreatment: 'ordinary', inflation: 0 }];
    }
    for (const s of streams) {
      if (age < (s.startAge || 0) || age > (s.endAge || p.endAge)) continue;
      if (s.whose === 'spouse' && (!p.spouseEnabled || spouseDead)) continue;
      if (s.whose === 'primary' && primaryDead) continue;
      if (s.whose === 'joint' && (primaryDead || spouseDead)) continue;
      const yrs = age - (s.startAge || 0);
      const amt = Math.round((s.amount || 0) * Math.pow(1 + (s.inflation || 0) / 100, yrs));
      if (s.taxTreatment === 'qualified_dividend') {
        qualifiedDividends += amt;
      } else if (s.taxTreatment === 'nonqualified_dividend') {
        other += amt;
      } else {
        other += amt;
      }
    }
    const totalInc = earned + ss + ssdiIncome + other + pensionIncome + qualifiedDividends;

    // Expense phases (new): active -> later -> late retirement
    let expMultiplier = 1;
    if (lostSpouse) expMultiplier = 1 - expenseReduction / 100;
    const ep = p.expensePhases || {};
    if (ep.enabled && effectivelyRetired) {
      if (age >= (ep.lateAge || 85)) expMultiplier *= (ep.lateMultiplier || 95) / 100;
      else if (age >= (ep.laterAge || 75)) expMultiplier *= (ep.laterMultiplier || 85) / 100;
    }
    let expenses;
    if (!effectivelyRetired && p.preRetirementExpenses > 0) {
      // Pre-retirement: use separate expense amount with its own inflation rate
      // Note: expMultiplier (expense phases, survivor reduction) doesn't apply pre-retirement
      const preRetInf = p.preRetirementExpenseInflation !== undefined ? p.preRetirementExpenseInflation : p.inflation;
      expenses = p.preRetirementExpenses * Math.pow(1 + preRetInf / 100, yr);
    } else if (p.expenseMode === 'percent' && effectivelyRetired) {
      expenses = (preTax + roth + taxable) * (p.withdrawalRate || 4) / 100 * expMultiplier;
    } else if (p.expenseMode === 'vpw' && effectivelyRetired) {
      const totalPortfolio = preTax + roth + taxable;
      const remainingYears = Math.max(1, p.endAge - age + 1);
      const vpwRate = 1 / remainingYears;
      let vpwExpenses = totalPortfolio * vpwRate;
      // Apply spending floor (inflation-adjusted)
      const vpwFloor = (p.vpwFloor || 0) * Math.pow(1 + p.inflation / 100, yr);
      if (vpwFloor > 0 && vpwExpenses < vpwFloor) vpwExpenses = vpwFloor;
      expenses = vpwExpenses * expMultiplier;
    } else if (p.expenseMode === 'guardrails' && effectivelyRetired) {
      const totalPortfolio = preTax + roth + taxable;
      // Initialize at retirement: start from annualExpenses inflated to retirement
      if (gkCurrentSpend === null) {
        const yrsToRetire = Math.max(0, p.retirementAge - p.currentAge);
        gkCurrentSpend = p.annualExpenses * Math.pow(1 + p.inflation / 100, yrsToRetire);
      }
      const lowerGuardrail = (p.gkLowerGuardrail || 3.0) / 100;
      const upperGuardrail = (p.gkUpperGuardrail || 5.5) / 100;
      const adjustment = (p.gkAdjustment || 10) / 100;
      // Apply inflation first, then check guardrails
      let proposedSpend = gkCurrentSpend * (1 + p.inflation / 100);
      if (totalPortfolio > 0) {
        const currentRate = proposedSpend / totalPortfolio;
        if (currentRate < lowerGuardrail) {
          // Prosperity rule: raise spending
          proposedSpend = gkCurrentSpend * (1 + adjustment);
        } else if (currentRate > upperGuardrail) {
          // Capital preservation rule: cut spending, no inflation this year
          proposedSpend = gkCurrentSpend * (1 - adjustment);
        }
      }
      gkCurrentSpend = proposedSpend;
      expenses = gkCurrentSpend * expMultiplier;
    } else {
      expenses = p.annualExpenses * Math.pow(1 + p.inflation / 100, yr) * expMultiplier;
    }

    // Pre-Medicare healthcare: source-aware cost between retirement and Medicare eligibility
    // SSDI recipients qualify for Medicare after 24-month waiting period (before age 65)
    let healthcareCost = 0;
    let acaSubsidy = 0, acaFPLPercent = 0, acaBenchmark = 0, acaNetPremium = 0;
    const hc = p.preMedicareHealthcare || {};
    // Pre-Medicare gap uses primary's Medicare age (their healthcare gap)
    const primaryMedCoverageAge = primaryDead ? spouseMedicareAge : primaryMedicareAge;
    if (hc.enabled && effectivelyRetired && age < primaryMedCoverageAge) {
      const hcStart = Math.ceil(p.retirementAge);
      if (age >= hcStart) {
        const hcYrs = age - hcStart;
        const src = hc.source || 'aca';
        const inf = (hc.inflation || 5) / 100;
        if (src === 'cobra') {
          // COBRA two-phase: COBRA period then follow-up source
          const cobraYrs = (hc.cobraDuration || 18) / 12;
          if (hcYrs < cobraYrs) {
            healthcareCost = Math.round((hc.annualCost || 18000) * Math.pow(1 + inf, hcYrs));
          } else {
            // Follow-up phase: cost inflates from hcStart (not from COBRA end)
            const fuCost = hc.cobraFollowUpCost || hc.annualCost || 18000;
            const fuInf = (hc.cobraFollowUpInflation || hc.inflation || 5) / 100;
            healthcareCost = Math.round(fuCost * Math.pow(1 + fuInf, hcYrs));
          }
        } else if (src === 'spouse_plan') {
          // Spouse plan until spouse retires, then follow-up
          const spRetAge = p.spouseRetirementAge || 65;
          const spouseStillWorking = spAge && spAge < spRetAge;
          if (spouseStillWorking) {
            healthcareCost = Math.round((hc.annualCost || 6000) * Math.pow(1 + inf, hcYrs));
          } else {
            const fuCost = hc.spousePlanFollowUpCost || hc.annualCost || 18000;
            const fuInf = (hc.spousePlanFollowUpInflation || hc.inflation || 5) / 100;
            healthcareCost = Math.round(fuCost * Math.pow(1 + fuInf, hcYrs));
          }
        } else if (src === 'va') {
          healthcareCost = 0; // VA: zero or near-zero cost
        } else if (src === 'aca') {
          // ACA Marketplace: dynamic subsidy based on projected MAGI (v1.9)
          // Full MAGI depends on withdrawals/conversions not yet computed (circular dependency).
          // Use prior year's stored MAGI as proxy (stable approximation for retirees).
          // Year 0: estimate from available income components only.
          const priorYr = yr > 0 && years[yr - 1] ? years[yr - 1] : null;
          const acaMAGI = priorYr ? priorYr.magi
            : (earned + ssdiIncome + pensionTaxable + other + calcTaxableSS(ss, earned + ssdiIncome + pensionTaxable + other, isSingle));
          const householdSize = hc.acaHouseholdSize || ((p.spouseEnabled || (p.spouseAge && p.spouseAge > 0)) ? 2 : 1);
          const acaRules = hc.acaSubsidyRules || 'auto';
          const useEnhancedOverride = acaRules === 'enhanced' ? true : acaRules === 'original' ? false : null;
          const effectiveYear = useEnhancedOverride === true ? 2025 : useEnhancedOverride === false ? 2026 : projYear;
          const hcInfRate = (hc.inflation || 5) / 100;
          const benchmark = hc.acaBenchmarkOverride > 0
            ? Math.round(hc.acaBenchmarkOverride * Math.pow(1 + hcInfRate, yr))
            : estimateSLCSP(age, householdSize > 1, yr, hc.inflation);
          const acaResult = calcACASubsidy(acaMAGI, benchmark, householdSize, yr, effectiveYear);
          healthcareCost = acaResult.netPremium;
          acaSubsidy = acaResult.subsidy;
          acaFPLPercent = acaResult.fplPercent;
          acaBenchmark = benchmark;
          acaNetPremium = acaResult.netPremium;
        } else {
          // retiree_plan, other: simple inflation from base cost
          healthcareCost = Math.round((hc.annualCost || 18000) * Math.pow(1 + inf, hcYrs));
        }
        expenses += healthcareCost;
      }
    }
    // Household Medicare start: when first person qualifies (spouse SSDI can trigger earlier)
    // Convert spouse Medicare age to primary's age scale for comparison
    const hasSpouseForMedicare = (p.spouseEnabled || (p.spouseAge && p.spouseAge > 0)) && !spouseDead && !primaryDead;
    const spouseMedInPrimaryAge = hasSpouseForMedicare ? spouseMedicareAge + (p.currentAge - (p.spouseAge || 0)) : 999;
    const effectiveMedicareAge = primaryDead ? spouseMedicareAge
      : hasSpouseForMedicare ? Math.min(primaryMedicareAge, spouseMedInPrimaryAge) : primaryMedicareAge;

    // Savings phase -- with optional contribution limit enforcement
    let saved = 0;
    let employerMatchAmt = 0;
    if (!effectivelyRetired && !primaryDead) {
      // Pre-retirement cash flow: check if after-tax income covers expenses + savings
      // Compute approximate tax on earned income for cash flow check
      const preRetTaxEst = calcTax(Math.max(0, earned - (isSingle ? STD_DEDUCTION_SINGLE : STD_DEDUCTION)), isSingle)
        + calcStateTax({
            ordinaryInc: earned, capGains: 0, ss: 0, ssTaxable: 0,
            pensionTaxable: 0, taxableWd: 0, earned, other: 0,
            stdDed: isSingle ? STD_DEDUCTION_SINGLE : STD_DEDUCTION,
            isSingle, age,
          }, p.stateCode);
      const afterTaxIncome = earned + other + ssdiIncome + pensionIncome - preRetTaxEst;
      const preRetExpenses = expenses; // already set above (pre-retirement or fallback)
      const cashAfterExpenses = afterTaxIncome - preRetExpenses;
      // If cash after expenses < target savings, reduce savings or tap taxable accounts
      const targetSavings = (partialRetire ? savingsAtYear * (retireMonth / 12) : savingsAtYear)
        + (p.spouseAge && !spouseDead ? (spRetired ? 0 : spPartialRetire ? spSavingsAtYear * (spouseRetireMonth / 12) : spSavingsAtYear) : 0);

      let actualSavings = targetSavings;
      let preRetWithdrawal = 0;
      if (cashAfterExpenses < targetSavings) {
        // Shortfall: try to cover from taxable accounts (cash first, then investment)
        const shortfall = targetSavings - cashAfterExpenses;
        if (shortfall > 0 && cashAfterExpenses >= 0) {
          const fromCash = Math.min(shortfall, cash); cash -= fromCash;
          const fromInv = Math.min(shortfall - fromCash, taxableInv);
          if (taxableBasis !== null && taxableInv > 0) taxableBasis = Math.max(0, taxableBasis * ((taxableInv - fromInv) / taxableInv));
          taxableInv -= fromInv;
          preRetWithdrawal = fromCash + fromInv;
        } else if (cashAfterExpenses < 0) {
          const need = Math.abs(cashAfterExpenses) + targetSavings;
          const fromCash = Math.min(need, cash); cash -= fromCash;
          const fromInv = Math.min(need - fromCash, taxableInv);
          if (taxableBasis !== null && taxableInv > 0) taxableBasis = Math.max(0, taxableBasis * ((taxableInv - fromInv) / taxableInv));
          taxableInv -= fromInv;
          preRetWithdrawal = fromCash + fromInv;
          actualSavings = Math.max(0, preRetWithdrawal - Math.abs(cashAfterExpenses));
        }
        if (cashAfterExpenses >= 0) actualSavings = Math.min(targetSavings, cashAfterExpenses + preRetWithdrawal);
      }

      const hasPreTax = p.accounts.some(a => a.type === 'pretax');
      const rothBal = p.accounts.filter(a => a.type === 'roth').reduce((s,a) => s+a.balance, 0);
      const rothConvEnabled = p.rothConversion && p.rothConversion.enabled;
      const hasRoth = p.accounts.some(a => a.type === 'roth') && (rothBal > 0 || rothConvEnabled);
      const hasTaxable = p.accounts.some(a => a.type === 'taxable');

      if (p.enforceContribLimits !== false) {
        // 2025 limits (indexed roughly to inflation)
        const limInf = Math.pow(1 + p.inflation / 100, yr);
        const limit401k = Math.round(CONTRIB_401K * limInf);
        const limitIRA = Math.round(CONTRIB_IRA * limInf);
        const catchUp = age >= 50 ? (age >= 60 && age <= 63 ? Math.round(CATCHUP_401K_SECURE2 * limInf) : Math.round(CATCHUP_401K * limInf)) : 0;
        const catchUpIRA = age >= 50 ? Math.round(CATCHUP_IRA * limInf) : 0;

        // Primary savings (use actualSavings ratio to scale)
        const savRatio = targetSavings > 0 ? actualSavings / targetSavings : 0;
        const savAmt = (partialRetire ? savingsAtYear * (retireMonth / 12) : savingsAtYear) * savRatio;
        let toPT = Math.min(savAmt * 0.6, hasPreTax ? limit401k + catchUp : 0);
        let toRoth = Math.min(savAmt * 0.25, hasRoth ? limitIRA + catchUpIRA : 0);
        let toTaxable = hasTaxable ? Math.max(0, savAmt - toPT - toRoth) : 0;
        // If no taxable account, overflow back to pre-tax / roth if room
        if (!hasTaxable) { const overflow = Math.max(0, savAmt - toPT - toRoth); toPT += Math.min(overflow, Math.max(0, limit401k + catchUp - toPT)); }
        preTax += toPT; roth += toRoth; taxableInv += toTaxable; saved = toPT + toRoth + toTaxable;
        if (taxableBasis !== null) taxableBasis += toTaxable;
        // Employer match: primary
        if (hasPreTax) {
          const emMatch = calcEmployerMatch(p.employerMatch, primaryEarned, toPT, yr, limInf);
          preTax += emMatch; employerMatchAmt += emMatch;
        }

        // Spouse savings
        if (p.spouseAge && !spRetired && !spouseDead) {
          const spSavBase = spPartialRetire ? spSavingsAtYear * (spouseRetireMonth / 12) : spSavingsAtYear;
          const spSavAmt = spSavBase * savRatio;
          const spCatchUp = spAge >= 50 ? (spAge >= 60 && spAge <= 63 ? Math.round(CATCHUP_401K_SECURE2 * limInf) : Math.round(CATCHUP_401K * limInf)) : 0;
          const spCatchUpIRA = spAge >= 50 ? Math.round(CATCHUP_IRA * limInf) : 0;
          let spPT = Math.min(spSavAmt * 0.6, hasPreTax ? limit401k + spCatchUp : 0);
          let spR = Math.min(spSavAmt * 0.25, hasRoth ? limitIRA + spCatchUpIRA : 0);
          let spT = hasTaxable ? Math.max(0, spSavAmt - spPT - spR) : 0;
          preTax += spPT; roth += spR; taxableInv += spT; saved += spPT + spR + spT;
          if (taxableBasis !== null) taxableBasis += spT;
          // Employer match: spouse
          if (hasPreTax) {
            const spEmMatch = calcEmployerMatch(p.spouseEmployerMatch, spouseEarned, spPT, yr, limInf);
            preTax += spEmMatch; employerMatchAmt += spEmMatch;
          }
        }
      } else {
        // No limits -- original proportional allocation
        let wPT = hasPreTax ? 0.6 : 0, wR = hasRoth ? 0.25 : 0, wT = hasTaxable ? 0.15 : 0;
        const total = wPT + wR + wT;
        if (total > 0) { wPT /= total; wR /= total; wT /= total; }
        const allocate = (amount) => { preTax += amount * wPT; roth += amount * wR; taxableInv += amount * wT; if (taxableBasis !== null) taxableBasis += amount * wT; };
        const savRatio = targetSavings > 0 ? actualSavings / targetSavings : 0;
        const savAmt = (partialRetire ? savingsAtYear * (retireMonth / 12) : savingsAtYear) * savRatio;
        allocate(savAmt); saved = savAmt;
        // Employer match: primary (no-limits branch)
        const nlLimInf = Math.pow(1 + p.inflation / 100, yr);
        const nlPrimaryPT = savAmt * wPT;
        if (nlPrimaryPT > 0) {
          const emMatch = calcEmployerMatch(p.employerMatch, primaryEarned, nlPrimaryPT, yr, nlLimInf);
          preTax += emMatch; employerMatchAmt += emMatch;
        }
        if (p.spouseAge && !spRetired && !spouseDead) { const spSavBase = spPartialRetire ? spSavingsAtYear * (spouseRetireMonth / 12) : spSavingsAtYear; const spSavAmt2 = spSavBase * savRatio; allocate(spSavAmt2); saved += spSavAmt2;
          const nlSpPT = spSavAmt2 * wPT;
          if (nlSpPT > 0) { const spEmMatch = calcEmployerMatch(p.spouseEmployerMatch, spouseEarned, nlSpPT, yr, nlLimInf); preTax += spEmMatch; employerMatchAmt += spEmMatch; }
        }
      }
    }

    // HSA contributions — separate from employer savings; user-specified annual amount
    let hsaContribThisYear = 0;
    if (p.hsaAnnualContribution > 0 && age < (p.hsaContributionStopAge || 65) && !primaryDead) {
      const limInfHsa = Math.pow(1 + p.inflation / 100, yr);
      let hsaLimit = Infinity;
      if (p.enforceContribLimits !== false) {
        const baseLimit = (p.hsaCoverageType === 'family') ? CONTRIB_HSA_FAMILY : CONTRIB_HSA_SELF;
        const catchUp55 = age >= 55 ? CONTRIB_HSA_CATCHUP : 0;
        hsaLimit = Math.round((baseLimit + catchUp55) * limInfHsa);
      }
      hsaContribThisYear = Math.min(p.hsaAnnualContribution, hsaLimit);
      hsa += hsaContribThisYear;
      // Excess over HSA limit flows to brokerage if enforcing limits
      if (p.enforceContribLimits !== false && p.hsaAnnualContribution > hsaLimit) {
        const excess = p.hsaAnnualContribution - hsaLimit;
        taxableInv += excess;
        if (taxableBasis !== null) taxableBasis += excess;
      }
    }

    // Debt / Liability payments
    let debtPayments = 0;
    const debts = p.debts || [];
    for (const d of debts) {
      if (age >= (d.startAge || p.currentAge) && age <= (d.endAge || p.endAge)) {
        const pmt = (d.monthlyPayment || 0) * 12;
        debtPayments += pmt;
      }
    }
    expenses += debtPayments;

    // Long-Term Care costs
    let ltcCost = 0;
    const ltc = p.longTermCare || {};
    if (ltc.enabled && age >= (ltc.startAge || 82) && age < (ltc.startAge || 82) + (ltc.duration || 4)) {
      let cost = (ltc.annualCost || 100000) * Math.pow(1 + (ltc.inflation || 5) / 100, yr);
      if (ltc.hasInsurance) {
        const insInfRate = (ltc.insuranceInflation || 0) / 100;
        const insYears = age - (ltc.insurancePurchaseAge || p.currentAge);
        const inflatedCoverage = Math.round((ltc.insuranceCoverage || 0) * Math.pow(1 + insInfRate, Math.max(0, insYears)));
        cost = Math.max(0, cost - inflatedCoverage);
      }
      ltcCost = Math.round(cost);
      expenses += ltcCost;
    }

    // RMD
    let rmd = 0, rmdRequired = false;
    if (age >= rmdStart && preTax > 0) { rmd = calcRMD(preTax, age); rmdRequired = true; }

    // Charitable giving -- flexible schedule + QCD
    let qcdAmount = 0, charityAmount = 0;
    const charity = p.charitableGiving || {};
    if (charity.enabled) {
      // Determine this year's charitable amount
      let yearCharity = 0;
      if (charity.useSchedule && charity.schedule && charity.schedule.length > 0) {
        for (const s of charity.schedule) {
          if (age >= (s.startAge || 0) && age <= (s.endAge || p.endAge)) {
            if (s.pctIncome && s.pctIncome > 0) yearCharity += Math.round(totalInc * s.pctIncome / 100);
            else yearCharity += (s.amount || 0);
          }
        }
      } else {
        yearCharity = charity.annualAmount || 0;
        if (charity.growWithInflation) yearCharity = Math.round(yearCharity * Math.pow(1 + p.inflation / 100, yr));
      }
      charityAmount = yearCharity;

      // QCD portion: if age >= 70.5 and has RMD, use QCD to satisfy
      if (age >= 70 && preTax > 0 && rmdRequired) {
        const limit = QCD_ANNUAL_LIMIT * Math.pow(1 + p.inflation / 100, yr);
        qcdAmount = Math.min(yearCharity, limit, rmd, preTax);
      }
      // Non-QCD charity comes out of after-tax spending (included in expenses below)
      const nonQCDCharity = Math.max(0, yearCharity - qcdAmount);
      expenses += nonQCDCharity;
    }

    // Life insurance premiums
    let lifeInsPremiums = 0;
    const liPolicies = p.lifeInsurance || [];
    for (const li of liPolicies) {
      const insuredAge = li.insured === 'spouse' ? spAge : age;
      const insuredDead = li.insured === 'spouse' ? spouseDead : primaryDead;
      if (!insuredAge) continue;
      const isActive = !insuredDead
        && (li.type === 'permanent' || insuredAge < (li.expiresAge || 999));
      if (isActive) {
        lifeInsPremiums += (li.annualPremium || 0);
      }
    }
    expenses += lifeInsPremiums;

    // Life insurance death benefits — fire in the year of death
    let lifeInsBenefit = 0;
    for (const li of liPolicies) {
      const deathAge = li.insured === 'spouse' ? spouseDiesAge : primaryDiesAge;
      const justDied = deathAge && age === deathAge;
      if (!justDied) continue;
      const deathInsuredAge = li.insured === 'spouse'
        ? (p.spouseAge || 0) + (deathAge - p.currentAge)
        : deathAge;
      const wasActive = li.type === 'permanent'
        || deathInsuredAge < (li.expiresAge || 999);
      if (wasActive) {
        const benefit = li.deathBenefit || 0;
        taxableInv += benefit;
        if (taxableBasis !== null) taxableBasis += benefit;
        lifeInsBenefit += benefit;
      }
    }

    // Withdrawal phase
    let withdrawal = 0, taxableWd = 0, rmdUsed = 0, capGains = 0, hsaTaxableWd = 0, hsaPenalty = 0;
    // Step 1: RMDs are mandatory — always taken from pre-tax (minus QCDs)
    let rmdCash = 0; // RMD cash available for spending or reinvestment
    if (rmdRequired && rmd > 0) {
      if (qcdAmount > 0) { preTax -= qcdAmount; rmdUsed += qcdAmount; }
      const rmdRemaining = Math.max(0, rmd - qcdAmount);
      const rmdTaken = Math.min(rmdRemaining, preTax);
      preTax -= rmdTaken; taxableWd += rmdTaken; rmdUsed += rmdTaken;
      rmdCash = rmdTaken; // cash on hand from RMD, not yet allocated
    }

    const wdOrder = (() => {
      const sched = p.withdrawalOrderSchedule;
      if (sched && sched.length > 0) {
        const phase = sched.find(ph => age >= ph.startAge && age <= ph.endAge);
        if (phase && phase.order && phase.order.length > 0) {
          const base = ['cash', 'hsa', 'taxable', 'pretax', 'roth'];
          const order = [...phase.order];
          for (const src of base) { if (!order.includes(src)) order.push(src); }
          return order;
        }
      }
      return p.withdrawalOrder || ['cash', 'hsa', 'taxable', 'pretax', 'roth'];
    })();

    if (effectivelyRetired || primaryDead) {
      // totalInc includes earned income (covers partial retirement year & working spouse)
      const gap = Math.max(0, expenses - totalInc);
      let remaining = gap;
      // Step 2: Fill spending gap in user-configured order
      for (const src of wdOrder) {
        if (remaining <= 0) break;
        if (src === 'pretax') {
          // Use RMD cash first (already withdrawn), then voluntary withdrawals
          const fromRmd = Math.min(remaining, rmdCash);
          rmdCash -= fromRmd; remaining -= fromRmd; withdrawal += fromRmd;
          if (remaining > 0) {
            const vol = Math.min(remaining, preTax); preTax -= vol; remaining -= vol;
            taxableWd += vol; withdrawal += vol;
          }
        } else if (src === 'cash') {
          // Cash/HYS: pure principal return, zero capital gains
          const w = Math.min(remaining, cash); cash -= w; remaining -= w;
          withdrawal += w;
        } else if (src === 'taxable') {
          // Investment/brokerage: dynamic cost basis tracking or fallback fraction
          const w = Math.min(remaining, taxableInv);
          if (w > 0) {
            const gainFrac = taxableBasis !== null
              ? Math.max(0, (taxableInv - taxableBasis) / taxableInv)
              : (p.brokerageGainsFraction !== undefined ? p.brokerageGainsFraction : 0.5);
            capGains += w * gainFrac;
            if (taxableBasis !== null) taxableBasis = Math.max(0, taxableBasis * ((taxableInv - w) / taxableInv));
            taxableInv -= w;
          }
          remaining -= w;
          withdrawal += w;
        } else if (src === 'hsa') {
          const w = Math.min(remaining, hsa); hsa -= w; remaining -= w;
          withdrawal += w;
          const medFrac = p.hsaMedicalWithdrawalFraction !== undefined ? p.hsaMedicalWithdrawalFraction : 1.0;
          if (age >= 65) {
            // Post-65: medical fraction tax-free, non-medical taxed as ordinary income (no penalty)
            hsaTaxableWd += w * (1 - medFrac);
          } else {
            // Pre-65: non-medical portion taxed as ordinary income + 20% penalty
            const nonMed = w * (1 - medFrac);
            hsaTaxableWd += nonMed;
            hsaPenalty += Math.round(nonMed * 0.20);
          }
        } else if (src === 'roth') {
          const w = Math.min(remaining, roth); roth -= w; remaining -= w;
          withdrawal += w;
        }
      }
      // Step 3: Any RMD cash not used for spending gets reinvested into taxable investment
      if (rmdCash > 0) {
        if (taxableBasis !== null) taxableBasis += rmdCash;
        taxableInv += rmdCash; withdrawal += rmdCash; rmdCash = 0;
      }
      // Step 4: Save surplus earned income (partial retirement year / working spouse)
      if (earned > 0) {
        const surplus = Math.max(0, totalInc - expenses);
        if (surplus > 0) { taxableInv += surplus; saved += surplus; if (taxableBasis !== null) taxableBasis += surplus; }
      }
    } else if (rmdCash > 0) {
      // Not retired but RMD required — reinvest into taxable investment
      if (taxableBasis !== null) taxableBasis += rmdCash;
      taxableInv += rmdCash; withdrawal += rmdCash; rmdCash = 0;
    }

    // Add cash event capital gains to the capGains total (taxes computed below)
    capGains += cashEventGains + qualifiedDividends;

    // Cash/HYS interest income: taxable as ordinary income every year
    // Interest = current cash balance × return rate (this IS what the growth function adds to balance)
    const cashInterest = Math.round(cash * cashReturn / 100);

    // Roth Conversion - Feature #3: expanded strategies
    let rothConv = 0;
    const rc = p.rothConversion;
    if (rc && rc.enabled && age >= rc.startAge && age <= rc.endAge && preTax > 0) {
      if (rc.strategy === 'fixed') {
        rothConv = Math.min(rc.fixedAmount || 0, preTax);
      } else if (rc.strategy === 'fillBracket' || rc.strategy === 'smartFill') {
        const ssTaxForRoth = calcTaxableSS(ss, earned + taxableWd + hsaTaxableWd + capGains + cashInterest + ssdiIncome + pensionTaxable + other - hsaContribThisYear, isSingle);
        const curTaxable = earned + taxableWd + hsaTaxableWd + cashInterest + ssdiIncome + pensionTaxable + other + ssTaxForRoth - hsaContribThisYear;
        let stdDedTemp = isSingle ? STD_DEDUCTION_SINGLE : STD_DEDUCTION;
        // Include senior deductions so bracket room calculation matches actual tax computation
        if (age >= 65) {
          if (isSingle) { stdDedTemp += SENIOR_STD_DEDUCTION_SINGLE; }
          else { stdDedTemp += SENIOR_STD_DEDUCTION_MFJ; if (p.spouseEnabled && spAge !== null && spAge >= 65) stdDedTemp += SENIOR_STD_DEDUCTION_MFJ; }
          const projYr = new Date().getFullYear() + yr;
          if (projYr >= 2025 && projYr <= 2028) {
            const exM = Math.max(0, curTaxable - (isSingle ? OBBB_SENIOR_PHASEOUT_SINGLE : OBBB_SENIOR_PHASEOUT_MFJ));
            let ob = Math.max(0, OBBB_SENIOR_DEDUCTION - Math.round(exM * OBBB_SENIOR_PHASEOUT_RATE));
            if (!isSingle && p.spouseEnabled && spAge !== null && spAge >= 65) ob += Math.max(0, OBBB_SENIOR_DEDUCTION - Math.round(exM * OBBB_SENIOR_PHASEOUT_RATE));
            stdDedTemp += ob;
          }
        }
        const curTaxableAfterDed = Math.max(0, curTaxable - stdDedTemp);
        const brackets = isSingle ? TAX_BRACKETS_SINGLE : TAX_BRACKETS_MFJ;
        let bracketTop = 0;
        for (const b of brackets) { if (b.rate <= rc.targetBracket) bracketTop = b.max; }
        if (bracketTop === Infinity) bracketTop = curTaxableAfterDed;
        let bracketRoom = Math.max(0, bracketTop - curTaxableAfterDed);

        // Smart Fill: additionally cap at next IRMAA threshold to avoid triggering surcharges
        if (rc.strategy === 'smartFill') {
          const ssTaxForMAGI = calcTaxableSS(ss, earned + taxableWd + hsaTaxableWd + capGains + cashInterest + ssdiIncome + pensionTaxable + other - hsaContribThisYear, isSingle);
          const curMAGI = earned + taxableWd + hsaTaxableWd + capGains + cashInterest + ssdiIncome + pensionTaxable + other + ssTaxForMAGI - hsaContribThisYear;
          const irmaaBrackets = isSingle ? IRMAA_BRACKETS_SINGLE : IRMAA_BRACKETS_MFJ;
          // Find the next IRMAA tier above current MAGI
          let nextIRMAAThreshold = Infinity;
          for (const ib of irmaaBrackets) {
            if (ib.magi > curMAGI) { nextIRMAAThreshold = ib.magi; break; }
          }
          const irmaaRoom = Math.max(0, nextIRMAAThreshold - curMAGI);
          bracketRoom = Math.min(bracketRoom, irmaaRoom);
        }

        rothConv = Math.min(bracketRoom, preTax);
      } else if (rc.strategy === 'targetMAGI') {
        const ssTaxForMAGI = calcTaxableSS(ss, earned + taxableWd + hsaTaxableWd + capGains + cashInterest + ssdiIncome + pensionTaxable + other - hsaContribThisYear, isSingle);
        const curMAGI = earned + taxableWd + hsaTaxableWd + capGains + cashInterest + ssdiIncome + pensionTaxable + other + ssTaxForMAGI - hsaContribThisYear;
        rothConv = Math.min(Math.max(0, (rc.targetMAGI || 200000) - curMAGI), preTax);
      } else if (rc.strategy === 'percentBalance') {
        rothConv = Math.min(Math.round(preTax * (rc.percentOfBalance || 10) / 100), preTax);
      } else if (rc.strategy === 'custom') {
        const entry = (rc.customSchedule || []).find(e => e.age === age);
        if (entry) rothConv = Math.min(entry.amount || 0, preTax);
      }
      rothConv = Math.max(0, Math.round(rothConv));
      preTax -= rothConv; roth += rothConv;
    }

    // Tax - federal + state + capital gains + NIIT
    // HSA contributions are an above-the-line deduction (reduce AGI); HSA non-medical withdrawals are ordinary income
    // IRS §86: compute taxable portion of SS based on provisional income (includes cap gains)
    const otherIncForSS = earned + taxableWd + hsaTaxableWd + rothConv + capGains + cashInterest + ssdiIncome + pensionTaxable + other - hsaContribThisYear;
    const ssTaxable = calcTaxableSS(ss, otherIncForSS, isSingle);
    const otherIncNoConv = earned + taxableWd + hsaTaxableWd + capGains + cashInterest + ssdiIncome + pensionTaxable + other - hsaContribThisYear;
    const ssTaxableNoConv = calcTaxableSS(ss, otherIncNoConv, isSingle);

    // Standard deduction + senior additions
    let stdDed = isSingle ? STD_DEDUCTION_SINGLE : STD_DEDUCTION;
    // Existing law: additional standard deduction for age 65+
    if (age >= 65) {
      if (isSingle) {
        stdDed += SENIOR_STD_DEDUCTION_SINGLE;
      } else {
        // Primary is 65+; add per-person amount
        stdDed += SENIOR_STD_DEDUCTION_MFJ;
        // Spouse 65+ check
        if (p.spouseEnabled && spAge !== null && spAge >= 65) stdDed += SENIOR_STD_DEDUCTION_MFJ;
      }
    }
    // OBBB Senior Deduction (2025-2028): $6,000/person, phases out above threshold
    // Applied as above-the-line deduction (works for both itemizers and standard deduction)
    if (age >= 65 && projYear >= 2025 && projYear <= 2028) {
      const magiForPhaseout = otherIncForSS + ssTaxable;
      const phaseoutThresh = isSingle ? OBBB_SENIOR_PHASEOUT_SINGLE : OBBB_SENIOR_PHASEOUT_MFJ;
      const excessMAGI = Math.max(0, magiForPhaseout - phaseoutThresh);
      let obbbDed = Math.max(0, OBBB_SENIOR_DEDUCTION - Math.round(excessMAGI * OBBB_SENIOR_PHASEOUT_RATE));
      if (!isSingle && p.spouseEnabled && spAge !== null && spAge >= 65) {
        obbbDed += Math.max(0, OBBB_SENIOR_DEDUCTION - Math.round(excessMAGI * OBBB_SENIOR_PHASEOUT_RATE));
      }
      stdDed += obbbDed;
    }

    // Ordinary income tax (excludes capital gains — they're taxed at preferential rates)
    // HSA: contributions reduce income (above-the-line); non-medical withdrawals are ordinary income
    const ordinaryInc = earned + taxableWd + hsaTaxableWd + rothConv + cashInterest + ssdiIncome + pensionTaxable + other + ssTaxable - hsaContribThisYear;
    const ordinaryIncNoConv = earned + taxableWd + hsaTaxableWd + cashInterest + ssdiIncome + pensionTaxable + other + ssTaxableNoConv - hsaContribThisYear;
    const ordinaryTaxable = Math.max(0, ordinaryInc - stdDed);
    const fedTaxOrdinary = calcTax(ordinaryTaxable, isSingle);
    const taxWithoutConv = calcTax(Math.max(0, ordinaryIncNoConv - stdDed), isSingle);
    const conversionTax = Math.round(fedTaxOrdinary - taxWithoutConv);

    // Capital gains tax: LTCG stacks on top of ordinary taxable income
    // IRS Rev. Proc. 2024-40: MFJ 0%≤$96,700 / 15%≤$583,750 / 20%; Single 0%≤$48,350 / 15%≤$533,400 / 20%
    let cgTax = 0;
    if (capGains > 0) {
      const cg0Thresh = isSingle ? CG_0_THRESH_SINGLE : CG_0_THRESH_MFJ;
      const cg15Thresh = isSingle ? CG_15_THRESH_SINGLE : CG_15_THRESH_MFJ;
      // CG stacks on top of ordinary taxable income for rate determination
      const cgStart = ordinaryTaxable; // bottom of CG stack
      const cgEnd = ordinaryTaxable + capGains; // top of CG stack
      // Portion in 0% zone
      const in0 = Math.max(0, Math.min(capGains, cg0Thresh - cgStart));
      // Portion in 15% zone
      const in15Start = Math.max(cgStart, cg0Thresh);
      const in15 = Math.max(0, Math.min(cgEnd, cg15Thresh) - in15Start);
      // Portion in 20% zone
      const in20 = Math.max(0, cgEnd - Math.max(cgStart, cg15Thresh));
      cgTax = Math.round(in15 * 0.15 + in20 * 0.20);
    }

    // NIIT: 3.8% Net Investment Income Tax on lesser of (NII, MAGI exceeding threshold)
    // IRC §1411: applies to cap gains, interest, dividends for MAGI > $200K single / $250K MFJ
    const magi = otherIncForSS + ssTaxable;
    const niitThresh = isSingle ? NIIT_THRESH_SINGLE : NIIT_THRESH_MFJ;
    const nii = capGains + cashInterest; // net investment income includes interest
    const niitTax = (magi > niitThresh && nii > 0)
      ? Math.round(Math.min(nii, magi - niitThresh) * NIIT_RATE) : 0;

    const fedTax = fedTaxOrdinary + cgTax + niitTax + hsaPenalty;
    const stateTax = calcStateTax({
      ordinaryInc, capGains, ss, ssTaxable, pensionTaxable, taxableWd,
      earned, other, stdDed, isSingle, age, hsaContrib: hsaContribThisYear,
    }, p.stateCode);
    const tax = fedTax + stateTax;

    // IRMAA: 2-year MAGI lookback (your 2028 IRMAA is based on 2026 tax return)
    // Use MAGI from 2 years prior if available in projection history
    const irmaaMagi = (yr >= 2 && years[yr - 2]) ? years[yr - 2].magi : magi;
    const irmaaSingle = (yr >= 2 && years[yr - 2]) ? years[yr - 2].isSingle : isSingle;
    const irmaa = age >= effectiveMedicareAge ? calcIRMAA(irmaaMagi, irmaaSingle) : { partB: 0, partD: 0, surcharge: 0, totalAnnual: 0, bracketIdx: 0 };
    const medicareCost = age >= effectiveMedicareAge ? Math.round(irmaa.totalAnnual * Math.pow(1.05, yr)) : 0;

    // Feature #7: Per-account growth with proportional MC volatility
    // All three MC models (Normal, Historical, Stress) now store shocks as mean-zero deviations.
    // Historical shocks are centered on the historical mean (~11.8%), so the user's expected
    // return is preserved as the average. volScale dampens shocks for low-return accounts.
    const growAcct = (bal, nomRet) => {
      let nr;
      if (hasSequences) {
        const volScale = Math.max(0.1, Math.min(1.5, nomRet / Math.max(p.nominalReturn, 1)));
        nr = nomRet + (p._returnSeq[yr] !== undefined ? p._returnSeq[yr] * volScale : 0);
      } else {
        nr = nomRet;
      }
      return bal * (1 + nr / 100);
    };
    const bearOvr = p._bearOverrides?.[yr];
    const usePostRetRet = retired && p.postRetirementReturn != null;
    const effPtReturn = usePostRetRet ? p.postRetirementReturn : ptReturn;
    const effRReturn = usePostRetRet ? p.postRetirementReturn : rReturn;
    const effTInvReturn = usePostRetRet ? p.postRetirementReturn : tInvReturn;
    const effHsaReturn = usePostRetRet ? p.postRetirementReturn : hsaReturn;
    preTax = growAcct(preTax, bearOvr ? weightedBearReturn('pretax', bearOvr) : effPtReturn);
    roth = growAcct(roth, bearOvr ? weightedBearReturn('roth', bearOvr) : effRReturn);
    cash = growAcct(cash, cashReturn);
    taxableInv = growAcct(taxableInv, bearOvr ? weightedBearReturn('taxable', bearOvr, 'investment') : effTInvReturn);
    hsa = growAcct(hsa, bearOvr ? weightedBearReturn('hsa', bearOvr) : effHsaReturn);

    // One-time expenses: silent balance deductions
    const oneTimeExps = (p.oneTimeExpenses || []).filter(e => e.age === age);
    for (const exp of oneTimeExps) {
      const amt = exp.amount || 0;
      if (exp.source === 'pretax') preTax = Math.max(0, preTax - amt);
      else if (exp.source === 'roth') roth = Math.max(0, roth - amt);
      else {
        const oldInv = taxableInv;
        taxableInv = Math.max(0, taxableInv - amt);
        if (taxableBasis !== null && oldInv > 0) taxableBasis = Math.max(0, taxableBasis * (taxableInv / oldInv));
      }
    }

    taxable = cash + taxableInv; // combined for output

    const _cash = Math.round(cash), _inv = Math.round(taxableInv), _tax = _cash + _inv;
    const _pt = Math.round(preTax), _ro = Math.round(roth), _hsa = Math.round(hsa);
    years.push({
      age, year: new Date().getFullYear() + yr,
      earned: Math.round(earned), ss: Math.round(ss), ssWithheld: Math.round(ssWithheld), ssdi: Math.round(ssdiIncome),
      pension: pensionIncome, pensionTaxable: pensionTaxable, healthcare: healthcareCost, healthcareSource: (hc.enabled && healthcareCost > 0) ? (hc.source || 'aca') : null,
      acaSubsidy: Math.round(acaSubsidy), acaFPLPercent: acaFPLPercent, acaBenchmark: Math.round(acaBenchmark), acaNetPremium: Math.round(acaNetPremium),
      debtPayments: Math.round(debtPayments), ltcCost, charityTotal: Math.round(charityAmount),
      other: Math.round(other), totalInc: Math.round(totalInc), expenses: Math.round(expenses),
      savings: Math.round(saved), employerMatch: Math.round(employerMatchAmt), withdrawal: Math.round(withdrawal),
      tax: Math.round(tax), fedTax: Math.round(fedTax), stateTax: Math.round(stateTax),
      cgTax: Math.round(cgTax), niitTax: Math.round(niitTax), capGains: Math.round(capGains),
      preTax: _pt, roth: _ro, hsa: _hsa, hsaContrib: Math.round(hsaContribThisYear),
      taxable: _tax, cash: _cash, taxableInv: _inv,
      cashInterest: Math.round(cashInterest),
      netWorth: _pt + _ro + _tax + _hsa,
      retired: effectivelyRetired || primaryDead, rmd: Math.round(rmdUsed), rmdRequired,
      qcd: Math.round(qcdAmount),
      rothConv: Math.round(rothConv), conversionTax: Math.round(conversionTax),
      irmaa: Math.round(irmaa.surcharge), medicareCost: Math.round(medicareCost),
      irmaaBracket: irmaa.bracketIdx, isSingle, magi: Math.round(magi),
      qualifiedDividends: Math.round(qualifiedDividends),
      cashEventNet: Math.round(cashEventNet), cashEventGains: Math.round(cashEventGains),
      lifeInsPremiums: Math.round(lifeInsPremiums), lifeInsBenefit: Math.round(lifeInsBenefit),
      wdOrder: wdOrder,
    });
  }
  return years;
}

function runMonteCarlo(p, n = 500, retStd = 6, infStd = 1.5, model = 'normal', confidenceThreshold = 90) {
  const numYears = p.endAge - p.currentAge + 1;
  const results = [];
  const hist = HISTORICAL_MARKET_DATA;

  // Box-Muller transform for normally distributed random numbers
  function randNormal(mean, std) {
    const u1 = Math.random(), u2 = Math.random();
    return mean + std * Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
  }

  // Normalized t-distribution (std dev = 1) for stress test model
  function randTNorm(mean, std) {
    const df = 5;
    const t = randT(df) * Math.sqrt((df - 2) / df);
    return mean + std * t;
  }

  // Historical model: pre-compute means so we can center on user's assumptions
  // This preserves the historical volatility pattern (fat tails, crash magnitudes,
  // return-inflation correlation) but shifts the mean to match the user's expected
  // return and inflation, preventing S&P's ~11.8% avg from inflating a 7% portfolio
  const histMeanRet = hist.reduce((s, h) => s + h[1], 0) / hist.length;
  const histMeanInf = hist.reduce((s, h) => s + h[2], 0) / hist.length;

  for (let i = 0; i < n; i++) {
    const returnSeq = [];
    const inflationSeq = [];
    for (let y = 0; y < numYears; y++) {
      let shock, inf;
      if (model === 'historical') {
        // Bootstrap: pick a random historical year-pair (return + inflation stay correlated)
        const idx = Math.floor(Math.random() * hist.length);
        // Shock = deviation from historical mean (centered on zero)
        // growAcct then applies this via volScale, same as Normal/Stress
        shock = hist[idx][1] - histMeanRet;
        // Inflation: shift historical value so mean matches user's assumption
        inf = p.inflation + (hist[idx][2] - histMeanInf);
      } else if (model === 'stress') {
        // Fat-tailed: t-distribution shocks (more extreme events than normal)
        shock = randTNorm(0, retStd);
        inf = Math.max(-1, randNormal(p.inflation, infStd));
      } else {
        // Normal (existing behavior): Gaussian shocks
        shock = randNormal(0, retStd);
        inf = Math.max(-1, randNormal(p.inflation, infStd));
      }
      returnSeq.push(shock);
      inflationSeq.push(inf);
    }

    const mp = { ...p, _returnSeq: returnSeq, _inflationSeq: inflationSeq };
    const proj = runProjection(mp);
    results.push({ final: proj[proj.length - 1].netWorth, proj,
      bustAge: proj.find(y => y.netWorth <= 0)?.age || null });
  }
  // Build successByAge: fraction of sims solvent at each age from retirement to end
  const retIdx = results[0].proj.findIndex(y => y.age >= p.retirementAge);
  const sIdx = retIdx >= 0 ? retIdx : 0;
  const pLen = results[0].proj.length;
  const successByAge = [];
  for (let i = sIdx; i < pLen; i++) {
    const age = results[0].proj[i].age;
    const solventCount = results.filter(r => r.proj[i] && r.proj[i].netWorth > 0).length;
    successByAge.push({ age, rate: Math.round(solventCount / n * 100) });
  }
  const threshold = confidenceThreshold || 90;
  let fundedToAge = p.retirementAge;
  for (let i = successByAge.length - 1; i >= 0; i--) {
    if (successByAge[i].rate >= threshold) { fundedToAge = successByAge[i].age; break; }
  }

  results.sort((a, b) => a.final - b.final);
  const successCount = results.filter(r => r.final > 0).length;
  return {
    successRate: Math.round(successCount / n * 100),
    median: results[Math.floor(n * 0.5)].proj,
    p10: results[Math.floor(n * 0.1)].proj,
    p90: results[Math.floor(n * 0.9)].proj,
    avgBustAge: (() => { const busts = results.filter(r => r.bustAge); return busts.length > 0 ? Math.round(busts.reduce((s,r) => s + r.bustAge, 0) / busts.length) : null; })(),
    model: model,
    successByAge,
    fundedToAge,
    fundedToAgeThreshold: threshold,
  };
}

// -- Roth Conversion Optimizer ----------------------------------------

function optimizeRothConversion() {
  const p = state.params;
  const preTaxBal = p.accounts.filter(a => a.type === 'pretax').reduce((s, a) => s + a.balance, 0);
  if (preTaxBal <= 0) { state.rothOptResults = { error: 'No pre-tax balance to convert.' }; render(); return; }

  // Baseline: no conversions
  const baseProj = runProjection({...p, rothConversion: { enabled: false }});
  const baseTax = baseProj.reduce((s, y) => s + y.tax, 0);
  const baseRMD = baseProj.reduce((s, y) => s + y.rmd, 0);
  const baseIRMAA = baseProj.reduce((s, y) => s + y.irmaa, 0);
  const baseFinal = baseProj[baseProj.length - 1].netWorth;
  const baseBust = baseProj.find(y => y.netWorth <= 0)?.age || null;

  const birthYear = new Date().getFullYear() - p.currentAge;
  const rmdAge = rmdStartAge(birthYear);
  const candidates = [];

  // Test windows: vary start from retirementAge-2 to retirementAge+5, end from start+3 to rmdAge+2
  const startAges = [];
  for (let s = Math.max(p.currentAge, p.retirementAge - 2); s <= Math.min(p.retirementAge + 5, rmdAge); s++) startAges.push(s);
  const endAges = [];
  for (let e = Math.max(...startAges) + 1; e <= Math.min(rmdAge + 3, p.endAge); e++) endAges.push(e);

  // Strategies to test
  const fixedAmounts = [5000, 10000, 15000, 20000, 30000, 40000, 50000, 75000, 100000, 150000, 200000];
  const bracketTargets = [0.12, 0.22, 0.24];

  // Sample a few start/end combos to keep it fast
  const windows = [];
  for (const s of startAges) {
    for (const e of endAges) {
      if (e > s && e - s >= 2 && e - s <= 15) windows.push([s, e]);
    }
  }
  // Limit to ~20 windows max
  const sampledWindows = windows.length > 20
    ? windows.filter((_, i) => i % Math.ceil(windows.length / 20) === 0)
    : windows;

  for (const [startAge, endAge] of sampledWindows) {
    // Fixed amounts
    for (const amt of fixedAmounts) {
      const rc = { enabled: true, strategy: 'fixed', fixedAmount: amt, startAge, endAge, targetBracket: 0.22 };
      const proj = runProjection({...p, rothConversion: rc});
      const bust = proj.find(y => y.netWorth <= 0)?.age || null;
      // Only skip if strategy busts earlier than baseline
      if (bust && (!baseBust || bust < baseBust)) continue;
      candidates.push({ rc, proj, label: `$${(amt/1000).toFixed(0)}K/yr &#183; Ages ${startAge}-${endAge}` });
    }
    // Fill bracket
    for (const br of bracketTargets) {
      const rc = { enabled: true, strategy: 'fillBracket', fixedAmount: 0, startAge, endAge, targetBracket: br };
      const proj = runProjection({...p, rothConversion: rc});
      const bust = proj.find(y => y.netWorth <= 0)?.age || null;
      if (bust && (!baseBust || bust < baseBust)) continue;
      candidates.push({ rc, proj, label: `Fill ${(br*100).toFixed(0)}% &#183; Ages ${startAge}-${endAge}` });
    }
    // Smart Fill (IRMAA-aware bracket fill)
    for (const br of bracketTargets) {
      const rc = { enabled: true, strategy: 'smartFill', fixedAmount: 0, startAge, endAge, targetBracket: br };
      const proj = runProjection({...p, rothConversion: rc});
      const bust = proj.find(y => y.netWorth <= 0)?.age || null;
      if (bust && (!baseBust || bust < baseBust)) continue;
      candidates.push({ rc, proj, label: `Smart ${(br*100).toFixed(0)}% &#183; Ages ${startAge}-${endAge}` });
    }
  }

  // Score each candidate
  // Score modes: tax savings and IRMAA savings are independent; RMD reduction is NOT scored
  // separately because it's already captured in tax savings (lower RMDs = lower taxes).
  const weights = state.optScoreMode === 'taxMin' ? { tax: 0.70, irmaa: 0.20, nw: 0.10 }
    : state.optScoreMode === 'nwMax' ? { tax: 0.20, irmaa: 0.10, nw: 0.70 }
    : /* balanced */ { tax: 0.45, irmaa: 0.20, nw: 0.35 };
  const scored = candidates.map(c => {
    const tax = c.proj.reduce((s, y) => s + y.tax, 0);
    const rmd = c.proj.reduce((s, y) => s + y.rmd, 0);
    const irmaa = c.proj.reduce((s, y) => s + y.irmaa, 0);
    const conv = c.proj.reduce((s, y) => s + y.rothConv, 0);
    const convTax = c.proj.reduce((s, y) => s + y.conversionTax, 0);
    const final = c.proj[c.proj.length - 1].netWorth;

    // Breakeven age: when tax-adjusted NW catches up to baseline
    // Tax-adjusted NW = portfolio - cumulative taxes, capturing upfront conversion cost
    let breakevenAge = null;
    const csi = c.proj.findIndex(y => y.rothConv > 0);
    if (csi >= 0) {
      let ctC = 0, ctB = 0, prevAdjC = 0, prevAdjB = 0;
      for (let i = 0; i < Math.min(c.proj.length, baseProj.length); i++) {
        ctC += c.proj[i].tax || 0;
        ctB += baseProj[i].tax || 0;
        const adjC = c.proj[i].netWorth - ctC;
        const adjB = baseProj[i].netWorth - ctB;
        if (i >= csi && i > 0 && prevAdjC < prevAdjB && adjC >= adjB) {
          breakevenAge = c.proj[i].age;
        }
        prevAdjC = adjC; prevAdjB = adjB;
      }
      ctC = 0; ctB = 0;
      let everBehind = false;
      for (let i = 0; i < Math.min(c.proj.length, baseProj.length); i++) {
        ctC += c.proj[i].tax || 0;
        ctB += baseProj[i].tax || 0;
        if (i >= csi && (c.proj[i].netWorth - ctC) < (baseProj[i].netWorth - ctB)) {
          everBehind = true; break;
        }
      }
      if (!everBehind) breakevenAge = -1;
    }

    // Independent metrics (positive = better than baseline)
    const taxSaved = baseTax - tax;
    const irmaaSaved = baseIRMAA - irmaa;
    const nwGain = final - baseFinal;
    // Normalize each metric to baseline scale before weighting
    const taxNorm = baseTax > 0 ? taxSaved / baseTax : 0;
    const irmaaNorm = baseIRMAA > 0 ? irmaaSaved / baseIRMAA : 0;
    const nwNorm = baseFinal > 0 ? nwGain / baseFinal : 0;
    const score = taxNorm * weights.tax + irmaaNorm * weights.irmaa + nwNorm * weights.nw;

    return {
      ...c, tax, rmd, irmaa, conv, convTax, final, score, breakevenAge,
      taxDiff: tax - baseTax, rmdDiff: rmd - baseRMD, irmaaDiff: irmaa - baseIRMAA, nwDiff: final - baseFinal,
    };
  });

  // Sort by score descending (best first) and take top 8
  scored.sort((a, b) => b.score - a.score);
  const top = scored.slice(0, 8);

  state.rothOptResults = {
    baseline: { tax: baseTax, rmd: baseRMD, irmaa: baseIRMAA, final: baseFinal, bust: baseBust },
    strategies: top,
    totalTested: candidates.length,
  };
  state.rothOptAppliedIdx = null;
  render();
}

// -- Generate Optimal Schedule (Option C) ----------------------------------------
// Greedy forward pass: for each year in the conversion window, test candidate
// amounts and pick the one that produces the best lifetime outcome.
function generateOptimalSchedule() {
  if (proGuard()) return;
  const p = state.params;
  const preTaxBal = p.accounts.filter(a => a.type === 'pretax').reduce((s, a) => s + a.balance, 0);
  if (preTaxBal <= 0) { alert('No pre-tax balance to convert.'); return; }

  const rc = p.rothConversion || {};
  const startAge = rc.startAge || p.retirementAge || 65;
  const endAge = rc.endAge || 72;
  const targetBracket = rc.targetBracket || 0.22;

  // Scoring weights (same as optimizer)
  const weights = state.optScoreMode === 'taxMin' ? { tax: 0.70, irmaa: 0.20, nw: 0.10 }
    : state.optScoreMode === 'nwMax' ? { tax: 0.20, irmaa: 0.10, nw: 0.70 }
    : /* balanced */ { tax: 0.45, irmaa: 0.20, nw: 0.35 };

  // Baseline: no conversions
  const baseProj = runProjection({ ...p, rothConversion: { enabled: false } });
  const baseTax = baseProj.reduce((s, y) => s + y.tax, 0);
  const baseIRMAA = baseProj.reduce((s, y) => s + y.irmaa, 0);
  const baseFinal = baseProj[baseProj.length - 1].netWorth;

  function scoreProj(proj) {
    const tax = proj.reduce((s, y) => s + y.tax, 0);
    const irmaa = proj.reduce((s, y) => s + y.irmaa, 0);
    const final = proj[proj.length - 1].netWorth;
    const taxNorm = baseTax > 0 ? (baseTax - tax) / baseTax : 0;
    const irmaaNorm = baseIRMAA > 0 ? (baseIRMAA - irmaa) / baseIRMAA : 0;
    const nwNorm = baseFinal > 0 ? (final - baseFinal) / baseFinal : 0;
    return taxNorm * weights.tax + irmaaNorm * weights.irmaa + nwNorm * weights.nw;
  }

  // First pass: get Smart Fill amounts as seed (run one projection with smartFill)
  const seedProj = runProjection({ ...p, rothConversion: {
    enabled: true, strategy: 'smartFill', startAge, endAge, targetBracket,
  }});
  const seedSchedule = [];
  for (let age = startAge; age <= endAge; age++) {
    const yr = seedProj.find(y => y.age === age);
    seedSchedule.push({ age, amount: yr ? yr.rothConv : 0 });
  }

  // Candidate amounts to test for each year
  const fixedCandidates = [0, 5000, 10000, 25000, 50000, 75000, 100000, 150000, 200000, 300000];

  // Greedy forward pass: optimize one year at a time
  const committed = []; // { age, amount }
  for (let age = startAge; age <= endAge; age++) {
    const seedAmt = (seedSchedule.find(e => e.age === age) || {}).amount || 0;
    // Build candidate list: fixed amounts + seed amount + variations around seed
    const candidates = new Set(fixedCandidates);
    candidates.add(seedAmt);
    if (seedAmt > 0) {
      candidates.add(Math.round(seedAmt * 0.75));
      candidates.add(Math.round(seedAmt * 1.25));
      candidates.add(Math.round(seedAmt * 0.5));
    }
    const sortedCands = [...candidates].sort((a, b) => a - b);

    let bestAmt = 0, bestScore = -Infinity;
    for (const amt of sortedCands) {
      // Build schedule: committed years + this candidate + smartFill for remaining
      const schedule = [
        ...committed,
        { age, amount: amt },
      ];
      // For remaining years, use smartFill (engine will compute dynamically)
      // We achieve this by using custom schedule for committed+current, then smartFill for remaining
      // Simplest approach: build full custom schedule with committed+candidate, and for future years
      // use the seed amounts as reasonable estimates
      for (let futAge = age + 1; futAge <= endAge; futAge++) {
        const seed = (seedSchedule.find(e => e.age === futAge) || {}).amount || 0;
        schedule.push({ age: futAge, amount: seed });
      }

      const proj = runProjection({ ...p, rothConversion: {
        enabled: true, strategy: 'custom', startAge, endAge, targetBracket,
        customSchedule: schedule,
      }});
      const score = scoreProj(proj);
      if (score > bestScore) { bestScore = score; bestAmt = amt; }
    }
    committed.push({ age, amount: bestAmt });
  }

  // Optional second pass: refine each year with neighbors committed
  for (let pass = 0; pass < 1; pass++) {
    for (let i = 0; i < committed.length; i++) {
      const age = committed[i].age;
      const curAmt = committed[i].amount;
      // Fine-grained candidates around current best
      const refineCands = new Set([0, curAmt]);
      for (const delta of [-25000, -10000, -5000, 5000, 10000, 25000]) {
        refineCands.add(Math.max(0, curAmt + delta));
      }
      let bestAmt = curAmt, bestScore = -Infinity;
      for (const amt of refineCands) {
        const schedule = committed.map((e, j) => j === i ? { age, amount: amt } : e);
        const proj = runProjection({ ...p, rothConversion: {
          enabled: true, strategy: 'custom', startAge, endAge, targetBracket,
          customSchedule: schedule,
        }});
        const score = scoreProj(proj);
        if (score > bestScore) { bestScore = score; bestAmt = amt; }
      }
      committed[i].amount = bestAmt;
    }
  }

  // Apply the optimized schedule
  state.params.rothConversion = {
    ...rc, enabled: true, strategy: 'custom', startAge, endAge, targetBracket,
    customSchedule: committed.filter(e => e.amount > 0),
  };
  state.mcResults = null; state.rothOptResults = null; state.rothOptAppliedIdx = null;
  saveState(); render();
}
function runMC() {
  const btn = document.querySelector('.mc-btn');
  if (btn) { btn.textContent = 'Running...'; btn.disabled = true; }
  const mc = state.mcConfig;
  if (!mc.model) mc.model = 'normal';
  setTimeout(() => { state.mcResults = runMonteCarlo(state.params, mc.numSims, mc.returnStdDev, mc.inflationStdDev, mc.model, mc.confidenceThreshold || 90); render(); }, 50);
}
