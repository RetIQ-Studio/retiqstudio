  const curYear = new Date().getFullYear();

  const toggleKey = (key) => {
    let keys = state.projChartKeys || ['netWorth'];
    if (keys.includes(key)) { keys = keys.filter(k => k !== key); }
    else if (keys.length < 3) { keys.push(key); }
    if (keys.length === 0) keys = ['netWorth'];
    return keys;
  };

  const checkboxes = available.map(cat => {
    const checked = selKeys.includes(cat.key);
    const disabled = !checked && selKeys.length >= 3;
    return `<label style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:${checked?'var(--text)':'var(--text-dim)'};cursor:${disabled?'default':'pointer'};opacity:${disabled?'0.4':'1'}">
      <input type="checkbox" ${checked?'checked':''} ${disabled?'disabled':''} onchange="state.projChartKeys=[${
        checked ? selKeys.filter(k=>k!==cat.key).map(k=>"'"+k+"'").join(',')
        : [...selKeys, cat.key].map(k=>"'"+k+"'").join(',')
      }];render()" style="accent-color:${cat.color};width:13px;height:13px">
      ${cat.label}</label>`;
  }).join(' ');

  const chartData = proj.map(y => {
    const d = {age:y.age, year:y.year, retired:y.retired};
    selCats.forEach((c,i) => { d['v'+i] = deflate(y[c.key]||0, y.year-curYear); });
    return d;
  });
  const chartKeys = selCats.map((_,i) => 'v'+i);
  const chartColors = selCats.map(c => c.color);
  const chartLabels = selCats.map(c => c.label);
  const showTable = state.projShowTable || false;
  let html = `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div style="font-size:12px;font-weight:600;color:var(--text)">Select up to 3 categories:</div>
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" ${showTable?'checked':''} onchange="state.projShowTable=this.checked;render()" style="accent-color:var(--blue)"> Show data table
        </label>
        <button onclick="exportProjectionCSV()" style="font-size:11px;padding:4px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-dim);cursor:pointer" title="Export projection to CSV">&#x1F4BE; CSV</button>
      </div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px 12px;margin-bottom:10px">${checkboxes}</div>
    <div style="max-width:750px;margin:0 auto">
    ${buildChart(chartData, chartKeys, chartColors, chartLabels, {title: chartLabels.join(' + ') + (showRealDollars ? " (Today's $)" : " (Future $)"), height: 200})}
    </div>
  </div>`;
  if (showTable) {
    const allCols = [
      { head:'Age', key:'age', color:'', isCurrency:false, special:'age' },
      { head:'Year', key:'year', color:'', isCurrency:false },
      { head:'Earned', key:'earned', color:'var(--cyan)', isCurrency:true },
      { head:'SS', key:'ss', color:'var(--green)', isCurrency:true },
      { head:'SSDI', key:'ssdi', color:'var(--blue)', isCurrency:true },
      { head:'Pension', key:'pension', color:'var(--green)', isCurrency:true },
      { head:'Exp.', key:'expenses', color:'var(--red)', isCurrency:true },
      { head:'Fed Tax', key:'fedTax', color:'var(--purple)', isCurrency:true },
      { head:'State Tax', key:'stateTax', color:'var(--purple)', isCurrency:true },
      { head:'W/D', key:'withdrawal', color:'var(--amber)', isCurrency:true },
      { head:'RMD', key:'rmd', color:'var(--purple)', isCurrency:true },
      { head:'QCD', key:'qcd', color:'var(--amber)', isCurrency:true },
      { head:'Charity', key:'charityTotal', color:'var(--amber)', isCurrency:true },
      { head:'Roth Conv', key:'rothConv', color:'var(--cyan)', isCurrency:true },
      { head:'IRMAA', key:'irmaa', color:'var(--pink)', isCurrency:true },
      { head:'Medicare', key:'medicareCost', color:'var(--pink)', isCurrency:true },
      { head:'Pre-Tax', key:'preTax', color:'var(--blue)', isCurrency:true },
      { head:'Roth', key:'roth', color:'var(--green)', isCurrency:true },
      { head:'Cash/HYS', key:'cash', color:'var(--cyan)', isCurrency:true },
      { head:'Brokerage', key:'taxableInv', color:'var(--amber)', isCurrency:true },
      { head:'Net Worth', key:'netWorth', color:'', isCurrency:true, special:'nw' },
    ];
    const alwaysShow = new Set(['age','year','netWorth','expenses']);
    const cols = allCols.filter(col => alwaysShow.has(col.key) || proj.some(y => (y[col.key]||0)!==0));
    const hdr = cols.map(cc => `<th>${cc.head}</th>`).join('');
    const rows = proj.map(y => {
      const cls = y.age===p.retirementAge?' class="retire-year"':y.netWorth<=0?' class="bust-year"':'';
      return `<tr${cls}>${cols.map(cc => {
        const v = y[cc.key]||0;
        const dv = cc.isCurrency ? deflate(v, y.year-curYear) : v;
        let st = cc.color ? 'color:'+cc.color : '';
        if (cc.special==='nw') st='font-weight:600;color:'+(y.netWorth>0?'var(--text)':'var(--red)');
        return '<td'+(st?' style="'+st+'"':'')+'>'+(cc.isCurrency?fmtK(dv):dv)+'</td>';
      }).join('')}</tr>`;
    }).join('');
    // Total row
    const totals = cols.map(cc => {
      if (!cc.isCurrency) return '<td style="font-weight:700">Total</td>';
      if (cc.special==='nw' || cc.key==='preTax' || cc.key==='roth' || cc.key==='cash' || cc.key==='taxableInv') return '<td>--</td>';
      const sum = proj.reduce((s,y) => s + (y[cc.key]||0), 0);
      return '<td style="font-weight:600;color:'+cc.color+'">'+ fmtK(deflate(sum, Math.floor(proj.length/2))) +'</td>';
    }).join('');
    html += `<div class="card"><div style="overflow-x:auto;overflow-y:auto;max-height:70vh"><table class="proj-table"><thead><tr>${hdr}</tr></thead><tbody>${rows}<tr style="border-top:2px solid var(--border);background:rgba(59,130,246,.05)">${totals}</tr></tbody></table></div></div>`;
  }
  return html;
}

function renderMonteCarlo(proj) {
  const mc = state.mcResults;
  const p = state.params;
  const cfg = state.mcConfig;
  const realRet = ((1 + p.nominalReturn/100) / (1 + p.inflation/100) - 1) * 100;

  let results = '';
  if (mc) {
    const mF = mc.median[mc.median.length-1].netWorth;
    const p10F = mc.p10[mc.p10.length-1].netWorth;
    const p90F = mc.p90[mc.p90.length-1].netWorth;
    const color = mc.successRate >= 80 ? 'var(--green)' : mc.successRate >= 50 ? 'var(--amber)' : 'var(--red)';
    const chartData = mc.median.map((m,i) => ({ age:m.age, year:m.year, retired:m.retired, p90:mc.p90[i]?.netWorth||0, median:m.netWorth, p10:mc.p10[i]?.netWorth||0 }));
    results = `<div class="stats-row" style="justify-content:center">
      <div class="stat"><div class="stat-label">Success Rate</div><div class="stat-value" style="color:${color}">${mc.successRate}%</div><div class="stat-sub">${mc.successRate>=90?'Strong':mc.successRate>=75?'Good':mc.successRate>=50?'Caution':'High risk'}</div></div>
      <div class="stat"><div class="stat-label">Median Final</div><div class="stat-value" style="color:var(--cyan)">${fmtK(mF)}</div></div>
      <div class="stat"><div class="stat-label">10th Pctl</div><div class="stat-value" style="color:var(--amber)">${fmtK(p10F)}</div><div class="stat-sub">Bad luck</div></div>
      <div class="stat"><div class="stat-label">90th Pctl</div><div class="stat-value" style="color:var(--green)">${fmtK(p90F)}</div><div class="stat-sub">Good luck</div></div>
      ${mc.avgBustAge ? `<div class="stat"><div class="stat-label">Avg Bust Age</div><div class="stat-value" style="color:var(--red)">${mc.avgBustAge}</div><div class="stat-sub">Among failed simulations only</div></div>` : ''}
    </div>
    <div class="card">${buildChart(chartData,['p90','median','p10'],['#10b981','#06b6d4','#ef4444'],['90th Pctl','Median','10th Pctl'],{title:'Monte Carlo -- Net Worth Paths',height:220})}</div>`;
  }

  // MC Field helper (uses mcConfig, not params)
  function mcField(label, key, opts = {}) {
    const { suffix, help } = opts;
    const v = cfg[key];
    return `<div class="field"><label class="field-label">${label}</label><div class="field-wrap">
      <input type="number" class="field-input${suffix?' has-suffix':''}" value="${v}" onchange="setMCConfig('${key}',Number(this.value))">
      ${suffix ? `<span class="field-suffix">${suffix}</span>` : ''}
    </div>${help ? `<div class="field-help">${help}</div>` : ''}</div>`;
  }

  return `<div class="card" data-accent="purple"><div class="card-title">Monte Carlo Simulation</div>
    <div style="font-size:13px;color:var(--text-dim);margin-bottom:16px;line-height:1.6">
      Randomizes investment returns and inflation across multiple simulations to estimate the probability your money lasts through age ${p.endAge}.
    </div>

    <div class="grid-2" style="margin-bottom:16px">
      <div style="padding:14px;background:var(--bg-base);border-radius:8px;border:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:10px">Base Assumptions (from Inputs)</div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text-dim)">
          <div>Nominal Return: <strong style="color:var(--text)">${p.nominalReturn}%</strong></div>
          <div>Inflation: <strong style="color:var(--text)">${p.inflation}%</strong></div>
          <div>Real Return: <strong style="color:var(--cyan)">${realRet.toFixed(2)}%</strong></div>
        </div>
      </div>
      <div style="padding:14px;background:var(--bg-base);border-radius:8px;border:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:10px">Simulation Settings</div>
        <div class="grid-3" style="gap:8px">
          ${mcField('Simulations', 'numSims', { help: '100-2000' })}
          ${mcField('Return Std Dev', 'returnStdDev', { suffix: '%', help: 'Historical ~6%' })}
          ${mcField('Inflation Std Dev', 'inflationStdDev', { suffix: '%', help: 'Historical ~1.5%' })}
        </div>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:12px">
      <button class="mc-btn" onclick="runMC()">Run ${cfg.numSims} Simulations</button>
      <span style="font-size:11px;color:var(--text-faint)">
        Return range: ${(p.nominalReturn - cfg.returnStdDev).toFixed(1)}% - ${(p.nominalReturn + cfg.returnStdDev).toFixed(1)}% &#183;
        Inflation range: ${(p.inflation - cfg.inflationStdDev).toFixed(1)}% - ${(p.inflation + cfg.inflationStdDev).toFixed(1)}%
      </span>
    </div>
  </div>` + results;
}

function renderScenarios(proj) {
  const p = state.params, final = proj[proj.length-1].netWorth;
  const scenarios = [
    {name:'Retire at 60',o:{retirementAge:60}},{name:'Retire at 62',o:{retirementAge:62}},
    {name:'Retire at 67',o:{retirementAge:67}},{name:'Retire at 70',o:{retirementAge:70}},
    {name:'Lower returns (5%)',o:{nominalReturn:5}},{name:'Higher ret. expenses (+20%)',o:{annualExpenses:Math.round(p.annualExpenses*1.2)}},
    {name:'Higher pre-ret expenses (+20%)',o:{preRetirementExpenses:Math.round((p.preRetirementExpenses||0)*1.2)}},
    {name:'SS at 62',o:{ssClaimAge:62}},{name:'SS at 70',o:{ssClaimAge:70}},
    {name:'No COLA on SS',o:{ssCOLA:0}},{name:'High inflation (5%)',o:{inflation:5}},
    {name:'Roth Conv $50K/yr',o:{rothConversion:{enabled:true,strategy:'fixed',fixedAmount:50000,startAge:p.retirementAge,endAge:Math.min(p.retirementAge+7,72),targetBracket:0.22}}},
    {name:'Roth Conv Fill 22%',o:{rothConversion:{enabled:true,strategy:'fillBracket',fixedAmount:50000,startAge:p.retirementAge,endAge:Math.min(p.retirementAge+7,72),targetBracket:0.22}}},
    {name:'Roth Smart Fill 22%',o:{rothConversion:{enabled:true,strategy:'smartFill',fixedAmount:50000,startAge:p.retirementAge,endAge:Math.min(p.retirementAge+7,72),targetBracket:0.22}}},
    {name:'Low Return + High Inflation',o:{nominalReturn:5,inflation:5}},

  const scCategories = [
    { key: 'netWorth', label: 'Net Worth', color: '#3b82f6' },

    { key: 'ss', label: 'Social Security', color: '#10b981' },
    { key: 'ssdi', label: 'SSDI', color: '#3b82f6' },
    { key: 'expenses', label: 'Expenses', color: '#ef4444' },
    { key: 'fedTax', label: 'Federal Tax', color: '#8b5cf6' },
    { key: 'stateTax', label: 'State Tax', color: '#a855f7' },
    { key: 'rmd', label: 'RMDs', color: '#7c3aed' },
    { key: 'preTax', label: 'Pre-Tax Bal.', color: '#3b82f6' },

  ];
  const scSelKeys = state.scenarioChartKeys || ['netWorth'];

  const btns = scenarios.map((s,i) => `<button class="scenario-btn${state.scenario===i?' active':''}" onclick="state.scenario=${state.scenario===i?'null':i};render()">${s.name}</button>`).join('');

  const catCheckboxes = scAvail.map(cat => {
    const checked = scSelKeys.includes(cat.key);
    const disabled = !checked && scSelKeys.length >= 3;
    return `<label style="display:inline-flex;align-items:center;gap:3px;font-size:11px;color:${checked?'var(--text)':'var(--text-dim)'};cursor:${disabled?'default':'pointer'};opacity:${disabled?'0.4':'1'}">
      <input type="checkbox" ${checked?'checked':''} ${disabled?'disabled':''} onchange="state.scenarioChartKeys=[${
        checked ? scSelKeys.filter(k=>k!==cat.key).map(k=>"'"+k+"'").join(',')
        : [...scSelKeys, cat.key].map(k=>"'"+k+"'").join(',')
      }];render()" style="accent-color:${cat.color};width:12px;height:12px">
      ${cat.label}</label>`;
  }).join(' ');

  let cmp = '';
  if (state.scenario !== null && state.scenario !== 'survivor') {

    cmp = `<div class="stats-row">

        selCats.forEach((c,ci) => {
          keys.push('base'+ci, 'sc'+ci);
          colors.push(c.color, ci===0?scColor:['#ec4899','#a855f7'][ci-1]||scColor);
          labels.push('Base: '+c.label, sc.name+': '+c.label);
        });
        return buildChart(chartData, keys, colors, labels, {title:'Base vs '+sc.name, height:160});
      })()}
      </div>
    </div>`;

  // -- Survivor Scenario --

  const svExpRed = state.survivorExpRed !== undefined ? state.survivorExpRed : 30;
  const isSvActive = state.scenario === 'survivor';

  let survivorSection = `
  <div class="card" data-accent="pink"><div class="card-title">Survivor Scenario -- What If a Spouse Passes Away?</div>
    <div style="font-size:13px;color:var(--text-dim);margin-bottom:14px;line-height:1.6">

    <div class="grid-3" style="margin-bottom:14px">

          <option value="spouse"${svWho==='spouse'?' selected':''}>Spouse</option>
          <option value="primary"${svWho==='primary'?' selected':''}>You (Primary)</option>
        </select></div>
      <div class="field"><label class="field-label">${svWho==='spouse'?'Your age when this occurs':"Spouse age when this occurs"}</label>
        <input type="number" class="field-input" value="${svAge}"
          onchange="state.survivorAge=Number(this.value);if(state.scenario==='survivor')render();"></div>
      <div class="field"><label class="field-label">Expense reduction after</label>
        <div class="field-wrap"><input type="number" class="field-input has-suffix" value="${svExpRed}"
          onchange="state.survivorExpRed=Number(this.value);if(state.scenario==='survivor')render();">
          <span class="field-suffix">%</span></div>
        <div class="field-help">Typical: 25-35% for housing/food savings</div></div>
    </div>
    <button class="scenario-btn${isSvActive?' active':''}" style="padding:10px 20px;font-size:13px"
      onclick="state.scenario=${isSvActive?'null':"'survivor'"};render()">
      ${isSvActive ? '&#10003; Showing Survivor Scenario' : 'Run Survivor Scenario'}
    </button>
  </div>`;

  if (isSvActive) {
    const sp = runProjection({...p, survivorWho: svWho, survivorAge: svAge, survivorExpenseReduction: svExpRed});
    const sf = sp[sp.length-1].netWorth, diff = sf - final;
    const sBust = sp.find(y => y.netWorth <= 0)?.age;
    const baseTax = proj.reduce((s,y) => s+y.tax, 0);
    const svTax = sp.reduce((s,y) => s+y.tax, 0);
    const baseSS = proj.reduce((s,y) => s+y.ss+y.ssdi, 0);
    const svSS = sp.reduce((s,y) => s+y.ss+y.ssdi, 0);
    const label = svWho === 'spouse' ? 'Spouse passes at your age ' + svAge : 'You pass at age ' + svAge;
    const deathYear = sp.find(y => y.isSingle);

    const chartData = proj.map((b,i) => ({age:b.age,year:b.year,retired:b.retired,base:b.netWorth,scenario:sp[i]?.netWorth||0}));
    const ssChart = proj.map((b,i) => ({age:b.age,year:b.year,retired:b.retired,base:b.ss+b.ssdi,scenario:(sp[i]?.ss||0)+(sp[i]?.ssdi||0)}));
    const taxChart = proj.map((b,i) => ({age:b.age,year:b.year,retired:b.retired,base:b.tax,scenario:sp[i]?.tax||0}));

    survivorSection += `
    <div class="stats-row">
      <div class="stat"><div class="stat-label">Base Final NW</div><div class="stat-value" style="color:var(--blue)">${fmtK(final)}</div></div>
      <div class="stat"><div class="stat-label">Survivor Final NW</div><div class="stat-value" style="color:var(--pink)">${fmtK(sf)}</div></div>
      <div class="stat"><div class="stat-label">NW Difference</div><div class="stat-value" style="color:${diff>=0?'var(--green)':'var(--red)'}">${fmtK(diff)}</div></div>
      <div class="stat"><div class="stat-label">Lasts To</div><div class="stat-value" style="color:${sBust?'var(--red)':'var(--green)'}">${sBust?'Age '+sBust:p.endAge+'+'}</div></div>
      <div class="stat"><div class="stat-label">SS Impact</div><div class="stat-value" style="color:var(--red)">${fmtK(svSS - baseSS)}</div><div class="stat-sub">Lifetime</div></div>
      <div class="stat"><div class="stat-label">Tax Impact</div><div class="stat-value" style="color:${svTax > baseTax?'var(--red)':'var(--green)'}">${fmtK(svTax - baseTax)}</div><div class="stat-sub">${svTax > baseTax ? 'Higher (single brackets)' : 'Lower'}</div></div>
    </div>
    <div class="grid-2">
      <div class="card"><div style="max-width:480px;margin:0 auto">${buildChart(chartData,['base','scenario'],['#3b82f6','#ec4899'],['Base Plan',label],{title:'Net Worth Comparison',height:150})}</div></div>
      <div class="card"><div style="max-width:480px;margin:0 auto">${buildChart(ssChart,['base','scenario'],['#10b981','#ec4899'],['Base SS+SSDI','Survivor SS+SSDI'],{title:'Social Security & SSDI Impact',height:150})}</div></div>
    </div>
    <div class="card"><div style="max-width:560px;margin:0 auto">${buildChart(taxChart,['base','scenario'],['#8b5cf6','#ec4899'],['Base Taxes','Survivor Taxes'],{title:'Tax Burden -- MFJ vs Single Filer',height:140})}</div></div>

    <div class="card"><div class="card-title">Survivor Impact Summary</div>
      <div style="font-size:13px;line-height:1.8;color:var(--text-dim)">
        If <strong style="color:var(--text)">${svWho === 'spouse' ? 'your spouse' : 'you'}</strong> passes away at
        ${svWho === 'spouse' ? 'your' : "your spouse's"} age <strong style="color:var(--pink)">${svAge}</strong>:
        The surviving spouse receives the <strong>higher</strong> of the two SS benefits (not both), losing
        <strong style="color:var(--red)">${fmtK(Math.abs(svSS - baseSS))}</strong> in lifetime SS income.
        Expenses drop by <strong>${svExpRed}%</strong>, but tax brackets shift to single-filer rates
        ${svTax > baseTax
          ? `, adding <strong style="color:var(--red)">${fmtK(svTax - baseTax)}</strong> in lifetime taxes due to narrower brackets and lower IRMAA thresholds.`
          : `, saving <strong style="color:var(--green)">${fmtK(baseTax - svTax)}</strong> in taxes due to lower overall income.`}
        ${sf > 0
          ? ` Portfolio ends at <strong style="color:var(--green)">${fmtK(sf)}</strong>.`
          : ` <strong style="color:var(--red)">Portfolio depleted at age ${sBust}.</strong>`}
      </div>
    </div>`;
  }

  return `<div class="card" data-accent="amber"><div class="card-title">Scenario Comparison</div>
    <div style="font-size:13px;color:var(--text-dim);margin-bottom:16px">Compare your base plan against different assumptions.</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">${btns}</div>
  </div>` + cmp + survivorSection;
}

function renderValidation() {
  // Group by category
  const cats = {};
  let total = 0, passed = 0;
  for (const [cat, name, source, expected, actual, tol, pass] of VALIDATION_DATA) {
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push({ name, source, expected, actual, tol, pass });
    total++;
    if (pass) passed++;
  }
  const rate = (passed / total * 100).toFixed(1);
  const allPass = passed === total;
  const statusColor = allPass ? 'var(--green)' : 'var(--red)';
  const statusIcon = allPass ? '\u2705' : '\u274c';

  let html = `<div class="card" style="max-width:1100px;margin:0 auto">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <span style="font-size:22px">${statusIcon}</span>
      <div>
        <div style="font-size:18px;font-weight:700;color:${statusColor}">${passed}/${total} Tests Passing (${rate}%)</div>
        <div style="font-size:12px;color:var(--text-dim)">Verified against IRS publications, SSA tables, CMS Medicare data, SECURE Act 2.0, and OBBB Act 2025</div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--text-faint);margin-bottom:18px;line-height:1.6">
      Every calculation in RetIQ's engine is tested against authoritative government sources. This report runs automatically before each release.
      For methodology details, see the <a href="https://retirementiq.app/manual.html#validation" target="_blank" style="color:var(--blue);text-decoration:none">User Manual &sect;23</a>.
    </div>`;

  // Category summary bar
  html += `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px">`;
  for (const [cat, tests] of Object.entries(cats)) {
    const cp = tests.filter(t => t.pass).length;
    const ct = tests.length;
    const ok = cp === ct;
    html += `<button onclick="document.getElementById('vc_${cat.replace(/[^a-zA-Z]/g,'')}').scrollIntoView({behavior:'smooth',block:'start'})"
      style="background:${ok ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)'};border:1px solid ${ok ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)'};
      border-radius:6px;padding:4px 10px;font-size:11px;color:${ok ? 'var(--green)' : 'var(--red)'};cursor:pointer;font-family:inherit">
      ${cat} <span style="font-weight:700">${cp}/${ct}</span></button>`;
  }
  html += `</div>`;

  // Each category table
  for (const [cat, tests] of Object.entries(cats)) {
    const cp = tests.filter(t => t.pass).length;
    const ct = tests.length;
    html += `<div id="vc_${cat.replace(/[^a-zA-Z]/g,'')}" style="margin-bottom:20px">
      <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;display:flex;align-items:center;gap:8px">
        <span style="color:${cp===ct?'var(--green)':'var(--red)'}">${cp===ct?'\u2713':'\u2717'}</span> ${cat}
        <span style="font-size:11px;font-weight:400;color:var(--text-faint)">${cp}/${ct}</span>
      </div>
      <div style="overflow-x:auto"><table class="proj-table" style="font-size:11.5px">
        <thead><tr><th style="width:30px"></th><th>Test</th><th>Expected</th><th>Actual</th><th>\u00b1</th><th>Source</th></tr></thead><tbody>`;
    for (const t of tests) {
      const fmtV = v => typeof v === 'number' && Math.abs(v) >= 100 ? v.toLocaleString() : v;
      html += `<tr style="${!t.pass?'background:rgba(239,68,68,0.08)':''}">
        <td style="text-align:center;color:${t.pass?'var(--green)':'var(--red)'}">${t.pass?'\u2713':'\u2717'}</td>
        <td>${t.name}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:11px">${fmtV(t.expected)}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${t.pass?'var(--text)':'var(--red)'}">${fmtV(t.actual)}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-faint)">${t.tol}</td>
        <td style="font-size:10.5px;color:var(--text-faint)">${t.source}</td>
      </tr>`;
    }
    html += `</tbody></table></div></div>`;
  }

  html += `</div>`;
  return html;
}

function render() {
  renderNav();
  renderDollarToggle();
  const proj = runProjection(state.params);
  let html = '';
  switch (state.tab) {
    case 'dashboard': html = renderDashboard(proj); break;
    case 'inputs': html = renderInputs(); break;
    case 'projection': html = renderProjectionTable(proj); break;
    case 'montecarlo': html = renderMonteCarlo(proj); break;
    case 'scenarios': html = renderScenarios(proj); break;
    case 'validation': html = renderValidation(); break;
  }
  html += '<div class="footer">RetIQ v1.4 &#183; Build 2026-02-27 01:05 ET &#183; All data local &#183; Not financial advice &#183; Save/Load to keep your plan &#183; <a href="https://retirementiq.app/security.html" target="_blank" style="color:var(--green);text-decoration:none">&#128737; Privacy &amp; Security</a> &#183; <a href="https://github.com/RetIQ-Studio/retiqstudio" target="_blank" style="color:var(--text-dim);text-decoration:none">Source (BSL 1.1)</a></div>';
  document.getElementById('app').innerHTML = html;
  updateHeaderHeight();
  // Scroll active sub-nav tab into view on mobile
  const activeSub = document.querySelector('.sub-nav .tab.active');
  if (activeSub) activeSub.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
}
function updateHeaderHeight() {
  const hdr = document.querySelector('.header');
  if (hdr) document.documentElement.style.setProperty('--header-h', hdr.offsetHeight + 'px');
}
window.addEventListener('resize', updateHeaderHeight);
// Fix mobile orientation change: iOS doesn't always reflow properly
window.addEventListener('orientationchange', () => {
  setTimeout(() => { updateHeaderHeight(); render(); }, 150);
});
render();
updateHeaderHeight();

const RETIQ_API = "https://retiq-worker.bortvin.workers.dev";

function setPlanBadge(isPro){
  const badge = document.getElementById("planBadge");
  if(!badge) return;
  if(isPro){
    badge.textContent = "PRO ✓";
    badge.style.background = "#065f46";
    badge.style.color = "#ecfdf5";
  }else{
    badge.textContent = "FREE";
    badge.style.background = "#111827";
    badge.style.color = "#e5e7eb";
  }
}

function hideUpgradeIfPro(){
  const buy = document.getElementById("buyBtn");
  if(!buy) return;
  if(localStorage.getItem("retiq_pro")==="true") { buy.style.display = "none"; return; }
  buy.style.display = "inline-flex";
  // Show correct price based on launch pricing
  const trialStart = parseInt(localStorage.getItem("retiq_trial_start") || "0", 10);
  const inLaunch = trialStart > 0 && (Date.now() - trialStart) / (1000*60*60*24) < 7;
  buy.textContent = inLaunch ? "Upgrade $29" : "Upgrade $49";
  buy.title = inLaunch ? "Pro: full customization, exports — $29 launch price" : "Pro: full customization, exports — $49 one-time";
}

function setActivateLabel(){
  const btn = document.getElementById("activateBtn");
  if(!btn) return;
  const pro = localStorage.getItem("retiq_pro")==="true" && localStorage.getItem("retiq_license");
  btn.textContent = pro ? "Manage" : "Activate";
}

async function validateLicense(key){
  try{
    const r = await fetch(`${RETIQ_API}/validate-license?license=${encodeURIComponent(key)}`);
    if(!r.ok) return false;
    const d = await r.json();
    return d.valid === true;
  }catch{ return null; } // null = network error (offline), false = explicitly invalid
}

// ---- Pro gating helpers ----
function requirePro(reason){
  const want = confirm(`${reason}\n\nUpgrade to RetIQ Pro now?`);
  if(want){
    document.getElementById("buyBtn")?.click();
  }
  return false;
}

// Gate exportHTML behind Pro
(function gateExport(){
  // exportHTML is a function already defined in this file
  if(typeof window.exportHTML === "function"){
    const original = window.exportHTML;
    window.exportHTML = function(){
      if(localStorage.getItem("retiq_pro") !== "true"){
        return requirePro("Saving an HTML snapshot is a Pro feature.");
      }
      return original.apply(this, arguments);
    };
  }
})();

// ---- Upgrade ----
document.getElementById("buyBtn")?.addEventListener("click", async ()=>{
  let trialToken = localStorage.getItem("retiq_trial_token") || null;

  // If we think we're in the launch window but have no token, try to get one
  const trialStart = parseInt(localStorage.getItem("retiq_trial_start") || "0", 10);
  const inLaunchWindow = trialStart > 0 && (Date.now() - trialStart) / (1000*60*60*24) < 7;

  if (inLaunchWindow && !trialToken) {
    try {
      const tr = await fetch(`${RETIQ_API}/start-trial`, { method: "POST" });
      if (tr.ok) {
        const td = await tr.json();
        if (td.token) {
          trialToken = td.token;
          localStorage.setItem("retiq_trial_token", td.token);
          localStorage.setItem("retiq_trial_start", String(td.issuedAt));
        }
      }
    } catch { /* proceed without token */ }
  }

  const r = await fetch(`${RETIQ_API}/create-checkout-session`, {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ token: trialToken })
  });
  const d = await r.json();
  if(d.url) location.href = d.url;
  else alert("Could not start checkout. Please try again.");
});

    document.getElementById("amBackToKey").onclick = () => {
      document.getElementById("amRecoverView").style.display = "none";
      document.getElementById("amActivateView").style.display = "block";
      keyInput.focus();
    };

    // Send recovery email
    document.getElementById("amRecover").onclick = async () => {
      const email = document.getElementById("amEmailInput").value.trim();
      const recoverMsg = document.getElementById("amRecoverMsg");
      if (!email || !email.includes("@")) {
        recoverMsg.style.color = "#f87171"; recoverMsg.textContent = "Please enter a valid email.";
        return;
      }
      const btn = document.getElementById("amRecover");
      btn.disabled = true; btn.textContent = "Sending…";
      recoverMsg.style.color = "#60a5fa"; recoverMsg.textContent = "";
      try {
        const r = await fetch(`${RETIQ_API}/recover-license`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
        const d = await r.json();
        if (d.error === "rate_limited") {
          recoverMsg.style.color = "#f87171";
          recoverMsg.textContent = d.message || "Too many requests. Try again later.";
        } else if (d.ok) {
          recoverMsg.style.color = "#4ade80";
          recoverMsg.textContent = d.message;
        } else {
          recoverMsg.style.color = "#f87171";
          recoverMsg.textContent = "Something went wrong. Please try again.";
        }
      } catch {
        recoverMsg.style.color = "#f87171";
        recoverMsg.textContent = "Could not reach server. Check your connection.";
      }
      btn.disabled = false; btn.textContent = "Send Recovery Email";
    };

    // Enter key in email field
    document.getElementById("amEmailInput").addEventListener("keydown", (e) => { if (e.key === "Enter") document.getElementById("amRecover").click(); });
  }
}

document.getElementById("activateBtn")?.addEventListener("click", () => openActivateModal());
  

// Auto-restore license on load
(async ()=>{
  const saved = localStorage.getItem("retiq_license");
  const result = saved ? await validateLicense(saved) : false;
  if(result === true){
    localStorage.setItem("retiq_pro","true");
    setPlanBadge(true);
    hideUpgradeIfPro();
    setActivateLabel();
    // Restore saved user data now that pro is confirmed
    try { const s = localStorage.getItem('retiq_v1'); if (s) { state.params = JSON.parse(s); migrateParams(); render(); } } catch(e) {}
  } else if(result === null){
    // Network error (offline) — keep existing pro status if previously validated
    const wasPro = localStorage.getItem("retiq_pro")==="true";
    setPlanBadge(wasPro);
    hideUpgradeIfPro();
    setActivateLabel();
    if(wasPro){ try { const s = localStorage.getItem('retiq_v1'); if (s) { state.params = JSON.parse(s); migrateParams(); render(); } } catch(e) {} }
  } else {
    // License explicitly invalid — demote
    localStorage.removeItem("retiq_pro");
    setPlanBadge(false);
    hideUpgradeIfPro();
    setActivateLabel();
  }
})();



// ---------- INSTALL UX (intentional) ----------
(function(){
  const installBtn = document.getElementById("installBtn");
  if(!installBtn) return;

  // Hide install button if already installed/standalone
  const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
  if(isStandalone) {
    installBtn.style.display = "none";
    return;
  }

  // Minimal modal (created on demand)
  function openInstallModal(canPrompt){
    const existing = document.getElementById("retiqInstallModal");
    if(existing) existing.remove();

    const overlay = document.createElement("div");
    overlay.id = "retiqInstallModal";
    overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px;";

    const card = document.createElement("div");
    card.style.cssText = "max-width:520px;width:100%;background:#0b1220;color:#e5e7eb;border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:16px 16px 14px;box-shadow:0 10px 30px rgba(0,0,0,.35);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;";

    const title = document.createElement("div");
    title.style.cssText = "font-weight:800;font-size:16px;margin-bottom:8px;";
    title.textContent = "Install RetIQ";

    const body = document.createElement("div");
    body.style.cssText = "font-size:13px;line-height:1.5;color:#cbd5e1;margin-bottom:12px;";

    const ua = navigator.userAgent;
    const isIOS = /iPhone|iPad|iPod/i.test(ua);
    const isMacSafari = /^((?!chrome|android).)*safari/i.test(ua) && /Mac/i.test(ua);
    const isChromium = /Chrome|Edg/i.test(ua);

    if(canPrompt){
      body.innerHTML = "Your browser supports one-click install. Click <b>Install now</b>.";
    } else if(isIOS){
      body.innerHTML = "On iPhone/iPad: tap <b>Share</b> → <b>Add to Home Screen</b>.";
    } else if(isMacSafari){
      body.innerHTML = "On Safari (macOS): use <b>File</b> → <b>Add to Dock</b> (or Share → Add to Dock, depending on version).";
    } else if(isChromium){
      body.innerHTML = "In Chrome/Edge: open the browser menu → <b>Install app</b> (or the install icon in the address bar).";
    } else {
      body.innerHTML = "Use your browser’s install option (often in the menu) to install this app.";
    }

    const actions = document.createElement("div");
    actions.style.cssText = "display:flex;gap:10px;justify-content:flex-end;";

    const closeBtn = document.createElement("button");
    closeBtn.textContent = "Close";
    closeBtn.style.cssText = "padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#e5e7eb;cursor:pointer;";
    closeBtn.onclick = ()=>overlay.remove();

    actions.appendChild(closeBtn);

    if(canPrompt){
      const doBtn = document.createElement("button");
      doBtn.textContent = "Install now";
      doBtn.style.cssText = "padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:#2563eb;color:white;cursor:pointer;";
      doBtn.onclick = async ()=>{
        try{
          await window.__retiqDeferredPrompt.prompt();
          window.__retiqDeferredPrompt = null;
          overlay.remove();
        }catch(e){
          overlay.remove();
          alert("Install prompt could not be shown. Use the browser menu to install.");
        }
      };
      actions.insertBefore(doBtn, closeBtn);
    }

    card.appendChild(title);
    card.appendChild(body);
    card.appendChild(actions);
    overlay.appendChild(card);
    overlay.addEventListener("click",(e)=>{ if(e.target===overlay) overlay.remove();});
    document.body.appendChild(overlay);
  }

  // Capture the install prompt if available (Chrome/Edge)
  window.__retiqDeferredPrompt = null;
  window.addEventListener("beforeinstallprompt",(e)=>{
    e.preventDefault();
    window.__retiqDeferredPrompt = e;
  });

  // Always open the modal on click; if we have deferred prompt, include Install now button
  installBtn.addEventListener("click", ()=>{
    openInstallModal(!!window.__retiqDeferredPrompt);
  });

  window.addEventListener("appinstalled", ()=>{
    installBtn.style.display = "none";
  });
})();

</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').then((reg) => {
        // Check for waiting worker on page load (update installed while away)
        if (reg.waiting) showUpdateBanner(reg.waiting);

        // Detect new worker arriving
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', () => {
            // installed + existing controller = update ready
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              showUpdateBanner(newWorker);
            }
          });
        });
      }).catch((err) => {
        console.warn('Service worker registration failed:', err);
      });

      // When a new SW activates (replacing an old one), reload to pick up new code.
      // Skip on first-ever install (no previous controller) to avoid unnecessary reload.
      const hadController = !!navigator.serviceWorker.controller;
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (hadController && !refreshing) {
          refreshing = true;
          window.location.reload();
        }
      });
    });
  }

  function showUpdateBanner(worker) {
    if (document.getElementById('sw-update-banner')) return; // already showing
    const banner = document.createElement('div');
    banner.id = 'sw-update-banner';
    banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:9999;display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 16px;background:linear-gradient(135deg,rgba(16,185,129,0.95),rgba(6,182,212,0.95));color:#fff;font-size:13px;font-family:system-ui,sans-serif;box-shadow:0 -2px 12px rgba(0,0,0,0.3);backdrop-filter:blur(8px)';
    banner.innerHTML = '<span>&#9889; A new version of RetIQ is available.</span>'
      + '<button onclick="document.getElementById(\'sw-update-banner\')._worker.postMessage({type:\'SKIP_WAITING\'})" '
      + 'style="background:#fff;color:#047857;border:none;border-radius:6px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer">Update now</button>'
      + '<button onclick="this.parentElement.remove()" '
      + 'style="background:transparent;color:rgba(255,255,255,0.8);border:1px solid rgba(255,255,255,0.4);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer">Later</button>';
    banner._worker = worker;
    document.body.appendChild(banner);
  }
</script>
